<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0) 20%),
      linear-gradient(140deg, #f1ede5 0%, #fbfaf6 58%, #e7f0ea 100%);
  }
</style>

<template id="claude-app-surface-template">
  <div id="claude-app-surface" data-composition-id="claude-app-surface" data-width="1180" data-height="780">
    <section class="claude-app-window dframe-root" data-primitive="claude-app-window" aria-label="Editable Claude app surface">
      <aside class="dframe-sidebar" data-primitive="claude-sidebar">
        <div class="claude-traffic" aria-hidden="true">
          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>
        </div>

        <div class="sidebar-head">
          <div class="claude-app-brand">
            <span class="claude-sunburst small" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span>
            </span>
            <span>Claude</span>
          </div>
          <button class="sidebar-icon-button" type="button" aria-label="Collapse sidebar"></button>
        </div>

        <div class="mode-switch" aria-label="Claude mode">
          <button type="button">Chat</button>
          <button type="button">Code</button>
          <button class="active" type="button">Cowork</button>
        </div>

        <div class="sidebar-primary-actions">
          <button class="new-chat-button" type="button">
            <span class="sidebar-symbol compose"></span>
            <span>New task</span>
          </button>
          <button class="search-chat-button" type="button">
            <span class="sidebar-symbol search"></span>
            <span>Search tasks</span>
          </button>
        </div>

        <div class="sidebar-section-label">Active tasks</div>
        <div class="dframe-row selected"><span class="sidebar-symbol project"></span><span>Q2 deck chart</span></div>
        <div class="dframe-row"><span class="sidebar-symbol artifact"></span><span>Browser metrics cleanup</span></div>

        <div class="sidebar-section-label">Today</div>
        <div class="dframe-row"><span class="sidebar-symbol chat"></span><span>Finder attachment test</span></div>
        <div class="dframe-row"><span class="sidebar-symbol chat"></span><span>Presentation cleanup</span></div>
        <div class="dframe-row"><span class="sidebar-symbol chat"></span><span>Reference video notes</span></div>

        <div class="sidebar-section-label">Projects</div>
        <div class="dframe-row"><span class="sidebar-symbol folder"></span><span>Marketing videos</span></div>
        <div class="dframe-row"><span class="sidebar-symbol folder"></span><span>Backlot primitives</span></div>

        <div class="sidebar-sync-state">
          <span class="sync-pulse"></span>
          <span>Claude can access selected folders and working files.</span>
        </div>

        <div class="sidebar-account">
          <span class="account-avatar"></span>
          <span class="account-copy"><strong>Demo workspace</strong><span>Pro plan</span></span>
          <span class="sidebar-kebab"></span>
        </div>
      </aside>

      <main class="dframe-pane-primary epitaxy-root" data-primitive="claude-thread-pane">
        <header class="epitaxy-topbar">
          <div class="topbar-left" data-top-left>
            <button class="topbar-icon menu" type="button" aria-label="Open sidebar"></button>
            <div class="thread-title-stack">
              <div class="conversation-title">Update Launch Deck opening slides</div>
              <div class="conversation-subtitle">Working in Launch Deck</div>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="model-selector" type="button">
              <span class="model-dot"></span>
              <span>Claude Sonnet 4.6</span>
              <span class="chevron down"></span>
            </button>
            <button class="topbar-icon share" type="button" aria-label="Share"></button>
            <button class="topbar-icon more" type="button" aria-label="More"></button>
          </div>
        </header>

        <div class="epitaxy-chat-panel-body">
          <div class="epitaxy-transcript-width">
            <article class="message-row user">
              <div class="epitaxy-sticky-prompt-bubble">Oh and update the revenue chart in my LP deck with the correct Q2 numbers.</div>
            </article>

            <div class="thread-context-strip" aria-label="Thread context">
              <span class="context-pill active-context">Working in folder</span>
              <span class="context-pill folder"><i></i>Launch Deck</span>
              <span class="context-pill sheet"><i></i>Q2 revenue.csv</span>
              <span class="context-pill doc"><i></i>slide-notes.md</span>
            </div>

            <article class="message-row assistant">
              <div class="assistant-gutter">
                <span class="claude-sunburst response-mark" aria-hidden="true">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span>
                </span>
              </div>
              <div class="assistant-stack">
                <div class="assistant-copy">
                  <span class="typing-mask assistant-line">Sure, I can make those deck changes for you.</span>
                  <span class="typing-mask assistant-line secondary">I'll inspect the folder context and prepare the deck update.</span>
                </div>

                <section class="thinking-card" data-primitive="message-part-group" aria-label="Thinking">
                  <button class="card-trigger" type="button">
                    <span class="chevron open"></span>
                    <span>Reading the selected context</span>
                    <span class="card-meta">3 parts</span>
                  </button>
                  <div class="thinking-body">
                    <div class="part-section">
                      <span class="part-label">Reasoning</span>
                      <span>Read the project folder, map the data files to slide edits, then stage the presentation update.</span>
                    </div>
                    <div class="source-cluster" aria-label="Sources">
                      <span class="source-label">Sources</span>
                      <span class="source-chip">slide-notes.md</span>
                      <span class="source-chip">Q2 revenue.csv</span>
                    </div>
                  </div>
                </section>

                <section class="tool-card epitaxy-task-card-surface" data-primitive="progress-rows" aria-label="Taking action">
                  <button class="card-trigger" type="button">
                    <span class="chevron open"></span>
                    <span>Making the deck update</span>
                    <span class="card-meta">00:07</span>
                  </button>
                  <div class="tool-row done"><span class="tool-dot"></span><span>Read Launch Deck folder</span><span class="tool-status">4 files</span></div>
                  <div class="tool-row done second"><span class="tool-dot"></span><span>Found slide notes and Q2 data</span><span class="tool-status">ready</span></div>
                  <div class="tool-row active"><span class="tool-dot"></span><span>Preparing PowerPoint edits</span><span class="tool-status">working</span></div>
                </section>

                <section class="command-card" data-primitive="command-output-card" aria-label="Command output">
                  <div class="command-card-head">
                    <span class="command-dot"></span>
                    <span>Local plan preview</span>
                    <span>preview</span>
                  </div>
                  <pre>{
  "slides": ["title", "revenue"],
  "edits": ["rename headline", "recolor chart", "add speaker note"]
}</pre>
                </section>

                <div class="message-actions" aria-label="Assistant message actions">
                  <button class="mini-action copy" type="button" aria-label="Copy"></button>
                  <button class="mini-action retry" type="button" aria-label="Retry"></button>
                  <button class="mini-action more" type="button" aria-label="More"></button>
                </div>
              </div>
            </article>
          </div>
        </div>

        <footer class="composer-shell" data-primitive="composer">
          <div class="epitaxy-composer-width">
            <div class="epitaxy-prompt conway-glass-frame" data-dropzone="ready">
              <div class="prompt-attachments">
                <span class="attachment-chip"><span class="file-chip folder"></span>Launch Deck</span>
                <span class="attachment-chip"><span class="file-chip doc"></span>slide-notes.md</span>
                <span class="attachment-count">2 attached</span>
              </div>
              <div class="epitaxy-prompt-input" aria-label="Prompt">Reply...</div>
              <div class="composer-controls">
                <span class="composer-tools">
                  <button class="prompt-icon-button plus" type="button" aria-label="Attach"></button>
                  <button class="prompt-tool" type="button"><span class="folder-mini"></span>Work in a folder</button>
                  <button class="prompt-tool" type="button">Research</button>
                </span>
                <button class="prompt-icon-button mic" type="button" aria-label="Dictate"></button>
                <button class="send-button is-running" type="button" aria-label="Stop generating"></button>
              </div>
            </div>
          </div>
        </footer>
      </main>

      <aside class="agent-rail" data-primitive="claude-agent-context-rail" aria-label="Claude task progress and context">
        <section class="rail-section progress-section">
          <div class="rail-title-row"><div class="rail-title">Task</div><span>Working</span></div>
          <div class="progress-circles" aria-hidden="true">
            <span class="done"></span><span class="done"></span><span class="active"></span><span></span>
          </div>
          <div class="rail-step-list">
            <div class="rail-step done"><span></span><p>Read folder</p><b>done</b></div>
            <div class="rail-step done"><span></span><p>Map Q2 data</p><b>done</b></div>
            <div class="rail-step active"><span></span><p>Prepare slides</p><b>now</b></div>
            <div class="rail-step"><span></span><p>Return file</p><b>next</b></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Artifacts</div>
          <div class="artifact-card">
            <span class="rail-file-icon deck"></span>
            <div><strong>Deck.pptx</strong><span>opening slides</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Context</div>
          <div class="context-list">
            <div class="context-row"><span class="rail-file-icon folder"></span><span>Launch Deck</span></div>
            <div class="context-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
            <div class="context-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Connectors</div>
          <div class="connector-row"><span class="connector-dot"></span><span>Local files</span><strong>On</strong></div>
          <div class="connector-row"><span class="connector-dot muted"></span><span>Web search</span><strong>Off</strong></div>
        </section>

        <section class="rail-section working-files">
          <div class="rail-title">Working files</div>
          <div class="working-file">slide-notes.md</div>
          <div class="working-file">README.md</div>
          <div class="working-file">Q2 revenue.csv</div>
        </section>

        <section class="rail-section rail-note">
          <span class="sync-pulse"></span>
          <p>Claude is using only the selected local project context.</p>
        </section>
      </aside>
    </section>

    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Anthropic Serif";
        src: url("../assets/fonts/AnthropicSerif-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #claude-app-surface {
        --bg-000: #fffdfa;
        --bg-100: #fbfaf6;
        --bg-150: #f8f5ef;
        --bg-200: #f0ebe2;
        --bg-300: #e7dfd4;
        --text-100: #181715;
        --text-200: #34312d;
        --text-300: #57534c;
        --text-400: #777066;
        --text-500: #978f84;
        --border-100: rgba(49, 44, 38, 0.085);
        --border-200: rgba(49, 44, 38, 0.13);
        --brand-000: #c65b47;
        --brand-100: #d66f59;
        --brand-soft: #f6e7df;
        --df-sidebar-width: 206px;
        --df-agent-rail-width: 160px;
        --df-header-h: 42px;
        --df-row-h: 26px;
        --df-radius-pill: 6px;
        --df-shadow-card: inset 0 0 0 0 transparent, 0 0 0 1px rgba(20, 16, 12, 0.055), 0 4px 24px rgba(20, 16, 12, 0.055);
        --df-shadow-pop: 0 0 0 0.5px rgba(0, 0, 0, 0.06), 0 18px 52px rgba(45, 35, 26, 0.12);
        --max-content-width: 770px;
        width: 1180px;
        height: 780px;
        overflow: visible;
        color: var(--text-100);
        font-family: "Anthropic Sans", sans-serif;
      }

      #claude-app-surface[data-reference-focus="true"] {
        --df-sidebar-width: 188px;
        --df-agent-rail-width: 142px;
        --df-header-h: 38px;
        --max-content-width: 850px;
      }

      #claude-app-surface * {
        box-sizing: border-box;
      }

      button {
        font: inherit;
      }

      .claude-app-window {
        position: relative;
        width: 1180px;
        height: 780px;
        overflow: hidden;
        display: grid;
        grid-template-columns: var(--df-sidebar-width) minmax(0, 1fr) var(--df-agent-rail-width);
        grid-template-rows: 100%;
        border-radius: 18px;
        background:
          linear-gradient(90deg, transparent 0 9.8%, rgba(231, 224, 215, 0.18) 9.8% calc(9.8% + 1px), transparent calc(9.8% + 1px) 90.2%, rgba(231, 224, 215, 0.14) 90.2% calc(90.2% + 1px), transparent calc(90.2% + 1px) 100%),
          var(--bg-000);
        box-shadow:
          0 32px 96px rgba(54, 42, 31, 0.16),
          0 0 0 1px rgba(55, 42, 31, 0.07);
      }

      #claude-app-surface[data-reference-focus="true"] .claude-app-window {
        background:
          linear-gradient(90deg, transparent 0 8.6%, rgba(231, 224, 215, 0.095) 8.6% calc(8.6% + 1px), transparent calc(8.6% + 1px) 91.4%, rgba(231, 224, 215, 0.08) 91.4% calc(91.4% + 1px), transparent calc(91.4% + 1px) 100%),
          var(--bg-000);
      }

      .dframe-sidebar {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: var(--df-sidebar-width);
        min-width: 0;
        padding: 13px 7px 12px;
        background: linear-gradient(180deg, rgba(248, 245, 239, 0.62), rgba(244, 240, 232, 0.54));
        border-right: 1px solid rgba(42, 35, 27, 0.026);
        box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.32);
        user-select: none;
      }

      #claude-app-surface[data-reference-focus="true"] .dframe-sidebar {
        padding-inline: 6px;
        opacity: 0.92;
        background: linear-gradient(180deg, rgba(248, 245, 239, 0.45), rgba(244, 240, 232, 0.35));
      }

      .claude-traffic {
        height: 14px;
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 13px 4px;
      }

      .claude-traffic span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      .claude-traffic .red { background: #ff5f57; }
      .claude-traffic .yellow { background: #ffbd2e; }
      .claude-traffic .green { background: #28c840; }

      .sidebar-head {
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 13px;
        padding-left: 5px;
      }

      .mode-switch {
        height: 31px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
        margin: 0 4px 13px;
        border-radius: 9px;
        background: rgba(232, 226, 217, 0.74);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.045);
      }

      #claude-app-surface[data-reference-focus="true"] .mode-switch,
      #claude-app-surface[data-reference-focus="true"] .sidebar-sync-state,
      #claude-app-surface[data-reference-focus="true"] .sidebar-account {
        opacity: 0.82;
      }

      .mode-switch button {
        min-width: 0;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--text-400);
        font-size: 11.5px;
        font-weight: 560;
      }

      .mode-switch .active {
        color: var(--text-100);
        background: rgba(255, 254, 250, 0.78);
        box-shadow: 0 1px 4px rgba(55, 48, 40, 0.08);
      }

      .claude-app-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        color: #342f2a;
        font-size: 14px;
        font-weight: 650;
      }

      .claude-sunburst {
        position: relative;
        display: inline-block;
        --ray-w: 2.2px;
        --ray-h: 8px;
        --ray-gap: 3px;
        color: var(--brand-000);
        flex: 0 0 auto;
      }

      .claude-sunburst.small {
        width: 18px;
        height: 18px;
        --ray-w: 1.6px;
        --ray-h: 6px;
        --ray-gap: 2px;
      }

      .claude-sunburst.response-mark {
        width: 27px;
        height: 27px;
        --ray-w: 2.5px;
        --ray-h: 10px;
        --ray-gap: 2.7px;
      }

      .claude-sunburst span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--ray-w);
        height: var(--ray-h);
        border-radius: 999px;
        background: currentColor;
        transform-origin: 50% calc(100% + var(--ray-gap));
        transform: translate(-50%, calc(-100% - var(--ray-gap))) rotate(calc(var(--i) * 30deg));
      }

      .claude-sunburst span:nth-child(1) { --i: 0; }
      .claude-sunburst span:nth-child(2) { --i: 1; }
      .claude-sunburst span:nth-child(3) { --i: 2; }
      .claude-sunburst span:nth-child(4) { --i: 3; }
      .claude-sunburst span:nth-child(5) { --i: 4; }
      .claude-sunburst span:nth-child(6) { --i: 5; }
      .claude-sunburst span:nth-child(7) { --i: 6; }
      .claude-sunburst span:nth-child(8) { --i: 7; }
      .claude-sunburst span:nth-child(9) { --i: 8; }
      .claude-sunburst span:nth-child(10) { --i: 9; }
      .claude-sunburst span:nth-child(11) { --i: 10; }
      .claude-sunburst span:nth-child(12) { --i: 11; }

      .sidebar-icon-button,
      .topbar-icon,
      .prompt-icon-button,
      .mini-action {
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--text-400);
        position: relative;
      }

      .sidebar-icon-button {
        width: 28px;
        height: 28px;
        border-radius: 8px;
      }

      .sidebar-icon-button::before,
      .sidebar-icon-button::after {
        content: "";
        position: absolute;
        border-radius: 2px;
        background: currentColor;
      }

      .sidebar-icon-button::before {
        width: 12px;
        height: 9px;
        box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.9);
        border: 1.5px solid currentColor;
        background: transparent;
      }

      .sidebar-icon-button::after {
        width: 1.5px;
        height: 9px;
        left: 13px;
      }

      .sidebar-primary-actions {
        display: grid;
        gap: 3px;
        margin-bottom: 13px;
      }

      .new-chat-button,
      .search-chat-button,
      .dframe-row {
        height: var(--df-row-h);
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        padding: 0 7px;
        border-radius: var(--df-radius-pill);
        color: var(--text-300);
        border: 0;
        background: transparent;
        font-size: 13px;
        white-space: nowrap;
      }

      .new-chat-button {
        color: var(--text-100);
        background: rgba(255, 254, 250, 0.62);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.045);
        font-weight: 570;
      }

      .search-chat-button {
        color: var(--text-400);
      }

      .dframe-row {
        margin-bottom: 1px;
      }

      .dframe-row.selected {
        color: var(--text-100);
        background: rgba(232, 226, 217, 0.78);
        box-shadow: none;
      }

      .dframe-row span:last-child,
      .new-chat-button span:last-child,
      .search-chat-button span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-section-label {
        margin: 14px 7px 5px;
        color: var(--text-500);
        font-size: 10.5px;
        font-weight: 600;
      }

      .sidebar-symbol {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-400);
        position: relative;
      }

      .sidebar-symbol.compose::before,
      .sidebar-symbol.search::before,
      .sidebar-symbol.project::before,
      .sidebar-symbol.artifact::before,
      .sidebar-symbol.chat::before,
      .sidebar-symbol.folder::before {
        content: "";
        position: absolute;
        inset: 2px;
        border: 1.5px solid currentColor;
      }

      .sidebar-symbol.compose::before {
        border-radius: 4px;
      }

      .sidebar-symbol.compose::after {
        content: "";
        position: absolute;
        right: 2px;
        top: 2px;
        width: 7px;
        height: 1.5px;
        background: currentColor;
        transform: rotate(-35deg);
        border-radius: 2px;
      }

      .sidebar-symbol.search::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        inset: 2px auto auto 2px;
      }

      .sidebar-symbol.search::after {
        content: "";
        position: absolute;
        right: 2px;
        bottom: 3px;
        width: 6px;
        height: 1.5px;
        border-radius: 2px;
        background: currentColor;
        transform: rotate(45deg);
      }

      .sidebar-symbol.project::before {
        inset: 3px;
        border-radius: 3px;
        background:
          linear-gradient(currentColor 0 0) 50% 50% / 1.5px 100% no-repeat,
          linear-gradient(currentColor 0 0) 50% 50% / 100% 1.5px no-repeat,
          rgba(216, 117, 95, 0.12);
        opacity: 0.9;
      }

      .sidebar-symbol.artifact::before {
        inset: 2px 3px 2px 4px;
        border-radius: 3px;
        background:
          linear-gradient(135deg, transparent 0 72%, rgba(216, 117, 95, 0.42) 72% 100%),
          rgba(216, 117, 95, 0.14);
        border-color: rgba(190, 88, 67, 0.38);
      }

      .sidebar-symbol.chat::before {
        inset: 3px 2px 4px 2px;
        border-radius: 6px 6px 6px 3px;
        background: rgba(80, 72, 62, 0.06);
      }

      .sidebar-symbol.chat::after {
        content: "";
        position: absolute;
        left: 4px;
        bottom: 3px;
        width: 5px;
        height: 5px;
        border-left: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: skew(-18deg);
      }

      .sidebar-symbol.folder::before {

<script>
  (() => {
    const isDirectPreview = /\/claude-app\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-app-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-app-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const params = new URLSearchParams(window.location.search);
      const captureMode = params.get("capture");
      const surface = document.querySelector("#claude-app-surface");
      if (surface && ["reference", "focus"].includes(captureMode)) {
        surface.setAttribute("data-reference-focus", "true");
        const replacements = new Map([
          ["Sure, I can make those deck changes for you.", "Sure, I can make those changes for you."],
          ["I'll inspect the folder context and prepare the deck update.", "I'll inspect the folder context and prepare the update."]
        ]);
        const walker = document.createTreeWalker(surface, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          let value = walker.currentNode.nodeValue;
          replacements.forEach((next, previous) => {
            value = value.replaceAll(previous, next);
          });
          walker.currentNode.nodeValue = value;
        }
      }
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
