<div id="claude-excel-workflow" data-composition-id="claude-excel-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="9">
  <section class="workflow-stage" data-primitive="claude-excel-workflow" aria-label="Claude and Excel workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="./mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame excel-component"
      data-primitive="excel-workbook-window"
      data-backlot-mount-src="./excel-workbook.html"
      data-backlot-mount-selector="#excel-workbook-surface"
    ></div>

    <div
      class="component-frame claude-component"
      data-primitive="claude-app-window"
      data-backlot-mount-src="./claude-app.html"
      data-backlot-mount-selector="#claude-app-surface"
    ></div>

    <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
    <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
  </section>
</div>

<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #eef1ed;
  }

  #claude-excel-workflow {
    --ink: #181410;
    --cursor: url("../assets/cursors/normal-select.svg");
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    color: var(--ink);
    font-family: Inter, sans-serif;
  }

  #claude-excel-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 16% 15%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0) 22%),
      radial-gradient(circle at 77% 18%, rgba(67, 184, 117, 0.16), rgba(67, 184, 117, 0) 27%),
      radial-gradient(circle at 72% 80%, rgba(181, 211, 197, 0.43), rgba(181, 211, 197, 0) 34%),
      radial-gradient(circle at 31% 86%, rgba(198, 91, 71, 0.08), rgba(198, 91, 71, 0) 27%),
      linear-gradient(145deg, #f4efe8 0%, #fbfaf6 47%, #deeae3 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 30px 0 0;
    opacity: 0.46;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(to bottom, transparent 0%, #000 17%, #000 78%, transparent 100%);
  }

  .menu-bar-component {
    position: absolute;
    left: 0;
    top: 0;
    z-index: 40;
    width: 100%;
    height: 30px;
  }

  .component-frame {
    position: absolute;
    overflow: hidden;
    transform-origin: top left;
  }

  .excel-component {
    left: 596px;
    top: 126px;
    z-index: 8;
    width: 1280px;
    height: 760px;
    border-radius: 15px;
    scale: 0.92;
    opacity: 0.98;
    box-shadow: 0 42px 132px rgba(37, 42, 55, 0.25);
  }

  .claude-component {
    left: 116px;
    top: 196px;
    z-index: 16;
    width: 1180px;
    height: 780px;
    border-radius: 18px;
    scale: 0.78;
    background: transparent;
    box-shadow:
      0 44px 138px rgba(54, 42, 31, 0.3),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  .component-frame > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  .workflow-cursor {
    position: absolute;
    left: 1388px;
    top: 548px;
    z-index: 40;
    width: 34px;
    height: 34px;
    background: var(--cursor) 0 0 / contain no-repeat;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
  }

  .click-ring {
    position: absolute;
    left: 1391px;
    top: 552px;
    z-index: 39;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(67, 184, 117, 0.72);
    border-radius: 50%;
    opacity: 0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  const applyExcelWorkflowCopy = () => {
    const replacements = new Map([
      ["Q2 deck chart", "Launch metrics review"],
      ["Update Launch Deck opening slides", "Check Launch Metrics workbook"],
      ["Working in Launch Deck", "Working in Launch Metrics"],
      ["Oh and update the revenue chart in my LP deck with the correct Q2 numbers.", "Oh and check the Q2 workbook formulas before we use the chart."],
      ["Launch Deck", "Launch Metrics"],
      ["slide-notes.md", "metrics-notes.md"],
      ["Sure, I can make those deck changes for you.", "Sure, I can check that workbook for you."],
      ["I'll inspect the folder context and prepare the deck update.", "I'll inspect the formulas and prepare the chart-range update."],
      ["map the data files to slide edits", "verify the formulas and chart inputs"],
      ["the presentation update", "the workbook update"],
      ["Making the deck update", "Reviewing the workbook"],
      ["Read Launch Metrics folder", "Read workbook folder"],
      ["Found slide notes and Q2 data", "Found Q2 revenue data"],
      ["Preparing PowerPoint edits", "Preparing Excel edits"],
      ["Prepare slides", "Check formulas"],
      ["Deck.pptx", "Metrics.xlsx"],
      ["opening slides", "chart range"],
      ["Presentation cleanup", "Workbook cleanup"]
    ]);

    const walker = document.createTreeWalker(document.querySelector(".claude-component"), NodeFilter.SHOW_TEXT);
    while (walker.nextNode()) {
      let value = walker.currentNode.nodeValue;
      replacements.forEach((next, previous) => {
        value = value.replaceAll(previous, next);
      });
      walker.currentNode.nodeValue = value;
    }
  };

  const applyWorkbookCopy = () => {
    const replacements = new Map([
      ["Deck-ready totals", "Chart-ready totals"],
      ["Opening slide", "Opening chart"],
      ["Chart update", "Range update"],
      ["Speaker notes", "Source notes"],
      ["Slide 1", "Chart A"],
      ["Slide 2", "Notes"],
      ["target used in the launch deck", "target used in the workbook"],
      ["3 deck rows ready", "3 chart rows ready"]
    ]);

    const walker = document.createTreeWalker(document.querySelector(".excel-component"), NodeFilter.SHOW_TEXT);
    while (walker.nextNode()) {
      let value = walker.currentNode.nodeValue;
      replacements.forEach((next, previous) => {
        value = value.replaceAll(previous, next);
      });
      walker.currentNode.nodeValue = value;
    }
  };

  window.__backlotComponentsReady?.then(() => {
    applyExcelWorkflowCopy();
    applyWorkbookCopy();
  });

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".excel-component", { opacity: 0, x: 34, y: 18, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.22);
  tl.from(".claude-component", { opacity: 0, x: -28, y: 20, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.48);
  tl.from(".workflow-cursor", { opacity: 0, x: -24, y: 20, duration: 0.28, ease: "sine.out" }, 1.08);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.3, duration: 0.18, ease: "sine.out" }, 1.52);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 1.74);
  tl.to(".workflow-cursor", { x: -570, y: 252, duration: 1.02, ease: "power2.inOut" }, 2.12);
  tl.to(".click-ring", { x: -570, y: 252, duration: 1.02, ease: "power2.inOut" }, 2.12);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.32, duration: 0.18, ease: "sine.out" }, 3.08);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 3.3);
  tl.to(".claude-component", { x: -8, y: -4, duration: 1.2, ease: "sine.inOut" }, 3.6);
  tl.to(".excel-component", { x: -18, y: 8, duration: 1.2, ease: "sine.inOut" }, 3.6);
  tl.to(".workflow-cursor", { x: 12, y: -52, duration: 1.05, ease: "power2.inOut" }, 4.08);
  window.__timelines["claude-excel-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(4.32).pause();
    gsap.set(".claude-component", { x: -8, y: -4, opacity: 1, filter: "blur(0px)" });
    gsap.set(".excel-component", { x: -18, y: 8, opacity: 0.98, filter: "blur(0px)" });
    gsap.set(".workflow-cursor", { x: 12, y: -52, opacity: 1 });
    gsap.set(".click-ring", { opacity: 0 });
  }
</script>
