<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fffdfa;
  }
</style>

<template id="claude-composer-template">
  <div id="claude-composer-surface" data-composition-id="claude-composer-surface" data-width="900" data-height="220">
    <section class="claude-composer-stage" data-primitive="claude-composer-stage" aria-label="Editable Claude composer surface">
      <div class="claude-composer-card conway-glass-frame" data-primitive="claude-working-composer" data-dropzone="ready">
        <div class="prompt-attachments" aria-label="Attached context">
          <span class="attachment-chip"><span class="file-chip folder"></span>Launch Deck</span>
          <span class="attachment-chip"><span class="file-chip doc"></span>slide-notes.md</span>
          <span class="attachment-count">2 attached</span>
        </div>

        <div class="epitaxy-prompt-input" aria-label="Prompt">Reply...</div>

        <div class="composer-controls">
          <span class="composer-tools">
            <button class="prompt-icon-button plus" type="button" aria-label="Attach"></button>
            <button class="prompt-tool active" type="button"><span class="folder-mini"></span>Work in a folder</button>
            <button class="prompt-tool" type="button">Research</button>
          </span>
          <button class="prompt-icon-button mic" type="button" aria-label="Dictate"></button>
          <button class="send-button is-running" type="button" aria-label="Stop generating"></button>
        </div>
      </div>
    </section>

    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #claude-composer-surface {
        width: 900px;
        height: 220px;
        color: #201f1d;
        font-family: "Anthropic Sans", sans-serif;
        overflow: visible;
      }

      #claude-composer-surface * {
        box-sizing: border-box;
      }

      button {
        font: inherit;
      }

      .claude-composer-stage {
        width: 900px;
        height: 220px;
        display: grid;
        place-items: center;
        padding: 36px 54px 50px;
        background: #fffdfa;
      }

      .claude-composer-card {
        width: 792px;
        min-height: 132px;
        display: grid;
        grid-template-rows: 31px 1fr 42px;
        overflow: hidden;
        border: 1px solid rgba(39, 37, 34, 0.105);
        border-radius: 29px;
        background: rgba(255, 254, 251, 0.985);
        box-shadow:
          inset 0 0 0 1px rgba(216, 117, 95, 0.05),
          0 1px 1px rgba(49, 44, 38, 0.035),
          0 28px 70px rgba(64, 48, 34, 0.105);
      }

      .prompt-attachments {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 8px 13px 0;
      }

      .attachment-chip {
        height: 22px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 160px;
        padding: 0 8px;
        border: 1px solid rgba(39, 37, 34, 0.08);
        border-radius: 7px;
        background: #f1eee8;
        color: #55514b;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
      }

      .file-chip {
        width: 14px;
        height: 14px;
        position: relative;
        flex: 0 0 auto;
        border-radius: 3px;
        background: #d7cfc3;
      }

      .file-chip.folder {
        background: #64bfe7;
      }

      .file-chip.folder::before {
        content: "";
        position: absolute;
        left: 1px;
        top: -2px;
        width: 7px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        background: #8dd2f0;
      }

      .file-chip.doc::before {
        content: "";
        position: absolute;
        right: 1px;
        top: 1px;
        border-left: 4px solid transparent;
        border-top: 4px solid #f7f5f0;
      }

      .attachment-count {
        margin-left: auto;
        color: #8a8379;
        font-size: 12px;
        font-weight: 500;
      }

      .epitaxy-prompt-input {
        padding: 6px 17px 0;
        color: #777066;
        font-size: 33px;
        line-height: 1.28;
        font-weight: 420;
        letter-spacing: 0;
      }

      .composer-controls {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 10px 9px;
        color: #777066;
      }

      .composer-tools {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .prompt-icon-button,
      .send-button {
        position: relative;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .prompt-icon-button {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(39, 37, 34, 0.08);
        border-radius: 50%;
        background: #f7f4ee;
        color: #777066;
      }

      .prompt-icon-button.plus::before,
      .prompt-icon-button.plus::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 2px;
        border-radius: 2px;
        background: currentColor;
      }

      .prompt-icon-button.plus::after {
        transform: rotate(90deg);
      }

      .prompt-tool {
        height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 9px;
        border: 1px solid rgba(39, 37, 34, 0.08);
        border-radius: 999px;
        background: #faf8f4;
        color: #57534c;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
      }

      .prompt-tool.active {
        border-color: rgba(216, 117, 95, 0.14);
        background: #fff5ef;
        color: #8a4a3f;
      }

      .folder-mini {
        width: 13px;
        height: 10px;
        position: relative;
        border-radius: 2px;
        background: #d7cfc3;
      }

      .folder-mini::before {
        content: "";
        position: absolute;
        left: 1px;
        top: -3px;
        width: 7px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        background: #c6bbad;
      }

      .prompt-icon-button.mic::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 8px;
        width: 8px;
        height: 12px;
        border: 2px solid currentColor;
        border-top-width: 3px;
        border-radius: 6px;
      }

      .prompt-icon-button.mic::after {
        content: "";
        position: absolute;
        left: 9px;
        top: 19px;
        width: 12px;
        height: 6px;
        border-bottom: 2px solid currentColor;
        border-radius: 0 0 10px 10px;
      }

      .send-button {
        width: 35px;
        height: 35px;
        margin-left: auto;
        border: 0;
        border-radius: 50%;
        background: #d86f5d;
        box-shadow: 0 8px 18px rgba(216, 117, 95, 0.22);
      }

      .send-button::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 11px;
        width: 13px;
        height: 13px;
        border-radius: 3px;
        background: #fffdfa;
      }

      .send-button.is-running {
        background: #d86f5d;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".claude-composer-card", { opacity: 0, y: 22, filter: "blur(5px)", duration: 0.58, ease: "expo.out" }, 0.1);
      tl.from(".attachment-chip, .attachment-count", { opacity: 0, y: 5, stagger: 0.05, duration: 0.25, ease: "sine.out" }, 0.42);
      tl.from(".epitaxy-prompt-input", { opacity: 0, y: 6, duration: 0.28, ease: "sine.out" }, 0.52);
      tl.from(".prompt-icon-button, .prompt-tool, .send-button", { opacity: 0, y: 6, stagger: 0.04, duration: 0.28, ease: "sine.out" }, 0.7);
      tl.to(".send-button", { scale: 1.045, duration: 0.55, repeat: 5, yoyo: true, ease: "sine.inOut" }, 1.02);
      window.__timelines["claude-composer-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-composer\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-composer-template");
      if (!template || document.querySelector("#claude-composer-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
