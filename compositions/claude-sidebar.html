    <style>
      /* Canonical Claude sidebar atom.
         Visual source of truth: reference/claude/2026-07-13/mac-app-home and
         mac-app-code (real Claude.app captures, 2026-07-13). Two panels:
         .panel-chat = the Home-tab sidebar (home/chat/cowork pages all use it
         — chat and cowork are one page in the real app), .panel-code = the
         Code-tab sidebar (LIGHT; sessions grouped by repo). Page switch is
         pure CSS via data-page on #claude-sidebar-surface; any value other
         than "code" shows the Home sidebar. Measured palette:
         sidebar #fcfcf9, active row #e8e8e8, accent #d87959. Text-muted
         #898782 (scorecard-sampled) is distinct from icon-stroke #7b7a75 —
         both are set here as local overrides so the shared foundation
         tokens stay untouched. */
      #claude-sidebar-surface {
        width: 360px;
        height: 840px;
        overflow: visible;
        color: var(--claude-ink);
        font-family: var(--font-claude-ui);
        --claude-text-muted: #898782;
        --claude-icon-stroke: #7b7a75;
      }

      #claude-sidebar-surface * {
        box-sizing: border-box;
      }

      #claude-sidebar-surface button {
        font: inherit;
        cursor: default;
      }

      :where(#claude-sidebar-surface) .backlot-icon {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Cheap interim de-weighting of the Lucide redraws (real app ships
         Anthropicons; sourcing that font is future work) — thinner stroke
         reads closer to the real icon set and stops the "off" flicker. */
      #claude-sidebar-surface symbol path,
      #claude-sidebar-surface symbol circle,
      #claude-sidebar-surface symbol rect {
        stroke-width: 1.5;
      }

      .claude-sidebar-stage {
        width: 360px;
        height: 840px;
        display: grid;
        place-items: center;
        background: var(--claude-paper);
      }

      .claude-sidebar-panel {
        width: 264px;
        height: 768px;
        display: none;
        flex-direction: column;
        overflow: hidden;
        user-select: none;
        padding: 10px 10px 12px;
        background: #ffffff;
      }

      #claude-sidebar-surface:not([data-page="code"]) .panel-chat,
      #claude-sidebar-surface[data-page="code"] .panel-code {
        display: flex;
      }

      /* Standalone presentation only: rounded card on the stage. */
      .claude-sidebar-stage .claude-sidebar-panel {
        border-radius: 12px;
        border: 1px solid rgba(11, 11, 11, 0.1);
        box-shadow: 0 28px 70px rgba(54, 42, 31, 0.13);
      }

      /* ---- Top row: traffic lights + window icons ---- */
      .hc-top {
        height: 30px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 2px 0 6px;
        margin-bottom: 8px;
      }

      .hc-traffic {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hc-traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
      }

      .hc-traffic .red { background: #ff5f57; }
      .hc-traffic .yellow { background: #febc2e; }
      .hc-traffic .green { background: #28c840; }

      .hc-top-spacer { flex: 1; }

      .hc-top-icon {
        width: 28px;
        height: 28px;
        flex: 0 0 auto;

      }

      tl.from(".claude-sidebar-panel", { opacity: 0, y: 22, filter: "blur(6px)", duration: 0.58, ease: "expo.out" }, 0.12);

  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-sidebar\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-sidebar-template");
      if (!template || document.querySelector("#claude-sidebar-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");
      if (page) document.querySelector("#claude-sidebar-surface").setAttribute("data-page", page);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
