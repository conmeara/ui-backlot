<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fffdfa;
  }
</style>

<template id="claude-agent-rail-template">
  <div id="claude-agent-rail-surface" data-composition-id="claude-agent-rail-surface" data-width="380" data-height="860">
    <section class="claude-agent-rail-stage" data-primitive="claude-agent-rail-stage" aria-label="Editable Claude agent rail surface">
      <aside class="agent-rail-panel" data-primitive="claude-agent-context-rail" aria-label="Claude task progress and context">
        <section class="rail-section progress-section">
          <div class="rail-title-row">
            <div>
              <div class="rail-title">Progress</div>
              <p>Steps show as the task unfolds.</p>
            </div>
          </div>

          <div class="rail-step-list">
            <div class="rail-step done"><span>1</span><p>Read folder</p></div>
            <div class="rail-step done"><span>2</span><p>Map Q2 data</p></div>
            <div class="rail-step active"><span>3</span><p>Update slides</p></div>
            <div class="rail-step"><span>4</span><p>Return file</p></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Artifacts</div>
          <div class="artifact-card">
            <span class="rail-file-icon deck"></span>
            <div><strong>Deck.pptx</strong><span>opening slides</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Context</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon folder"></span><span>Launch Deck</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
          </div>
          <div class="rail-sublabel">Connectors</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon connector"></span><span>Web search</span></div>
          </div>
          <div class="rail-sublabel">Working files</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>README.md</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
          </div>
        </section>

        <section class="rail-section rail-note">
          <span class="sync-pulse"></span>
          <p>Claude is using only the selected folder and working files.</p>
        </section>
      </aside>
    </section>

    <style>
      #claude-agent-rail-surface {
        width: 380px;
        height: 860px;
        overflow: visible;
        color: #211f1c;
        font-family: var(--font-claude-ui);
      }

      #claude-agent-rail-surface * {
        box-sizing: border-box;
      }

      .claude-agent-rail-stage {
        width: 380px;
        height: 860px;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #fffdfa;
      }

      .agent-rail-panel {
        width: 324px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .rail-section {
        display: grid;
        gap: 14px;
        padding: 21px 20px;
        border: 1px solid rgba(39, 37, 34, 0.085);
        border-radius: 18px;
        background: rgba(255, 253, 249, 0.78);
        box-shadow: 0 12px 42px rgba(72, 52, 39, 0.055);
      }

      .progress-section {
        gap: 19px;
      }

      .rail-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .rail-title {
        color: #292520;
        font-size: 22px;
        line-height: 1.1;
        font-weight: 760;
      }

      .progress-section p,
      .rail-note p {
        margin: 8px 0 0;
        color: #6a6259;
        font-size: 14px;
        line-height: 1.35;
      }

      .rail-sublabel {
        margin: 4px 0 -4px;
        color: #7f776c;
        font-size: 13px;
        font-weight: 600;
      }

      .rail-step-list {
        display: grid;
        gap: 18px;
      }

      .rail-step {
        min-height: 31px;
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 0;
        border-radius: 0;
        background: transparent;
      }

      .rail-step span {
        width: 26px;
        height: 26px;
        position: relative;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #eeede6;
        color: #a49b90;
        font-size: 12px;
        font-weight: 600;
      }

      .rail-step.done span {
        background: #2d83d8;
        color: transparent;
        font-size: 0;
      }

      .rail-step.done span::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        width: 9px;
        height: 6px;
        border-left: 2px solid #fff;
        border-bottom: 2px solid #fff;
        transform: rotate(-45deg);
      }

      .rail-step.active {
        background: transparent;
      }

      .rail-step.active span {
        background: #fff;
        border: 2px solid #2d83d8;
        color: #2d83d8;
      }

      .rail-step p {
        min-width: 0;
        margin: 0;
        overflow: hidden;
        color: #292520;
        font-size: 16px;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .artifact-card {
        min-height: 54px;
        display: grid;
        grid-template-columns: 25px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .artifact-card strong {
        display: block;
        overflow: hidden;
        color: #292520;
        font-size: 16px;
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .artifact-card span:last-child {
        display: block;
        margin-top: 3px;
        color: #736c63;
        font-size: 11px;
      }

      .rail-list {
        display: grid;
        gap: 5px;
      }

      .rail-row {
        min-height: 34px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        color: #292520;
        font-size: 16px;
      }

      .rail-row span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-file-icon {
        width: 24px;
        height: 24px;
        position: relative;
        flex: 0 0 auto;
        border: 1.3px solid #a79e91;
        border-radius: 5px;
        background: transparent;
      }

      .rail-file-icon.deck {
        width: 24px;
        height: 24px;
        border-radius: 5px;
        background: transparent;
      }

      .rail-file-icon.folder {
        border-color: #88aebf;
        background: #edf8fc;
      }

      .rail-file-icon.folder::before {
        content: "";
        position: absolute;
        left: 2px;
        top: -3px;
        width: 10px;
        height: 5px;
        border-radius: 3px 3px 0 0;
        background: #98d5ee;
      }

      .rail-file-icon.sheet {
        border-color: #80ae84;
        background: #f2faf2;
      }

      .rail-file-icon.doc {
        background: transparent;
      }

      .rail-file-icon.connector {
        border-color: #d8d2c9;
        background: #f4efe8;
      }

      .rail-note {
        display: none;
        min-height: 58px;
        grid-template-columns: 12px minmax(0, 1fr);
        align-items: start;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(216, 117, 95, 0.09);
        border-radius: 14px;
        background: rgba(255, 246, 239, 0.64);
        box-shadow: none;
      }

      .rail-note p {
        margin: 0;
      }

      .sync-pulse {
        width: 10px;
        height: 10px;
        margin-top: 4px;
        border-radius: 50%;
        background: #d86f5d;
        box-shadow: 0 0 0 4px rgba(216, 117, 95, 0.12);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".agent-rail-panel", { opacity: 0, x: 18, filter: "blur(5px)", duration: 0.52, ease: "power3.out" }, 0.12);
      tl.from(".rail-step", { opacity: 0, x: 9, stagger: 0.055, duration: 0.28, ease: "sine.out" }, 0.52);
      tl.from(".rail-section:not(.progress-section)", { opacity: 0, y: 9, stagger: 0.06, duration: 0.3, ease: "power2.out" }, 0.86);
      tl.to(".rail-step.active span, .sync-pulse", { scale: 1.06, duration: 0.58, repeat: 5, yoyo: true, ease: "sine.inOut" }, 1.16);
      window.__timelines["claude-agent-rail-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-agent-rail\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-agent-rail-template");
      if (!template || document.querySelector("#claude-agent-rail-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
