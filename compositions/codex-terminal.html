    <script>
      window.__timelines = window.__timelines || {};
      const terminalDuration = 12;
      const planSpinnerRepeat = Math.max(0, Math.floor((terminalDuration - 1.1) / 0.9) - 1);
      const verifySpinnerRepeat = Math.max(0, Math.floor((terminalDuration - 2.2) / 0.9) - 1);
      const cursorBlinkRepeat = Math.max(0, Math.floor((terminalDuration - 2.85) / 0.56) - 1);
      const tl = gsap.timeline({ paused: true });

      tl.from(".terminal-window", { opacity: 0, y: 22, scale: 0.985, duration: 0.42, ease: "power2.out" }, 0.12);
      tl.from(".prompt-line", { opacity: 0, y: 8, duration: 0.28, ease: "power2.out" }, 0.35);
      tl.from(".codex-card.hero", { opacity: 0, y: 12, duration: 0.34, ease: "power2.out" }, 0.62);
      tl.from(".step", { opacity: 0, x: -12, stagger: 0.08, duration: 0.24, ease: "power2.out" }, 1.0);
      tl.from(".tool-line", { opacity: 0, x: -10, stagger: 0.08, duration: 0.24, ease: "power2.out" }, 1.62);
      tl.from(".activity-pane", { opacity: 0, x: 18, duration: 0.36, ease: "power2.out" }, 1.9);
      tl.from(".diff-line", { opacity: 0, x: 10, stagger: 0.06, duration: 0.22, ease: "power2.out" }, 2.2);
      tl.from(".terminal-output", { opacity: 0, y: 10, duration: 0.3, ease: "power2.out" }, 2.55);
      tl.from(".progress-fill", { scaleX: 0.2, transformOrigin: "left center", duration: 1.4, ease: "power2.out" }, 2.75);
      tl.to(".step.active .step-icon", { rotation: 360, duration: 0.9, repeat: planSpinnerRepeat, ease: "none" }, 1.1);
      tl.to(".verify-row.active span", { rotation: 360, duration: 0.9, repeat: verifySpinnerRepeat, ease: "none" }, 2.2);
      tl.to(".codex-cursor", { opacity: 0.12, duration: 0.28, repeat: cursorBlinkRepeat, yoyo: true, ease: "steps(1)" }, 2.85);

      window.__timelines["codex-terminal-surface"] = tl;
    </script>

<script>
  (() => {
    const isDirectPreview = decodeURIComponent(window.location.pathname).endsWith("/codex-terminal.html");
    if (!isDirectPreview) return;

    const mount = () => {
      if (document.getElementById("codex-terminal-surface")) return;
      const template = document.getElementById("codex-terminal-surface-template");
      if (!template || !document.body) return;

      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };

    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
