    <section class="claude-chat-shell-window" data-primitive="claude-chat-shell" aria-label="Editable Claude chat shell">
      <aside class="chat-sidebar" data-primitive="claude-chat-sidebar">
        <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>

        <header class="sidebar-brand">
          <svg class="backlot-icon claude-mark-icon small" aria-hidden="true"><use href="#si-claude"/></svg>
          <strong>Claude</strong>
          <button type="button" aria-label="Collapse sidebar" class="sidebar-icon split-icon"></button>
        </header>

        <button class="new-chat-button" type="button"><span class="plus-mini" aria-hidden="true"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-new-chat"/></svg></span>New chat</button>
        <div class="search-row"><span class="search-icon" aria-hidden="true"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-search"/></svg></span><span>Search chats</span></div>

        <nav class="sidebar-list" aria-label="Recent chats">
          <div class="side-label">Today</div>
          <div class="side-item active"><span class="chat-dot"></span><span>Browser layout polish</span></div>
          <div class="side-item"><span class="chat-dot"></span><span>Launch deck chart</span></div>
          <div class="side-item"><span class="chat-dot"></span><span>Demo narration notes</span></div>
          <div class="side-label">Projects</div>
          <div class="side-item project"><span class="project-box"></span><span>Marketing videos</span></div>
          <div class="side-item project"><span class="project-box"></span><span>UI Backlot</span></div>
        </nav>

        <div class="sidebar-footer">
          <span class="avatar-dot">C</span>
          <div><strong>Demo workspace</strong><span>Pro plan</span></div>
        </div>
      </aside>

      <main class="chat-main" data-primitive="claude-chat-thread">
        <header class="chat-topbar" data-primitive="claude-chat-topbar">
          <div class="thread-title">
            <button type="button" aria-label="Toggle sidebar" class="topbar-icon menu-icon"></button>
            <div>
              <strong>Browser layout polish</strong>
              <span>Working in UI Backlot</span>
            </div>
          </div>
          <div class="topbar-actions">
            <button type="button" class="model-pill"><span class="model-dot"></span>Opus 4.5</button>
            <button type="button" aria-label="Share" class="topbar-icon share-icon"></button>
            <button type="button" aria-label="More" class="topbar-icon more-icon"><span></span></button>
          </div>
        </header>

        <section class="message-field" data-primitive="claude-launch-chat-thread">
          <div class="user-bubbles" data-primitive="claude-user-bubbles">
            <div class="user-bubble">Ah good catch. Can you make the browser nav line up at every breakpoint?</div>
            <div class="user-bubble compact">Also keep it clean enough for a short demo clip.</div>
          </div>

          <article class="assistant-reply" data-primitive="claude-serif-reply">
            <svg class="backlot-icon claude-mark-icon reply-mark" aria-hidden="true"><use href="#si-claude"/></svg>
            <p>Done. Nav looks good at all breakpoints.</p>
            <p class="secondary">I tightened the mobile wrapping, checked the desktop crop, and kept the browser surface ready for HyperFrames.</p>
          </article>
        </section>

        <footer class="chat-composer" data-primitive="claude-chat-composer">
          <div class="composer-chip-row">
            <span class="context-chip"><span class="folder-mini"></span>UI Backlot</span>
            <span class="context-chip muted">browser-app.html</span>
            <span class="attached-count">2 attached</span>
          </div>
          <div class="composer-placeholder">Reply...</div>
          <div class="composer-controls">
            <button type="button" aria-label="Attach" class="round-control plus-control"></button>
            <span class="composer-spacer"></span>
            <button type="button" class="composer-model-selector">Opus 4.5<span class="selector-chevron"></span></button>
            <button type="button" aria-label="Send" class="send-control"></button>
          </div>
        </footer>
        <div class="composer-disclaimer">Claude is AI and can make mistakes. Please double-check responses.</div>
      </main>
    </section>

    <style>
      #claude-chat-shell-surface {
        --paper: #fffdfa;
        --field: #f7f5ef;
        --sidebar: #f5f1ea;
        --bubble: #eeece5;
        --ink: #17130f;
        --muted: #746c62;
        --hairline: rgba(43, 35, 27, 0.11);
        --soft-line: rgba(224, 216, 205, 0.58);
        --brand: #c85f4b;
        --brand-strong: #d46c59;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        color: var(--ink);
        font-family: var(--font-claude-ui);
      }

      #claude-chat-shell-surface * {
        box-sizing: border-box;
      }

      #claude-chat-shell-surface button {
        font: inherit;
      }

      .claude-chat-shell-window {
        position: relative;
        width: 1440px;
        height: 900px;
        display: grid;
        grid-template-columns: 260px 1fr;
        overflow: hidden;
        border-radius: 18px;
        background: var(--paper);
        box-shadow:
          0 42px 140px rgba(55, 42, 30, 0.17),
          0 0 0 1px rgba(56, 42, 31, 0.08);
      }

      .chat-sidebar {
        position: relative;
        display: grid;
        grid-template-rows: 44px 48px 40px 1fr 72px;
        gap: 10px;
        padding: 22px 16px 18px;
        background: linear-gradient(180deg, #faf7f1 0%, var(--sidebar) 100%);
        border-right: 1px solid var(--soft-line);
      }

      .traffic {
        position: absolute;
        left: 18px;
        top: 18px;
        display: flex;
        gap: 8px;
      }

      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
      }

      .traffic span:nth-child(1) { background: #ff5f57; }
      .traffic span:nth-child(2) { background: #febc2e; }
      .traffic span:nth-child(3) { background: #28c840; }

      .sidebar-brand {
        margin-top: 23px;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .sidebar-brand strong {
        flex: 1 1 auto;
        font-size: 16px;
        font-weight: 730;
      }

      .claude-mark-icon {
        display: inline-block;
        color: #d97757;
        flex: 0 0 auto;
      }

      .claude-mark-icon.small {
        width: 18px;
        height: 18px;
      }

      .claude-mark-icon.reply-mark {
        position: absolute;
        left: 0;
        top: 9px;
        width: 48px;
        height: 48px;
      }

      .sidebar-icon,
      .topbar-icon {
        position: relative;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #6d655c;
      }

      .sidebar-icon:hover,
      .topbar-icon:hover {
        background: rgba(57, 49, 40, 0.06);
      }

      .split-icon::before,
      .split-icon::after {
        content: "";
        position: absolute;
        top: 9px;
        width: 6px;
        height: 14px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
      }

      .split-icon::before { left: 8px; }
      .split-icon::after { right: 8px; opacity: 0.48; }

      .new-chat-button,
      .search-row,
      .side-item {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 7px;
        color: #3d3a33;
      }

      .new-chat-button {
        height: 30px;
        margin-top: 2px;
        border: 0;
        padding: 0 8px;
        background: transparent;
        text-align: left;
        font-size: 13.5px;
        font-weight: 500;
      }

      .plus-mini {
        width: 15px;
        height: 15px;
        display: grid;
        place-items: center;
        color: #6d6a60;
      }

      .plus-mini svg {
        width: 15px;
        height: 15px;
      }

      .search-row {
        height: 30px;
        padding: 0 8px;
        color: #3d3a33;
        font-size: 13.5px;
      }

      .search-icon {
        width: 15px;
        height: 15px;
        display: grid;
        place-items: center;
        color: #6d6a60;
      }

      .search-icon svg {
        width: 15px;
        height: 15px;
      }

      .sidebar-list {
        min-width: 0;
        display: grid;
        align-content: start;
        gap: 7px;
        padding-top: 10px;
      }

      .side-label {
        margin: 15px 8px 4px;
        color: #8b8175;
        font-size: 12px;
        font-weight: 720;
      }

      .side-item {
        height: 34px;
        padding: 0 10px;
        color: #61584e;
        font-size: 14px;
      }

      .side-item span:last-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .side-item.active {
        background: #ebe5dc;
        color: #2e2923;
        font-weight: 650;
      }

      .chat-dot {
        width: 10px;
        height: 10px;
        border: 1.5px solid #a3988b;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .side-item.active .chat-dot {
        border-color: var(--brand);
        background: var(--brand);
        box-shadow: 0 0 0 3px rgba(200, 95, 75, 0.11);
      }

      .project-box {
        width: 13px;
        height: 10px;
        border: 1.5px solid #a3988b;
        border-radius: 4px;
        flex: 0 0 auto;
      }

      .sidebar-footer {
        align-self: end;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        color: #61584e;
      }

      .sidebar-footer strong,
      .sidebar-footer span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar-footer strong {
        font-size: 13px;
        font-weight: 720;
      }

      .sidebar-footer span {
        color: #8a8175;
        font-size: 12px;
      }

      .avatar-dot {
        width: 29px;
        height: 29px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #dd7b65;
        color: #fff;
        font-size: 13px;
        font-weight: 760;
      }

      .chat-main {
        position: relative;
        min-width: 0;
        display: grid;
        grid-template-rows: 76px 1fr 176px 24px;
        background:
          radial-gradient(circle at 54% 20%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 28%),
          linear-gradient(180deg, #fffdfa 0%, #fbfaf6 100%);
      }

      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 28px;
        border-bottom: 1px solid rgba(224, 216, 205, 0.44);
      }

      .thread-title,
      .topbar-actions {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .thread-title {
        gap: 12px;
      }

      .thread-title strong,
      .thread-title span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .thread-title strong {
        max-width: 360px;
        font-size: 15px;
        font-weight: 720;
      }

      .thread-title span {
        max-width: 360px;
        margin-top: 2px;
        color: #857b70;
        font-size: 12px;
      }

      .menu-icon::before,
      .menu-icon::after {
        content: "";
        position: absolute;
        left: 9px;
        width: 14px;
        height: 1.5px;
        border-radius: 2px;
        background: currentColor;
      }

      .menu-icon::before { top: 11px; }
      .menu-icon::after { top: 19px; }

      .topbar-actions {
        justify-content: flex-end;
        gap: 9px;
      }

      .model-pill {
        height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(53, 44, 35, 0.1);
        border-radius: 999px;
        padding: 0 13px;
        background: #fffdfa;
        color: #403a33;
        font-size: 13px;
      }

      .model-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--brand);
      }

      .share-icon::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 10px;
        width: 10px;
        height: 12px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
      }

      .share-icon::after {
        content: "";
        position: absolute;
        left: 14px;
        top: 7px;
        width: 6px;
        height: 6px;
        border-left: 1.5px solid currentColor;
        border-top: 1.5px solid currentColor;
        transform: rotate(45deg);
      }

      .more-icon span,
      .more-icon::before,
      .more-icon::after {
        content: "";
        position: absolute;
        top: 15px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: currentColor;
      }

      .more-icon::before { left: 9px; }
      .more-icon span { left: 15px; }
      .more-icon::after { left: 21px; }

      .message-field {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }

      .user-bubbles {
        position: absolute;
        right: 92px;
        top: 58px;
        display: grid;
        gap: 13px;
        justify-items: end;
        z-index: 2;
      }

      .user-bubble {
        max-width: 585px;
        padding: 16px 20px 17px;
        border-radius: 19px;
        background: var(--bubble);
        color: #191511;
        box-shadow: 0 1px 0 rgba(55, 48, 40, 0.05);
        font-size: 24px;
        line-height: 1.27;
        font-weight: 420;
      }

      .user-bubble.compact {
        max-width: 470px;
      }

      .assistant-reply {
        position: absolute;
        left: 146px;
        top: 274px;
        width: 820px;
        min-height: 170px;
        padding-left: 78px;
        color: var(--ink);
      }

      .assistant-reply p {
        margin: 0;
        max-width: 760px;
        font-family: var(--font-claude-serif);
        font-size: 38px;
        line-height: 1.16;
        font-weight: 460;
        letter-spacing: 0;
      }

      .assistant-reply p.secondary {
        max-width: 780px;
        margin-top: 24px;
        color: #342e28;
        font-size: 27px;
        line-height: 1.23;
        font-weight: 430;
      }

      .chat-composer {
        align-self: end;
        justify-self: center;
        width: min(900px, calc(100% - 112px));
        height: 122px;
        margin-bottom: 6px;
        display: grid;
        grid-template-rows: 28px 1fr 38px;
        padding: 13px 17px 13px;
        border: 1px solid rgba(43, 35, 27, 0.16);
        border-radius: 24px;
        background: rgba(255, 254, 251, 0.99);
        box-shadow:
          0 1px 0 rgba(54, 45, 38, 0.06),
          0 20px 60px rgba(71, 52, 37, 0.09);
      }

      .composer-disclaimer {
        justify-self: center;
        width: min(900px, calc(100% - 112px));
        margin-top: 8px;
        text-align: center;
        color: var(--muted);
        font-size: 11.5px;
      }

      .composer-chip-row {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .context-chip,
      .attached-count {
        height: 24px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: 1px solid rgba(42, 36, 30, 0.1);
        border-radius: 9px;
        padding: 0 9px;
        background: #f3f0ea;
        color: #4c453d;
        font-size: 12px;
        font-weight: 620;
      }

      .context-chip.muted {
        color: #665e55;
        background: #f8f6f1;
        font-weight: 520;
      }

      .attached-count {
        margin-left: auto;
        border-color: transparent;
        background: transparent;
        color: #7b7268;
        font-weight: 650;
      }

      .folder-mini {
        position: relative;
        width: 14px;
        height: 11px;
        border-radius: 2px;
        background: #d7d0c4;
      }

      .folder-mini::before {
        content: "";
        position: absolute;
        left: 1px;
        top: -4px;
        width: 8px;
        height: 5px;
        border-radius: 2px 2px 0 0;
        background: #c8bdae;
      }

      .composer-placeholder {
        align-self: center;
        color: #767068;
        font-size: 25px;
        line-height: 1;
        font-weight: 430;
      }

      .composer-controls {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .round-control {
        position: relative;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(42, 36, 30, 0.1);
        border-radius: 50%;
        background: #f8f5ef;
        color: #726a61;
      }

      .plus-control::before,
      .plus-control::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 16px;
        width: 14px;
        height: 2px;
        border-radius: 2px;
        background: currentColor;
      }

      .plus-control::after {
        transform: rotate(90deg);
      }

      .folder-button,
      .tool-button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(42, 36, 30, 0.1);
        border-radius: 999px;
        padding: 0 14px;
        background: #fbf8f3;
        color: #413a33;
        font-size: 13px;
        font-weight: 610;
      }

      .folder-button {
        color: #9c4234;
        background: #fff6f2;
      }

      .composer-spacer {
        flex: 1 1 auto;
      }

      .mic-control::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 8px;
        width: 8px;
        height: 15px;
        border: 2px solid currentColor;
        border-top-width: 3px;
        border-radius: 8px;
      }

      .mic-control::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 22px;

<script>
  (() => {
    const isDirectPreview = /\/claude-chat-shell\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-chat-shell-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-chat-shell-surface")) return;
      const fragment = template.content.cloneNode(true);
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
