<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fffdfa;
  }
</style>

<template id="claude-cinematic-reply-template">
  <div id="claude-cinematic-reply-surface" data-composition-id="claude-cinematic-reply-surface" data-width="1920" data-height="1080">
    <section class="claude-cinematic-window" data-primitive="claude-cinematic-reply" aria-label="Editable Claude cinematic reply surface">
      <div class="answer-block">
        <h1 class="answer-copy">Sure, I can make those changes for you.</h1>
        <span
          class="response-mark"
          data-primitive="claude-response-mark"
          data-backlot-mount-src="./claude-response-mark.html"
          data-backlot-mount-selector="#claude-response-mark-surface"
          aria-hidden="true"
        ></span>
      </div>

      <div class="reply-composer" data-primitive="composer">
        <div class="reply-input">Reply...</div>
        <div class="composer-controls">
          <button class="attach-button" type="button" aria-label="Attach"></button>
          <button class="composer-tool folder-tool" type="button"><span></span>Work in a folder</button>
          <button class="composer-tool" type="button">Research</button>
          <button class="send-button" type="button" aria-label="Send"></button>
        </div>
      </div>
    </section>

    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Anthropic Serif";
        src: url("../assets/fonts/AnthropicSerif-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #claude-cinematic-reply-surface {
        width: 1920px;
        height: 1080px;
        overflow: visible;
        color: #151412;
        font-family: "Anthropic Sans", sans-serif;
      }

      #claude-cinematic-reply-surface * {
        box-sizing: border-box;
      }

      button {
        font: inherit;
      }

      .claude-cinematic-window {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fdfcf8;
      }

      .answer-block {
        position: absolute;
        left: 252px;
        top: 364px;
        width: 1260px;
      }

      .answer-copy {
        margin: 0;
        font-family: "Anthropic Serif", serif;
        font-size: 65px;
        line-height: 1;
        font-weight: 420;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .response-mark {
        position: absolute;
        display: block;
        left: 8px;
        top: 143px;
        width: 104px;
        height: 104px;
        color: #c65b47;
        transform-origin: center;
      }

      .response-mark > [data-backlot-mounted-component] {
        position: absolute;
        left: 0;
        top: 0;
        width: 128px;
        height: 128px;
        transform: scale(0.8125);
        transform-origin: top left;
      }

      .reply-composer {
        position: absolute;
        left: 188px;
        top: 892px;
        width: 1544px;
        min-height: 230px;
        display: grid;
        grid-template-rows: minmax(0, 1fr) 78px;
        overflow: hidden;
        border: 1.5px solid rgba(39, 37, 34, 0.16);
        border-radius: 72px;
        background: rgba(255, 254, 251, 0.98);
        box-shadow: 0 1px 2px rgba(49, 44, 38, 0.035), 0 28px 90px rgba(64, 48, 34, 0.09);
      }

      .reply-input {
        padding: 62px 68px 0;
        color: #7d756e;
        font-size: 55px;
        line-height: 1;
        font-weight: 450;
      }

      .composer-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 60px 46px;
        color: #777066;
      }

      .attach-button,
      .send-button {
        position: relative;
        display: grid;
        place-items: center;
        border: 0;
        flex: 0 0 auto;
      }

      .attach-button {
        width: 44px;
        height: 44px;
        border: 1px solid rgba(39, 37, 34, 0.08);
        border-radius: 50%;
        background: #f7f4ee;
      }

      .attach-button::before,
      .attach-button::after {
        content: "";
        position: absolute;
        width: 17px;
        height: 2.5px;
        border-radius: 2px;
        background: currentColor;
      }

      .attach-button::after {
        transform: rotate(90deg);
      }

      .composer-tool {
        height: 40px;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid rgba(39, 37, 34, 0.08);
        background: #faf8f4;
        color: #57534c;
        font-size: 17px;
      }

      .folder-tool span {
        width: 18px;
        height: 14px;
        border-radius: 2px;
        background: #d7cfc3;
        position: relative;
      }

      .folder-tool span::before {
        content: "";
        position: absolute;
        left: 2px;
        top: -5px;
        width: 10px;
        height: 6px;
        border-radius: 2px 2px 0 0;
        background: #c6bbad;
      }

      .send-button {
        width: 54px;
        height: 54px;
        margin-left: auto;
        border-radius: 16px;
        background: #d66f59;
        box-shadow: 0 12px 24px rgba(216, 117, 95, 0.22);
      }

      .send-button::before {
        content: "";
        position: absolute;
        left: 17px;
        top: 16px;
        width: 18px;
        height: 18px;
        border-left: 4px solid #fff;
        border-top: 4px solid #fff;
        transform: rotate(45deg);
      }
    </style>
    <script src="../runtime/backlot-component-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".answer-copy", { opacity: 0, y: 18, filter: "blur(4px)", duration: 0.62, ease: "power3.out" }, 0.16);
      tl.from(".response-mark", { opacity: 0, scale: 0.92, rotation: -18, duration: 0.5, ease: "back.out(1.4)" }, 0.44);
      tl.from(".reply-composer", { opacity: 0, y: 24, filter: "blur(5px)", duration: 0.58, ease: "expo.out" }, 0.76);
      tl.from(".attach-button, .composer-tool, .send-button", { opacity: 0, y: 6, stagger: 0.04, duration: 0.28, ease: "sine.out" }, 1.08);
      tl.to(".response-mark", { rotation: 8, duration: 2.8, repeat: 2, yoyo: true, ease: "sine.inOut" }, 1.16);
      window.__timelines["claude-cinematic-reply-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-cinematic-reply\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-cinematic-reply-template");
      if (!template || document.querySelector("#claude-cinematic-reply-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      window.__backlotComponentsState = "loading";
      const componentLoader = document.createElement("script");
      componentLoader.src = "../runtime/backlot-component-loader.js";
      document.head.appendChild(componentLoader);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
