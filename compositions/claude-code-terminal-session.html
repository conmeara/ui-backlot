      #claude-code-terminal-session-surface {

        --muted: #8e8881;

      #claude-code-terminal-session-surface * {

      .terminal-titlebar {

      .traffic {

      .traffic span {

      .terminal-paper {
        height: calc(100% - 52px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        background:
          linear-gradient(90deg, rgba(188, 83, 74, 0.05) 0 1px, transparent 1px 76px),
          var(--paper);
      }

      .terminal-identity {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 12px;
        padding: 0 22px 14px;
        min-height: 116px;
        align-items: start;
      }

      .pixel-mark {
        width: 74px;
        height: 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 0;
        margin-top: 4px;
      }

      .pixel-mark span {
        background: var(--red);
        opacity: 0;
      }

      .pixel-mark span:nth-child(2),
      .pixel-mark span:nth-child(3),
      .pixel-mark span:nth-child(5),
      .pixel-mark span:nth-child(6),
      .pixel-mark span:nth-child(7),
      .pixel-mark span:nth-child(8),
      .pixel-mark span:nth-child(9),
      .pixel-mark span:nth-child(10),
      .pixel-mark span:nth-child(11),
      .pixel-mark span:nth-child(12),
      .pixel-mark span:nth-child(14),
      .pixel-mark span:nth-child(15) {

      }

      .terminal-identity h1,
      .terminal-identity p {

      }

      .terminal-identity h1 {
        padding-top: 7px;
        font-size: 23px;
        line-height: 1.18;
        font-weight: 500;
      }

      .terminal-identity h1 span {

        font-size: 21px;
        font-weight: 430;

      .terminal-identity p {

        margin: 0 9px 18px;
        padding: 7px 10px 8px;

      .terminal-events {

<script>
  (() => {
    const isDirectPreview = /\/claude-code-terminal-session\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-code-terminal-session-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-code-terminal-session-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      window.__timelines = window.__timelines || {};
      window.__timelines["claude-code-terminal-session-surface"] = null;
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
