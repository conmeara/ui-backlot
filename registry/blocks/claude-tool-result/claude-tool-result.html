    <style>
      #claude-tool-result-surface {
        --bg-000: #ffffff;
        --bg-100: #faf9f5;
        --bg-200: #f2eee7;
        --text-100: #171715;
        --text-200: #35332f;
        --text-300: #59564f;
        --text-400: #777169;
        --text-500: #928b82;
        --border-100: rgba(49, 44, 38, 0.1);
        --brand-000: #c75f48;
        --brand-100: #d8755f;
        --success: #5fa36b;
        --df-sidebar-width: 260px;
        --df-agent-rail-width: 238px;
        --df-header-h: 48px;
        --df-row-h: 26px;
        --df-radius-pill: 6px;
        --df-shadow-card: inset 0 0 0 0 transparent, 0 0 0 1px rgba(20, 16, 12, 0.055), 0 4px 24px rgba(20, 16, 12, 0.055);
        --max-content-width: 596px;
        width: 1180px;
        height: 780px;
        overflow: visible;
        color: var(--text-100);
        font-family: var(--font-claude-ui);
      }

      #claude-tool-result-surface * {
        box-sizing: border-box;
      }

      button {
        font: inherit;
      }

      .claude-tool-window {
        position: relative;
        width: 1180px;
        height: 780px;
        overflow: hidden;
        display: grid;
        grid-template-columns: var(--df-sidebar-width) minmax(0, 1fr) var(--df-agent-rail-width);
        grid-template-rows: 100%;
        border-radius: 18px;
        background: var(--bg-100);
        box-shadow: 0 38px 110px rgba(54, 42, 31, 0.22), 0 0 0 1px rgba(55, 42, 31, 0.08);
      }

      .dframe-sidebar {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: var(--df-sidebar-width);
        min-width: 0;
        padding: 13px 10px 12px;
        background: #f6f3ed;
        border-right: 1px solid rgba(42, 35, 27, 0.06);
        box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.42);
        user-select: none;
      }

      .claude-traffic {
        height: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px 4px;
      }

      .claude-traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
      }

      .claude-traffic .red { background: #ff5f57; }
      .claude-traffic .yellow { background: #febc2e; }
      .claude-traffic .green { background: #28c840; }

      .sidebar-head {
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-left: 5px;
      }

      .mode-switch {
        height: 31px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
        margin: 0 4px 14px;
        border-radius: 9px;
        background: rgba(232, 226, 217, 0.74);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.045);
      }

      .mode-switch button {
        min-width: 0;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--text-400);
        font-size: 11.5px;
        font-weight: 560;
      }

      .mode-switch .active {
        color: var(--text-100);
        background: rgba(255, 254, 250, 0.78);
        box-shadow: 0 1px 4px rgba(55, 48, 40, 0.08);
      }

      .claude-app-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        color: #342f2a;
        font-size: 14px;
        font-weight: 680;
      }

      .claude-sunburst {
        position: relative;
        display: inline-block;
        --ray-w: 2.4px;
        --ray-h: 8px;
        --ray-gap: 3px;
        color: var(--brand-000);
        flex: 0 0 auto;
      }

      .claude-sunburst.small {
        width: 18px;
        height: 18px;
        --ray-w: 1.8px;
        --ray-h: 6.5px;
        --ray-gap: 2px;
      }

      .claude-sunburst.response-mark {
        width: 30px;
        height: 30px;
        --ray-w: 3px;
        --ray-h: 11px;
        --ray-gap: 3px;
      }

      .claude-sunburst span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--ray-w);
        height: var(--ray-h);
        border-radius: 999px;
        background: currentColor;
        transform-origin: 50% calc(100% + var(--ray-gap));
        transform: translate(-50%, calc(-100% - var(--ray-gap))) rotate(calc(var(--i) * 30deg));
      }

      .claude-sunburst span:nth-child(1) { --i: 0; }
      .claude-sunburst span:nth-child(2) { --i: 1; }
      .claude-sunburst span:nth-child(3) { --i: 2; }
      .claude-sunburst span:nth-child(4) { --i: 3; }
      .claude-sunburst span:nth-child(5) { --i: 4; }
      .claude-sunburst span:nth-child(6) { --i: 5; }
      .claude-sunburst span:nth-child(7) { --i: 6; }
      .claude-sunburst span:nth-child(8) { --i: 7; }
      .claude-sunburst span:nth-child(9) { --i: 8; }
      .claude-sunburst span:nth-child(10) { --i: 9; }
      .claude-sunburst span:nth-child(11) { --i: 10; }
      .claude-sunburst span:nth-child(12) { --i: 11; }

      .sidebar-icon-button,
      .topbar-icon,
      .prompt-icon-button,
      .mini-action {
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--text-400);
        position: relative;
      }

      .sidebar-icon-button {
        width: 28px;
        height: 28px;
        border-radius: 8px;
      }

      .sidebar-icon-button::before {
        content: "";
        width: 12px;
        height: 9px;
        border-radius: 2px;
        border: 1.5px solid currentColor;
        box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.9);
      }

      .sidebar-primary-actions {
        display: grid;
        gap: 3px;
        margin-bottom: 13px;
      }

      .new-chat-button,
      .search-chat-button,
      .dframe-row {
        height: var(--df-row-h);
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        padding: 0 7px;
        border: 0;
        border-radius: var(--df-radius-pill);
        background: transparent;
        color: var(--text-300);
        font-size: 13px;
        white-space: nowrap;
      }

      .new-chat-button {
        color: var(--text-100);
        background: rgba(248, 246, 242, 0.98);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.055);
        font-weight: 590;
      }

      .search-chat-button {
        color: var(--text-400);
      }

      .dframe-row {
        margin-bottom: 1px;
      }

      .dframe-row.selected,
      .dframe-row.active-thread {
        color: var(--text-100);
        background: rgba(244, 241, 235, 0.98);
      }

      .dframe-row span:last-child,
      .new-chat-button span:last-child,
      .search-chat-button span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-section-label {
        margin: 12px 7px 5px;
        color: var(--text-500);
        font-size: 10.5px;
        font-weight: 600;
      }

      .sidebar-symbol {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-400);
        position: relative;
      }

      .sidebar-symbol::before {
        content: "";
        position: absolute;
        inset: 3px;
        border: 1.5px solid currentColor;
        border-radius: 4px;
      }

      .sidebar-symbol.compose::after,
      .sidebar-symbol.search::after,
      .sidebar-symbol.chat::after,
      .sidebar-symbol.folder::after {
        content: "";
        position: absolute;
        background: currentColor;
      }

      .sidebar-symbol.compose::after {
        right: 2px;
        top: 3px;
        width: 7px;
        height: 1.5px;
        border-radius: 2px;
        transform: rotate(-35deg);
      }

      .sidebar-symbol.search::before {
        width: 8px;
        height: 8px;
        inset: 2px auto auto 2px;
        border-radius: 50%;
      }

      .sidebar-symbol.search::after {
        right: 2px;
        bottom: 3px;
        width: 6px;
        height: 1.5px;
        border-radius: 2px;
        transform: rotate(45deg);
      }

      .sidebar-symbol.folder::before {
        inset: 5px 2px 2px;
      }

      .sidebar-symbol.folder::after {
        left: 3px;
        top: 3px;
        width: 7px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        opacity: 0.3;
      }

      .sidebar-account {
        margin-top: auto;
        height: 36px;
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr) 20px;
        align-items: center;
        gap: 8px;
        padding: 0 7px;
        color: var(--text-400);
        font-size: 12px;
      }

      .sidebar-sync-state {
        display: grid;
        grid-template-columns: 12px 1fr;
        gap: 7px;
        align-items: start;
        margin: 18px 7px 10px;
        padding: 10px 9px;
        border-radius: 10px;
        background: rgba(255, 254, 250, 0.46);
        color: var(--text-500);
        font-size: 10.5px;
        line-height: 1.35;
      }

      .sync-pulse {
        width: 8px;
        height: 8px;
        margin-top: 3px;
        border-radius: 50%;
        background: #6aa76d;
        box-shadow: 0 0 0 4px rgba(106, 167, 109, 0.13);
      }

      .account-avatar {
        width: 23px;
        height: 23px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--brand-100);
        color: #fff;
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .account-copy {
        display: grid;
        gap: 1px;
        min-width: 0;
      }

      .account-copy strong {
        color: var(--text-300);
        font-size: 12px;
        font-weight: 560;
      }

      .account-copy span {
        color: var(--text-500);
        font-size: 11px;
      }

      .sidebar-kebab {
        position: relative;
        width: 18px;
        height: 18px;
      }

      .sidebar-kebab::before,
      .topbar-icon.more::before,
      .mini-action.more::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: currentColor;
        transform: translate(-50%, -50%);
        box-shadow: -5px 0 0 currentColor, 5px 0 0 currentColor;
      }

      .dframe-pane-primary {
        position: relative;
        min-width: 0;
        height: 100%;
        display: grid;
        grid-template-rows: var(--df-header-h) minmax(0, 1fr) 152px;
        background: var(--bg-100);
      }

      .epitaxy-topbar {
        height: var(--df-header-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 18px 0 12px;
        border-bottom: 1px solid rgba(50, 44, 36, 0.045);
      }

      .topbar-left,
      .topbar-actions {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .topbar-left { gap: 8px; }
      .topbar-actions { gap: 6px; }

      .topbar-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
      }

      .topbar-icon.menu::before {
        content: "";
        width: 16px;
        height: 12px;
        border-top: 1.8px solid currentColor;
        border-bottom: 1.8px solid currentColor;
        box-shadow: 0 5px 0 -3.2px currentColor;
      }

      .topbar-icon.share::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 1.6px solid currentColor;
        border-radius: 3px;
      }

      .topbar-icon.share::after {
        content: "";
        position: absolute;
        top: 6px;
        width: 7px;
        height: 7px;
        border-top: 1.6px solid currentColor;
        border-right: 1.6px solid currentColor;
        transform: rotate(-45deg);
      }

      .thread-title-stack {
        min-width: 0;
        display: grid;
        gap: 1px;
      }

      .conversation-title {
        color: var(--text-200);
        font-size: 13.5px;
        font-weight: 620;
        line-height: 1.1;
      }

      .conversation-subtitle {
        color: var(--text-500);
        font-size: 11px;
        line-height: 1.1;
      }

        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 9px;

        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-300);
        font-size: 12px;
      }

      .model-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--brand-100);
      }

      .chevron {
        width: 12px;
        height: 12px;
        position: relative;
        color: var(--text-500);
      }

      .chevron::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 2px;
        width: 6px;
        height: 6px;
        border-right: 1.6px solid currentColor;
        border-bottom: 1.6px solid currentColor;
        transform: rotate(-45deg);
      }

      .chevron.open::before,
      .chevron.down::before {
        top: 1px;
        transform: rotate(45deg);
      }

<script>
  (() => {
    const isDirectPreview = /\/claude-tool-result\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-tool-result-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-tool-result-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
