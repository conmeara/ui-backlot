            <div class="v-line"><em>4</em><code></code></div>
            <div class="v-line"><em>5</em><code>Prism is an open-source editing toolkit for coding agents. It plans,</code></div>
            <div class="v-line"><em>6</em><code>trims, grades, and exports video from a brief, a transcript, or both.</code></div>
            <div class="v-line"><em>7</em><code></code></div>
            <div class="v-line"><em>8</em><code>Agents cannot watch a timeline directly. Prism turns raw footage into</code></div>
            <div class="v-line"><em>9</em><code>evidence they can reason over: shot boundaries, word-aligned captions,</code></div>
            <div class="v-line"><em>10</em><code>loudness curves, and an explicit edit decision list.</code></div>
            <div class="v-line"><em>11</em><code></code></div>
            <div class="v-line"><em>12</em><code><span class="tk-quote">&gt; <span class="tk-b">Start here:</span> <span class="tk-link">[Install Prism](#install)</span>, then tell your agent: <span class="tk-code">`Cut</span></span></code></div>
            <div class="v-line"><em>13</em><code><span class="tk-quote">&gt; a 45-second trailer from these clips and keep every punch-in.`</span></code></div>
            <div class="v-line"><em>14</em><code></code></div>
            <div class="v-line"><em>15</em><code><span class="tk-h">## Why Prism?</span></code></div>
            <div class="v-line"><em>16</em><code></code></div>
            <div class="v-line"><em>17</em><code>A terminal gives an agent access to ffmpeg, but not editorial judgment.</code></div>
            <div class="v-line"><em>18</em><code>It still needs to know whether a take was clean, a cut landed on the</code></div>
            <div class="v-line add"><em>19</em><code>beat, or an export kept its color and loudness. Prism puts shots,</code></div>
            <div class="v-line add"><em>20</em><code>audio, and cut points on one shared timeline, then records the edit as</code></div>
            <div class="v-line add"><em>21</em><code>inspectable project state.</code></div>
            <div class="v-line"><em>22</em><code></code></div>
            <div class="v-line"><em>23</em><code><span class="tk-h">## What's included</span></code></div>
            <div class="v-line"><em>24</em><code></code></div>
            <div class="v-line"><em>25</em><code>| Layer | Included | Role |</code></div>
            <div class="v-line"><em>26</em><code>|---|---|---|</code></div>
            <div class="v-line"><em>27</em><code>| <span class="tk-b">Tools</span> | The <span class="tk-code">`prism`</span> CLI | Trim, grade, and render clips |</code></div>

            <div class="v-line"><em>29</em><code>| <span class="tk-b">Ledger</span> | <span class="tk-code">`EDIT.md`</span> | Preserves reviewer notes and taste |</code></div>

            <div class="v-line"><em>33</em><code><span class="tk-h">## Getting started</span></code></div>
            <div class="v-line"><em>34</em><code></code></div>

<script>
  (() => {
    const isDirectPreview = /\/codex-app\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("codex-app-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#codex-app-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const pane = new URLSearchParams(window.location.search).get("pane");
      if (pane) {
        const root = document.getElementById("codex-app-surface");
        if (root) root.setAttribute("data-pane", pane);
      }
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
