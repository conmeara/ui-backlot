<style>
      @import url("styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      radial-gradient(circle at 22% 16%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0) 28%),
      linear-gradient(140deg, #eee9df 0%, #fbfaf6 58%, #e4ece4 100%);
  }
</style>

<template id="claude-chat-pane-template">
  <div id="claude-chat-pane-surface" data-composition-id="claude-chat-pane-surface" data-width="1180" data-height="900">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <symbol id="lucide-sidebar-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="M9 3v18" />
      </symbol>
      <symbol id="lucide-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v13" />
        <path d="m16 6-4-4-4 4" />
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
      </symbol>
      <symbol id="lucide-more" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1" />
        <circle cx="19" cy="12" r="1" />
        <circle cx="5" cy="12" r="1" />
      </symbol>
    </svg>
    <section class="claude-chat-pane-window" data-primitive="claude-chat-pane" aria-label="Editable Claude chat pane">
      <header class="chat-topbar" data-primitive="claude-chat-topbar">
        <div class="thread-title">
          <button type="button" aria-label="Toggle sidebar" class="topbar-icon"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-sidebar-toggle"/></svg></button>
          <div>
            <strong>Browser layout polish</strong>
            <span>Working in UI Backlot</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="model-pill"><span class="model-dot"></span>Claude Sonnet 4.6</button>
          <button type="button" aria-label="Share" class="topbar-icon"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-share"/></svg></button>
          <button type="button" aria-label="More" class="topbar-icon"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-more"/></svg></button>
        </div>
      </header>

      <!-- Poured from the shared claude-thread-core atom (cinematic-scale
           reply, no sidebar chrome) instead of a bespoke copy — see
           docs/component-consolidation-audit-2026-07-02.md. The shell CSS
           below repaints the mounted panel to the pane's cinematic rhythm,
           the same "shell overrides atom internals" pattern
           compositions/claude-composed-app.html uses for its own thread
           slot. -->
      <main
        class="component-slot thread-slot"
        data-primitive="claude-chat-thread"
        data-embed="flat"
        data-backlot-mount-src="compositions/claude-thread-core.html"
        data-backlot-mount-selector="#claude-thread-core-surface"
      ></main>

      <footer class="chat-composer-dock" data-primitive="claude-chat-composer">
        <div
          class="component-slot composer-slot"
          data-primitive="claude-working-composer"
          data-embed="flat"
          data-backlot-mount-src="compositions/claude-composer.html"
          data-backlot-mount-selector="#claude-composer-surface"
        ></div>
      </footer>
      <div class="composer-disclaimer">Claude is AI and can make mistakes. Please double-check responses.</div>
    </section>

    <style>
      #claude-chat-pane-surface {
        --paper: #fffdfa;
        --ink: #17130f;
        --muted: #746c62;
        --brand: #c85f4b;
        width: 1180px;
        height: 900px;
        overflow: hidden;
        color: var(--ink);
        font-family: var(--font-claude-ui);
      }

      #claude-chat-pane-surface * {
        box-sizing: border-box;
      }

      #claude-chat-pane-surface button {
        font: inherit;
        cursor: default;
      }

      :where(#claude-chat-pane-surface) .backlot-icon {
        width: 1em;
        height: 1em;
        display: block;
      }

      .claude-chat-pane-window {
        position: relative;
        width: 1180px;
        height: 900px;
        display: grid;
        grid-template-rows: 76px 1fr auto 24px;
        overflow: hidden;
        border: 1px solid rgba(56, 42, 31, 0.08);
        border-radius: 28px;
        background:
          radial-gradient(circle at 53% 20%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0) 28%),
          linear-gradient(180deg, #fffdfa 0%, #fbfaf6 100%);
        box-shadow:
          0 42px 120px rgba(55, 42, 30, 0.15),
          0 1px 0 rgba(255, 255, 255, 0.68) inset;
      }

      .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 28px;
        border-bottom: 1px solid rgba(224, 216, 205, 0.44);
      }

      .thread-title,
      .topbar-actions {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .thread-title {
        gap: 12px;
      }

      .thread-title strong,
      .thread-title span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .thread-title strong {
        max-width: 420px;
        font-size: 15px;
        font-weight: 720;
      }

      .thread-title span {
        max-width: 420px;
        margin-top: 2px;
        color: #857b70;
        font-size: 12px;
      }

      .topbar-icon {
        position: relative;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #6d655c;
        padding: 8px;
      }

      .topbar-icon:hover {
        background: rgba(57, 49, 40, 0.06);
      }

      .topbar-actions {
        justify-content: flex-end;
        gap: 9px;
      }

      .model-pill {
        height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(53, 44, 35, 0.1);
        border-radius: 999px;
        padding: 0 13px;
        background: #fffdfa;
        color: #403a33;
        font-size: 13px;
      }

      .model-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--brand);
      }

      /* ---- Thread slot (mounted claude-thread-core, cinematic scale) ---- */
      .component-slot {
        position: relative;
        min-width: 0;
        overflow: hidden;
        background: transparent;
      }

      .component-slot > [data-backlot-mounted-component] {
        display: block;
        pointer-events: none;
      }

      .thread-slot {
        min-height: 0;
      }

      /* The pane owns its own topbar, so the mounted atom's working topbar
         (session title / share / more) is chrome we hide; the remaining
         overrides pour the atom's dense working thread into the large-serif
         cinematic rhythm this pane was originally hand-authored with —
         mirrors the atom's own [data-scale="cinematic"] block (see
         compositions/claude-thread-core.html) without depending on the
         data-scale attribute surviving the loader's script-stripped mount. */
      #claude-chat-pane-surface .thread-slot .thread-topbar { display: none; }

      /* Hiding the topbar grid item removes it from grid auto-placement
         entirely, so the remaining .thread-scroll child would otherwise
         fall into the panel's first (48px) row track instead of filling
         the panel — collapse to a single fluid row, same fix
         claude-composed-app.html applies to its own thread slot. */
      #claude-chat-pane-surface .thread-slot .thread-core-panel {
        grid-template-rows: minmax(0, 1fr);
        background: transparent;
      }

      #claude-chat-pane-surface .thread-slot .thread-scroll { padding: 44px 0 24px; }
      #claude-chat-pane-surface .thread-slot .thread-scroll::after { display: none; }

      #claude-chat-pane-surface .thread-slot .thread-width {
        width: min(calc(100% - 76px), 780px);
      }

      #claude-chat-pane-surface .thread-slot .message-row.user {
        margin-bottom: 34px;
      }

      #claude-chat-pane-surface .thread-slot .sticky-prompt-bubble {
        max-width: 585px;
        padding: 16px 20px 17px;
        border-radius: 19px;
        font-size: 24px;
        line-height: 1.27;
        font-weight: 430;
      }

      #claude-chat-pane-surface .thread-slot .assistant-stack {
        padding-left: 78px;
      }

      #claude-chat-pane-surface .thread-slot .reply-mark {
        display: block;
        position: absolute;
        left: 0;
        top: 9px;
        width: 48px;
        height: 48px;
      }

      #claude-chat-pane-surface .thread-slot .assistant-copy {
        max-width: 700px;
        gap: 33px;
        font-size: 48px;
        line-height: 1.13;
        font-weight: 430;
      }

      /* No color here: the atom's own base rule (`.assistant-line.secondary
         { color: inherit }`) already resolves to the theme-aware
         --claude-ink / --claude-ink-soft tokens, including its .theme-dark
         override — hardcoding a light-mode hex here would silently outrank
         that dark rule the same way the composed shell's neutral-token
         override once did (see the dark-variant style block below). */
      #claude-chat-pane-surface .thread-slot .assistant-line.secondary {
        font-size: 34px;
        line-height: 1.23;
        font-weight: 430;
      }

      /* Cinematic rhythm carries no tool chrome in this pane's source frame
         study — hide the dense working-thread cards. */
      #claude-chat-pane-surface .thread-slot .thinking-card,
      #claude-chat-pane-surface .thread-slot .tool-card,
      #claude-chat-pane-surface .thread-slot .command-card,
      #claude-chat-pane-surface .thread-slot .message-actions {
        display: none;
      }

      /* ---- Composer dock (mounted claude-composer, chat page) ---- */
      .chat-composer-dock {
        justify-self: center;
        width: min(900px, calc(100% - 112px));
        margin-bottom: 6px;
      }

      .composer-slot {
        overflow: visible;
      }

      .composer-disclaimer {
        justify-self: center;
        width: min(900px, calc(100% - 112px));
        margin-top: 8px;
        text-align: center;
        color: var(--muted);
        font-size: 11.5px;
      }
    </style>

    <style>
      /* ============ DARK VARIANT (shell chrome) ============
         The mounted atoms carry their own .theme-dark blocks, which cascade
         from the same root class; this block only repaints the chrome the
         pane itself owns (window frame, topbar). Covers both the
         class-on-self and class-on-ancestor forms, matching
         compositions/claude-composed-app.html's convention. */
      #claude-chat-pane-surface.theme-dark .claude-chat-pane-window,
      .theme-dark #claude-chat-pane-surface .claude-chat-pane-window {
        background: linear-gradient(180deg, #262624 0%, #201f1d 100%);
        box-shadow:
          0 42px 120px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      #claude-chat-pane-surface.theme-dark .chat-topbar,
      .theme-dark #claude-chat-pane-surface .chat-topbar {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      #claude-chat-pane-surface.theme-dark .thread-title strong,
      .theme-dark #claude-chat-pane-surface .thread-title strong {
        color: #e8e5da;
      }

      #claude-chat-pane-surface.theme-dark .thread-title span,
      .theme-dark #claude-chat-pane-surface .thread-title span {
        color: #98948a;
      }

      #claude-chat-pane-surface.theme-dark .topbar-icon,
      .theme-dark #claude-chat-pane-surface .topbar-icon {
        color: #98948a;
      }

      #claude-chat-pane-surface.theme-dark .model-pill,
      .theme-dark #claude-chat-pane-surface .model-pill {
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #b7b2a8;
      }

      #claude-chat-pane-surface.theme-dark .composer-disclaimer,
      .theme-dark #claude-chat-pane-surface .composer-disclaimer {
        color: #8a8578;
      }
    </style>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-chat-pane\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-chat-pane-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-chat-pane-surface")) return;
      const fragment = template.content.cloneNode(true);
      document.body.appendChild(fragment);
      // Direct preview only: the fragment's mount slots don't exist in the
      // live document until now, so the loader must be injected after
      // insertion rather than as a static top-level <script src> (which
      // would run before the template is cloned and find zero mounts).
      // When this pane is itself mounted by a host composition, the host's
      // own loader instance resolves these nested mounts recursively, so
      // this branch never runs.
      const loader = document.createElement("script");
      loader.src = "runtime/backlot-component-loader.js";
      document.body.appendChild(loader);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
