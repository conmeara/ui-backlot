    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #excel-workbook-surface {
        --excel: #107c41;
        --excel-dark: #0b5f32;
        --excel-soft: #e5f3ea;
        --chrome: #f8f9fa;
        --line: #d7dce2;
        --grid: #dce1e7;
        --ink: #16120f;
        --muted: #67727f;
        --green: #43b875;
        --amber: #d9a441;
        --blue: #1d86e8;
        --clay: #c65b47;
        width: 1280px;
        height: 760px;
        overflow: hidden;
        color: var(--ink);
        font-family: "Anthropic Sans", system-ui, sans-serif;
      }

      #excel-workbook-surface * {
        box-sizing: border-box;
      }

      .excel-window {
        width: 1280px;
        height: 760px;
        overflow: hidden;
        border-radius: 15px;
        background: #eef1f4;
        border: 1px solid rgba(20, 30, 48, 0.12);
        box-shadow: 0 32px 96px rgba(28, 34, 46, 0.22);
      }

      .excel-titlebar {
        height: 38px;
        display: grid;
        grid-template-columns: 58px 24px auto auto auto 1fr auto;
        align-items: center;
        gap: 9px;
        padding: 0 13px;
        background: var(--chrome);
        border-bottom: 1px solid #d6dae0;
        color: #2d3540;
        font-size: 12px;
        font-weight: 650;
      }

      .excel-traffic {
        position: relative;
        width: 50px;
        height: 14px;
      }

      .excel-traffic::before {
        content: "";
        position: absolute;
        left: 0;
        top: 1px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff5f57;
        box-shadow: 19px 0 0 #febc2e, 38px 0 0 #28c840;
      }

      .excel-app-icon {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        border-radius: 6px;
        background: linear-gradient(135deg, #21a366, var(--excel-dark));
        color: #fff;
        font-size: 10px;
        font-weight: 850;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }

      .workbook-title {
        min-width: 150px;
      }

      .save-state,
      .autosave,
      .title-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #68727e;
        font-size: 10px;
        white-space: nowrap;
      }

      .sync-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: 2px solid var(--green);
        border-top-color: transparent;
      }

      .autosave span {
        width: 26px;
        height: 14px;
        border-radius: 999px;
        background: #d7ecdf;
        border: 1px solid #98cfad;
        position: relative;
      }

      .autosave span::after {
        content: "";
        position: absolute;
        right: 2px;
        top: 2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      .title-search {
        justify-self: center;
        width: 250px;
        height: 22px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 999px;
        background: #eef0f3;
        color: #7c8792;
        font-size: 11px;
        font-weight: 500;
      }

      .title-actions span {
        height: 22px;
        display: inline-flex;
        align-items: center;
        padding: 0 9px;
        border-radius: 7px;
        background: #eef0f3;
        color: #384450;
        font-size: 11px;
      }

      .excel-tabs {
        height: 30px;
        display: flex;
        align-items: end;
        gap: 3px;
        padding: 0 12px;
        background: #f3f4f6;
        border-bottom: 1px solid #d7dbe1;
      }

      .excel-tabs span {
        height: 25px;
        display: flex;

        padding: 0 13px;

        color: #33404c;
        font-size: 12px;

        border: 1px solid #d7dbe1;
        border-bottom-color: #fff;

      .excel-tabs .contextual {

      .excel-ribbon {
        height: 100px;
        display: flex;
        align-items: stretch;
        padding: 5px 8px 0;
        background: #fff;
        border-bottom: 1px solid #d4d9e0;
      }

      .ribbon-group {
        position: relative;
        display: flex;

        gap: 7px;

        padding: 3px 9px 25px;
        border-left: 1px solid #e3e6eb;

      .ribbon-group:first-child {

      }

      .ribbon-group strong {
        position: absolute;

        font-weight: 600;
        text-align: center;
      }

      .ribbon-large {

        grid-template-rows: 34px auto;
        justify-items: center;
        gap: 4px;

        border: 1px solid transparent;

        color: #283441;
        font-size: 11px;

      }

      .ribbon-large i {
        position: absolute;
        right: 6px;
        bottom: 8px;
        width: 5px;
        height: 5px;
        border-right: 1.4px solid #606a74;
        border-bottom: 1.4px solid #606a74;

      .cmd-icon {
        width: 29px;
        height: 30px;
        border-radius: 7px;
        background: #e5f3ea;
        border: 1px solid #b9dbc8;
        position: relative;
      }

      .cmd-icon.paste::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        width: 13px;
        height: 16px;
        border-radius: 3px;
        background: var(--excel);

      .cmd-icon.paste::after {
        content: "";

        left: 10px;
        top: 5px;
        width: 9px;
        height: 5px;
        border-radius: 3px;
        background: #f1d37c;
      }

      .ribbon-stack {
        display: grid;
        gap: 4px;
      }

      .ribbon-stack span,
      .field,
      .toggle,
      .merge,
      .wrap {
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        border: 1px solid #d8dce2;

        color: #34414f;

      .field {

      }

      .toggle.fill {

<script>
  (() => {
    const isDirectPreview = decodeURIComponent(window.location.pathname).endsWith("/excel-workbook.html");
    if (!isDirectPreview) return;

    const mount = () => {
      if (document.getElementById("excel-workbook-surface")) return;
      const template = document.getElementById("excel-workbook-surface-template");
      if (!template || !document.body) return;

      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };

    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
