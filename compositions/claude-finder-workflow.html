<div id="claude-finder-workflow" data-composition-id="claude-finder-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="9">
  <section class="workflow-stage" data-primitive="claude-finder-workflow" aria-label="Claude and Finder workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="./mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame finder-component"
      data-primitive="finder-window"
      data-backlot-mount-src="./finder-window.html"
      data-backlot-mount-selector="#finder-window-surface"
    ></div>

    <div
      class="component-frame claude-thread-component"
      data-primitive="claude-app-window"
      data-backlot-mount-src="./claude-app.html"

</div>

<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #eceee8;
  }

  #claude-finder-workflow {
    --ink: #181410;
    --paper: #f7f5ef;
    --hairline: rgba(43, 35, 28, 0.12);

  }

  #claude-finder-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0) 21%),
      radial-gradient(circle at 82% 14%, rgba(205, 110, 87, 0.15), rgba(205, 110, 87, 0) 25%),
      radial-gradient(circle at 74% 82%, rgba(189, 212, 199, 0.44), rgba(189, 212, 199, 0) 31%),
      linear-gradient(145deg, #f2eee7 0%, #fbfaf6 50%, #dfe9e2 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 30px 0 0;
    opacity: 0.5;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);

  .finder-component {

    height: 436px;
    border-radius: 22px;

  .claude-thread-component,
  .claude-attachment-component {

    width: 1180px;

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.36, ease: "sine.out" }, 0.08);
  tl.from(".finder-component", { opacity: 0, x: -32, y: 18, filter: "blur(7px)", duration: 0.56, ease: "power3.out" }, 0.22);
  tl.from(".claude-attachment-component", { opacity: 0, x: 30, y: 22, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.56);
  tl.from(".workflow-cursor", { opacity: 0, x: -24, y: 18, duration: 0.28, ease: "sine.out" }, 1.24);
  tl.from(".drag-chip", { opacity: 0, x: -18, y: -10, scale: 0.96, duration: 0.24, ease: "sine.out" }, 1.42);
  tl.to(".workflow-cursor", { x: 365, y: 178, duration: 0.86, ease: "power2.inOut" }, 1.72);
  tl.to(".click-ring", { x: 365, y: 178, duration: 0.86, ease: "power2.inOut" }, 1.72);
  tl.to(".drag-chip", { x: 224, y: 116, duration: 0.86, ease: "power2.inOut" }, 1.72);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1.28, duration: 0.22, ease: "sine.out" }, 2.56);
  tl.to(".click-ring", { opacity: 0, scale: 1.85, duration: 0.26, ease: "sine.in" }, 2.84);
  tl.to(".drag-chip", { opacity: 0, y: 128, duration: 0.32, ease: "sine.out" }, 2.92);
  tl.to(".finder-component", { x: -16, y: -10, opacity: 0.72, duration: 1.35, ease: "sine.inOut" }, 3.18);
  tl.to(".claude-attachment-component", { y: -12, duration: 1.2, ease: "sine.inOut" }, 3.65);
  tl.to(".workflow-cursor", { x: 574, y: 336, duration: 1.08, ease: "power2.inOut" }, 4.36);
  tl.to(".claude-attachment-component", { opacity: 0, filter: "blur(8px)", duration: 0.56, ease: "sine.inOut" }, 5.18);
  tl.fromTo(".claude-thread-component", { opacity: 0, y: 16, filter: "blur(8px)" }, { opacity: 1, y: -12, filter: "blur(0px)", duration: 0.64, ease: "power2.out" }, 5.3);
  tl.to(".workflow-cursor", { x: 654, y: 404, duration: 1.08, ease: "power2.inOut" }, 6.2);
  window.__timelines["claude-finder-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");

  if (captureMode === "hero") {
    tl.seek(3.38).pause();
  } else if (captureMode === "thread") {
    tl.seek(5.95).pause();
    gsap.set(".claude-attachment-component", { opacity: 0, y: -12, filter: "blur(8px)" });
    gsap.set(".claude-thread-component", { opacity: 1, y: -12, filter: "blur(0px)" });
    gsap.set(".finder-component", { x: -16, y: -10, opacity: 0.72 });
    gsap.set(".drag-chip", { opacity: 0, y: 128 });
  }
</script>
