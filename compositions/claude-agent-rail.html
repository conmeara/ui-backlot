<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fffdfa;
  }
</style>

<template id="claude-agent-rail-template">
  <div id="claude-agent-rail-surface" data-composition-id="claude-agent-rail-surface" data-width="380" data-height="860">
    <section class="claude-agent-rail-stage" data-primitive="claude-agent-rail-stage" aria-label="Editable Claude agent rail surface">
      <aside class="agent-rail-panel" data-primitive="claude-agent-context-rail" aria-label="Claude task progress and context">
        <section class="rail-section progress-section">
          <div class="rail-title-row">
            <div>
              <div class="rail-title">Task</div>
              <p>Preparing updates from selected local context.</p>
            </div>
            <span>Working</span>
          </div>

          <div class="progress-circles" aria-hidden="true">
            <span class="done"></span>
            <span class="done"></span>
            <span class="active"></span>
            <span></span>
          </div>

          <div class="rail-step-list">
            <div class="rail-step done"><span></span><p>Read folder</p><b>done</b></div>
            <div class="rail-step done"><span></span><p>Map Q2 data</p><b>done</b></div>
            <div class="rail-step active"><span></span><p>Prepare slides</p><b>now</b></div>
            <div class="rail-step"><span></span><p>Return file</p><b>next</b></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Artifacts</div>
          <div class="artifact-card">
            <span class="rail-file-icon deck"></span>
            <div><strong>Deck.pptx</strong><span>opening slides</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Context</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon folder"></span><span>Launch Deck</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Connectors</div>
          <div class="connector-row"><span class="connector-dot"></span><span>Local files</span><strong>On</strong></div>
          <div class="connector-row"><span class="connector-dot muted"></span><span>Web search</span><strong>Off</strong></div>
        </section>

        <section class="rail-section working-files">
          <div class="rail-title">Working files</div>
          <div class="working-file">slide-notes.md</div>
          <div class="working-file">README.md</div>
          <div class="working-file">Q2 revenue.csv</div>
        </section>

        <section class="rail-section rail-note">
          <span class="sync-pulse"></span>
          <p>Claude is using only the selected local project context.</p>
        </section>
      </aside>
    </section>

    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #claude-agent-rail-surface {
        width: 380px;
        height: 860px;
        overflow: visible;
        color: #211f1c;
        font-family: "Anthropic Sans", sans-serif;
      }

      #claude-agent-rail-surface * {
        box-sizing: border-box;
      }

      .claude-agent-rail-stage {
        width: 380px;
        height: 860px;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #fffdfa;
      }

      .agent-rail-panel {
        width: 324px;
        min-height: 800px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 18px 16px 16px;
        border: 1px solid rgba(39, 37, 34, 0.085);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 254, 251, 0.985), rgba(250, 248, 243, 0.95));
        box-shadow:
          0 1px 1px rgba(49, 44, 38, 0.035),
          0 24px 70px rgba(72, 52, 39, 0.12);
      }

      .rail-section {
        display: grid;
        gap: 9px;
      }

      .progress-section {
        gap: 12px;
      }

      .rail-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .rail-title-row > span {
        height: 24px;
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(214, 111, 89, 0.12);
        color: #a84535;
        font-size: 12px;
        font-weight: 700;
      }

      .rail-title {
        color: #292520;
        font-size: 15px;
        line-height: 1.1;
        font-weight: 720;
      }

      .progress-section p,
      .rail-note p {
        margin: 5px 0 0;
        color: #6a6259;
        font-size: 13px;
        line-height: 1.35;
      }

      .progress-circles {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .progress-circles span {
        width: 27px;
        height: 27px;
        position: relative;
        border: 1.5px solid #d8d2c9;
        border-radius: 50%;
        background: #fffefa;
      }

      .progress-circles .done {
        border-color: #d8d2c9;
        background: #f1eee8;
      }

      .progress-circles .done::before {
        content: "";
        position: absolute;
        left: 9px;
        top: 8px;
        width: 8px;
        height: 5px;
        border-left: 2px solid #4b4740;
        border-bottom: 2px solid #4b4740;
        transform: rotate(-45deg);
      }

      .progress-circles .active {
        border-color: #d86f5d;
        box-shadow: 0 0 0 6px rgba(216, 117, 95, 0.1);
      }

      .rail-step-list {
        display: grid;
        gap: 6px;
      }

      .rail-step {
        min-height: 34px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        align-items: center;
        gap: 9px;
        padding: 0 9px;
        border-radius: 10px;
        background: rgba(246, 243, 237, 0.42);
      }

      .rail-step span {
        width: 16px;
        height: 16px;
        position: relative;
        border: 1.5px solid #d8d2c9;
        border-radius: 50%;
      }

      .rail-step.done span {
        background: #f1eee8;
      }

      .rail-step.done span::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 4px;
        width: 6px;
        height: 4px;
        border-left: 1.7px solid #4b4740;
        border-bottom: 1.7px solid #4b4740;
        transform: rotate(-45deg);
      }

      .rail-step.active {
        background: rgba(214, 111, 89, 0.075);
      }

      .rail-step.active span {
        border-color: #d86f5d;
        box-shadow: 0 0 0 5px rgba(216, 117, 95, 0.1);
      }

      .rail-step p {
        min-width: 0;
        margin: 0;
        overflow: hidden;
        color: #4f4942;
        font-size: 13px;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-step b {
        color: #736c63;
        font-size: 11.5px;
        font-weight: 620;
      }

      .artifact-card {
        min-height: 61px;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        align-items: center;
        gap: 11px;
        padding: 10px 11px;
        border: 1px solid rgba(39, 37, 34, 0.07);
        border-radius: 14px;
        background: rgba(255, 254, 250, 0.74);
      }

      .artifact-card strong {
        display: block;
        overflow: hidden;
        color: #292520;
        font-size: 13.5px;
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .artifact-card span:last-child {
        display: block;
        margin-top: 3px;
        color: #736c63;
        font-size: 12.5px;
      }

      .rail-list {
        display: grid;
        gap: 5px;
      }

      .rail-row,
      .connector-row,
      .working-file {
        min-height: 32px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 9px;
        border-radius: 10px;
        background: rgba(246, 243, 237, 0.45);
        color: #4f4942;
        font-size: 13px;
      }

      .rail-row span:last-child,
      .connector-row span:nth-child(2),
      .working-file {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-file-icon {
        width: 20px;
        height: 20px;
        position: relative;
        flex: 0 0 auto;
        border-radius: 5px;
        background: #ddd4c7;
      }

      .rail-file-icon.deck {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: linear-gradient(135deg, #d46e54, #a84835);
      }

      .rail-file-icon.folder {
        background: #72c2e4;
      }

      .rail-file-icon.folder::before {
        content: "";
        position: absolute;
        left: 2px;
        top: -3px;
        width: 10px;
        height: 5px;
        border-radius: 3px 3px 0 0;
        background: #98d5ee;
      }

      .rail-file-icon.sheet {
        background: #84b889;
      }

      .rail-file-icon.doc {
        background: #d6cfc4;
      }

      .connector-row strong {
        margin-left: auto;
        color: #736c63;
        font-size: 12px;
        font-weight: 650;
      }

      .connector-dot {
        width: 9px;
        height: 9px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #43b875;
        box-shadow: 0 0 0 4px rgba(67, 184, 117, 0.12);
      }

      .connector-dot.muted {
        background: #c7bfb5;
        box-shadow: none;
      }

      .working-files {
        margin-top: auto;
      }

      .rail-note {
        min-height: 58px;
        grid-template-columns: 12px minmax(0, 1fr);
        align-items: start;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(216, 117, 95, 0.09);
        border-radius: 14px;
        background: rgba(255, 246, 239, 0.64);
      }

      .rail-note p {
        margin: 0;
      }

      .sync-pulse {
        width: 10px;
        height: 10px;
        margin-top: 4px;
        border-radius: 50%;
        background: #d86f5d;
        box-shadow: 0 0 0 4px rgba(216, 117, 95, 0.12);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".agent-rail-panel", { opacity: 0, x: 18, filter: "blur(5px)", duration: 0.52, ease: "power3.out" }, 0.12);
      tl.from(".progress-circles span", { opacity: 0, y: 5, stagger: 0.045, duration: 0.24, ease: "sine.out" }, 0.38);
      tl.from(".rail-step", { opacity: 0, x: 9, stagger: 0.055, duration: 0.28, ease: "sine.out" }, 0.52);
      tl.from(".rail-section:not(.progress-section)", { opacity: 0, y: 9, stagger: 0.06, duration: 0.3, ease: "power2.out" }, 0.86);
      tl.to(".progress-circles .active, .rail-step.active span, .sync-pulse", { scale: 1.06, duration: 0.58, repeat: 5, yoyo: true, ease: "sine.inOut" }, 1.16);
      window.__timelines["claude-agent-rail-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-agent-rail\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-agent-rail-template");
      if (!template || document.querySelector("#claude-agent-rail-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
