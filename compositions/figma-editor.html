      .selection-actions {

      }

      .selected-layer-card {
        min-height: 32px;
        padding: 0 12px;
        border-bottom: 1px solid var(--figma-border);
      }

      .selected-layer-card .layer-icon {
        width: 14px;
        height: 14px;
        border-width: 1.5px;
      }

      .selected-layer-card strong {
        font-size: 11px;
        font-weight: 600;
        color: #1e1e1e;
      }

      .selected-layer-card .layer-caret {
        width: 6px;
        height: 6px;
        border-color: #6e6e73;
      }

      .selected-layer-card .panel-icon-button {
        width: 24px;
        height: 24px;
        color: #6e6e73;
      }

      .property-group {
        padding: 8px 12px;
        border-color: var(--figma-border);
      }

      .property-title {
        height: 32px;
        display: flex;
        align-items: center;
        margin-bottom: 0;
        font-size: 11px;
        font-weight: 600;
        color: #1e1e1e;
      }

      .property-grid {
        gap: 6px;
      }

      .property-grid label {
        height: 24px;
        border: 1px solid #e6e6e6;
        border-radius: 5px;
        background: #fff;
        color: #6e6e73;
        padding: 0 8px;
        font-size: 11px;
      }

      .property-grid label span {
        color: #1e1e1e;
        font-size: 11px;
        font-weight: 500;
      }

      .align-strip {
        gap: 4px;
        margin-bottom: 8px;
      }

      .align-strip button {
        height: 24px;
        border: 1px solid #e6e6e6;
        border-radius: 5px;
        background-color: #fff;
      }

      .constraints-widget {
        grid-template-columns: minmax(0, 1fr);
        min-height: 0;
        margin-top: 8px;
      }

      .constraints-widget span,
      .constraints-widget small {
        font-size: 11px;
      }

      .constraint-box {
        grid-column: 1;
        grid-row: auto;
        width: 72px;
        height: 48px;
      }

      .toggle-row,
      .paint-row,
      .opacity-row,
      .prototype-row {
        min-height: 24px;
        font-size: 11px;
        color: #6e6e73;
      }

      .paint-row strong,
      .prototype-row strong {
        color: #1e1e1e;
        font-size: 11px;
      }

      .swatch {
        width: 16px;
        height: 16px;
        border-radius: 4px;
      }

      .export-button {
        height: 24px;
        border-radius: 5px;
        font-size: 11px;
      }

      .bottom-toolbar {
        left: calc(50% - 34px);
        bottom: 28px;
        height: 40px;
        gap: 2px;
        padding: 4px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 13px;
        background: #fff;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.22);
      }

      .tool {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        color: #1e1e1e;
      }

      .tool.active {
        color: #fff;
        background: var(--figma-blue);
      }

      .dev-mode-pill {
        position: absolute;
        left: calc(50% + 190px);
        bottom: 28px;
        z-index: 8;
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 9px;
        background: #fff;
        color: #1e1e1e;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.22);
      }

      .dev-mode-pill .backlot-icon {
        width: 14px;
        height: 14px;
        stroke-width: 1.5;
      }

      /* Dark-mode variant: UI3 editor chrome only. Canvas content (the Maple
         Grove design frames) stays light, matching real Figma dark mode. */
      .figma-window.theme-dark {
        --figma-bg: #1e1e1e;
        --figma-panel: #2c2c2c;
        --figma-panel-alt: #323232;
        --figma-border: #383838;
        --figma-border-strong: #444444;
        --figma-ink: #ffffff;
        --figma-muted: #b3b3b3;
        --figma-soft: #8c8c8c;
        --figma-field: #383838;
        --figma-blue: #0d99ff;
      }

      .figma-window.theme-dark .canvas {
        background: #1e1e1e;
      }

      .figma-window.theme-dark .left-panel,
      .figma-window.theme-dark .properties-panel {
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.45);
      }

      .figma-window.theme-dark .file-context > span {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .panel-tab,
      .figma-window.theme-dark .prop-tab {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .panel-tab.active,
      .figma-window.theme-dark .prop-tab.active {
        color: #ffffff;
        background: #383838;
      }

      .figma-window.theme-dark .panel-heading {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .page-row,
      .figma-window.theme-dark .layer-row {
        color: #ffffff;
      }

      .figma-window.theme-dark .page-row.active,
      .figma-window.theme-dark .layer-row.active {
        background: #383838;
      }

      .figma-window.theme-dark .layer-row.selected {
        background: #2b3950;
      }

      .figma-window.theme-dark .layer-icon.frame {
        border-color: #d5d5d5;
      }

      .figma-window.theme-dark .layer-icon.component {
        border-color: #b18cff;
      }

      .figma-window.theme-dark .layer-icon.text::before {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .asset-search {
        background: #383838;
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .asset-row {
        color: #ffffff;
      }

      .figma-window.theme-dark .asset-glyph.frame {
        border-color: var(--figma-muted);
      }

      .figma-window.theme-dark .frame-label {
        color: #8c8c8c;
      }

      .figma-window.theme-dark .right-avatar {
        background: #ffca27;
        color: #111;
      }

      .figma-window.theme-dark .right-play::before {
        border-left-color: #ffffff;
      }

      .figma-window.theme-dark .zoom-menu {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .selected-layer-card {
        border-bottom-color: var(--figma-border);
      }

      .figma-window.theme-dark .selected-layer-card strong {
        color: #ffffff;
      }

      .figma-window.theme-dark .selected-layer-card .layer-caret {
        border-color: var(--figma-muted);
      }

      .figma-window.theme-dark .selected-layer-card .panel-icon-button {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .property-title {
        color: #ffffff;
      }

      .figma-window.theme-dark .property-grid label {
        border: 1px solid #444444;
        background: #383838;
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .property-grid label span {
        color: #ffffff;
      }

      .figma-window.theme-dark .align-strip button {
        border: 1px solid #444444;
        background-color: #383838;
      }

      .figma-window.theme-dark .toggle-row,
      .figma-window.theme-dark .paint-row,
      .figma-window.theme-dark .opacity-row,
      .figma-window.theme-dark .prototype-row {
        color: var(--figma-muted);
      }

      .figma-window.theme-dark .paint-row strong,
      .figma-window.theme-dark .prototype-row strong {
        color: #ffffff;
      }

      .figma-window.theme-dark .export-button {
        border-color: #444444;
        background: #383838;
        color: #ffffff;
      }

      .figma-window.theme-dark .bottom-toolbar {
        border: 1px solid #444444;
        background: #2c2c2c;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.45);
      }

      .figma-window.theme-dark .tool {
        color: #d5d5d5;
      }

      .figma-window.theme-dark .tool.active {
        color: #fff;
      }

      .figma-window.theme-dark .tool-separator {
        background: #444444;
      }

      .figma-window.theme-dark .dev-mode-pill {
        border: 1px solid #444444;
        background: #2c2c2c;
        color: #d5d5d5;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.45);
      }

      /* Onboarding page (data-page="onboarding"): ported verbatim from the
         former figma-onboarding-editor.html, all selectors scoped under
         .figma-page-onboarding so nothing leaks into the editor page. */
      .figma-page-onboarding {
        --frame: #1b1b1c;
        --top: #232324;
        --sidebar: #242425;
        --sidebar-dark: #1b1b1c;
        --canvas: #19191a;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.14);
        --text: #f4f4f5;
        --muted: #a5a5aa;
        --faint: #707077;
        --blue: #0d99ff;
        --red: #ff3d23;
        --orange: #ff7a45;
        width: 1120px;
        height: 760px;
        overflow: visible;
        color: var(--text);
        font-family: var(--font-figma);
      }

      .figma-page-onboarding * {
        box-sizing: border-box;
      }

      .figma-page-onboarding button,
      .figma-page-onboarding input {
        font: inherit;
      }

      .figma-page-onboarding.figma-onboarding-window {
        width: 1120px;
        height: 760px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 238px 1fr 246px;
        grid-template-rows: 52px 1fr;
        border-radius: 18px;
        background: var(--canvas);
        border: 1px solid rgba(0, 0, 0, 0.36);
        box-shadow:
          0 36px 108px rgba(33, 30, 25, 0.28),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }

      .figma-page-onboarding .figma-topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        background: var(--top);
        border-bottom: 1px solid var(--line);
        padding: 0 12px 0 18px;
      }

      .figma-page-onboarding .top-left,
      .figma-page-onboarding .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .figma-page-onboarding .hamburger,
      .figma-page-onboarding .play {
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        position: relative;
      }

      .figma-page-onboarding .hamburger span {
        position: absolute;
        left: 8px;
        width: 12px;
        height: 2px;
        border-radius: 2px;
        background: #dadadd;
      }

      .figma-page-onboarding .hamburger span:nth-child(1) { top: 8px; }
      .figma-page-onboarding .hamburger span:nth-child(2) { top: 13px; }
      .figma-page-onboarding .hamburger span:nth-child(3) { top: 18px; }

      .figma-page-onboarding .figma-mark {
        width: 18px;
        height: 18px;
        color: #fff;
      }

      .figma-page-onboarding .top-left strong {
        font-size: 15px;
        font-weight: 560;
      }

      .figma-page-onboarding .chevron {
        width: 8px;
        height: 8px;
        border: solid #aaaab1;
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
        margin-left: -10px;
        margin-top: -4px;
      }

      .figma-page-onboarding .share {
        height: 28px;
        padding: 0 15px;
        border: 0;
        border-radius: 5px;
        background: var(--blue);
        color: white;
        font-size: 13px;
        font-weight: 650;
      }

      .figma-page-onboarding .mode {
        height: 28px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        padding: 0 10px;
        font-size: 12px;
      }

      .figma-page-onboarding .mode.active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.09);
      }

      .figma-page-onboarding .play::before {
        content: "";
        position: absolute;
        left: 9px;
        top: 7px;
        width: 0;
        height: 0;
        border-top: 7px solid transparent;
        border-bottom: 7px solid transparent;
        border-left: 10px solid #e9e9ee;
      }

      .figma-page-onboarding .avatar {
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 50%;
        color: white;
        background: #e25057;
        font-weight: 720;
      }

      .figma-page-onboarding .figma-sidebar {
        grid-column: 1;
        grid-row: 2;
        background: var(--sidebar);
        border-right: 1px solid var(--line);
      }

      .figma-page-onboarding .tabs {
        height: 44px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-bottom: 1px solid var(--line);
      }

      .figma-page-onboarding .tab {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        position: relative;
      }

      .figma-page-onboarding .tab.active {
        color: var(--text);
      }

      .figma-page-onboarding .tab.active::after {
        content: "";
        position: absolute;
        left: 34px;
        right: 34px;
        bottom: 0;
        height: 2px;
        background: var(--blue);
      }

      .figma-page-onboarding .search-box {
        height: 42px;
        margin: 12px 14px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 5px;
        background: #1f1f20;
        color: var(--faint);
        padding: 0 10px;
      }

      .figma-page-onboarding .search-box span {
        width: 12px;
        height: 12px;
        border: 2px solid var(--faint);
        border-radius: 50%;
        position: relative;
      }

      .figma-page-onboarding .search-box span::after {
        content: "";
        position: absolute;
        width: 6px;
        height: 2px;
        right: -5px;
        bottom: -3px;
        background: var(--faint);
        transform: rotate(45deg);
      }

      .figma-page-onboarding .search-box input {
        width: 100%;
        border: 0;
        outline: 0;
        color: #787981;
        background: transparent;
        font-size: 13px;
      }

      .figma-page-onboarding .tree {
        padding: 4px 11px;
        font-size: 14px;
      }

      .figma-page-onboarding .tree-row {
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 5px;
        color: #dddde1;
        padding: 0 9px;
      }

      .figma-page-onboarding .tree-row.child {
        padding-left: 31px;
      }

      .figma-page-onboarding .tree-row.grandchild {
        padding-left: 52px;
        color: #a7a7ad;
        font-size: 12.5px;
      }

      .figma-page-onboarding .tree-row.selected {
        background: rgba(255, 255, 255, 0.1);
      }

      .figma-page-onboarding .twisty {
        width: 7px;
        height: 7px;
        border: solid #a4a4aa;
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }

      .figma-page-onboarding .page-icon,
      .figma-page-onboarding .frame-icon,
      .figma-page-onboarding .text-icon,
      .figma-page-onboarding .rect-icon {
        width: 11px;
        height: 13px;
        border: 1.4px solid #bdbdc2;
        border-radius: 2px;
      }

      .figma-page-onboarding .frame-icon {
        width: 12px;
        height: 12px;
        border-radius: 1px;
      }

      .figma-page-onboarding .text-icon {
        border: 0;
        position: relative;
      }

      .figma-page-onboarding .text-icon::before {
        content: "T";
        position: absolute;
        left: 1px;
        top: -2px;
        color: #aaaab1;
        font-size: 13px;
        font-weight: 800;
      }

      .figma-page-onboarding .rect-icon {
        width: 12px;
        height: 10px;
        border-color: #ff6a4f;
      }

      .figma-page-onboarding .figma-canvas {
        position: relative;
        grid-column: 2;
        grid-row: 2;
        overflow: hidden;
        background: var(--canvas);
      }

      .figma-page-onboarding .dark-canvas-grid {
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      .figma-page-onboarding .phone-board {
        position: absolute;
        top: 148px;
      }

      .figma-page-onboarding .welcome-board { left: 54px; }
      .figma-page-onboarding .signup-board { left: 260px; }

      .figma-page-onboarding .frame-label {
        position: absolute;
        left: 0;
        top: -24px;
        color: #72737a;
        font-size: 11px;
      }

      .figma-page-onboarding .phone-frame {
        width: 176px;
        height: 382px;
        overflow: hidden;
        border-radius: 2px;
        background:
          radial-gradient(circle at 50% 22%, rgba(255, 71, 40, 0.22), rgba(255, 71, 40, 0) 25%),
          linear-gradient(180deg, #101011, #070708 72%);
        box-shadow:
          0 30px 50px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        padding: 13px 14px;
        color: #f6f6f7;
        text-align: center;
      }

      .figma-page-onboarding .selected-frame .phone-frame {
        box-shadow:
          0 30px 50px rgba(0, 0, 0, 0.48),
          0 0 0 1px rgba(255, 61, 35, 0.34) inset;
      }

      .figma-page-onboarding .selected-frame {
        outline: 1.5px solid var(--blue);
        outline-offset: 5px;
      }

      .figma-page-onboarding .selection-chip {
        position: absolute;
        left: -5px;
        top: -52px;
        height: 20px;
        display: grid;
        place-items: center;
        padding: 0 7px;
        border-radius: 5px;
        color: #fff;
        background: var(--blue);
        font-size: 10px;
        font-weight: 700;
      }

      .figma-page-onboarding .dark-handle {
        position: absolute;
        z-index: 4;
        width: 9px;
        height: 9px;
        border: 1.5px solid var(--blue);
        border-radius: 2px;
        background: var(--canvas);
      }

      .figma-page-onboarding .dark-handle.nw { left: -10px; top: -10px; }
      .figma-page-onboarding .dark-handle.n { left: calc(50% - 4px); top: -10px; }
      .figma-page-onboarding .dark-handle.ne { right: -10px; top: -10px; }
      .figma-page-onboarding .dark-handle.e { right: -10px; top: calc(50% - 4px); }
      .figma-page-onboarding .dark-handle.se { right: -10px; bottom: -10px; }
      .figma-page-onboarding .dark-handle.s { left: calc(50% - 4px); bottom: -10px; }
      .figma-page-onboarding .dark-handle.sw { left: -10px; bottom: -10px; }
      .figma-page-onboarding .dark-handle.w { left: -10px; top: calc(50% - 4px); }

      .figma-page-onboarding .phone-status {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        font-weight: 700;
      }

      .figma-page-onboarding .signal {
        width: 20px;
        height: 9px;
        background:
          linear-gradient(90deg, #fff 0 3px, transparent 3px 5px, #fff 5px 8px, transparent 8px 10px, #fff 10px 16px, transparent 16px);
        opacity: 0.9;
      }

      .figma-page-onboarding .app-icon {
        width: 40px;
        height: 40px;
        margin: 52px auto 18px;
        border-radius: 12px;
        background: linear-gradient(145deg, #ff4b24, #d91f16);
        box-shadow: 0 12px 24px rgba(255, 61, 35, 0.35);
        display: grid;
        place-items: center;
      }

      .figma-page-onboarding .app-icon span {
        width: 12px;
        height: 18px;
        border-radius: 8px 8px 4px 4px;
        background: #ffe8df;
        position: relative;
      }

      .figma-page-onboarding .app-icon span::before,
      .figma-page-onboarding .app-icon span::after {
        content: "";
        position: absolute;
        width: 10px;
        height: 2px;
        background: #ffe8df;
        top: 6px;
      }

      .figma-page-onboarding .app-icon span::before { left: -7px; transform: rotate(28deg); }
      .figma-page-onboarding .app-icon span::after { right: -7px; transform: rotate(-28deg); }

      .figma-page-onboarding .phone-frame h2,
      .figma-page-onboarding .phone-frame h3,
      .figma-page-onboarding .phone-frame p,
      .figma-page-onboarding .phone-frame small {
        margin: 0;
      }

      .figma-page-onboarding .phone-frame h2 {
        font-size: 24px;
        line-height: 1;
        margin-bottom: 13px;
        font-weight: 850;
      }

      .figma-page-onboarding .phone-frame p {
        color: #8f9098;
        font-size: 8.5px;
        line-height: 1.35;
      }

      .figma-page-onboarding .stats-card {
        height: 66px;
        margin: 26px 0 68px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.04);
      }

      .figma-page-onboarding .stats-card strong {
        display: block;
        color: #ff6047;
        font-size: 12px;
      }

      .figma-page-onboarding .stats-card span {
        display: block;
        margin-top: 3px;
        color: #6d6e75;
        font-size: 9px;
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.1px;
      }

      .figma-page-onboarding .phone-frame button {
        border: 0;
        color: white;
        background: linear-gradient(180deg, #ff4324, #ed2416);
        border-radius: 8px;
        height: 32px;
        font-size: 8.5px;
        font-weight: 740;
      }

      .figma-page-onboarding .welcome-board .phone-frame > button {
        width: 100%;
      }

      .figma-page-onboarding .phone-frame small {
        display: block;
        margin-top: 9px;
        color: #65666f;
        font-size: 7px;

<script>
  (() => {
    const isDirectPreview = /\/figma-editor\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("figma-editor-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#figma-editor-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");
      if (page) document.querySelector("#figma-editor-surface").setAttribute("data-page", page);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
