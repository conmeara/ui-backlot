<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Codex — Interaction Demo</title>
  </head>
  <body>
    <div id="codex-interaction" data-composition-id="codex-interaction" data-width="1280" data-height="800" data-start="0" data-duration="7.2">
      <section class="cx-stage" data-primitive="codex-interaction" aria-label="Codex CLI finishing a command, running tools, and applying an edit">
        <div class="cx-window">
          <div
            class="component-frame cx-frame"
            data-primitive="codex-terminal-window"
            data-backlot-mount-src="../compositions/codex-terminal.html"
            data-backlot-mount-selector="#codex-terminal-surface"
          ></div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#0a0c10; }
      #codex-interaction { width:1280px; height:800px; overflow:hidden; font-family:"SF Mono",ui-monospace,Menlo,monospace; color:#d6dbe2; }
      #codex-interaction * { box-sizing:border-box; }
      .cx-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#14181f,#0c0f14); display:grid; place-items:center; }

      /* codex-terminal mounts at its native 1120x840 and is scaled down to
         fit the stage; the outer box supplies the window radius/shadow
         (the inner mounted window's own shadow would be clipped by the
         frame's overflow:hidden) — same double-wrapper idiom as
         claude-code-interaction / browser-interaction. */
      .cx-window { position:relative; width:940px; height:705px; border-radius:12px; overflow:hidden; box-shadow:0 34px 90px rgba(0,0,0,0.5); background:#080910; }
      .component-frame { position:absolute; inset:0; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; transform:scale(0.83929); }

      .demo-cursor { position:absolute; left:640px; top:560px; z-index:90; width:26px; height:26px; background:url("../assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(106,208,143,0.7); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../runtime/backlot-component-loader.js"></script>
    <script src="../runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const DURATION = 7.2;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".cx-stage");

      // Registered synchronously with a full-duration hold (the mount below
      // is async; the renderer must never probe a zero-duration composition).
      tl.to(stage, { opacity: 1, duration: DURATION }, 0);
      gsap.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 });

      window.__backlotComponentsReady.then(() => {
        const mount = stage.querySelector(".cx-frame");
        const win = mount && mount.querySelector("#codex-terminal-surface");
        if (!win) return;

        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets (all inside the real Codex terminal chrome) ----
        const composerInput = win.querySelector(".composer-input");
        const inputBar = win.querySelector(".composer-input .input-bar");
        const inputTextEl = win.querySelector(".input-text");
        const typedTail = win.querySelector('[data-role="cx-typed-tail"]');
        const transcript = win.querySelector(".transcript");
        const liveExplore = win.querySelector('[data-role="live-explore"]');
        const livePlan = win.querySelector('[data-role="live-plan"]');
        const liveApplied = win.querySelector('[data-role="live-applied"]');
        const liveAppliedText = win.querySelector('[data-role="live-applied-text"]');
        const liveTool1Kind = win.querySelector('[data-role="live-tool-1-kind"]');
        const liveTool1Path = win.querySelector('[data-role="live-tool-1-path"]');
        const liveTool2Kind = win.querySelector('[data-role="live-tool-2-kind"]');
        const liveTool2Path = win.querySelector('[data-role="live-tool-2-path"]');
        const livePlan1 = win.querySelector('[data-role="live-plan-1"]');
        const livePlan2 = win.querySelector('[data-role="live-plan-2"]');
        const livePlan3 = win.querySelector('[data-role="live-plan-3"]');
        // Real Codex appends a new turn BELOW existing scrollback in-session
        // — it only full-repaints on discrete overlay transitions (startup,
        // resume picker), never on a plain follow-up submit. collapseRows
        // names the prior turn's rows; the timeline keeps the newest tail of
        // them on screen and only instantly drops the oldest (see the
        // collapseAt block below — the mounted terminal has no scroll
        // container, so full old + full new can't both fit).
        const collapseRows = Array.from(win.querySelectorAll(".transcript > article")).filter(
          (el) => !el.classList.contains("live-turn")
        );
        if (
          !composerInput || !inputTextEl || !typedTail || !transcript ||
          !liveExplore || !livePlan || !liveApplied || !liveAppliedText ||
          !liveTool1Path || !liveTool2Path || !livePlan1 || !livePlan2 || !livePlan3 ||
          collapseRows.length === 0
        ) return;

        // The pinned composer already carries a mid-typed sentence (the
        // reference capture's own state); this demo finishes it rather than
        // inventing a new one, same idiom as browser-interaction reading its
        // URL out of the mount. Trimmed back a few extra characters from the
        // pinned prefix (still the same final sentence) so the typing beat
        // has enough characters to read as a person typing.
        gsap.set(inputTextEl, { textContent: "Awesome! Let's implement the" });
        const TAIL = " plan.";

        // Rewrite the live turn's content so the streamed response coheres
        // with the session prompt above it ("Make the Codex terminal
        // surface match actual public CLI screenshots") instead of the
        // mounted composition's own unrelated marketing-page placeholder.
        if (liveTool1Kind) gsap.set(liveTool1Kind, { textContent: "Read" });
        gsap.set(liveTool1Path, { textContent: "compositions/codex-terminal.html" });
        if (liveTool2Kind) gsap.set(liveTool2Kind, { textContent: "Read" });
        gsap.set(liveTool2Path, { textContent: "reference/codex/app-screenshots/app-screenshot-light.webp" });
        gsap.set(livePlan1, { textContent: "Recheck the splash header spacing against the CLI reference" });
        gsap.set(livePlan2, { textContent: "Verify the prompt band and transcript bullet rhythm" });
        gsap.set(livePlan3, { textContent: "Tighten the composer chrome and shortcut row" });
        const APPLIED = "Applied 3 edits to codex-terminal.html — 14 insertions, 5 deletions.";

        // The sent message needs a visible "> ..." prompt row of its own —
        // real Codex echoes every submitted turn as a new prompt line above
        // its response, otherwise the streamed Explored/Plan/Applied blocks
        // read as attached to the OLD prompt still pinned above the
        // transcript. Built the same bullet+content grid shape as every
        // other .transcript article (18px bullet column, 1fr content) so it
        // sits in the rhythm; text color matches the real .user-prompt band
        // (bright text, muted glyph) rather than the dimmer transcript
        // commentary color. Marked "live-turn" so article.live-turn's own
        // display:none rule (see codex-terminal.html) hides it by default
        // and collapseRows' ":not(.live-turn)" filter leaves it untouched.
        const livePromptRow = document.createElement("article");
        livePromptRow.className = "live-turn";
        livePromptRow.setAttribute("data-role", "live-prompt-row");
        const livePromptBullet = document.createElement("span");
        livePromptBullet.className = "bullet";
        livePromptBullet.textContent = ">";
        const livePromptText = document.createElement("p");
        livePromptText.style.color = "var(--terminal-text)";
        livePromptText.style.fontSize = "15px";
        const livePromptStrong = document.createElement("strong");
        livePromptStrong.textContent = "Awesome! Let's implement the plan.";
        livePromptText.appendChild(livePromptStrong);
        livePromptRow.appendChild(livePromptBullet);
        livePromptRow.appendChild(livePromptText);
        transcript.insertBefore(livePromptRow, liveExplore);

        // ---- Rest-frame pins (t=0): pinned composer text as captured,
        // live turn not yet run. gsap.set (not tl.set at 0). ----
        gsap.set([livePromptRow, liveExplore, livePlan, liveApplied], { opacity: 0 });

        // Typing target starts EMPTY (display:none, not just empty text —
        // composer-input is a flex row with `gap`, so an empty-but-present
        // span would still eat a gap slot and nudge the pinned text/cursor).
        // Per-char spans flip display so the block cursor (a flex sibling
        // right after the typed text) rides the leading edge.
        const tailChars = [];
        for (const ch of TAIL) {
          const s = document.createElement("span");
          s.textContent = ch;
          typedTail.appendChild(s);
          tailChars.push(s);
        }
        gsap.set(tailChars, { display: "none" });

        // 1) Click the composer, finish typing the pinned sentence.
        const CLICK_AT = 0.7;
        const TYPE_AT = 1.15;
        const CPS = 17;
        ix.click(composerInput, { at: CLICK_AT, moveDur: 0.6 });
        tl.set(typedTail, { display: "inline" }, TYPE_AT);
        for (let i = 0; i < tailChars.length; i++) {
          tl.set(tailChars[i], { display: "inline" }, TYPE_AT + i / CPS);
        }
        const tailEndAt = TYPE_AT + TAIL.length / CPS;

        // The old turn's in-flight check ticks and then completes while the
        // user is still typing — an "Esc to interrupt" spinner can't outlive
        // its own turn into the next prompt's response (mount strips the
        // composition's script, so the spinner is otherwise frozen).
        const runningRowEl = win.querySelector(".running-row");
        const runningBullet = runningRowEl && runningRowEl.querySelector(".bullet");
        const runningTextEl = runningRowEl && runningRowEl.querySelector("p");
        if (runningBullet && runningTextEl) {
          ["◓", "◑", "◒"].forEach((frame, i) => {
            tl.set(runningBullet, { textContent: frame }, 0.45 + i * 0.45);
          });
          const checkDoneAt = TYPE_AT + 0.25;
          tl.set(runningBullet, { textContent: "•", attr: { class: "bullet" } }, checkDoneAt);
          tl.set(runningTextEl, { textContent: "Checked terminal capture fidelity (12s)" }, checkDoneAt);
        }

        // 2) Send: the composer clears (message sent) while the terminal
        // moves on to running the turn.
        const submitAt = tailEndAt + 0.4;
        tl.to(composerInput, { opacity: 0, duration: 0.15 }, submitAt);

        // 2b) The mounted terminal-screen has a hard fixed-height clip with
        // zero slack even for the OLD turn alone — the full new turn cannot
        // fit below the full old one. A terminal never deletes interior
        // scrollback while keeping both ends pinned, so this is modeled as a
        // real scroll: the ENTIRE buffer (splash header, tip line, old
        // prompt band, transcript) translates up until the newest tail of
        // the old turn (Diff + checks row) sits at the top of the clip, the
        // oldest content sliding off-screen intact. offsetTop is used for
        // the distance (layout px, unaffected by the mount's outer scale).
        const screenEl = win.querySelector(".terminal-screen");
        const splashEl = win.querySelector(".codex-splash");
        const tipEl = win.querySelector(".tip-line");
        const promptBandEl = win.querySelector(".user-prompt");
        const diffRowEl = win.querySelector(".diff-row");
        if (screenEl) gsap.set(screenEl, { overflow: "hidden" });
        const scrollEls = [splashEl, tipEl, promptBandEl, transcript].filter(Boolean);
        const scrollDelta = diffRowEl && splashEl
          ? Math.max(0, Math.round(
              (diffRowEl.getBoundingClientRect().top - splashEl.getBoundingClientRect().top) /
              (win.getBoundingClientRect().width / win.offsetWidth || 1)
            ))
          : 0;
        const collapseAt = submitAt + 0.2;
        const collapseFadeDur = 0.35;
        if (scrollDelta > 0) {
          tl.to(scrollEls, { y: -scrollDelta, duration: collapseFadeDur, ease: "power1.inOut" }, collapseAt);
        }

        // 2c) The sent turn's own "> ..." prompt line appears right as the
        // old turn's activity settles — the visible cause for the response
        // that follows. ratatui repaints instantly (it never alpha-composites
        // monospace glyphs), so this is a snap-in `tl.set`, not a fade.
        const promptAt = collapseAt + collapseFadeDur + 0.05;
        tl.set(livePromptRow, { display: "grid", opacity: 1 }, promptAt);

        // 3) Tool-call results ("Explored") pop in as a completed block —
        // real Codex chrome, snapped in as a repaint, not typed or faded.
        const exploreAt = promptAt + 0.3;
        tl.set(liveExplore, { display: "grid", opacity: 1 }, exploreAt);

        // 4) Plan checklist pops in the same way, a beat later.
        const planAt = exploreAt + 0.75;
        tl.set(livePlan, { display: "grid", opacity: 1 }, planAt);

        // 5) The applied summary block also snaps in; only its text streams
        // token by token, like AI prose.
        const appliedAt = planAt + 0.7;
        tl.set(liveApplied, { display: "grid", opacity: 1 }, appliedAt);
        ix.stream(liveAppliedText, APPLIED, { at: appliedAt + 0.2, cps: 45, unit: "word" });

        // 6) Composer resets to idle, ready for the next command. Hiding
        // input-bar alongside the text clear leaves exactly one caret
        // (cx-cursor) in the idle composer — with the pinned/typed text
        // gone, input-bar and cx-cursor would otherwise sit right next to
        // each other across only the flex gap, reading as a doubled cursor.
        const doneAt = appliedAt + 0.2 + APPLIED.length / 45 + 0.3;
        tl.set(inputTextEl, { textContent: "" }, doneAt);
        tl.set(typedTail, { textContent: "", display: "none" }, doneAt);
        if (inputBar) tl.set(inputBar, { display: "none" }, doneAt);
        tl.to(composerInput, { opacity: 1, duration: 0.25 }, doneAt);
      }).catch(() => {});

      window.__timelines["codex-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(7.05).pause();
        window.__backlotComponentsReady.then(() => { tl.seek(0).seek(7.05).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
