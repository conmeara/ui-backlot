<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".terminal-component", { opacity: 0, x: 34, y: 20, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.24);
  tl.from(".claude-component", { opacity: 0, x: -28, y: 18, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.48);
  tl.from(".workflow-cursor", { opacity: 0, x: -22, y: 20, duration: 0.28, ease: "sine.out" }, 1.1);
  tl.to(".workflow-cursor", { x: -574, y: -42, duration: 0.92, ease: "power2.inOut" }, 1.55);
  tl.to(".click-ring", { x: -574, y: -42, duration: 0.92, ease: "power2.inOut" }, 1.55);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.3, duration: 0.18, ease: "sine.out" }, 2.38);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 2.6);
  tl.to(".claude-component", { x: -10, y: -4, duration: 1.1, ease: "sine.inOut" }, 3.0);
  tl.to(".terminal-component", { x: -20, y: 8, duration: 1.1, ease: "sine.inOut" }, 3.0);
  tl.to(".workflow-cursor", { x: 42, y: 4, duration: 1.1, ease: "power2.inOut" }, 3.35);
  window.__timelines["claude-codex-terminal-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(4.2).pause();
    gsap.set(".claude-component", { x: -10, y: -4, opacity: 1, filter: "blur(0px)" });
    gsap.set(".terminal-component", { x: -20, y: 8, opacity: 0.98, filter: "blur(0px)" });
    gsap.set(".workflow-cursor", { x: 42, y: 4, opacity: 1 });
  }
</script>
