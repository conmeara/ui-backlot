    <style>
      #excel-workbook-surface {
        --excel: #217346;
        --excel-dark: #0f5c33;
        --excel-soft: #e5f3ea;
        --chrome: #f7f7f7;
        --line: rgba(20, 30, 48, 0.12);
        --grid: rgba(20, 30, 48, 0.1);
        --ink: #16120f;
        --muted: #67727f;
        --green: #43b875;
        --amber: #d9a441;
        --blue: #1d86e8;
        --clay: #c65b47;
        width: 1280px;
        height: 760px;
        overflow: hidden;
        color: var(--ink);
        font-family: var(--font-office-ui);
      }

      #excel-workbook-surface * {
        box-sizing: border-box;
      }

      .excel-window {
        position: relative;
        width: 1280px;
        height: 760px;
        overflow: hidden;
        border-radius: 12px;
        background: #eef1f4;
        border: 1px solid rgba(20, 30, 48, 0.14);
        box-shadow: 0 30px 70px rgba(28, 30, 38, 0.28), 0 2px 0 rgba(255, 255, 255, 0.4) inset;
      }

      .excel-symbols {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .excel-titlebar {
        height: 34px;
        display: grid;
        grid-template-columns: 58px auto 1fr auto auto;
        align-items: center;
        gap: 9px;
        padding: 0 13px;
        background: var(--chrome);
        border-bottom: 1px solid rgba(20, 30, 48, 0.1);
        color: #2d3540;
        font-size: 12px;
        font-weight: 650;
      }

      .excel-traffic {
        position: relative;
        width: 52px;
        height: 12px;
      }

      .excel-traffic::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff5f57;
        box-shadow:
          0 0 0 0.5px rgba(0, 0, 0, 0.12) inset,
          20px 0 0 #febc2e,
          20px 0 0 0.5px rgba(0, 0, 0, 0.12) inset,
          40px 0 0 #28c840,
          40px 0 0 0.5px rgba(0, 0, 0, 0.12) inset;
      }

      .workbook-title {
        justify-self: center;
        font-weight: 650;
        color: #2d3540;
        white-space: nowrap;
      }

      .saved-state {
        font-style: normal;
        font-weight: 500;
        color: #7c8792;
      }

      .autosave,
      .title-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #68727e;
        font-size: 10px;
        white-space: nowrap;
      }

      .autosave span {
        width: 26px;
        height: 14px;
        border-radius: 999px;
        background: #d7ecdf;
        border: 1px solid #98cfad;
        position: relative;
      }

      .autosave span::after {
        content: "";
        position: absolute;
        right: 2px;
        top: 2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      .title-search {
        width: 210px;
        height: 22px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 999px;
        background: #eef0f3;
        color: #7c8792;
        font-size: 11px;
        font-weight: 500;
      }

      .title-actions span {
        height: 22px;
        display: inline-flex;
        align-items: center;
        padding: 0 9px;
        border-radius: 7px;
        background: #eef0f3;
        color: #384450;
        font-size: 11px;
      }

      .title-actions .comments {
        background: transparent;
        color: #444d57;
        padding: 0 8px;
      }

      .title-actions .share {
        background: var(--excel);
        color: #fff;
        font-weight: 600;
        padding: 0 12px;
        border-radius: 6px;
      }

      .title-actions .share::after {
        content: "\2304";
        margin-left: 6px;
        font-size: 9px;
        opacity: 0.9;
      }

      .excel-tabs {
        height: 32px;
        display: flex;
        align-items: stretch;

<script>
  (() => {
    const isDirectPreview = decodeURIComponent(window.location.pathname).endsWith("/excel-workbook.html");
    if (!isDirectPreview) return;

    const mount = () => {
      if (document.getElementById("excel-workbook-surface")) return;
      const template = document.getElementById("excel-workbook-surface-template");
      if (!template || !document.body) return;

      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };

    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
