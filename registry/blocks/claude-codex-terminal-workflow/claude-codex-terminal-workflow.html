<div id="claude-codex-terminal-workflow" data-composition-id="claude-codex-terminal-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="9">
  <section class="workflow-stage" data-primitive="claude-codex-terminal-workflow" aria-label="Claude and Codex terminal workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="compositions/mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame terminal-component"
      data-primitive="codex-terminal-window"
      data-backlot-mount-src="compositions/codex-terminal.html"
      data-backlot-mount-selector="#codex-terminal-surface"
    ></div>

    <div
      class="component-frame claude-component"
      data-primitive="claude-composed-app"
      data-backlot-mount-src="compositions/claude-composed-app.html"
      data-backlot-mount-selector="#claude-composed-app"
    ></div>

    <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
    <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
  </section>
</div>

<style>
      @import url("styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #edf1ec;
  }

  #claude-codex-terminal-workflow {
    --ink: #181410;
    --cursor: url("assets/cursors/normal-select.svg");
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    color: var(--ink);
    font-family: var(--font-claude-ui);
  }

  #claude-codex-terminal-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 14% 16%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0) 22%),
      radial-gradient(circle at 78% 14%, rgba(198, 91, 71, 0.14), rgba(198, 91, 71, 0) 26%),
      radial-gradient(circle at 70% 82%, rgba(181, 211, 197, 0.44), rgba(181, 211, 197, 0) 32%),
      linear-gradient(145deg, #f5f1eb 0%, #fbfaf6 47%, #deeae3 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 30px 0 0;
    opacity: 0.46;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(to bottom, transparent 0%, #000 17%, #000 78%, transparent 100%);
  }

  .menu-bar-component {
    position: absolute;
    left: 0;
    top: 0;
    z-index: 40;
    width: 100%;
    height: 30px;
  }

  .component-frame {
    position: absolute;
    overflow: hidden;
    transform-origin: top left;
  }

  .terminal-component {
    left: 852px;
    top: 138px;
    z-index: 8;
    width: 1120px;
    height: 840px;
    border-radius: 15px;
    scale: 0.84;
    opacity: 0.98;
    box-shadow: 0 42px 130px rgba(23, 27, 32, 0.32);
  }

  .claude-component {
    left: 86px;
    top: 178px;
    z-index: 16;
    width: 1180px;
    height: 780px;
    border-radius: 18px;
    scale: 0.72;
    background: transparent;
    box-shadow:
      0 44px 138px rgba(54, 42, 31, 0.3),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  .component-frame > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  /* claude-composed-app is a fixed 1440x900 shell; scale-to-fit-height
     inside the 1180x780 claude-component frame (matches the old claude-app
     footprint, which rendered natively at 1180x780 with no inner scaling —
     the frame's own `scale: 0.72` still applies the overall stage shrink). */
  .claude-component > [data-backlot-mounted-component] {
    width: 1440px;
    height: 900px;
    transform: scale(0.8667);
    transform-origin: top left;
  }

  .workflow-cursor {
    position: absolute;
    left: 1392px;
    top: 746px;
    z-index: 40;
    width: 34px;
    height: 34px;
    background: var(--cursor) 0 0 / contain no-repeat;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
  }

  .click-ring {
    position: absolute;
    left: 1394px;
    top: 750px;
    z-index: 39;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(198, 91, 71, 0.74);
    border-radius: 50%;
    opacity: 0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="runtime/backlot-component-loader.js"></script>
<script>
  // Set the canonical shell's page/toggle attributes on the mounted root
  // once the component loader settles (shell defaults to data-page="cowork"
  // already, matching the old claude-app cowork framing; sidebar+rail stay
  // on to match the old three-column crop).
  // Pass-110 scene-copy convention: the mounted atoms expose stable
  // data-copy="<slot>" hooks (claude-thread-core + claude-agent-rail); the
  // shell's visible cowork topbar title is addressed through its
  // data-primitive hook. Hooks missing from the mounted DOM are skipped,
  // so the map stays declarative and inert against markup churn. Scene
  // matches the mounted codex-terminal surface (Codex CLI session working
  // on the terminal surface fidelity inside ~/Projects/ui-backlot).
  const applyClaudeSceneCopy = () => {
    const claudeRoot = document.querySelector(".claude-component #claude-composed-app");
    if (!claudeRoot) return;
    const sceneCopy = {
      "thread-title": "Review Codex terminal captures",
      "thread-subtitle": "Working in ui-backlot",
      "user-prompt": "Oh and compare the Codex terminal surface against the real CLI captures while it runs.",
      "reply-primary": "I'll review the terminal surface from the selected folder.",
      "reply-secondary": "I'm checking the CLI reference captures and the transcript copy before returning notes.",
      "thinking-json": '{ "command": "find /sessions/ui-backlot -type f -maxdepth 2", "description": "List selected project files" }',
      "source-chip-1": "codex-terminal.html",
      "source-chip-2": "cli-reference.png",
      "tool-title": "Reviewing codex-terminal.html",
      "tool-row-1": "Read ui-backlot folder",
      "tool-row-2": "Found CLI reference captures",
      "tool-row-3": "Comparing transcript rows",
      "command-output": "Found codex-terminal.html, cli-reference.png, and capture-notes.md.\nNext I'll compare the transcript rows against the CLI splash.",
      "artifact-1-kind": "MD",
      "artifact-1": "terminal-review-notes.md",
      "context-folder": "ui-backlot",
      "context-file-1-kind": "HTML",
      "context-file-1": "codex-terminal.html",
      "context-file-2-kind": "PNG",
      "context-file-2": "cli-reference.png",
      "context-file-3-kind": "MD",
      "context-file-3": "capture-notes.md"
    };
    Object.entries(sceneCopy).forEach(([slot, text]) => {
      claudeRoot.querySelectorAll(`[data-copy="${slot}"]`).forEach((node) => {
        node.textContent = text;
      });
    });
    const shellTitle = claudeRoot.querySelector('[data-primitive="claude-cowork-topbar"] .shell-thread-title');
    if (shellTitle) shellTitle.textContent = sceneCopy["thread-title"];
  };

  if (window.__backlotComponentsReady) {
    window.__backlotComponentsReady.then(() => {
      const shellRoot = document.querySelector(".claude-component #claude-composed-app");
      if (shellRoot) {
        shellRoot.setAttribute("data-page", "cowork");
        shellRoot.setAttribute("data-sidebar", "on");
        shellRoot.setAttribute("data-rail", "on");
      }
      applyClaudeSceneCopy();
    }).catch(() => {});
  }

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".terminal-component", { opacity: 0, x: 34, y: 20, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.24);
  tl.from(".claude-component", { opacity: 0, x: -28, y: 18, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.48);
  tl.from(".workflow-cursor", { opacity: 0, x: -22, y: 20, duration: 0.28, ease: "sine.out" }, 1.1);
  tl.to(".workflow-cursor", { x: -574, y: -42, duration: 0.92, ease: "power2.inOut" }, 1.55);
  tl.to(".click-ring", { x: -574, y: -42, duration: 0.92, ease: "power2.inOut" }, 1.55);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.3, duration: 0.18, ease: "sine.out" }, 2.38);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 2.6);
  tl.to(".claude-component", { x: -10, y: -4, duration: 1.1, ease: "sine.inOut" }, 3.0);
  tl.to(".terminal-component", { x: -20, y: 8, duration: 1.1, ease: "sine.inOut" }, 3.0);
  tl.to(".workflow-cursor", { x: 42, y: 4, duration: 1.1, ease: "power2.inOut" }, 3.35);
  window.__timelines["claude-codex-terminal-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(4.2).pause();
    gsap.set(".claude-component", { x: -10, y: -4, opacity: 1, filter: "blur(0px)" });
    gsap.set(".terminal-component", { x: -20, y: 8, opacity: 0.98, filter: "blur(0px)" });
    gsap.set(".workflow-cursor", { x: 42, y: 4, opacity: 1 });
  }
</script>
