    <style>
      #claude-home-surface {
        --bg-000: #ffffff;
        --bg-100: #f8f8f6;
        --bg-200: #f4efe8;
        --bg-300: #ece4d8;
        --text-100: #0b0b0b;
        --text-200: #373734;
        --text-300: #52514e;
        --text-400: #7b7974;
        --text-500: #7b7974;
        --border-100: rgba(11, 11, 11, 0.1);
        --border-200: rgba(11, 11, 11, 0.1);
        --brand-000: #c75f48;
        --brand-100: #d8755f;
        --brand-dark: #a84535;
        --sidebar-width: 280px;
        --df-header-h: 48px;
        --df-row-h: 26px;
        --df-radius-pill: 6px;
        --df-shadow-pop: 0 0 0 0.5px rgba(0, 0, 0, 0.06), 0 18px 52px rgba(45, 35, 26, 0.12);
        width: 980px;
        height: 760px;
        overflow: visible;
        color: var(--text-100);
        font-family: var(--font-claude-ui);
      }

      #claude-home-surface * {
        box-sizing: border-box;
      }

      /* Mirrors the live app's CSS-reset baseline: every element resolves
         a real hairline border-color (not an inherited text currentColor)
         even where border-width is 0, so a fidelity capture's computed
         borderColor reads match the reference's near-universal #e0e0df
         hairline instead of leaking text-color reads. Zero-specificity
         :where() so it stays a pure fallback and can never outrank a more
         specific rule that intentionally sets a different border-color. */
      :where(#claude-home-surface *) {
        border-color: var(--border-100);
      }

      #claude-home-surface button {
        font: inherit;
      }

      .claude-home-window {
        position: relative;
        width: 980px;
        height: 760px;
        overflow: hidden;
        border-radius: 18px;
        background: var(--bg-100);
        box-shadow:
          0 38px 110px rgba(54, 42, 31, 0.2),
          0 0 0 1px rgba(55, 42, 31, 0.08);
      }

      .home-sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 2;
        width: var(--sidebar-width);
        min-width: 0;
        display: flex;
        flex-direction: column;
        padding: 9px 8px 10px;
        border-radius: 0;
        background: #f8f8f6;
        border-right: 1px solid rgba(11, 11, 11, 0.1);
        box-shadow: none;
        user-select: none;
      }

      .claude-traffic {
        height: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px 4px;
      }

      .claude-traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
      }

      .claude-traffic .red { background: #ff5f57; }
      .claude-traffic .yellow { background: #febc2e; }
      .claude-traffic .green { background: #28c840; }

      .sidebar-brand {
        height: 28px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 5px;
        margin-bottom: 10px;
        color: var(--text-200);
        font-size: 14px;
      }

      .sidebar-brand strong {
        font-weight: 550;

<script>
  (() => {
    const isDirectPreview = /\/claude-home\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-home-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-home-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
