          <div class="cw-thread">
            <article class="cw-msg-user"><div class="cw-bubble">Look at my drafts that were started within the last three months and then check that I didn't publish them on the team blog using a search against content on that site and then suggest the ones that are most close to being ready</div></article>
            <article class="cw-msg-assistant">
              <div class="cw-assistant-copy">I'll help you find drafts from the last three months and check if they've been published. Let me start by looking at your drafts folder.</div>
              <section class="cw-command-card" aria-label="Running command">

                </div>
                <div class="cw-command-body">
                  <span class="cw-command-label">Request</span>
                  <pre class="cw-command-code">{
  `command`: `find /sessions/demo-workspace/mnt/blog-drafts -type f \( -name "*.md" -o -name "*.txt" -o -name "*.html" \) -mtime -90 -exec ls -la {} \;`,
  `description`: `Find draft files modified in the last 90 days`
}</pre>
                </div>
              </section>
              <div class="cw-assistant-copy cw-continue">Found 46 draft files. Now let me read the content of each to get their titles/topics, then…</div>
            </article>
          </div>

<script>
  (() => {
    const isDirectPreview = /\/claude-desktop\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-desktop-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-desktop-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
