  }
</style>

<template id="claude-attachment-draft-template">
  <div id="claude-attachment-draft-surface" data-composition-id="claude-attachment-draft-surface" data-width="1180" data-height="780">
    <section class="claude-attachment-window dframe-root" data-primitive="claude-attachment-draft-window" aria-label="Editable Claude attachment draft surface">
      <aside class="dframe-sidebar" data-primitive="claude-sidebar">
        <div class="claude-traffic" aria-hidden="true">
          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>
        </div>

        <div class="sidebar-head">
          <div class="claude-app-brand">
            <span class="claude-sunburst small" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span>
            </span>

        <div class="mode-switch" aria-label="Claude mode">
          <button type="button">Chat</button>
          <button type="button">Code</button>
          <button class="active" type="button">Cowork</button>
        </div>

        <div class="sidebar-primary-actions">
          <button class="new-chat-button" type="button"><span class="sidebar-symbol compose"></span><span>New task</span></button>
          <button class="search-chat-button" type="button"><span class="sidebar-symbol search"></span><span>Search tasks</span></button>

        <div class="sidebar-section-label">Active tasks</div>
        <div class="dframe-row selected"><span class="sidebar-symbol project"></span><span>Launch deck opening slides</span></div>
        <div class="dframe-row"><span class="sidebar-symbol artifact"></span><span>Browser metrics cleanup</span></div>

        <div class="sidebar-section-label">Today</div>
        <div class="dframe-row active-thread"><span class="sidebar-symbol folder"></span><span>Launch Deck folder</span></div>
        <div class="dframe-row"><span class="sidebar-symbol chat"></span><span>Presentation cleanup</span></div>
        <div class="dframe-row"><span class="sidebar-symbol chat"></span><span>Reference video notes</span></div>

        <div class="sidebar-section-label">Projects</div>
        <div class="dframe-row"><span class="sidebar-symbol folder"></span><span>Marketing videos</span></div>
        <div class="dframe-row"><span class="sidebar-symbol folder"></span><span>Backlot primitives</span></div>

        <div class="sidebar-sync-state">
          <span class="sync-pulse"></span>
          <span>Folder context is attached and ready for a task.</span>
        </div>

        <div class="sidebar-account">
          <span class="account-avatar"></span>
          <span class="account-copy"><strong>Demo workspace</strong><span>Pro plan</span></span>
          <span class="sidebar-kebab"></span>
        </div>
      </aside>

      <main class="dframe-pane-primary draft-root" data-primitive="claude-draft-pane">
        <header class="draft-topbar">
          <div class="topbar-left">
            <button class="topbar-icon menu" type="button" aria-label="Open sidebar"></button>
            <div class="thread-title-stack">
              <div class="conversation-title">New chat</div>
              <div class="conversation-subtitle">Folder context attached</div>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="model-selector" type="button">
              <span class="model-dot"></span>
              <span>Claude Sonnet 4.6</span>
              <span class="chevron down"></span>
            </button>
            <button class="topbar-icon share" type="button" aria-label="Share"></button>
            <button class="topbar-icon more" type="button" aria-label="More"></button>
          </div>
        </header>

        <div class="draft-body">
          <section class="draft-stage" data-primitive="claude-draft-stage">
            <div class="stage-logo">
              <span class="claude-sunburst hero-mark" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span>
              </span>
              <h1>Claude</h1>
            </div>

            <div class="folder-drop-card" data-primitive="claude-attached-folder-card" aria-label="Attached folder context">
              <div class="folder-card-icon"><span></span></div>
              <div class="folder-card-copy">
                <strong>Launch Deck</strong>
                <span>4 files ready for Claude</span>
              </div>
              <div class="folder-card-status">attached</div>
            </div>

            <div class="draft-composer conway-glass-frame" data-primitive="claude-draft-composer">
              <div class="draft-attachments">
                <span class="attachment-chip folder"><span class="file-chip folder"></span>Launch Deck</span>
                <span class="attachment-chip doc"><span class="file-chip doc"></span>slide-notes.md</span>
                <span class="attachment-chip sheet"><span class="file-chip sheet"></span>Q2 revenue.csv</span>
              </div>
              <div class="draft-prompt-text">Use the Launch Deck folder and update the opening slides so the workflow feels ready for a demo video.</div>
              <div class="composer-controls">
                <span class="composer-tools">
                  <button class="prompt-icon-button plus" type="button" aria-label="Attach"></button>
                  <button class="prompt-tool active" type="button"><span class="folder-mini"></span>Work in a folder</button>
                  <button class="prompt-tool" type="button">Research</button>
                </span>
                <button class="prompt-icon-button mic" type="button" aria-label="Dictate"></button>
                <button class="send-button" type="button" aria-label="Send"></button>
              </div>
            </div>

            <div class="context-popover" data-primitive="claude-folder-context-menu" aria-label="Folder context chooser">
              <div class="popover-header">
                <span class="folder-mini large"></span>
                <span>Work in a folder</span>
              </div>
              <div class="context-row selected">
                <span class="file-chip folder"></span>
                <span>Launch Deck</span>
                <em>4 files</em>
              </div>
              <div class="context-row">
                <span class="file-chip folder muted"></span>
                <span>Marketing videos</span>
                <em>12 files</em>
              </div>
              <button class="browse-row" type="button">Choose another folder...</button>
            </div>

          </section>
        </div>
      </main>

      <aside class="agent-rail" data-primitive="claude-agent-context-rail" aria-label="Claude task context">
        <section class="rail-section progress-section">
          <div class="rail-title">Progress</div>
          <div class="progress-circles" aria-hidden="true">
            <span class="done"></span><span class="active"></span><span></span><span></span>
          </div>
          <p>Ready to start once the prompt is sent.</p>
        </section>

        <section class="rail-section">
          <div class="rail-title">Context</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon folder"></span><span>Launch Deck</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Artifacts</div>
          <div class="artifact-card">
            <span class="rail-file-icon deck"></span>
            <div><strong>Launch Deck.pptx</strong><span>will be updated</span></div>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Connectors</div>
          <div class="connector-row"><span class="connector-dot"></span><span>Local files</span><strong>On</strong></div>
          <div class="connector-row"><span class="connector-dot muted"></span><span>Web search</span><strong>Off</strong></div>
        </section>

        <section class="rail-section working-files">
          <div class="rail-title">Working files</div>
          <div class="working-file">slide-notes.md</div>
          <div class="working-file">Q2 revenue.csv</div>
        </section>
      </aside>
    </section>

    <style>
      #claude-attachment-draft-surface {
        --bg-000: #ffffff;
        --bg-100: #faf9f5;
        --bg-200: #f2eee7;
        --text-100: #171715;
        --text-200: #35332f;
        --text-300: #59564f;
        --text-400: #777169;
        --text-500: #928b82;
        --border-100: rgba(49, 44, 38, 0.1);
        --border-200: rgba(49, 44, 38, 0.16);
        --brand-000: #c75f48;
        --brand-100: #d8755f;
        --brand-soft: #f6e7df;
        --df-sidebar-width: 260px;
        --df-agent-rail-width: 238px;
        --df-header-h: 48px;
        --df-row-h: 26px;
        --df-radius-pill: 6px;
        --df-shadow-card: inset 0 0 0 0 transparent, 0 0 0 1px rgba(20, 16, 12, 0.055), 0 4px 24px rgba(20, 16, 12, 0.055);
        width: 1180px;
        height: 780px;
        overflow: visible;
        color: var(--text-100);
        font-family: Inter, sans-serif;
      }

      #claude-attachment-draft-surface * {
        box-sizing: border-box;
      }

      #claude-attachment-draft-surface button {
        font: inherit;
      }

      .claude-attachment-window {
        position: relative;
        width: 1180px;
        height: 780px;
        overflow: hidden;
        display: grid;
        grid-template-columns: var(--df-sidebar-width) minmax(0, 1fr) var(--df-agent-rail-width);
        grid-template-rows: 100%;
        border-radius: 18px;
        background: var(--bg-100);
        box-shadow:
          0 38px 110px rgba(54, 42, 31, 0.22),
          0 0 0 1px rgba(55, 42, 31, 0.08);
      }

      .dframe-sidebar {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: var(--df-sidebar-width);
        min-width: 0;
        padding: 13px 10px 12px;
        background: #f6f3ed;
        border-right: 1px solid rgba(42, 35, 27, 0.06);
        box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.42);
        user-select: none;
      }

      .claude-traffic {
        height: 14px;
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 10px 4px;
      }

      .claude-traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      .claude-traffic .red { background: #ff5f57; }
      .claude-traffic .yellow { background: #ffbd2e; }
      .claude-traffic .green { background: #28c840; }

      .sidebar-head {
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-left: 5px;
      }

      .mode-switch {
        height: 31px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
        margin: 0 4px 14px;
        border-radius: 9px;
        background: rgba(232, 226, 217, 0.74);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.045);
      }

      .mode-switch button {
        min-width: 0;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--text-400);
        font-size: 11.5px;
        font-weight: 560;
      }

      .mode-switch .active {
        color: var(--text-100);
        background: rgba(255, 254, 250, 0.78);
        box-shadow: 0 1px 4px rgba(55, 48, 40, 0.08);
      }

      .claude-app-brand,
      .stage-logo {
        display: flex;
        align-items: center;
      }

      .claude-app-brand {
        gap: 9px;
        color: #342f2a;
        font-size: 14px;
        font-weight: 680;
      }

      .claude-sunburst {
        position: relative;
        display: inline-block;
        --ray-w: 2.4px;
        --ray-h: 8px;
        --ray-gap: 3px;
        color: var(--brand-000);
        flex: 0 0 auto;
      }

      .claude-sunburst.small {
        width: 18px;
        height: 18px;
        --ray-w: 1.8px;
        --ray-h: 6.5px;
        --ray-gap: 2px;
      }

      .claude-sunburst.hero-mark {
        width: 36px;
        height: 36px;
        --ray-w: 4.4px;
        --ray-h: 15px;
        --ray-gap: 4px;
      }

      .claude-sunburst span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--ray-w);
        height: var(--ray-h);
        border-radius: 999px;
        background: currentColor;
        transform-origin: 50% calc(100% + var(--ray-gap));
        transform: translate(-50%, calc(-100% - var(--ray-gap))) rotate(calc(var(--i) * 30deg));
      }

      .claude-sunburst span:nth-child(1) { --i: 0; }
      .claude-sunburst span:nth-child(2) { --i: 1; }
      .claude-sunburst span:nth-child(3) { --i: 2; }
      .claude-sunburst span:nth-child(4) { --i: 3; }
      .claude-sunburst span:nth-child(5) { --i: 4; }
      .claude-sunburst span:nth-child(6) { --i: 5; }
      .claude-sunburst span:nth-child(7) { --i: 6; }
      .claude-sunburst span:nth-child(8) { --i: 7; }
      .claude-sunburst span:nth-child(9) { --i: 8; }
      .claude-sunburst span:nth-child(10) { --i: 9; }
      .claude-sunburst span:nth-child(11) { --i: 10; }
      .claude-sunburst span:nth-child(12) { --i: 11; }

      .sidebar-icon-button,
      .topbar-icon,
      .prompt-icon-button {
        position: relative;
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--text-400);
      }

      .sidebar-icon-button {
        width: 28px;
        height: 28px;
        border-radius: 8px;
      }

      .sidebar-icon-button::before {
        content: "";
        width: 12px;
        height: 9px;
        border-radius: 2px;
        border: 1.5px solid currentColor;
        box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.9);
      }

      .sidebar-primary-actions {
        display: grid;
        gap: 3px;
        margin-bottom: 13px;
      }

      .new-chat-button,
      .search-chat-button,
      .dframe-row {
        height: var(--df-row-h);
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        padding: 0 7px;
        border: 0;
        border-radius: var(--df-radius-pill);
        background: transparent;
        color: var(--text-300);
        font-size: 13px;
        white-space: nowrap;
      }

      .new-chat-button {
        color: var(--text-100);
        background: rgba(248, 246, 242, 0.98);
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.055);
        font-weight: 590;
      }

      .search-chat-button {
        color: var(--text-400);
      }

      .dframe-row {
        margin-bottom: 1px;
      }

      .dframe-row.selected,
      .dframe-row.active-thread {
        color: var(--text-100);
        background: rgba(244, 241, 235, 0.98);
      }

      .dframe-row span:last-child,
      .new-chat-button span:last-child,
      .search-chat-button span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-section-label {
        margin: 12px 7px 5px;
        color: var(--text-500);
        font-size: 10.5px;
        font-weight: 600;
      }

      .sidebar-symbol {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-400);
        position: relative;
      }

      .sidebar-symbol::before {
        content: "";
        position: absolute;
        inset: 3px;
        border: 1.5px solid currentColor;
        border-radius: 4px;
      }

      .sidebar-symbol.compose::after,
      .sidebar-symbol.search::after,
      .sidebar-symbol.chat::after,
      .sidebar-symbol.folder::after {
        content: "";
        position: absolute;
        background: currentColor;
      }

      .sidebar-symbol.compose::after {
        right: 2px;
        top: 3px;
        width: 7px;
        height: 1.5px;
        border-radius: 2px;
        transform: rotate(-35deg);
      }

      .sidebar-symbol.search::before {
        width: 8px;
        height: 8px;
        inset: 2px auto auto 2px;
        border-radius: 50%;
      }

      .sidebar-symbol.search::after {
        right: 2px;
        bottom: 3px;
        width: 6px;
        height: 1.5px;
        border-radius: 2px;
        transform: rotate(45deg);
      }

      .sidebar-symbol.folder::before {
        inset: 5px 2px 2px;
      }

      .sidebar-symbol.folder::after {
        left: 3px;
        top: 3px;
        width: 7px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        opacity: 0.3;
      }

      .sidebar-account {
        margin-top: auto;
        height: 36px;
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr) 20px;
        align-items: center;
        gap: 8px;
        padding: 0 7px;
        color: var(--text-400);
        font-size: 12px;
      }

      .sidebar-sync-state {
        display: grid;
        grid-template-columns: 12px 1fr;
        gap: 7px;
        align-items: start;
        margin: 18px 7px 10px;
        padding: 10px 9px;
        border-radius: 10px;
        background: rgba(255, 254, 250, 0.46);
        color: var(--text-500);
        font-size: 10.5px;
        line-height: 1.35;
      }

      .sync-pulse {
        width: 8px;
        height: 8px;
        margin-top: 3px;
        border-radius: 50%;
        background: #6aa76d;
        box-shadow: 0 0 0 4px rgba(106, 167, 109, 0.13);
      }

      .account-avatar {
        width: 23px;
        height: 23px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 38% 32%, #fff 0 13%, rgba(255, 255, 255, 0) 15%),
          var(--brand-100);
      }

      .account-copy {
        display: grid;
        gap: 1px;
        min-width: 0;
      }

      .account-copy strong {
        color: var(--text-300);
        font-size: 12px;
        font-weight: 560;
      }

      .account-copy span {
        color: var(--text-500);
        font-size: 11px;
      }

      .sidebar-kebab,
      .topbar-icon.more {
        position: relative;
        width: 20px;
        height: 20px;
      }

      .sidebar-kebab::before,
      .topbar-icon.more::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: currentColor;
        transform: translate(-50%, -50%);
        box-shadow: -5px 0 0 currentColor, 5px 0 0 currentColor;
      }

      .dframe-pane-primary {
        position: relative;
        min-width: 0;
        height: 100%;
        display: grid;
        grid-template-rows: var(--df-header-h) minmax(0, 1fr);
        background: var(--bg-100);
      }

      .draft-topbar {
        height: var(--df-header-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 18px 0 12px;
        border-bottom: 1px solid rgba(50, 44, 36, 0.045);
        background: rgba(250, 248, 243, 0.84);
      }

      .topbar-left,
      .topbar-actions {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .topbar-left {
        gap: 8px;
      }

      .topbar-actions {
        gap: 6px;
      }

      .topbar-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
      }

      .topbar-icon.menu::before {
        content: "";
        width: 16px;
        height: 12px;
        border-top: 1.8px solid currentColor;
        border-bottom: 1.8px solid currentColor;
        box-shadow: 0 5px 0 -3.2px currentColor;
      }

      .topbar-icon.share::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 1.6px solid currentColor;
        border-radius: 3px;
      }

      .topbar-icon.share::after {

        width: 7px;
        height: 7px;
        border-top: 1.6px solid currentColor;
        border-right: 1.6px solid currentColor;
        transform: rotate(-45deg);
      }

      .thread-title-stack {
        display: grid;
        gap: 1px;
        min-width: 0;
      }

      .conversation-title {
        color: var(--text-200);
        font-size: 13.5px;
        font-weight: 620;
        line-height: 1.1;
      }

      .conversation-subtitle {
        color: var(--text-500);
        font-size: 11px;
        line-height: 1.1;
      }

      .model-selector {

        align-items: center;
        gap: 7px;

        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-300);
        font-size: 12px;
      }

      .model-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--brand-100);
      }

      .chevron {
        width: 12px;
        height: 12px;
        position: relative;
        color: var(--text-500);

        content: "";

        left: 3px;
        top: 1px;
        width: 6px;
        height: 6px;
        border-right: 1.6px solid currentColor;
        border-bottom: 1.6px solid currentColor;
        transform: rotate(45deg);
      }

      .draft-body {
        min-width: 0;
        min-height: 0;
        background:
          linear-gradient(180deg, rgba(250, 248, 243, 1), rgba(250, 248, 243, 0) 84px),
          var(--bg-100);
      }

      .draft-stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 44px 56px;
      }

      .stage-logo {
        gap: 13px;
        margin-bottom: 20px;
      }

      .stage-logo h1 {
        margin: 0;
        color: var(--text-100);
        font-family: Georgia, serif;
        font-size: 39px;
        font-weight: 720;
        letter-spacing: 0;
      }

      .folder-drop-card {
        width: min(100%, 608px);
        height: 58px;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr) auto;
        align-items: center;
        gap: 11px;
        margin-bottom: 10px;
        padding: 9px 13px;
        border: 1px solid rgba(199, 95, 72, 0.19);
        border-radius: 16px;
        background: rgba(255, 249, 245, 0.94);

<script>
  (() => {
    const isDirectPreview = /\/claude-attachment-draft\.html$/.test(window.location.pathname);
