<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Codex — Interaction Demo</title>
  </head>
  <body>
    <div id="codex-interaction" data-composition-id="codex-interaction" data-width="1280" data-height="800" data-start="0" data-duration="11">
      <section class="cx-stage" data-primitive="codex-interaction" aria-label="Codex CLI typing a command and streaming output">
        <div class="cx-window">
          <div class="cx-titlebar"><span class="dots"><i></i><i></i><i></i></span><span class="cx-title">ui-backlot — codex — 120x34</span></div>
          <div class="cx-screen">
            <div class="cx-splash">
              <div class="line dim">&gt;_ <b>OpenAI Codex</b> <span class="mut">(v0.140.0)</span></div>
              <div class="line dim">model: <b>gpt-5.2-codex</b> <span class="mut">/model to change</span></div>
              <div class="line dim">directory: ~/Projects/ui-backlot</div>
            </div>
            <div class="cx-prompt"><span class="caret">&gt;</span> <span class="cmd" data-role="cmd"></span></div>
            <div class="cx-out" data-role="out"></div>
            <div class="cx-status" data-role="status"></div>
          </div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#0a0c10; }
      #codex-interaction { width:1280px; height:800px; overflow:hidden; font-family:"SF Mono",ui-monospace,Menlo,monospace; color:#d6dbe2; }
      #codex-interaction * { box-sizing:border-box; }
      .cx-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#14181f,#0c0f14); display:grid; place-items:center; }
      .cx-window { position:relative; width:940px; height:620px; background:#0e1116; border-radius:12px; border:1px solid rgba(255,255,255,0.08); box-shadow:0 34px 90px rgba(0,0,0,0.5); overflow:hidden; display:grid; grid-template-rows:38px 1fr; }
      .cx-titlebar { display:flex; align-items:center; gap:12px; padding:0 16px; background:#171b22; border-bottom:1px solid rgba(255,255,255,0.06); }
      .dots { display:flex; gap:8px; } .dots i { width:12px; height:12px; border-radius:50%; } .dots i:nth-child(1){background:#ec6a5e;} .dots i:nth-child(2){background:#f4bf4f;} .dots i:nth-child(3){background:#61c554;}
      .cx-title { font-size:12px; color:#8b93a1; }
      .cx-screen { padding:20px 22px; font-size:14px; line-height:1.65; overflow:hidden; }
      .cx-splash { border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px 14px; margin-bottom:18px; width:max-content; }
      .line.dim { color:#9aa3b1; } .line b { color:#e7ebf1; font-weight:600; } .mut { color:#5f6a79; }
      .cx-prompt { color:#e7ebf1; margin-bottom:14px; } .caret { color:#6ad08f; }
      .cx-out { color:#8fbf8f; white-space:pre-wrap; }
      .cx-out .k { color:#7fb2ff; } .cx-out .g { color:#6ad08f; } .cx-out .y { color:#e0b45e; }
      .cx-status { color:#5f6a79; margin-top:12px; }
      .demo-cursor { position:absolute; left:640px; top:560px; z-index:90; width:26px; height:26px; background:url("assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(106,208,143,0.7); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="runtime/backlot-component-loader.js"></script>
    <script src="runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".cx-stage");
      const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

      const CMD = "make the launch page match the Q2 deck";
      const OUT =
        "\nExplored\n" +
        "  Read  compositions/launch-page.html\n" +
        "  Read  reference/deck/q2-deck.pdf\n\n" +
        "Plan\n" +
        "  1. Match the hero headline and Q2 revenue figure\n" +
        "  2. Recolor the CTA to the deck accent\n" +
        "  3. Update the metrics row (16% / 42% / +50%)\n\n" +
        "Applied 3 edits to launch-page.html — 42 insertions, 11 deletions.";

      // 1) type the command.
      ix.click('[data-role="cmd"]', { at: 0.6, moveDur: 0.7 });
      ix.type('[data-role="cmd"]', CMD, { at: 1.0, cps: 20 });

      // 2) stream the terminal output, then a status line.
      const outAt = 1.0 + CMD.length / 20 + 0.5;
      ix.stream('[data-role="out"]', OUT, { at: outAt, cps: 90 });
      const doneAt = outAt + OUT.length / 90 + 0.3;
      ix.type('[data-role="status"]', "✔ Done · 8.4s · Esc to interrupt", { at: doneAt, cps: 40, fade: 0.05 });

      window.__timelines["codex-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") tl.seek(10.4).pause();
    </script>
  </body>
</html>
