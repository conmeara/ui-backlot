      .document-stage {

        height: 18px;

      }

      .ruler .indent {

        top: 1px;

        height: 0;

        left: 105px;

      .ruler .indent.right {
        right: 92px;
      }

      .ruler.vertical {
        position: absolute;
        left: 36px;
        top: 33px;
        bottom: 30px;

        display: grid;
        justify-items: center;
        align-content: space-evenly;
        border-radius: 5px;
        border: 1px solid #d4d9e0;
        background: #f7f8fa;
        color: #7a8490;
        font-size: 8px;

      .page {

      .page-margin {

        border-color: rgba(24, 90, 189, 0.12);

      .page-margin.top {

        right: 30px;
        top: 54px;
        border-top: 1px dashed rgba(24, 90, 189, 0.16);
      }

      .page-margin.left {
        top: 30px;
        bottom: 30px;
        left: 52px;
        border-left: 1px dashed rgba(24, 90, 189, 0.16);
      }

      .page h1 {

      .revision-insert {

        text-decoration-thickness: 2px;

      .page p {
        margin: 0 0 14px;
        color: #2f3640;
        font-family: Inter, sans-serif;
        font-size: 13.4px;
        line-height: 1.62;

      .lede {
        font-size: 14px;
        color: #252b32;
      }

      .text-selection {
        background: rgba(128, 184, 255, 0.42);
        box-shadow: 0 0 0 1px rgba(24, 90, 189, 0.12);
      }

      .comment-highlight {
        background: rgba(255, 231, 153, 0.76);
        box-shadow: inset 0 -2px 0 rgba(229, 170, 46, 0.64);
      }

      .caret {
        display: inline-block;
        width: 1.5px;
        height: 17px;
        margin: 0 1px -3px;
        background: #111827;

      @keyframes wordCaret {
        50% { opacity: 0; }

      .tracked-change {
        position: relative;
        margin: 19px 0;
        padding: 17px 16px 12px;
        border-radius: 3px;
        background: #f7fbff;
        border: 1px solid #c8dcf8;

      .change-bar {
        position: absolute;
        left: -10px;
        top: 0;
        bottom: 0;
        width: 3px;
        border-radius: 3px;
        background: var(--word-blue);
      }

      .change-type {
        position: absolute;
        left: 13px;
        top: 4px;
        color: #5e6974;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .tracked-change strong {
        display: block;
        margin-bottom: 5px;
        color: var(--word-blue);
        font-size: 13px;
      }

      .tracked-change p {
        margin: 0;
      }

      .doc-table {
        width: 100%;
        border-collapse: collapse;
        color: #2f3640;
        font-family: Inter, sans-serif;
        font-size: 11.6px;
      }

      .doc-table th,
      .doc-table td {
        height: 30px;
        padding: 0 9px;
        border: 1px solid #d7dce2;
        text-align: left;
      }

      .doc-table th {
        background: #edf4fd;
        color: var(--word-blue);
        font-weight: 720;
      }

      .comment-anchor {
        position: absolute;
        right: -47px;
        top: 143px;
        width: 38px;
        height: 1px;
        background: #d8a11d;
      }

      .comment-anchor span {
        position: absolute;
        right: -6px;
        top: -6px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #d8a11d;
        box-shadow: 0 0 0 4px rgba(216, 161, 29, 0.16);
      }

      .review-float {
        position: absolute;
        right: 42px;
        top: 122px;
        display: flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid #d0d7e2;
        border-radius: 7px;
        background: #fff;
        box-shadow: 0 10px 22px rgba(27, 39, 53, 0.12);
      }

      .review-float button,
      .review-header button {
        height: 22px;
        border: 0;
        border-radius: 5px;
        background: #e8f1ff;
        color: var(--word-blue);
        font: 700 10px Inter, system-ui, sans-serif;
      }

      .review-float button:first-child {
        background: var(--word-blue);
        color: #fff;
      }

      .comment-card {
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 9px;
        background: #fff;
        border: 1px solid #d9dde4;
        box-shadow: 0 8px 22px rgba(44, 51, 61, 0.06);
      }

      .comment-card.active {
        border-color: #aac8ef;
        box-shadow:
          0 0 0 1px rgba(24, 90, 189, 0.12),
          0 10px 24px rgba(44, 51, 61, 0.08);
      }

      .review-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .review-header button {
        width: 44px;
      }

      .comment-author {
        color: var(--word-blue);
        font-size: 12px;
        font-weight: 760;
      }

      .comment-meta {
        display: grid;
        grid-template-columns: 24px 1fr 16px;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .comment-meta small {
        color: #7a8490;
        font-size: 9px;
        font-weight: 600;
      }

      .comment-meta i {
        width: 16px;
        height: 16px;
        position: relative;
      }

      .comment-meta i::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 3px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #7a8490;
        box-shadow: 0 5px 0 #7a8490, 0 10px 0 #7a8490;
      }

      .avatar {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #dbeafe;
        color: var(--word-blue);
        font-size: 11px;
        font-weight: 800;
      }

      .avatar.review {
        background: #f7e4df;
        color: #9b3a2b;
      }

      .comment-card p {
        margin: 0;
        color: #4c5661;
        font-size: 12px;
        line-height: 1.42;
      }

      .comment-actions {
        display: flex;
        gap: 7px;
        margin-top: 10px;
      }

      .comment-actions span {
        height: 23px;
        display: inline-flex;
        align-items: center;
        padding: 0 8px;
        border-radius: 7px;
        background: #eef4fc;
        color: var(--word-blue);
        font-size: 11px;
        font-weight: 650;
      }

      .reply-field {
        height: 27px;
        display: flex;
        align-items: center;
        margin-top: 11px;
        padding: 0 9px;
        border-radius: 7px;
        border: 1px solid #dce1e8;
        color: #8a94a0;
        font-size: 10px;
        background: #fbfcfd;
      }

      .changes-summary {
        display: grid;
        gap: 7px;
        margin-top: 21px;
        padding: 13px;
        border-radius: 9px;
        background: #edf4fd;
        color: #4c5661;
        font-size: 12px;
      }

      .changes-summary strong {
        color: var(--word-blue);
      }

      .changes-summary span {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .changes-summary b {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--word-blue);
      }

      .word-statusbar {
        height: 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 13px;
        background: #f8f9fb;
        border-top: 1px solid #d4d9e0;
        color: #5e6974;
        font-size: 11px;
      }

      .status-spacer {
        flex: 1;
      }

      .zoom-line {
        width: 88px;
        height: 4px;
        border-radius: 999px;
        position: relative;
        background:
          linear-gradient(90deg, var(--word-blue) 0 66%, #c9d0d8 66% 100%);
      }

      .zoom-line i {
        position: absolute;
        left: 62%;
        top: -4px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        border: 1px solid #8fb4e3;
        box-shadow: 0 1px 3px rgba(22, 31, 43, 0.18);
      }

      .zoom-minus {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid #c3cad3;
        position: relative;
      }

      .zoom-minus::before {
        content: "";
        position: absolute;
        left: 4px;
        right: 4px;
        top: 6px;
        height: 1.5px;
        background: #63707c;
      }

      .view-mode {
        width: 16px;
        height: 14px;
        border: 1px solid #c3cad3;
        border-radius: 3px;
        background: #fff;
      }

      .view-mode.active {
        border-color: #91b8ea;
        background: #e8f1ff;
      }

      .view-mode.page-view {
        display: inline-grid;
        place-items: center;
      }

      .view-mode.page-view::before {
        content: "";
        width: 7px;
        height: 9px;
        background: #9aa5b1;
      }

      /* Word for web fidelity pass: source-targeted overrides. */
      #word-editor-surface {
        --word-blue: #2b579a;
        --word-blue-2: #185abd;
        --web-chrome: #f8f8f8;
        --web-tab: #f3f2f1;
        --web-border: #d2d0ce;
        --web-text: #252423;
        --web-muted: #605e5c;
        --web-canvas: #e6e6e6;
        --web-pane: #faf9f8;

      .word-window {

        background: #fff;
        border-color: #c8c6c4;
        box-shadow: 0 18px 54px rgba(32, 31, 30, 0.18);
      }

      .word-titlebar {
        height: 40px;
        grid-template-columns: 32px 28px 68px minmax(170px, auto) 1fr auto 32px;
        gap: 8px;
        padding: 0 10px;
        background: var(--web-chrome);
        border-bottom: 1px solid #edebe9;
        font-size: 12px;
        font-weight: 400;
      }

      .word-traffic,
      .save-state,
      .autosave {
        display: none;
      }

      .app-launcher {
        width: 28px;
        height: 28px;
        display: grid;
        grid-template-columns: repeat(3, 4px);
        grid-auto-rows: 4px;
        place-content: center;
        gap: 3px;
        color: #605e5c;
      }

      .app-launcher span {
        width: 4px;
        height: 4px;
        border-radius: 1px;
        background: currentColor;
      }

      .word-app-icon {
        width: 24px;
        height: 24px;
        border-radius: 2px;
        background: #2b579a;
        font-size: 13px;
        box-shadow: inset -4px 0 0 rgba(0, 0, 0, 0.12);
      }

      .quick-access {
        gap: 3px;
        padding: 0;
      }

      .qa {
        width: 18px;
        height: 18px;
        color: #605e5c;
      }

      .word-title {
        display: grid;
        gap: 1px;
        min-width: 0;
      }

      .word-title strong {
        color: #323130;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.05;
      }

      .word-title span {
        color: #107c10;
        font-size: 10px;
        font-weight: 400;
      }

      .title-search {
        width: 410px;
        height: 28px;
        justify-self: center;
        border-radius: 3px;
        background: #fff;
        border: 1px solid #c8c6c4;
        color: #605e5c;
        font-size: 12px;
        font-weight: 400;
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.03);
      }

      .title-actions {
        gap: 6px;
      }

      .title-actions span {
        height: 28px;
        border-radius: 2px;
        border: 1px solid #c8c6c4;
        background: #fff;
        color: #323130;
        font-size: 12px;
        font-weight: 400;
      }

      .title-actions .mode-action::after,
      .title-actions .share-action::after {
        content: "";
        width: 5px;
        height: 5px;
        margin-left: 6px;
        border-right: 1.4px solid currentColor;
        border-bottom: 1.4px solid currentColor;
        transform: rotate(45deg) translateY(-2px);
      }

      .title-actions .comments-action {
        gap: 6px;
      }

      .title-actions .comments-action::before {
        content: "";
        width: 12px;
        height: 9px;
        border: 1.4px solid #323130;
        border-radius: 2px;
        box-shadow: 0 4px 0 -3px #323130;
      }

      .title-actions .share-action {
        background: #0f6cbd;
        border-color: #0f6cbd;
        color: #fff;
      }

      .profile-dot {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #d13438;
        color: #fff;
        font-size: 10px;
        font-weight: 600;
      }

      .word-tabs {
        height: 31px;
        align-items: stretch;
        gap: 0;
        padding: 0 10px;
        background: var(--web-tab);
        border-bottom: 1px solid #edebe9;
      }

      .word-tabs span {
        height: 31px;
        padding: 0 12px;
        border-radius: 0;
        border: 0;
        color: #323130;
        font-size: 12px;
        font-weight: 400;
      }

      .word-tabs .file-tab {
        color: #323130;
        background: transparent;
      }

      .word-tabs .active {
        background: #fff;
        border: 0;
        color: #2b579a;
        box-shadow: inset 0 -2px 0 #2b579a;
        font-weight: 600;
      }

      .word-tabs .contextual {
        background: transparent;
      }

      .word-ribbon {
        height: 86px;
        align-items: stretch;
        padding: 4px 8px 0;
        background: #fff;
        border-bottom: 1px solid #c8c6c4;
      }

      .review-ribbon {
        padding-left: 8px;
      }

      .ribbon-group {
        gap: 5px;
        min-width: 82px;
        padding: 2px 8px 18px;
        border-left-color: #edebe9;
      }

      .ribbon-group strong {
        bottom: 2px;
        color: #605e5c;
        font-size: 9px;
        font-weight: 400;
      }

      .ribbon-group.comments { min-width: 142px; }
      .ribbon-group.tracking { min-width: 306px; }
      .ribbon-group.changes { min-width: 178px; }
      .ribbon-group.compare { min-width: 124px; }
      .ribbon-group.proofing { min-width: 176px; }

      .ribbon-large {
        width: 54px;
        min-height: 54px;
        grid-template-rows: 27px auto;
        gap: 2px;
        padding: 2px;
        border-radius: 2px;
        color: #323130;
        font-size: 11px;
        line-height: 1.1;
      }

      .ribbon-large:hover,
      .field:hover,
      .review-chip:hover,
      .ribbon-stack span:hover,
      .track-command:hover {
        background: #f3f2f1;
      }

      .cmd-icon {
        display: block;
        width: 24px;
        height: 24px;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .cmd-icon.comment::before {
        left: 4px;
        top: 5px;
        width: 14px;
        height: 10px;
        border-width: 1.5px;
        border-color: #2b579a;
        border-radius: 2px;
      }

      .cmd-icon.comment::after {
        left: 11px;
        top: 14px;
        width: 5px;
        height: 5px;
        background: #fff;
        border-width: 1.5px;
        border-color: #2b579a;
      }

      .cmd-icon.track::before,
      .cmd-icon.accept::before,
      .cmd-icon.reject::before {
        content: "";
        position: absolute;
        left: 6px;
        top: 3px;
        width: 12px;
        height: 17px;
        border-radius: 1px;
        background: #fff;
        border: 1.2px solid #8a8886;
      }

      .cmd-icon.track::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 8px;
        width: 12px;
        height: 8px;
        border-left: 2px solid #d83b01;
        border-bottom: 2px solid #d83b01;
        transform: rotate(-45deg);

      .cmd-icon.accept::after {
        left: 9px;
        top: 11px;
        width: 10px;
        height: 6px;
        border-left: 2px solid #107c10;
        border-bottom: 2px solid #107c10;
      }

      .cmd-icon.reject::after {
        left: 9px;
        top: 9px;
        width: 10px;
        height: 10px;
      }

      .ribbon-stack {
        gap: 2px;
      }

      .ribbon-stack span,
      .field,
      .review-chip,
      .track-command {
        height: 24px;
        border-radius: 2px;

        background: transparent;
        color: #323130;
        font-size: 12px;
        font-weight: 400;
      }

      .ribbon-stack span {
        min-width: 76px;
        padding: 0 6px;
      }

      .ribbon-stack.compact span {
        min-width: 74px;
      }

      .ribbon-row {
        gap: 4px;
      }

      .track-command .cmd-icon {

        position: absolute;

        height: 6px;
        border-right: 1.4px solid #605e5c;
        border-bottom: 1.4px solid #605e5c;

      .track-menu {

        background: #f3f2f1;

      .review-select {

      .button-row {

      .field.small {

      tl.from(".nav-pane", { opacity: 0, x: -14, duration: 0.34, ease: "power3.out" }, 0.7);

<script>
  (() => {
    const isDirectPreview = decodeURIComponent(window.location.pathname).endsWith("/word-editor.html");
    if (!isDirectPreview) return;

    const mount = () => {
      if (document.getElementById("word-editor-surface")) return;
      const template = document.getElementById("word-editor-surface-template");
      if (!template || !document.body) return;

      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };

    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
