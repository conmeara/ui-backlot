<div id="claude-premiere-workflow" data-composition-id="claude-premiere-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="9">
  <section class="workflow-stage" data-primitive="claude-premiere-workflow" aria-label="Claude and Premiere workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="./mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame premiere-component"
      data-primitive="premiere-video-editor-window"
      data-backlot-mount-src="./premiere-editor.html"
      data-backlot-mount-selector="#premiere-editor-surface"
    ></div>

    <div
      class="component-frame claude-component"
      data-primitive="claude-composed-app"
      data-backlot-mount-src="./claude-composed-app.html"
      data-backlot-mount-selector="#claude-composed-app"
    ></div>

    <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
    <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
  </section>
</div>

<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #eff1ec;
  }

  #claude-premiere-workflow {
    --ink: #181410;
    --cursor: url("../assets/cursors/normal-select.svg");
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    color: var(--ink);
    font-family: var(--font-claude-ui);
  }

  #claude-premiere-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 16% 16%, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0) 23%),
      radial-gradient(circle at 75% 18%, rgba(143, 124, 255, 0.12), rgba(143, 124, 255, 0) 26%),
      radial-gradient(circle at 74% 80%, rgba(181, 211, 197, 0.4), rgba(181, 211, 197, 0) 34%),
      radial-gradient(circle at 30% 86%, rgba(198, 91, 71, 0.08), rgba(198, 91, 71, 0) 27%),
      linear-gradient(145deg, #f4efe8 0%, #fbfaf6 48%, #dee8e1 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 30px 0 0;
    opacity: 0.43;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(to bottom, transparent 0%, #000 17%, #000 78%, transparent 100%);
  }

  .menu-bar-component {
    position: absolute;
    left: 0;
    top: 0;
    z-index: 40;
    width: 100%;
    height: 30px;
  }

  .component-frame {
    position: absolute;
    overflow: hidden;
    transform-origin: top left;
  }

  .premiere-component {
    left: 548px;
    top: 86px;
    z-index: 8;
    width: 1440px;
    height: 900px;
    border-radius: 15px;
    scale: 0.82;
    opacity: 0.98;
    box-shadow: 0 44px 138px rgba(33, 35, 49, 0.31);
  }

  .claude-component {
    left: 116px;
    top: 196px;
    z-index: 16;
    width: 1440px;
    height: 900px;
    border-radius: 18px;
    scale: 0.639;
    background: transparent;
    box-shadow:
      0 44px 138px rgba(54, 42, 31, 0.31),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  .component-frame > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  .workflow-cursor {
    position: absolute;
    left: 1454px;
    top: 650px;
    z-index: 40;
    width: 34px;
    height: 34px;
    background: var(--cursor) 0 0 / contain no-repeat;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
  }

  .click-ring {
    position: absolute;
    left: 1457px;
    top: 654px;
    z-index: 39;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(143, 124, 255, 0.72);
    border-radius: 50%;
    opacity: 0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  // Pass-110 scene-copy convention: the mounted atoms expose stable
  // data-copy="<slot>" hooks (claude-thread-core + claude-agent-rail); the
  // shell's visible cowork topbar title is addressed through its
  // data-primitive hook. Hooks missing from the mounted DOM are skipped,
  // so the map stays declarative and inert against markup churn.
  const applyClaudeSceneCopy = () => {
    const claudeRoot = document.querySelector(".claude-component #claude-composed-app");
    if (!claudeRoot) return;
    const sceneCopy = {
      "thread-title": "Review launch video sequence",
      "thread-subtitle": "Working in Launch Cut",
      "user-prompt": "Oh and tighten the launch video sequence before we export it.",
      "reply-primary": "I'll review the launch cut from the selected folder.",
      "reply-secondary": "I'm checking the edit notes and shot list before returning the trimmed sequence.",
      "thinking-json": '{ "command": "find /sessions/launch-cut -type f -maxdepth 2", "description": "List selected project files" }',
      "source-chip-1": "edit-notes.md",
      "source-chip-2": "shot-list.csv",
      "tool-title": "Editing LaunchCut.prproj",
      "tool-row-1": "Read Launch Cut folder",
      "tool-row-2": "Found edit notes and footage",
      "tool-row-3": "Trimming the sequence",
      "command-output": "Found LaunchCut.prproj, edit-notes.md, and shot-list.csv.\nNext I'll trim the sequence against the marked edit points.",
      "artifact-1-kind": "PROJ",
      "artifact-1": "LaunchCut.prproj",
      "context-folder": "Launch Cut",
      "context-file-1-kind": "MD",
      "context-file-1": "edit-notes.md",
      "context-file-2-kind": "CSV",
      "context-file-2": "shot-list.csv",
      "context-file-3-kind": "PROJ",
      "context-file-3": "LaunchCut.prproj"
    };
    Object.entries(sceneCopy).forEach(([slot, text]) => {
      claudeRoot.querySelectorAll(`[data-copy="${slot}"]`).forEach((node) => {
        node.textContent = text;
      });
    });
    const shellTitle = claudeRoot.querySelector('[data-primitive="claude-cowork-topbar"] .shell-thread-title');
    if (shellTitle) shellTitle.textContent = sceneCopy["thread-title"];
  };

  const applyPremiereChildCopy = () => {
    const replacements = new Map([
      ["Program: Launch Deck", "Program: Launch Cut"],
      ["Launch Deck sequence", "Launch Cut sequence"],
      ["Launch Deck", "Launch Cut"]
    ]);

    const walker = document.createTreeWalker(document.querySelector(".premiere-component"), NodeFilter.SHOW_TEXT);
    while (walker.nextNode()) {
      let value = walker.currentNode.nodeValue;
      replacements.forEach((next, previous) => {
        value = value.replaceAll(previous, next);
      });
      walker.currentNode.nodeValue = value;
    }
  };

  window.__backlotComponentsReady?.then(() => {
    const claudeRoot = document.querySelector("#claude-composed-app");
    if (claudeRoot) {
      claudeRoot.setAttribute("data-page", "cowork");
      claudeRoot.setAttribute("data-sidebar", "on");
      claudeRoot.setAttribute("data-rail", "on");
    }
    applyClaudeSceneCopy();
    applyPremiereChildCopy();
  });

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".premiere-component", { opacity: 0, x: 34, y: 18, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.22);
  tl.from(".claude-component", { opacity: 0, x: -28, y: 20, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.48);
  tl.from(".workflow-cursor", { opacity: 0, x: -24, y: 20, duration: 0.28, ease: "sine.out" }, 1.08);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.3, duration: 0.18, ease: "sine.out" }, 1.52);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 1.74);
  tl.to(".workflow-cursor", { x: -650, y: 170, duration: 1.02, ease: "power2.inOut" }, 2.12);
  tl.to(".click-ring", { x: -650, y: 170, duration: 1.02, ease: "power2.inOut" }, 2.12);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.32, duration: 0.18, ease: "sine.out" }, 3.08);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 3.3);
  tl.to(".claude-component", { x: -8, y: -4, duration: 1.2, ease: "sine.inOut" }, 3.6);
  tl.to(".premiere-component", { x: -18, y: 8, duration: 1.2, ease: "sine.inOut" }, 3.6);
  tl.to(".workflow-cursor", { x: 8, y: -58, duration: 1.05, ease: "power2.inOut" }, 4.08);
  window.__timelines["claude-premiere-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(4.32).pause();
    gsap.set(".claude-component", { x: -8, y: -4, opacity: 1, filter: "blur(0px)" });
    gsap.set(".premiere-component", { x: -18, y: 8, opacity: 0.98, filter: "blur(0px)" });
    gsap.set(".workflow-cursor", { x: 8, y: -58, opacity: 1 });
    gsap.set(".click-ring", { opacity: 0 });
  }
</script>
