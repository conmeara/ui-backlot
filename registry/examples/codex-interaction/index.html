<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Codex — Interaction Demo</title>
  </head>
  <body>
    <div id="codex-interaction" data-composition-id="codex-interaction" data-width="1280" data-height="800" data-start="0" data-duration="9.5">
      <section class="cx-stage" data-primitive="codex-interaction" aria-label="Codex CLI finishing a command, running tools, and applying an edit">
        <div class="cx-window">
          <div
            class="component-frame cx-frame"
            data-primitive="codex-terminal-window"
            data-backlot-mount-src="compositions/codex-terminal.html"
            data-backlot-mount-selector="#codex-terminal-surface"
          ></div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#0a0c10; }
      #codex-interaction { width:1280px; height:800px; overflow:hidden; font-family:"SF Mono",ui-monospace,Menlo,monospace; color:#d6dbe2; }
      #codex-interaction * { box-sizing:border-box; }
      .cx-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#14181f,#0c0f14); display:grid; place-items:center; }

      /* codex-terminal mounts at its native 1120x840 and is scaled down to
         fit the stage; the outer box supplies the window radius/shadow
         (the inner mounted window's own shadow would be clipped by the
         frame's overflow:hidden) — same double-wrapper idiom as
         claude-code-interaction / browser-interaction. */
      .cx-window { position:relative; width:940px; height:705px; border-radius:12px; overflow:hidden; box-shadow:0 34px 90px rgba(0,0,0,0.5); background:#080910; }
      .component-frame { position:absolute; inset:0; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; transform:scale(0.83929); }

      .demo-cursor { position:absolute; left:640px; top:560px; z-index:90; width:26px; height:26px; background:url("assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(106,208,143,0.7); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="runtime/backlot-component-loader.js"></script>
    <script src="runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const DURATION = 9.5;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".cx-stage");

      // Registered synchronously with a full-duration hold (the mount below
      // is async; the renderer must never probe a zero-duration composition).
      tl.to(stage, { opacity: 1, duration: DURATION }, 0);
      gsap.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 });

      window.__backlotComponentsReady.then(() => {
        const mount = stage.querySelector(".cx-frame");
        const win = mount && mount.querySelector("#codex-terminal-surface");
        if (!win) return;

        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets (all inside the real Codex terminal chrome) ----
        const composerInput = win.querySelector(".composer-input");
        const inputTextEl = win.querySelector(".input-text");
        const typedTail = win.querySelector('[data-role="cx-typed-tail"]');
        const cursorEl = win.querySelector('[data-role="cx-cursor"]');
        const liveExplore = win.querySelector('[data-role="live-explore"]');
        const livePlan = win.querySelector('[data-role="live-plan"]');
        const liveApplied = win.querySelector('[data-role="live-applied"]');
        const liveAppliedText = win.querySelector('[data-role="live-applied-text"]');
        // The pinned session's transcript already fills the terminal's
        // fixed-height screen down to the composer (that's the reference
        // capture's own long-session framing) — there is zero slack left
        // for a new turn. Fold the least-load-bearing established rows
        // (internal monologue, the approval prompt, the earlier diff, and
        // the now-finished spinner) once the live turn starts, the same way
        // a real terminal's older lines scroll away, so the new turn has
        // room.
        const collapseRows = Array.from(win.querySelectorAll(".thought-row, .approval-row, .running-row"))
          .concat(Array.from(win.querySelectorAll(".diff-row")).filter((el) => el !== liveApplied));
        if (!composerInput || !inputTextEl || !typedTail || !liveExplore || !livePlan || !liveApplied || !liveAppliedText) return;

        // The pinned composer already carries a mid-typed sentence (the
        // reference capture's own state) — this demo finishes it rather
        // than inventing a new one, same idiom as browser-interaction
        // reading its URL out of the mount.
        const TAIL = "an.";
        const APPLIED = liveAppliedText.textContent.trim();

        // ---- Rest-frame pins (t=0): pinned composer text as captured,
        // live turn not yet run. gsap.set (not tl.set at 0). ----
        gsap.set([liveExplore, livePlan, liveApplied], { opacity: 0 });

        // Typing target starts EMPTY (display:none, not just empty text —
        // composer-input is a flex row with `gap`, so an empty-but-present
        // span would still eat a gap slot and nudge the pinned text/cursor).
        // Per-char spans flip display so the block cursor (a flex sibling
        // right after the typed text) rides the leading edge.
        const tailChars = [];
        for (const ch of TAIL) {
          const s = document.createElement("span");
          s.textContent = ch;
          typedTail.appendChild(s);
          tailChars.push(s);
        }
        gsap.set(tailChars, { display: "none" });

        // 1) Click the composer, finish typing the pinned sentence.
        const CLICK_AT = 0.7;
        const TYPE_AT = 1.15;
        const CPS = 10;
        ix.click(composerInput, { at: CLICK_AT, moveDur: 0.6 });
        tl.set(typedTail, { display: "inline" }, TYPE_AT);
        for (let i = 0; i < tailChars.length; i++) {
          tl.set(tailChars[i], { display: "inline" }, TYPE_AT + i / CPS);
        }
        const tailEndAt = TYPE_AT + TAIL.length / CPS;

        // 2) Send: the composer clears (message sent) while the terminal
        // moves on to running the turn.
        const submitAt = tailEndAt + 0.45;
        tl.to(composerInput, { opacity: 0, duration: 0.15 }, submitAt);

        // 2b) The finished spinner + older reasoning scroll away, making
        // room for the new turn's transcript (see collapseRows comment
        // above) — a discrete display:none step once the fade completes,
        // like every other latent-content toggle in this repo's demos.
        const collapseAt = submitAt + 0.25;
        tl.to(collapseRows, { opacity: 0, duration: 0.3 }, collapseAt);
        tl.set(collapseRows, { display: "none" }, collapseAt + 0.3);

        // 3) Tool-call results ("Explored") pop in as a completed block —
        // real Codex chrome, not typed character by character.
        const exploreAt = collapseAt + 0.3 + 0.35;
        tl.set(liveExplore, { display: "grid" }, exploreAt);
        tl.to(liveExplore, { opacity: 1, duration: 0.25 }, exploreAt);

        // 4) Plan checklist pops in the same way, a beat later.
        const planAt = exploreAt + 0.9;
        tl.set(livePlan, { display: "grid" }, planAt);
        tl.to(livePlan, { opacity: 1, duration: 0.25 }, planAt);

        // 5) The applied summary is the only part that streams token by
        // token, like AI prose.
        const appliedAt = planAt + 0.9;
        tl.set(liveApplied, { display: "grid" }, appliedAt);
        tl.to(liveApplied, { opacity: 1, duration: 0.2 }, appliedAt);
        ix.stream(liveAppliedText, APPLIED, { at: appliedAt + 0.2, cps: 32, unit: "word" });

        // 6) Composer resets to idle, ready for the next command.
        const doneAt = appliedAt + 0.2 + APPLIED.length / 32 + 0.3;
        tl.set(inputTextEl, { textContent: "" }, doneAt);
        tl.set(typedTail, { textContent: "", display: "none" }, doneAt);
        tl.to(composerInput, { opacity: 1, duration: 0.25 }, doneAt);
      }).catch(() => {});

      window.__timelines["codex-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(9.2).pause();
        window.__backlotComponentsReady.then(() => { tl.seek(0).seek(9.2).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
