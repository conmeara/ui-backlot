    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #figma-editor-surface {
        --figma-bg: #f4f4f5;
        --figma-panel: #ffffff;
        --figma-panel-alt: #fbfbfc;
        --figma-border: #e3e3e7;
        --figma-border-strong: #c9c9d1;
        --figma-ink: #17171a;
        --figma-muted: #6f7178;
        --figma-soft: #9b9da4;
        --figma-blue: #0d99ff;
        --figma-purple: #8b5cf6;
        --figma-green: #22c55e;
        --figma-coral: #f26b5e;
        width: 1440px;
        height: 900px;
        overflow: visible;
        font-family: "Anthropic Sans", sans-serif;
        color: var(--figma-ink);
      }

      #figma-editor-surface * {
        box-sizing: border-box;
      }

      button {
        font: inherit;
      }

      .figma-window {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 52px 256px 1fr 304px;
        grid-template-rows: 48px 1fr;
        border-radius: 17px;
        background: var(--figma-bg);
        box-shadow:
          0 36px 120px rgba(39, 39, 46, 0.22),
          0 0 0 1px rgba(35, 35, 42, 0.1);
      }

      .figma-titlebar {
        grid-column: 1 / -1;
        position: relative;
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr) auto;
        align-items: center;
        padding: 0 14px;
        border-bottom: 1px solid var(--figma-border);
        background: rgba(255, 255, 255, 0.92);
      }

      .traffic {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #ffbd2e; }
      .traffic .green { background: #28c840; }

      .file-title {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #26262a;
        font-size: 14px;
        font-weight: 620;
      }

      .figma-mark {
        width: 16px;
        height: 22px;
        display: grid;
        grid-template-columns: 8px 8px;
        grid-template-rows: repeat(3, 7px);
        gap: 0;
      }

      .figma-mark span {
        width: 8px;
        height: 8px;
      }

      .figma-mark span:nth-child(1) { background: #f24e1e; border-radius: 4px 0 0 4px; }
      .figma-mark span:nth-child(2) { background: #ff7262; border-radius: 0 4px 4px 0; }
      .figma-mark span:nth-child(3) { background: #a259ff; border-radius: 4px 0 0 4px; }
      .figma-mark span:nth-child(4) { background: #1abcfe; border-radius: 50%; }
      .figma-mark span:nth-child(5) { background: #0acf83; border-radius: 4px 0 4px 4px; }

      .title-chevron {
        width: 8px;
        height: 8px;
        border-right: 1.5px solid var(--figma-muted);
        border-bottom: 1.5px solid var(--figma-muted);
        transform: rotate(45deg) translateY(-2px);
      }

      .title-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mode-pill,
      .share-button,
      .toolbar-mode {
        height: 30px;
        border: 1px solid var(--figma-border);
        border-radius: 8px;
        background: #fff;
        color: var(--figma-muted);
        padding: 0 10px;
        font-size: 12px;
      }

      .mode-pill.active {
        color: var(--figma-ink);
        background: #f1f1f4;
      }

      .share-button {
        color: #fff;
        border-color: var(--figma-blue);
        background: var(--figma-blue);
        font-weight: 620;
      }

      .avatar-stack {
        width: 52px;
        height: 30px;
        display: flex;
        align-items: center;
        padding: 0 4px;
        border: 1px solid var(--figma-border);
        border-radius: 999px;
        background: #fff;
      }

      .avatar-stack span {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        margin-left: -3px;
        border: 1px solid #fff;
        border-radius: 50%;
        color: #fff;
        background: var(--figma-purple);
        font-size: 10px;
        font-weight: 700;
      }

      .avatar-stack span:first-child {
        margin-left: 0;
        background: #14b8a6;
      }

      .present-button {
        width: 30px;
        height: 30px;
        border: 1px solid var(--figma-border);
        border-radius: 8px;
        background: #fff;
        position: relative;
      }

      .present-button::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 8px;
        border-left: 9px solid var(--figma-ink);
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
      }

      .navigation-rail,
      .left-panel,
      .properties-panel {
        background: var(--figma-panel);
        border-right: 1px solid var(--figma-border);
      }

      .navigation-rail {
        grid-column: 1;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
        padding: 10px 0;
      }

      .rail-spacer {
        flex: 1;
      }

      .rail-icon {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: var(--figma-muted);
        position: relative;
      }

      .rail-icon.active {
        color: #fff;
        background: var(--figma-ink);
      }

      .rail-icon::before,
      .rail-icon::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .rail-icon.layers::before {
        width: 16px;
        height: 12px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
        box-shadow: -3px 3px 0 -1px var(--figma-ink), -3px 3px 0 0 currentColor;
      }

      .rail-icon.assets::before {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background:
          linear-gradient(currentColor 0 0) 0 0 / 7px 7px no-repeat,
          linear-gradient(currentColor 0 0) 9px 0 / 7px 7px no-repeat,
          linear-gradient(currentColor 0 0) 0 9px / 7px 7px no-repeat,
          linear-gradient(currentColor 0 0) 9px 9px / 7px 7px no-repeat;
      }

      .rail-icon.search::before {
        width: 12px;
        height: 12px;
        border: 1.7px solid currentColor;
        border-radius: 50%;
      }

      .rail-icon.search::after {
        width: 7px;
        height: 1.7px;
        margin-left: 6px;
        margin-top: 6px;
        border-radius: 2px;
        background: currentColor;
        transform: translate(-50%, -50%) rotate(45deg);
      }

      .rail-icon.library::before {
        width: 15px;
        height: 15px;
        border: 1.7px solid currentColor;
        border-radius: 4px;
      }

      .rail-icon.bell::before {
        width: 13px;
        height: 14px;
        border: 1.7px solid currentColor;
        border-radius: 9px 9px 5px 5px;
      }

      .rail-icon.help::before {
        content: "?";
        font-size: 16px;
        font-weight: 800;
      }

      .left-panel {
        grid-column: 2;
        grid-row: 2;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .panel-tabs,
      .panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 44px;
        padding: 0 12px;
        border-bottom: 1px solid var(--figma-border);
      }

      .panel-tab,
      .prop-tab {
        height: 28px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--figma-muted);
        padding: 0 10px;
        font-size: 12px;
        font-weight: 590;
      }

      .panel-tab.active,
      .prop-tab.active {
        color: var(--figma-ink);
        background: #f1f1f4;
      }

      .page-section {
        padding: 11px 12px 7px;
        border-bottom: 1px solid var(--figma-border);
      }

      .panel-heading {
        margin: 12px 12px 7px;
        color: var(--figma-soft);
        font-size: 11px;
        font-weight: 700;
      }

      .page-section .panel-heading {
        margin: 0 0 7px;
      }

      .page-row,
      .layer-row {
        height: 28px;
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr);
        align-items: center;
        gap: 6px;
        border-radius: 7px;
        color: var(--figma-muted);
        font-size: 12px;
      }

      .page-row {
        padding: 0 6px;
      }

      .page-row.active,
      .layer-row.active {
        color: var(--figma-ink);
        background: #f2f2f5;
      }

      .page-dot {

        height: 6px;
        border-radius: 50%;
        background: var(--figma-blue);
      }

      .layer-tree {
        padding: 0 8px 14px;
      }

      .layer-row {
        grid-template-columns: 16px 16px minmax(0, 1fr);
        padding: 0 6px;
      }

      .layer-row.child {
        padding-left: 24px;
      }

      .layer-row.grandchild {
        padding-left: 40px;
      }

      .layer-row.selected {
        color: var(--figma-ink);
        font-weight: 600;
      }

      .layer-row span:last-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .layer-caret {
        width: 7px;
        height: 7px;
        border-right: 1.5px solid var(--figma-soft);
        border-bottom: 1.5px solid var(--figma-soft);
        transform: rotate(-45deg);
      }

      .layer-caret.open {
        transform: rotate(45deg);
      }

      .layer-icon {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        border: 1.5px solid var(--figma-soft);
      }

      .layer-icon.frame { border-color: var(--figma-blue); }
      .layer-icon.text { border: 0; position: relative; }
      .layer-icon.text::before { content: "T"; font-weight: 800; color: var(--figma-muted); }
      .layer-icon.group { border-color: var(--figma-purple); }
      .layer-icon.rect { border-radius: 2px; }
      .layer-icon.component { transform: rotate(45deg); border-color: var(--figma-purple); }

<script>
  (() => {
    const isDirectPreview = /\/figma-editor\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("figma-editor-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#figma-editor-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
