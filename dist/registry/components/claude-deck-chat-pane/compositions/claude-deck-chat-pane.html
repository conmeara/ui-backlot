<style>
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 14%, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 30%),
      linear-gradient(142deg, #eee9df 0%, #fbfaf6 58%, #e4ece4 100%);
  }
</style>

<template id="claude-deck-chat-pane-template">
  <div id="claude-deck-chat-pane-surface" data-composition-id="claude-deck-chat-pane-surface" data-width="1180" data-height="900">
    <section class="claude-deck-chat-pane-window" data-primitive="claude-deck-chat-pane" aria-label="Editable Claude deck update pane">
      <header class="deck-chat-topbar" data-primitive="claude-chat-topbar">
        <div class="thread-title">
          <button type="button" aria-label="Toggle sidebar" class="topbar-icon menu-icon"></button>
          <div>
            <strong>Launch deck update</strong>
            <span>Working in Launch Deck</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="model-pill"><span class="model-dot"></span>Claude Sonnet 4.6</button>
          <button type="button" aria-label="Share" class="topbar-icon share-icon"></button>
          <button type="button" aria-label="More" class="topbar-icon more-icon"><span></span></button>
        </div>
      </header>

      <main class="message-field" data-primitive="claude-chat-thread">
        <div class="user-bubbles" data-primitive="claude-user-bubbles">
          <div class="user-bubble">Can you update the opening slide and map the Q2 chart to the new numbers?</div>
          <div class="user-bubble compact">Keep the story tight for a short product launch review.</div>
        </div>

        <article class="assistant-reply" data-primitive="claude-serif-reply">
          <span class="claude-mark reply-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </span>
          <p>Done. The deck is ready for review.</p>
          <p class="secondary">I updated the opening slide, mapped the Q2 chart, and left the speaker notes in place.</p>
        </article>
      </main>

      <footer class="chat-composer" data-primitive="claude-chat-composer">
        <div class="composer-chip-row">
          <span class="context-chip"><span class="folder-mini"></span>Launch Deck</span>
          <span class="context-chip muted">Q2 revenue.csv</span>
          <span class="context-chip muted">slide-notes.md</span>
          <span class="attached-count">3 attached</span>
        </div>
        <div class="composer-placeholder">Reply...</div>
        <div class="composer-controls">
          <button type="button" aria-label="Attach" class="round-control plus-control"></button>
          <button type="button" class="folder-button"><span class="folder-mini"></span>Work in a folder</button>
          <button type="button" class="tool-button">Research</button>
          <span class="composer-spacer"></span>
          <button type="button" aria-label="Dictate" class="round-control mic-control"></button>
          <button type="button" aria-label="Send" class="send-control"></button>
        </div>
      </footer>
    </section>

    <style>
      #claude-deck-chat-pane-surface {
        --paper: #fbfaf6;
        --paper-strong: #fffdf8;
        --line: #e7e0d7;
        --ink: #19140f;
        --muted: #706860;
        --soft: #ede9e2;
        --brand: #cc5f4b;
        --brand-strong: #d96550;
        width: 1180px;
        height: 900px;
        color: var(--ink);
        font-family: Inter, sans-serif;
      }

      #claude-deck-chat-pane-surface * {
        box-sizing: border-box;
      }

      .claude-deck-chat-pane-window {
        position: relative;
        width: 1180px;
        height: 900px;
        overflow: hidden;
        border: 1px solid rgba(66, 50, 38, 0.1);
        border-radius: 24px;
        background:
          radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0) 34%),
          linear-gradient(180deg, var(--paper-strong) 0%, var(--paper) 100%);
        box-shadow:
          0 28px 80px rgba(55, 43, 32, 0.14),
          inset 0 1px rgba(255, 255, 255, 0.78);
      }

      .deck-chat-topbar {
        height: 74px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 34px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.76);
        backdrop-filter: blur(18px);
      }

      .thread-title,
      .topbar-actions,
      .composer-controls,
      .composer-chip-row {
        display: flex;
        align-items: center;
      }

      .thread-title {
        gap: 19px;
      }

      .thread-title strong {
        display: block;
        font-size: 17px;
        line-height: 1.1;
        font-weight: 760;
      }

      .thread-title span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 520;
      }

      .topbar-actions {
        gap: 13px;
      }

      button {
        font: inherit;
      }

      .topbar-icon {
        position: relative;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #645d55;
      }

      .menu-icon::before,
      .menu-icon::after {
        content: "";
        position: absolute;
        left: 8px;
        width: 13px;
        height: 1px;
        background: currentColor;
      }

      .menu-icon::before {
        top: 11px;
      }

      .menu-icon::after {
        top: 18px;
      }

      .share-icon::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 9px;
        width: 10px;
        height: 14px;
        border: 1.6px solid currentColor;
        border-radius: 3px;
      }

      .share-icon::after {
        content: "";
        position: absolute;
        left: 14px;
        top: 5px;
        width: 6px;
        height: 6px;
        border-left: 1.7px solid currentColor;
        border-top: 1.7px solid currentColor;
        transform: rotate(45deg);
      }

      .more-icon span,
      .more-icon::before,
      .more-icon::after {
        content: "";
        position: absolute;
        top: 14px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: currentColor;
      }

      .more-icon::before {
        left: 9px;
      }

      .more-icon span {
        left: 14px;
      }

      .more-icon::after {
        left: 19px;
      }

      .model-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 17px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.6);
        color: #2b231d;
        font-size: 15px;
        font-weight: 560;
      }

      .model-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--brand);
      }

      .message-field {
        position: relative;
        height: 653px;
        padding: 60px 68px 0;
      }

      .user-bubbles {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 14px;
        margin-left: auto;
        max-width: 596px;
      }

      .user-bubble {
        max-width: 588px;
        padding: 18px 22px 19px;
        border-radius: 18px;
        background: var(--soft);
        color: #181410;
        font-size: 25px;
        font-weight: 560;
        line-height: 1.17;
        box-shadow: inset 0 1px rgba(255, 255, 255, 0.55);
      }

      .user-bubble.compact {
        max-width: 486px;
      }

      .assistant-reply {
        position: absolute;
        left: 118px;
        top: 331px;
        width: 810px;
        min-height: 262px;
        padding-left: 84px;
        color: var(--ink);
      }

      .assistant-reply p {
        margin: 0;
        font-family: Georgia, Georgia, serif;
        font-size: 52px;
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .assistant-reply .secondary {
        margin-top: 32px;
        max-width: 700px;
        color: #3d352e;
        font-size: 34px;
        font-weight: 690;
        line-height: 1.22;
      }

      .claude-mark {
        position: absolute;
        left: 0;
        top: 11px;
        width: 64px;
        height: 64px;
      }

      .claude-mark span {
        position: absolute;
        left: 28px;
        top: 0;
        width: 8px;
        height: 64px;
        border-radius: 999px;
        background: var(--brand);
        transform-origin: center;
      }

      .claude-mark span:nth-child(2) { transform: rotate(30deg); }
      .claude-mark span:nth-child(3) { transform: rotate(60deg); }
      .claude-mark span:nth-child(4) { transform: rotate(90deg); }
      .claude-mark span:nth-child(5) { transform: rotate(120deg); }
      .claude-mark span:nth-child(6) { transform: rotate(150deg); }
      .claude-mark span:nth-child(7) { transform: rotate(180deg); }
      .claude-mark span:nth-child(8) { transform: rotate(210deg); }
      .claude-mark span:nth-child(9) { transform: rotate(240deg); }
      .claude-mark span:nth-child(10) { transform: rotate(270deg); }
      .claude-mark span:nth-child(11) { transform: rotate(300deg); }
      .claude-mark span:nth-child(12) { transform: rotate(330deg); }

      .chat-composer {
        position: absolute;
        left: 138px;
        right: 138px;
        bottom: 28px;
        height: 142px;
        padding: 14px 18px 14px;
        border: 1px solid rgba(75, 55, 40, 0.13);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 25px 70px rgba(57, 43, 31, 0.16),
          inset 0 1px rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(18px);
      }

      .composer-chip-row {
        gap: 8px;
      }

      .context-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 26px;
        padding: 0 11px;
        border: 1px solid #ded7cf;
        border-radius: 8px;
        background: #f4f0e9;
        color: #4c443c;
        font-size: 13px;
        font-weight: 680;
      }

      .context-chip.muted {
        font-weight: 610;
      }

      .folder-mini {
        width: 14px;
        height: 11px;
        display: inline-block;
        border-radius: 2px 2px 3px 3px;
        background: #dccfb8;
      }

      .folder-mini::before {
        content: "";
        display: block;
        width: 8px;
        height: 3px;
        margin-top: -3px;
        border-radius: 2px 2px 0 0;
        background: #dccfb8;
      }

      .attached-count {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
        font-weight: 720;
      }

      .composer-placeholder {
        margin-top: 10px;
        color: #71695f;
        font-size: 31px;
        font-weight: 650;
        line-height: 1;
      }

      .composer-controls {
        gap: 9px;
        margin-top: 13px;
      }

      .round-control,
      .send-control {
        position: relative;
        flex: 0 0 auto;
      }

      .round-control {
        width: 37px;
        height: 37px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: #fffdf8;
        color: #6c6259;
      }

      .plus-control::before,
      .plus-control::after {
        content: "";
        position: absolute;
        left: 11px;
        top: 17px;
        width: 15px;
        height: 2px;
        border-radius: 2px;
        background: currentColor;
      }

      .plus-control::after {
        transform: rotate(90deg);
      }

      .folder-button,
      .tool-button {
        min-height: 37px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fbf8f3;
        color: #413a33;
        font-size: 14px;
        font-weight: 620;
      }

      .folder-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #9c4234;
        background: #fff6f2;
      }

      .composer-spacer {
        flex: 1 1 auto;
      }

      .mic-control::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 8px;
        width: 8px;
        height: 15px;
        border: 2px solid currentColor;
        border-top-width: 3px;
        border-radius: 8px;
      }

      .mic-control::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 22px;
        width: 14px;
        height: 7px;
        border-bottom: 2px solid currentColor;
        border-radius: 0 0 12px 12px;
      }

      .send-control {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: 50%;
        background: var(--brand-strong);
        box-shadow: 0 9px 20px rgba(210, 105, 83, 0.25);
      }

      .send-control::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 12px;
        width: 13px;
        height: 13px;
        border-left: 3px solid #fff;
        border-top: 3px solid #fff;
        transform: rotate(45deg);
      }
    </style>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-deck-chat-pane\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-deck-chat-pane-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-deck-chat-pane-surface")) return;
      const fragment = template.content.cloneNode(true);
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
