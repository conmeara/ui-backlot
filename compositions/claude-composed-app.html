<style>
  /* ============================================================
     Canonical Claude desktop shell, composed from the four atoms
     (claude-sidebar / claude-thread-core / claude-composer /
     claude-agent-rail) via runtime/backlot-component-loader.js.

     Visual source of truth: compositions/claude-desktop.html pass-100
     (chat / cowork / code pages). The shell owns the window chrome
     (frame, topbars, chat welcome, code dock) and the column layout;
     the atoms own everything inside their columns and are flattened
     into the frame by the [data-embed="flat"] attribute on each slot.

     Parameters (on #claude-composed-app, all pure CSS):
       data-page="chat" | "cowork" | "code"   (default cowork)
       data-sidebar="on" | "off"              (default on)
       data-rail="on" | "off"                 (default: on for cowork only)
     Direct preview also accepts ?page= / ?sidebar= / ?rail= — see the
     convenience script at the end (capture-time only).

     Cascade note: this style block sits after the mount slots, so it
     comes later in the document than every mounted atom's styles and
     wins equal-specificity ties. Shell overrides that repaint atom
     internals therefore always declare both light and dark values. */
  #claude-composed-app {
    /* Neutral palette override (2026-07-05 fidelity pass): the shared
       foundation tokens (--claude-ink and friends) are warm-brown-grey
       and measurably off the live neutral ramp. Foundation is off-limits
       to edit directly, so the corrected neutrals are re-declared here,
       scoped to this composition only. */
    --claude-ink: #0b0b0b;
    --claude-ink-soft: #373734;
    --claude-text-muted: #52514e;
    --claude-text-faint: #7b7974;
    width: 1440px;
    height: 900px;
    position: relative;
    color: var(--claude-ink);
    font-family: var(--font-claude-ui);
  }

  #claude-composed-app * {
    box-sizing: border-box;
  }

  /* Mirrors the live app's CSS-reset baseline: every element resolves a
     real hairline border-color (not an inherited text currentColor) even
     where border-width is 0, matching the reference's near-universal
     #e0e0df hairline (rgba(11,11,11,0.1) composited on paper). Zero-
     specificity :where() so it never outranks a mounted atom's own
     border-color rules (status dots, etc.) — pure fallback default. */
  :where(#claude-composed-app *) {
    border-color: rgba(11, 11, 11, 0.1);
  }

  #claude-composed-app button {
    font: inherit;
    cursor: default;
  }

  .claude-shell-window {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    border-radius: 16px;
  }

  /* ---- Window frame per page (claude-desktop .page-*) ---- */
  #claude-composed-app[data-page="chat"] .claude-shell-window {
    background: #faf9f5;
    box-shadow:
      0 40px 120px rgba(54, 42, 31, 0.22),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .claude-shell-window {
    background: #fdfbf6;
    box-shadow:
      0 40px 120px rgba(54, 42, 31, 0.2),
      0 0 0 1px rgba(43, 36, 30, 0.08);
  }

  #claude-composed-app[data-page="code"] .claude-shell-window {
    background:
      radial-gradient(120% 90% at 50% 40%, #131315 0%, #0f0f10 55%, #0b0b0c 100%);
    box-shadow:
      0 40px 120px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.04);
  }

  /* ---- Slots ---- */
  .component-slot {
    position: relative;
    min-width: 0;
    overflow: hidden;
    background: transparent;
  }

  .component-slot > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  .sidebar-slot {
    flex: 0 0 auto;
  }

  #claude-composed-app[data-page="chat"] .sidebar-slot { width: 260px; }
  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .sidebar-slot { width: 300px; }
  #claude-composed-app[data-page="code"] .sidebar-slot {
    width: 332px;
    padding: 16px;
  }

  #claude-composed-app[data-sidebar="off"] .sidebar-slot { display: none; }

  /* Sidebar page fallback: keeps the mounted panels in sync with the
     shell's data-page even when the shell is itself mounted by the
     loader (scripts stripped, so the post-mount propagation below
     cannot run). The convenience script also sets data-page on the
     mounted surface so the atom's own selectors agree. */
  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .sidebar-slot .panel-chat,
  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .sidebar-slot .panel-code { display: none; }
  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .sidebar-slot .panel-cowork { display: flex; }
  #claude-composed-app[data-page="code"] .sidebar-slot .panel-chat,
  #claude-composed-app[data-page="code"] .sidebar-slot .panel-cowork { display: none; }
  #claude-composed-app[data-page="code"] .sidebar-slot .panel-code { display: flex; }
  #claude-composed-app[data-page="chat"] .sidebar-slot .panel-cowork,
  #claude-composed-app[data-page="chat"] .sidebar-slot .panel-code { display: none; }
  #claude-composed-app[data-page="chat"] .sidebar-slot .panel-chat { display: flex; }

  /* ---- Main column ---- */
  .shell-main {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  #claude-composed-app[data-page="chat"] .shell-main { background: #faf9f5; }

  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .shell-main {
    background:
      linear-gradient(rgba(223, 219, 209, 0.34) 1px, transparent 1px),
      linear-gradient(90deg, rgba(223, 219, 209, 0.34) 1px, transparent 1px),
      #fffdf7;
    background-size: 58px 58px;
  }

  /* ---- Topbars (claude-desktop .cd-chat-topbar / .cw-topbar) ---- */
  .shell-topbar {
    display: none;
    flex: 0 0 auto;
    align-items: center;
  }

  /* Decoration lives on low-specificity base rules so the dark block can
     override it; the page attribute rules only toggle display. */
  #claude-composed-app .shell-topbar-chat {
    height: 52px;
    gap: 8px;
    padding: 0 20px 0 14px;
    border-bottom: 1px solid rgba(11, 11, 11, 0.1);
  }

  #claude-composed-app .shell-topbar-cowork {
    height: 60px;
    padding: 0 28px;
    border-bottom: 1px solid rgba(11, 11, 11, 0.1);
    background: rgba(255, 253, 247, 0.8);
  }

  #claude-composed-app[data-page="chat"] .shell-topbar-chat { display: flex; }

  #claude-composed-app:not([data-page="chat"]):not([data-page="code"]) .shell-topbar-cowork { display: flex; }

  #claude-composed-app .shell-topbar .backlot-icon,
  #claude-composed-app .shell-hero .backlot-icon,
  #claude-composed-app .shell-code-main .backlot-icon {
    width: 100%;
    height: 100%;
    display: block;
  }

  #claude-composed-app .shell-topbar-icon {
    width: 32px;
    height: 32px;
    padding: 7px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: #898781;
  }

  #claude-composed-app .shell-topbar-spacer { flex: 1; }

  #claude-composed-app .shell-thread-title {
    color: var(--claude-ink-soft);
    font-size: 17px;
    font-weight: 560;
  }

  /* ---- Chat welcome (claude-desktop .cd-welcome) ---- */
  .shell-chat-welcome { display: none; }

  #claude-composed-app[data-page="chat"] .shell-chat-welcome {
    min-height: 0;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 60px 70px;

  /* ============ DARK VARIANT (shell chrome) ============
     Mirrors claude-desktop's dark block for the chrome the shell owns;
     the mounted atoms carry their own .theme-dark blocks, which cascade
     from the same root class. The capture scripts add theme-dark to
     #claude-composed-app (--root-class + --selector), and composed
     workflows may add it on any ancestor, so both forms are covered.
     The code page is dark-native and intentionally has no dark variant. */

  /* Neutral-token re-flip: the light-mode fidelity correction above
     (#claude-composed-app { --claude-ink: ...; --claude-ink-soft: ...; })
     is an ID-specificity rule, so it silently outranks every mounted
     atom's `.theme-dark .foo { color: var(--claude-ink-soft) }` rule
     even when theme-dark is active (ID beats class regardless of
     source order) — washing out assistant text, sidebar, composer, and
     rail copy in dark mode. Restore the foundation's own measured dark
     values here at matching (ID + class) specificity so dark mode gets
     correct contrast again; light mode is untouched. */
  #claude-composed-app.theme-dark,

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  (() => {
    const root = document.getElementById("claude-composed-app");
    const params = new URLSearchParams(window.location.search);

    // Capture-time convenience params (same pattern as the atoms' ?page=).
    const page = params.get("page");
    if (page === "chat" || page === "cowork" || page === "code") {
      root.setAttribute("data-page", page);
    }
    for (const key of ["sidebar", "rail"]) {
      const value = params.get(key);
      if (value === "on" || value === "off") {
        root.setAttribute(`data-${key}`, value);
      }
    }

    // Propagate the shell page into the mounted atoms' own data-page
    // attributes once mounting settles, so the atoms' scoped CSS agrees
    // with the shell CSS fallback. Deterministic for capture:
    // tools/capture-web-ui.mjs waits for __backlotComponentsState to be
    // "ready" (set by the same promise) plus a settle delay.
    const propagatePage = () => {
      const currentPage = root.getAttribute("data-page") || "cowork";
      const sidebar = root.querySelector(".sidebar-slot #claude-sidebar-surface");
      if (sidebar) sidebar.setAttribute("data-page", currentPage);
      const chatComposer = root.querySelector(".composer-slot-chat #claude-composer-surface");
      if (chatComposer) chatComposer.setAttribute("data-page", "chat");
      const coworkComposer = root.querySelector(".composer-slot-cowork #claude-composer-surface");
      if (coworkComposer) coworkComposer.setAttribute("data-page", "cowork");
    };
    if (window.__backlotComponentsReady) {
      window.__backlotComponentsReady.then(propagatePage).catch(() => {});
    } else {
      propagatePage();
    }
  })();

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".claude-shell-window", { opacity: 0, y: 22, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.12);
  tl.from(".sidebar-slot", { opacity: 0, x: -18, duration: 0.36, ease: "sine.out" }, 0.36);
  tl.from(".shell-main", { opacity: 0, y: 14, duration: 0.42, ease: "power2.out" }, 0.5);
  tl.from(".rail-slot", { opacity: 0, x: 16, duration: 0.36, ease: "sine.out" }, 0.66);
  window.__timelines["claude-composed-app"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    // Fully settled entrance state (all tweens complete by ~1.02s).
    tl.seek(1.45).pause();
  }
</script>
