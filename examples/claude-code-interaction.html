<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Claude Code — Interaction Demo</title>
  </head>
  <body>
    <div id="claude-code-interaction" data-composition-id="claude-code-interaction" data-width="1280" data-height="800" data-start="0" data-duration="10">
      <section class="cc-stage" data-primitive="claude-code-interaction" aria-label="Claude Code CLI typing a command and streaming a reply">
        <div class="cc-window">
          <div
            class="component-frame cc-frame"
            data-primitive="claude-code-terminal-window"
            data-backlot-mount-src="../compositions/claude-code-terminal-session.html"
            data-backlot-mount-selector="#claude-code-terminal-session-surface"
          ></div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#0a0c10; }
      #claude-code-interaction { width:1280px; height:800px; overflow:hidden; font-family:"SF Mono",ui-monospace,Menlo,monospace; color:#d6dbe2; }
      #claude-code-interaction * { box-sizing:border-box; }
      .cc-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#14181f,#0c0f14); display:grid; place-items:center; }

      /* claude-code-terminal-session mounts at its native 1372x1038 and is
         scaled down to fit the stage; the outer box supplies the window
         radius/shadow (the inner mounted window's own shadow would be
         clipped by the frame's overflow:hidden, since the frame crops
         exactly to the window box) — same double-wrapper idiom as
         browser-interaction / mac-multi-app-demo's app windows. */
      .cc-window { position:relative; width:940px; height:711px; border-radius:12px; overflow:hidden; box-shadow:0 34px 90px rgba(0,0,0,0.5); background:#1c1e23; }
      .component-frame { position:absolute; inset:0; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; transform:scale(0.68513); }

      .demo-cursor { position:absolute; left:640px; top:560px; z-index:90; width:26px; height:26px; background:url("../assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(217,119,87,0.7); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../runtime/backlot-component-loader.js"></script>
    <script src="../runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const DURATION = 10;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".cc-stage");

      // Registered synchronously with a full-duration hold (the mount below
      // is async; the renderer must never probe a zero-duration composition).
      tl.to(stage, { opacity: 1, duration: DURATION }, 0);
      // Plain gsap.set (not tl.set at position 0) for the click-ring's rest
      // pose — see browser-interaction for why this avoids a t=0 ambiguity.
      gsap.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 });

      window.__backlotComponentsReady.then(() => {
        const mount = stage.querySelector(".cc-frame");
        const win = mount && mount.querySelector("#claude-code-terminal-session-surface");
        if (!win) return;

        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets (all inside the real terminal-session chrome) ----
        const inputRow = win.querySelector('[data-role="cc-input-row"]');
        const typedEl = win.querySelector('[data-role="cc-typed"]');
        const cursorEl = win.querySelector('[data-role="cc-cursor"]');
        const workingEl = win.querySelector('[data-role="cc-working"]');
        const liveTurn = win.querySelector('[data-role="live-turn"]');
        const liveUser = win.querySelector('[data-role="live-user"]');
        const liveUserText = win.querySelector('[data-role="live-user-text"]');
        const toolRows = Array.from(win.querySelectorAll('[data-role="live-tools"] .tool-row'));
        const liveReply = win.querySelector('[data-role="live-reply"]');
        const liveReplyText = win.querySelector('[data-role="live-reply-text"]');
        const liveTiming = win.querySelector('[data-role="live-timing"]');
        if (!inputRow || !typedEl || !cursorEl || !liveTurn || !liveUserText || !liveReplyText) return;

        // The command typed is the very command the mounted turn already
        // shows (baked into the composition's own scripted session) — no
        // invented copy, same idiom as browser-interaction's URLTXT read.
        const CMD = liveUserText.textContent.trim();
        const REPLY = liveReplyText.textContent.trim();

        // The mounted composition bakes a static "Worked for 8s" into the
        // turn-footer timing line, which doesn't match the elapsed spinner
        // this demo actually plays (submit ~3.4s, done ~8.5s — a ~5s working
        // phase). Correct the copy once at setup, before any seek, so the
        // frozen completion value agrees with the counter the viewer just
        // watched tick up.
        if (liveTiming) {
          const timingTextNode = Array.from(liveTiming.childNodes).find(
            (n) => n.nodeType === Node.TEXT_NODE && n.textContent.trim()
          );
          if (timingTextNode) timingTextNode.textContent = timingTextNode.textContent.replace(/\d+/, "5");
        }

        // ---- Rest-frame pins (t=0): idle footer prompt, no live turn yet.
        // gsap.set (not tl.set at 0) — see house convention above. ----
        gsap.set(liveTurn, { display: "none" });
        gsap.set([liveUser, ...toolRows, liveReply, liveTiming], { autoAlpha: 0 });
        gsap.set(workingEl, { opacity: 0 });

        // Typing target starts EMPTY; per-char spans flip display so the
        // real terminal cursor (a flex sibling right after the typed text)
        // rides the leading edge as the width grows — no absolute-position
        // caret tracking needed, unlike a caret nested inside static-width
        // text.
        const typedChars = [];
        for (const ch of CMD) {
          const s = document.createElement("span");
          s.className = "bl-char";
          if (ch === " ") s.style.whiteSpace = "pre";
          s.textContent = ch;
          typedEl.appendChild(s);
          typedChars.push(s);
        }
        gsap.set(typedChars, { display: "none" });

        // 1) Click the input row, type the command.
        const CLICK_AT = 0.6;
        const TYPE_AT = 1.0;
        const CPS = 22;
        ix.click(inputRow, { at: CLICK_AT, moveDur: 0.6 });
        for (let i = 0; i < typedChars.length; i++) {
          tl.set(typedChars[i], { display: "inline" }, TYPE_AT + i / CPS);
        }
        const cmdEndAt = TYPE_AT + CMD.length / CPS;

        // 2) Submit: the typed line clears (sent), the terminal cursor goes
        // quiet, and the same command reappears as the transcript's next
        // turn — echoing exactly what was typed, in place.
        const submitAt = cmdEndAt + 0.45;
        tl.to([typedEl, cursorEl], { opacity: 0, duration: 0.12 }, submitAt);
        tl.set(typedEl, { textContent: "" }, submitAt + 0.12);
        tl.set(liveTurn, { display: "block" }, submitAt + 0.05);
        tl.to(liveUser, { autoAlpha: 1, duration: 0.14 }, submitAt + 0.1);
        // working-status is display:none at rest (see composition CSS) so
        // the standalone capture stays untouched — flip it to block before
        // fading it in, and back to none once its fade-out finishes so it
        // stops contributing footer height.
        tl.set(workingEl, { display: "block" }, submitAt);
        ix.show(workingEl, { at: submitAt, dur: 0.2 });

        // 3) Tool calls snap in one by one — label then its result ~0.35s
        // later, staggered ~0.4s tool-to-tool, reading as the agent
        // invoking / running / getting a result back, not typing.
        const toolsStart = submitAt + 0.5;
        const toolOffsets = [0, 0.35, 0.4, 0.75, 0.8, 1.15];
        toolRows.forEach((row, i) => {
          tl.to(row, { autoAlpha: 1, duration: 0.16 }, toolsStart + (toolOffsets[i] || i * 0.4));
        });

        // 4) The reply streams in like AI output once the last tool result
        // is back — the bullet line reveals a beat before the text streams.
        const summaryAt = toolsStart + 1.15 + 0.3;
        tl.to(liveReply, { autoAlpha: 1, duration: 0.1 }, summaryAt - 0.1);
        ix.stream(liveReplyText, REPLY, { at: summaryAt, cps: 45 });

        // 5) Done: working indicator clears, the turn's timing line lands,
        // and the terminal cursor returns — a fresh idle prompt, awaiting
        // the next command, like a real CLI session.
        const doneAt = summaryAt + REPLY.length / 45 + 0.3;
        ix.hide(workingEl, { at: doneAt - 0.15, dur: 0.15 });
        tl.set(workingEl, { display: "none" }, doneAt);
        tl.to(liveTiming, { autoAlpha: 1, duration: 0.14 }, doneAt);
        tl.to(cursorEl, { opacity: 1, duration: 0.2 }, doneAt + 0.25);

        // 3b) The working indicator is on screen the whole time the tools
        // run and the reply streams (submitAt through doneAt) — the real
        // CLI never lets it sit static: the ✻ glyph cycles every ~120ms and
        // the label ticks an elapsed-seconds counter the whole time.
        const glyph = workingEl.querySelector(".glyph");
        const label = win.querySelector('[data-role="cc-working-label"]');
        const SPIN = ["✻", "✽", "✻", "✢", "·", "✢"];
        let spinFrame = 0;
        for (let t = submitAt; t < doneAt; t += 0.12) {
          tl.set(glyph, { textContent: SPIN[spinFrame++ % SPIN.length] }, t);
        }
        for (let s = 0; submitAt + s < doneAt; s++) {
          tl.set(label, { textContent: `Working… (${s}s · esc to interrupt)` }, submitAt + s);
        }
      }).catch(() => {});

      window.__timelines["claude-code-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(9.8).pause();
        window.__backlotComponentsReady.then(() => { tl.seek(0).seek(9.8).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
