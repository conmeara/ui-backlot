<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Backlot Quickstart Demo</title>
  </head>
  <body>
    <div id="quickstart-demo" data-composition-id="quickstart-demo" data-width="1920" data-height="1080" data-start="0" data-duration="14">
      <section class="quickstart-stage" data-primitive="quickstart-demo" aria-label="Claude and browser demo assembled from UI Backlot components">
        <div class="desktop-field" aria-hidden="true"></div>

        <div
          class="component-frame menu-bar-component"
          data-primitive="mac-menu-bar"
          data-backlot-mount-src="compositions/mac-menu-bar.html"
          data-backlot-mount-selector="#mac-menu-bar-surface"
        ></div>

        <div
          class="component-frame browser-component"
          data-primitive="browser-app-window"
          data-backlot-mount-src="compositions/browser-app.html"
          data-backlot-mount-selector="#browser-app-surface"
        ></div>

        <div
          class="component-frame claude-component"
          data-primitive="claude-chat-pane"
          data-backlot-mount-src="compositions/claude-chat-pane.html"
          data-backlot-mount-selector="#claude-chat-pane-surface"
        ></div>

        <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #f7f5ef;
      }

      #quickstart-demo {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        color: #16120f;
        font-family: Inter, sans-serif;
      }

      #quickstart-demo * {
        box-sizing: border-box;
      }

      .quickstart-stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 13%, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 24%),
          radial-gradient(circle at 82% 20%, rgba(198, 91, 71, 0.14), rgba(198, 91, 71, 0) 28%),
          radial-gradient(circle at 78% 84%, rgba(189, 212, 199, 0.58), rgba(189, 212, 199, 0) 32%),
          linear-gradient(145deg, #f2eee7 0%, #fffdf8 52%, #dfe9e2 100%);
      }

      .desktop-field {
        position: absolute;
        inset: 30px 0 0;
        opacity: 0.34;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.24) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
        background-size: 96px 96px;
        mask-image: linear-gradient(to bottom, transparent 0%, #000 17%, #000 80%, transparent 100%);
      }

      .component-frame {
        position: absolute;
        overflow: hidden;
      }

      .component-frame > [data-backlot-mounted-component] {
        position: absolute;
        left: 0;
        top: 0;
        display: block;
        pointer-events: none;
        transform-origin: top left;
      }

      .menu-bar-component {
        left: 0;
        top: 0;
        z-index: 40;
        width: 100%;
        height: 30px;
      }

      .browser-component {
        left: 598px;
        top: 150px;
        z-index: 5;
        width: 1164px;
        height: 664px;
        border-radius: 26px;
        box-shadow: 0 36px 118px rgba(47, 39, 31, 0.15);
      }

      .browser-component > [data-backlot-mounted-component] {
        left: -350px;
        transform: scale(0.77);
      }

      .claude-component {
        left: 126px;
        top: 118px;
        z-index: 14;
        width: 900px;
        height: 684px;
        border-radius: 26px;
        box-shadow: 0 46px 126px rgba(52, 39, 29, 0.24);
      }

      .claude-component > [data-backlot-mounted-component] {
        transform: scale(0.762);
      }

      .workflow-cursor {
        position: absolute;
        left: 1210px;
        top: 446px;
        z-index: 28;
        width: 34px;
        height: 34px;
        background: #111;
        mask: url("assets/cursors/normal-select.svg") center / contain no-repeat;
        filter: drop-shadow(0 6px 6px rgba(0, 0, 0, 0.18));
      }

      .click-ring {
        position: absolute;
        left: 1199px;
        top: 435px;
        z-index: 27;
        width: 54px;
        height: 54px;
        border: 2px solid rgba(207, 96, 74, 0.56);
        border-radius: 50%;
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="runtime/backlot-component-loader.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });

      tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.12);
      tl.from(".browser-component", { opacity: 0, x: 38, y: 18, filter: "blur(8px)", duration: 0.66, ease: "power3.out" }, 0.24);
      tl.from(".claude-component", { opacity: 0, x: -32, y: 22, filter: "blur(8px)", duration: 0.7, ease: "power3.out" }, 0.56);
      tl.from(".workflow-cursor", { opacity: 0, x: -42, y: 28, duration: 0.38, ease: "sine.out" }, 1.18);
      tl.to(".workflow-cursor", { x: 92, y: 118, duration: 0.82, ease: "power2.inOut" }, 2.0);
      tl.to(".click-ring", { opacity: 1, scale: 1.08, duration: 0.18, ease: "sine.out" }, 2.76);
      tl.to(".click-ring", { opacity: 0, scale: 1.44, duration: 0.38, ease: "sine.out" }, 2.94);
      tl.to(".claude-component", { y: -8, duration: 2.1, ease: "sine.inOut" }, 4.2);
      tl.to(".browser-component", { y: -5, duration: 2.1, ease: "sine.inOut" }, 4.34);
      tl.to(".workflow-cursor", { x: -164, y: 6, duration: 1.2, ease: "power2.inOut" }, 7.3);
      tl.to(".claude-component", { y: 0, duration: 2.4, ease: "sine.inOut" }, 9.2);
      tl.to(".browser-component", { y: 0, duration: 2.4, ease: "sine.inOut" }, 9.32);

      window.__timelines["quickstart-demo"] = tl;

      const captureMode = new URLSearchParams(window.location.search).get("capture");
      if (captureMode === "hero") {
        tl.seek(1.65).pause();
      }
    </script>
  </body>
</html>
