<script>
  (() => {
    const isDirectPreview = /\/figma-onboarding-editor\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("figma-onboarding-editor-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#figma-onboarding-editor-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      window.__timelines = window.__timelines || {};
      window.__timelines["figma-onboarding-editor-surface"] = null;
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
