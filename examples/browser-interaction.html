<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Browser — Interaction Demo</title>
  </head>
  <body>
    <div id="browser-interaction" data-composition-id="browser-interaction" data-width="1280" data-height="800" data-start="0" data-duration="5.4">
      <section class="br-stage" data-primitive="browser-interaction" aria-label="Browser typing a URL and loading a page">
        <div class="br-app-window">
          <div
            class="component-frame br-frame"
            data-primitive="browser-app-window"
            data-backlot-mount-src="../compositions/browser-app.html"
            data-backlot-mount-selector="#browser-app-surface"
          ></div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#c9ccd1; }
      #browser-interaction { width:1280px; height:800px; overflow:hidden; font-family:-apple-system,"SF Pro Text",Inter,sans-serif; color:#16120f; }
      #browser-interaction * { box-sizing:border-box; }
      .br-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#eceef1,#dfe2e7); display:grid; place-items:center; }

      /* browser-app is mounted at its native 1516x864 and scaled down to fit
         the stage; the outer box supplies the window radius/shadow (the
         inner mounted window's own shadow would be clipped by the frame's
         overflow:hidden, since the frame crops exactly to the window box —
         same double-wrapper idiom as mac-multi-app-demo's app windows). */
      .br-app-window { position:relative; width:1107px; height:631px; border-radius:14px; overflow:hidden; box-shadow:0 34px 90px rgba(28,30,38,0.24); background:#fff; }
      .component-frame { position:absolute; inset:0; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; transform:scale(0.73); }

      .demo-cursor { position:absolute; left:640px; top:600px; z-index:90; width:26px; height:26px; background:url("../assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(26,115,232,0.75); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../runtime/backlot-component-loader.js"></script>
    <script src="../runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const DURATION = 5.4;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".br-stage");

      // Registered synchronously with a full-duration hold (the mount below
      // is async; the renderer must never probe a zero-duration composition).
      tl.to(stage, { opacity: 1, duration: DURATION }, 0);
      // Plain gsap.set (not tl.set at position 0) — a zero-duration timeline
      // tween sitting exactly at the timeline start is ambiguous about
      // whether it has "started" when the playhead sits exactly at 0, so it
      // can fail to render on that exact frame. Setting the rest state
      // directly on the DOM before any seek avoids that edge case.
      gsap.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 });

      window.__backlotComponentsReady.then(() => {
        const mount = stage.querySelector(".br-frame");
        const win = mount && mount.querySelector("#browser-app-surface");
        if (!win) return;

        // browser-app's own hero-capture decorations (a static cursor glyph
        // and an "edit badge" pill) aren't part of this demo's story — this
        // demo drives its own cursor/click-ring and never selects a grid row.
        const staticCursor = win.querySelector(":scope > .cursor");
        const editBadge = win.querySelector(":scope > .edit-badge");
        if (staticCursor) staticCursor.style.display = "none";
        if (editBadge) editBadge.style.display = "none";

        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets (all inside the real browser-app chrome) ----
        const urlBar = win.querySelector(".url-bar");
        const urlText = win.querySelector(".url-text");
        const lockUse = win.querySelector(".lock use");
        const suggest = win.querySelector('[data-role="suggest"]');
        const suggestText = win.querySelector('[data-role="suggest-text"]');
        const loadBar = win.querySelector('[data-role="loadbar"]');
        const appShell = win.querySelector(".app-shell");
        const reloadUse = win.querySelector(".nav-button.reload use");
        const activeTab = win.querySelector(".tab.active");
        const tabTitle = activeTab && activeTab.querySelector(".tab-title");
        const tabFaviconSvg = activeTab && activeTab.querySelector(".tab-favicon");
        const tabFaviconUse = tabFaviconSvg && tabFaviconSvg.querySelector("use");
        if (!urlBar || !urlText || !loadBar || !appShell || !activeTab) return;

        // The URL typed is the very address already baked into browser-app's
        // omnibox/tab — typing it "loads" the same Content-production page
        // the surface already ships, so no invented destination content is
        // needed.
        const URLTXT = urlText.textContent.trim();
        const finalTabTitle = tabTitle ? tabTitle.textContent : "";

        // ---- Rest-frame pins (t=0): a fresh, not-yet-navigated tab. ----
        gsap.set(appShell, { opacity: 0 });
        gsap.set(urlText, { textContent: "" });
        if (tabTitle) gsap.set(tabTitle, { textContent: "New Tab" });
        if (tabFaviconUse) gsap.set(tabFaviconUse, { opacity: 0 });

        // 1) Click the omnibox, type the URL.
        const TYPE_AT = 1.0;
        const TYPE_CPS = 20;
        ix.click(urlBar, { at: 0.7, moveDur: 0.5 });
        tl.to(urlBar, { borderColor: "#1a73e8", backgroundColor: "#ffffff", boxShadow: "0 1px 6px rgba(26,115,232,0.28)", duration: 0.15 }, TYPE_AT - 0.15);
        // The cursor stays exactly where it clicked (on the omnibox) for the
        // entire type+commit — a real hand-typed entry never chases the
        // mouse to a nearby control mid-keystroke.
        ix.type(urlText, URLTXT, { at: TYPE_AT, cps: TYPE_CPS });

        // Autocomplete suggestion panel: fades in with focus, echoes the
        // typed value as it's revealed, and hides again once load starts.
        const typeDur = URLTXT.length / TYPE_CPS;
        if (suggest && suggestText) {
          ix.show(suggest, { at: TYPE_AT - 0.1, dur: 0.12, from: { opacity: 0 } });
          tl.set(suggestText, { textContent: URLTXT.slice(0, 10) }, TYPE_AT + 0.05 * typeDur);
          tl.set(suggestText, { textContent: URLTXT.slice(0, 24) }, TYPE_AT + 0.2 * typeDur);
          tl.set(suggestText, { textContent: URLTXT }, TYPE_AT + 0.45 * typeDur);
        }

        // 2) "Enter" — loading bar sweeps, the page fades in.
        const enterAt = TYPE_AT + typeDur + 0.35;
        if (suggest) ix.hide(suggest, { at: enterAt, dur: 0.1 });
        tl.to(urlBar, { borderColor: "transparent", backgroundColor: "#eef2f9", boxShadow: "none", duration: 0.2 }, enterAt);
        tl.fromTo(loadBar, { scaleX: 0 }, { scaleX: 0.7, duration: 0.5, ease: "power1.out" }, enterAt);
        tl.to(loadBar, { scaleX: 1, duration: 0.35, ease: "power1.in" }, enterAt + 0.5);
        tl.to(loadBar, { opacity: 0, duration: 0.2 }, enterAt + 0.85);
        ix.show(appShell, { at: enterAt + 0.9, dur: 0.25, from: { opacity: 0 } });
        // Cursor stays parked at the omnibox through the entire load — no
        // unmotivated drift to the tab strip while the page loads.

        // Reload glyph flips to a stop icon for the full load, matching
        // desktop Chrome's most reliable "page is loading" affordance.
        if (reloadUse) {
          tl.set(reloadUse, { attr: { href: "#lucide-tab-close" } }, enterAt);
          tl.set(reloadUse, { attr: { href: "#lucide-reload" } }, enterAt + 0.9);
        }

        // Tab favicon becomes a spinning throbber for the load, then
        // resolves back to the doc icon. Finite (non-repeating) rotation
        // tween so the timeline duration stays bounded/seek-safe, landing on
        // an exact multiple of 360deg so the reset below is clean.
        if (tabFaviconSvg && tabFaviconUse) {
          tl.set(tabFaviconSvg, { background: "none", border: "2px solid rgba(95,99,104,0.35)", borderTopColor: "#1a73e8", borderRadius: "50%", rotation: 0 }, enterAt);
          tl.to(tabFaviconSvg, { rotation: 720, duration: 0.88, ease: "none" }, enterAt);
          tl.set(tabFaviconSvg, { border: "none", rotation: 0 }, enterAt + 0.9);
          tl.set(tabFaviconUse, { opacity: 1 }, enterAt + 0.9);
        }
        // Tab title resolves to the loaded page's identity.
        if (tabTitle) tl.set(tabTitle, { textContent: finalTabTitle }, enterAt + 0.9);
        // Lock replaces the info glyph once the secure page has loaded.
        if (lockUse) tl.set(lockUse, { attr: { href: "#lucide-shield" } }, enterAt + 0.9);
      }).catch(() => {});

      window.__timelines["browser-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(5.2).pause();
        window.__backlotComponentsReady.then(() => { tl.seek(0).seek(5.2).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
