    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".thread-core-panel", { opacity: 0, y: 18, filter: "blur(5px)", duration: 0.52, ease: "power3.out" }, 0.12);
      tl.from(".thread-topbar", { opacity: 0, y: -8, duration: 0.3, ease: "sine.out" }, 0.25);
      tl.from(".message-row.user", { opacity: 0, y: 12, duration: 0.32, ease: "sine.out" }, 0.38);
      tl.from(".thread-context-strip .context-pill", { opacity: 0, y: 8, stagger: 0.04, duration: 0.24, ease: "sine.out" }, 0.54);
      tl.from(".message-row.assistant", { opacity: 0, y: 16, duration: 0.42, ease: "power2.out" }, 0.74);
      tl.from(".assistant-line", { clipPath: "inset(0 100% 0 0)", duration: 1.35, ease: "none" }, 1.06);
      tl.from(".thinking-card", { opacity: 0, y: 10, duration: 0.32, ease: "power2.out" }, 2.32);
      tl.from(".tool-card", { opacity: 0, y: 10, duration: 0.34, ease: "power2.out" }, 2.7);
      tl.from(".command-card", { opacity: 0, y: 9, duration: 0.3, ease: "sine.out" }, 3.02);
      tl.from(".message-actions .mini-action", { opacity: 0, y: 5, stagger: 0.04, duration: 0.2, ease: "sine.out" }, 3.2);
      tl.to(".tool-row.active .tool-dot", { rotation: 360, duration: 0.75, repeat: 4, ease: "none" }, 3.08);
      window.__timelines["claude-thread-core-surface"] = tl;
    </script>

<script>
  (() => {
    const isDirectPreview = /\/claude-thread-core\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-thread-core-template");
      if (!template || document.querySelector("#claude-thread-core-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
