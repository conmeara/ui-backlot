    <style>

      #finder-window-surface * {

      .finder-window {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".finder-window", { opacity: 0, y: 16, filter: "blur(5px)", duration: 0.42, ease: "power3.out" }, 0.1);
      tl.from(".finder-sidebar", { opacity: 0, x: -10, duration: 0.28, ease: "sine.out" }, 0.24);
      tl.from(".finder-toolbar", { opacity: 0, y: -8, duration: 0.28, ease: "sine.out" }, 0.28);
      tl.from(".finder-column:nth-child(1) .file-row", { opacity: 0, x: -8, duration: 0.22, stagger: 0.018, ease: "sine.out" }, 0.42);
      tl.from(".finder-column:nth-child(2) .file-row", { opacity: 0, x: -8, duration: 0.24, ease: "sine.out" }, 0.78);
      tl.from(".finder-column:nth-child(3) .file-row", { opacity: 0, x: -8, duration: 0.24, stagger: 0.035, ease: "sine.out" }, 0.94);
      tl.to(".finder-column:nth-child(2) .file-row.selected", { backgroundColor: "#cfcfcf", duration: 0.18, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.22);
      window.__timelines["finder-window-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/finder-window\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("finder-window-template");
    const mount = () => {
      if (!template || document.querySelector("#finder-window-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
