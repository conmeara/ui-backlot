<style>
      @import url("styles/backlot-foundation.css");
  html,
  body {
    width: max-content;
    min-width: 100%;
    min-height: 100%;
    margin: 0;
    padding: 0;
    background: #1c1e23;
  }
</style>

<template id="claude-code-terminal-session-surface-template">
  <div id="claude-code-terminal-session-surface" data-composition-id="claude-code-terminal-session-surface" data-width="1372" data-height="1038">
    <section class="claude-code-terminal-session-window" data-primitive="claude-code-terminal-session-window" aria-label="Editable Claude Code terminal session surface">
      <header class="terminal-titlebar" data-primitive="mac-window-titlebar">
        <div class="traffic" aria-hidden="true">
          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>
        </div>
        <div class="terminal-title">
          <img class="cc-folder-icon" src="assets/app-icons/folder-home.png" alt="" aria-hidden="true" />
          <span>✳ Claude Code</span>
        </div>
      </header>

      <main class="terminal-paper" data-primitive="claude-code-terminal-paper">
        <section class="shell-preamble" data-primitive="claude-code-shell-preamble">
          <p data-copy="shell-prompt">demo@Demo-MacBook-Pro ~ % claude</p>
        </section>

        <div class="beat-gap" aria-hidden="true"></div>

        <section class="terminal-identity" data-primitive="claude-code-session-identity">
          <div class="pixel-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
          <div>
            <p class="identity-line" data-copy="cc-version"><strong>Claude Code</strong> <span>v2.1.215</span></p>
            <p class="identity-line dim" data-copy="cc-model">Sonnet 4.6 with high effort · Claude Max</p>
            <p class="identity-line dim" data-copy="cc-cwd">/Users/demo/Projects/launch-deck</p>
          </div>
        </section>

        <div class="beat-gap" aria-hidden="true"></div>

        <p class="mcp-warning" data-copy="mcp-warning"><span class="warn-glyph">⚠</span> 3 MCP servers need authentication <span class="dim">· run /mcp</span></p>

        <div class="beat-gap" aria-hidden="true"></div>

        <section class="promo-block" data-primitive="claude-code-promo">
          <p class="promo-title" data-copy="promo-title">Sonnet 4.6 is now the default for Claude Max</p>
          <p class="promo-body" data-copy="promo-body">You can use up to 50% of your weekly usage limit on Sonnet 4.6. Run <a href="#">/model</a> and select Sonnet 4.6 to use it. Learn more:</p>
          <p class="promo-link" data-copy="promo-link"><a href="#">https://support.claude.com/en/articles/15424964-claude-sonnet-4-6-promotional-access</a></p>
          <p class="promo-more dim" data-copy="promo-more">+1 more · /status</p>
        </section>

        <div class="beat-gap" aria-hidden="true"></div>

        <section class="terminal-transcript" data-primitive="claude-code-transcript">
          <div class="turn-user"><span class="glyph">❯</span><span data-copy="turn-1-user">hi</span></div>

          <div class="beat-gap" aria-hidden="true"></div>

          <p class="turn-reply"><span class="glyph">●</span><span data-copy="turn-1-reply">Hey! What can I help you with today?</span></p>
          <p class="turn-timing dim" data-copy="turn-1-timing"><span class="glyph">✻</span> Churned for 1s</p>

          <div class="beat-gap" aria-hidden="true"></div>

          <div class="turn-user"><span class="glyph">❯</span><span data-copy="turn-2-user">outline the launch deck plan</span></div>

          <div class="beat-gap" aria-hidden="true"></div>

          <p class="turn-reply"><span class="glyph">●</span><span data-copy="turn-2-reply">On it — I'll draft the outline, then wire the slide components before touching copy.</span></p>
          <p class="turn-timing dim" data-copy="turn-2-timing"><span class="glyph">✻</span> Worked for 3s</p>
        </section>

        <footer class="terminal-input" data-primitive="claude-code-terminal-input">
          <div class="input-row"><span class="glyph">❯</span><span class="terminal-cursor" aria-hidden="true"></span></div>
          <div class="status-row">
            <p class="status-line" data-copy="context-pct">
              <span>(3.7%)</span>
              <span class="status-right dim"><span class="glyph">●</span> high · /effort</span>
            </p>
            <p class="dim" data-copy="mode-line"><span class="glyph">⏸</span> manual mode on · <span class="glyph">←</span> for agents</p>
          </div>
        </footer>
      </main>
    </section>

    <style>
      /* "sfmono-regular" and "ui-monospace" are OS-bundled system fonts with
         no downloadable file — src: local(...) satisfies the renderer's
         font_family_without_font_face check without needing a .woff2.
         "SF Mono" itself is already auto-resolved to a bundled render-time
         substitute (see system_font_will_alias), so it needs no @font-face. */
      @font-face {
        font-family: "SFMono-Regular";
        src: local("SFMono-Regular");
      }
      @font-face {
        font-family: "ui-monospace";
        src: local("SF Mono");
      }

      #claude-code-terminal-session-surface {
        --term-bg: #292c33;
        --term-ink: #ffffff;
        --term-dim: #999999;
        --term-accent: #ca7c5e;
        --term-warn: #f5c344;
        --term-link: #83a5d6;
        --term-bar: #373737;
        --term-hairline: #888888;
        width: 1372px;
        height: 1038px;
        overflow: visible;
        color: var(--term-ink);
        font-family: "SF Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
      }

      #claude-code-terminal-session-surface * {
        box-sizing: border-box;
      }

      .claude-code-terminal-session-window {
        width: 1372px;
        height: 1038px;
        overflow: hidden;
        border-radius: 12px;
        background: var(--term-bg);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.45);
      }

      /* Measured 2026-07-20 (cli-terminal-startup-dark, full-width titlebar
         crop): the title sits LEFT-aligned right after the traffic lights,
         not centered in the window — this differs from stock macOS Terminal
         chrome, so match the reference rather than the OS default. */
      .terminal-titlebar {
        height: 40px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 18px;
        background: var(--term-bg);
      }

      .traffic {
        display: flex;
        gap: 8px;
      }

      .traffic span {
        width: 12px;
        height: 12px;
        display: block;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.2);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #febc2e; }
      .traffic .green { background: #28c840; }

      .terminal-title {
        display: flex;
        align-items: center;
        gap: 6px;
        /* Measured 2026-07-20 Mac reference (cli-terminal-startup-dark):
           the focused titlebar label renders as a dimmed rgb(165,168,175),
           not pure white — macOS titlebar text sits well below the near-
           white body text (confirmed against the same capture's bold
           "Claude Code v2.1.215" body line, which IS 255/255/255). */
        color: #a5a8af;
        font-size: 13px;
        font-weight: 700;
        font-family: -apple-system, "SF Pro Text", var(--font-sans, sans-serif);
      }

      .cc-folder-icon {
        width: 14px;
        height: auto;
        display: block;
        flex: 0 0 auto;
      }

      .terminal-paper {
        height: calc(100% - 40px);
        padding: 14px 28px 18px;
        overflow: hidden;
        font-size: 13px;
        line-height: 17px;
      }

      .terminal-paper p {
        margin: 0;
      }

      .beat-gap {
        height: 17px;
      }

      .shell-preamble p {
        color: var(--term-dim);
      }

      .shell-preamble p:last-child {
        color: var(--term-ink);
      }

      .terminal-identity {
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 10px;
        align-items: start;
      }

      /* Re-derived 2026-07-20 by sampling the mascot mark pixel-for-pixel out
         of reference/claude/2026-07-20/cli-terminal-startup-dark/screenshot.png
         (bbox ~124,250 to 251,330 @2x, an 8-column x 5-row pixel grid). The
         previous 6x5 layout put the ear/flange row FIRST (reading as an
         antenna), but the reference's flange is the full-width MIDDLE row,
         with an inset head on top and an inset body below it — fixed here. */
      .pixel-mark {
        width: 24px;
        height: 15px;
        margin-top: 1px;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }

      .pixel-mark span {
        background: var(--term-accent);
        opacity: 0;
      }

      /* Eye notches read as solid black in the reference (sampled rgb(0,0,0)
         from cli-terminal-startup-dark), not the terminal's dark-navy
         background (#292c33) that would otherwise show through the
         transparent gap — give them their own opaque fill. */
      .pixel-mark span:nth-child(11),
      .pixel-mark span:nth-child(14) {
        background: #000000;
        opacity: 1;
      }

      /* row0: head top, inset (cols 1-6 of 8) */
      .pixel-mark span:nth-child(2),
      .pixel-mark span:nth-child(3),
      .pixel-mark span:nth-child(4),
      .pixel-mark span:nth-child(5),
      .pixel-mark span:nth-child(6),
      .pixel-mark span:nth-child(7),
      /* row1: eyes, inset (cols 1,3,4,6 filled; eyes at 2,5; 0,7 empty) */
      .pixel-mark span:nth-child(10),
      .pixel-mark span:nth-child(12),
      .pixel-mark span:nth-child(13),
      .pixel-mark span:nth-child(15),
      /* row2: ear/flange, FULL width (all 8 cols) */
      .pixel-mark span:nth-child(17),
      .pixel-mark span:nth-child(18),
      .pixel-mark span:nth-child(19),
      .pixel-mark span:nth-child(20),
      .pixel-mark span:nth-child(21),
      .pixel-mark span:nth-child(22),
      .pixel-mark span:nth-child(23),
      .pixel-mark span:nth-child(24),
      /* row3: body, inset (cols 1-6 of 8) */
      .pixel-mark span:nth-child(26),
      .pixel-mark span:nth-child(27),
      .pixel-mark span:nth-child(28),
      .pixel-mark span:nth-child(29),
      .pixel-mark span:nth-child(30),
      .pixel-mark span:nth-child(31),
      /* row4: four legs, two inset pairs with a center gap */
      .pixel-mark span:nth-child(34),
      .pixel-mark span:nth-child(35),
      .pixel-mark span:nth-child(38),
      .pixel-mark span:nth-child(39) {
        opacity: 1;
      }

      .identity-line {
        color: var(--term-ink);
      }

      .identity-line strong {
        font-weight: 700;
      }

      .identity-line span {
        color: var(--term-dim);
      }

      .identity-line.dim {
        color: var(--term-dim);
      }

      .mcp-warning {
        color: var(--term-warn);
      }

      .mcp-warning .warn-glyph {
        margin-right: 2px;
      }

      .mcp-warning .dim {
        color: var(--term-dim);
      }

      .promo-block {
        border-left: 3px solid var(--term-accent);
        padding-left: 12px;
      }

      .promo-title {
        color: var(--term-accent);
      }

      .promo-body {
        color: var(--term-ink);
      }

      .promo-body a,
      .promo-link a {
        color: var(--term-link);
        text-decoration: none;
      }

      .promo-more {
        color: var(--term-dim);
      }

      .turn-user {
        background: var(--term-bar);
        margin: 0 -28px;
        padding: 3.5px 28px;
        min-height: 24px;
        display: flex;
        align-items: center;
      }

      .turn-user .glyph {
        color: var(--term-dim);
        margin-right: 8px;
      }

      .turn-user span:last-child {
        color: var(--term-ink);
      }

      .turn-reply {
        color: var(--term-ink);
        display: flex;
        gap: 8px;
      }

      .turn-reply .glyph {
        color: var(--term-ink);
      }

      .turn-timing {
        color: var(--term-dim);
      }

      .turn-timing .glyph {
        margin-right: 2px;
      }

      .terminal-input {
        margin-top: 17px;
      }

      .input-row {
        border-top: 1px solid var(--term-hairline);
        border-bottom: 1px solid var(--term-hairline);
        padding: 8px 0;
        display: flex;
        align-items: center;
        min-height: 33px;
      }

      .input-row .glyph {
        color: var(--term-ink);
        margin-right: 10px;
      }

      .terminal-cursor {
        display: inline-block;
        width: 8px;
        height: 17px;
        background: var(--term-ink);
      }

      /* Reference (cli-terminal-startup-dark / cli-terminal-chat-dark) stacks
         the context-pct and "manual mode" lines vertically, with the
         "high · /effort" status right-aligned only against the TOP line —
         not centered against the whole two-line block. */
      .status-row {
        padding-top: 8px;
      }

      .status-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        color: var(--term-dim);
      }

      .status-right {
        color: var(--term-dim);
      }

      .dim {
        color: var(--term-dim);
      }

      .glyph {
        color: var(--term-dim);
      }
    </style>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-code-terminal-session\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-code-terminal-session-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-code-terminal-session-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      window.__timelines = window.__timelines || {};
      window.__timelines["claude-code-terminal-session-surface"] = null;
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
