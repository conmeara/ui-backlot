      #premiere-editor-surface * {

      #premiere-editor-surface button {
        font: inherit;
      }

      .premiere-window {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 38px 32px 1fr;
        border-radius: 10px;
        background: var(--app-bg);
        box-shadow:
          0 34px 120px rgba(16, 16, 20, 0.38),
          0 0 0 1px rgba(255, 255, 255, 0.11);

        display: grid;
        grid-template-columns: 92px 34px auto minmax(0, 1fr) auto;
        align-items: center;
        column-gap: 13px;
        padding: 0 10px;
        background: #1d1d1d;
        border-bottom: 1px solid var(--border);
      }

      .traffic {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .traffic span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #ffbd2e; }
      .traffic .green { background: #28c840; }

      .home-icon {
        width: 18px;
        height: 18px;
        position: relative;
        opacity: 0.78;
      }

        content: "";
        position: absolute;
        left: 2px;
        top: 6px;
        width: 14px;
        height: 10px;
        background: #cfcfcf;
        clip-path: polygon(0 44%, 50% 0, 100% 44%, 88% 44%, 88% 100%, 12% 100%, 12% 44%);
      }

      .mode-tabs {
        display: flex;
        align-items: center;
        gap: 23px;
        height: 100%;
      }

      .mode-tabs button {
        height: 100%;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #d0d0d0;
        font-size: 12px;
        font-weight: 590;
      }

      .mode-tabs button.active {
        border-bottom-color: #e8e8e8;
        color: #fff;
      }

      .app-identity {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        color: #f7f7fb;
        font-size: 11px;
        font-weight: 560;
      }

      .title-muted {
        color: var(--soft);
        font-weight: 520;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        grid-column: 5 / 6;
        justify-self: end;
      }

      .top-actions button,
      .workspace-tabs button,
      .panel-tabs button,
      .monitor-controls button,
      .tools-panel button {
        border: 0;
        color: inherit;
      }

      .sync-pill {
        height: 24px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 12px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 650;
        background: #2a2a2a;
        color: #d6d7df;
      }

      .sync-pill span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(91, 191, 114, 0.12);
      }

      .workspace-tabs {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 18px;
        background: var(--panel-soft);
        border-bottom: 1px solid var(--border);
      }

      .workspace-tabs button {
        height: 100%;
        padding: 0;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 560;

        color: #fff;
      }

      .workspace-divider {

        height: 18px;
        margin: 0 4px;
        background: #3b3d47;
      }

      .workspace-spacer {
        flex: 1;
      }

        height: 22px;
        padding: 0 12px;
        justify-content: flex-start;
        border: 1px solid #393939;
        border-radius: 5px;
        color: #8b8b8b;
        background: #171717;
        box-shadow: none;
      }

      .editor-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 38px 272px 330px minmax(0, 1fr) 286px 34px;
        grid-template-rows: 306px minmax(0, 1fr);
        gap: 3px;
        padding: 3px;
        background: #151515;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);

        grid-column: 3;
        grid-row: 1;
      }

      .program-monitor {
        grid-column: 4;
        grid-row: 1;
      }

      .audio-meters {
        grid-column: 6;
        grid-row: 1 / 3;
        position: relative;
        display: grid;
        grid-template-rows: 30px 1fr 26px;
        padding: 7px 5px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: #111;
      }

      .project-panel {
        grid-column: 1 / 3;
        grid-row: 1;
      }

      .tools-panel {
        grid-column: 1;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 6px 4px;

        background: #191919;

        overflow: hidden;
        border: 1px solid #101116;

<script>
