      #figma-editor-surface {

      }

        height: 900px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 288px 1fr 304px;
        grid-template-rows: 48px 1fr;
        border-radius: 17px;
        background: var(--figma-bg);
        box-shadow:
          0 36px 120px rgba(39, 39, 46, 0.22),
          0 0 0 1px rgba(35, 35, 42, 0.1);
      }

      .figma-titlebar {
        grid-column: 1 / -1;
        position: relative;
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr) auto;
        align-items: center;
        padding: 0 14px;
        border-bottom: 1px solid var(--figma-border);
        background: rgba(255, 255, 255, 0.92);

      .traffic {
        display: flex;
        gap: 7px;
        align-items: center;

      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #ffbd2e; }
      .traffic .green { background: #28c840; }

      .file-title {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #26262a;
        font-size: 14px;
        font-weight: 620;
      }

      .figma-mark {
        width: 16px;
        height: 22px;
        display: grid;
        grid-template-columns: 8px 8px;
        grid-template-rows: repeat(3, 7px);
        gap: 0;
      }

      .figma-mark span {
        width: 8px;
        height: 8px;
      }

      .figma-mark span:nth-child(1) { background: #f24e1e; border-radius: 4px 0 0 4px; }
      .figma-mark span:nth-child(2) { background: #ff7262; border-radius: 0 4px 4px 0; }
      .figma-mark span:nth-child(3) { background: #a259ff; border-radius: 4px 0 0 4px; }
      .figma-mark span:nth-child(4) { background: #1abcfe; border-radius: 50%; }
      .figma-mark span:nth-child(5) { background: #0acf83; border-radius: 4px 0 4px 4px; }

      .title-chevron {
        width: 8px;
        height: 8px;
        border-right: 1.5px solid var(--figma-muted);
        border-bottom: 1.5px solid var(--figma-muted);
        transform: rotate(45deg) translateY(-2px);
      }

      .title-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mode-pill,
      .share-button,
      .toolbar-mode {
        height: 30px;
        border: 1px solid var(--figma-border);
        border-radius: 8px;
        background: #fff;
        color: var(--figma-muted);
        padding: 0 10px;
        font-size: 12px;
      }

      .mode-pill.active {
        color: var(--figma-ink);
        background: #f1f1f4;
      }

      .share-button {
        color: #fff;
        border-color: var(--figma-blue);
        background: var(--figma-blue);
        font-weight: 620;
      }

      .avatar-stack {
        width: 52px;
        height: 30px;
        display: flex;
        align-items: center;
        padding: 0 4px;
        border: 1px solid var(--figma-border);
        border-radius: 999px;
        background: #fff;
      }

      .avatar-stack span {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        margin-left: -3px;
        border: 1px solid #fff;
        border-radius: 50%;
        color: #fff;
        background: var(--figma-purple);
        font-size: 10px;
        font-weight: 700;
      }

      .avatar-stack span:first-child {
        margin-left: 0;
        background: #14b8a6;
      }

      .present-button {
        width: 30px;
        height: 30px;
        border: 1px solid var(--figma-border);
        border-radius: 8px;
        background: #fff;
        position: relative;
      }

      .present-button::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 8px;
        border-left: 9px solid var(--figma-ink);
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
      }

      .left-panel,
      .properties-panel {
        background: var(--figma-panel);
        border-right: 1px solid var(--figma-border);
      }

      .left-panel {
        grid-column: 1;
        grid-row: 2;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .panel-tabs,

        padding: 0 12px;
        border-bottom: 1px solid var(--figma-border);

      .panel-tab,

        background: transparent;
        color: var(--figma-muted);
        padding: 0 10px;

        font-weight: 590;

      .panel-tab.active,

        color: var(--figma-ink);
        background: #f1f1f4;

      .panel-icon-button {

        height: 26px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--figma-muted);
        position: relative;
      }

      .panel-icon-button:hover,
      .panel-icon-button.dots {
        background: #f1f1f4;
      }

      .panel-icon-button.collapse {
        margin-left: auto;
      }

      .panel-icon-button.collapse::before,
      .panel-icon-button.branch::before,
      .panel-icon-button.dots::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .panel-icon-button.collapse::before {
        width: 12px;
        height: 12px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
        box-shadow: inset 4px 0 0 rgba(111, 113, 120, 0.18);
      }

      .panel-icon-button.branch::before {
        width: 13px;
