<script>
  (() => {
    const isDirectPreview = /\/slack-app\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("slack-app-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#slack-app-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
