<style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".browser-component", { opacity: 0, x: 54, y: 12, filter: "blur(7px)", duration: 0.68, ease: "expo.out" }, 0.16);
  tl.from(".prompt-layer", { opacity: 0, y: 22, filter: "blur(5px)", duration: 0.56, ease: "power4.out" }, 0.68);
  tl.from(".workflow-cursor", { opacity: 0, x: -36, y: 28, duration: 0.26, ease: "sine.out" }, 1.2);
  tl.to(".workflow-cursor", { x: -198, y: -412, duration: 0.88, ease: "power2.inOut" }, 1.74);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.52 }, { opacity: 1, scale: 1.25, duration: 0.2, ease: "sine.out" }, 2.48);
  tl.to(".click-ring", { opacity: 0, scale: 1.85, duration: 0.26, ease: "sine.in" }, 2.7);
  tl.to(".browser-component", { x: -22, y: 8, opacity: 0.86, duration: 1.7, ease: "sine.inOut" }, 2.82);
  tl.to(".prompt-layer", { opacity: 0, y: -18, filter: "blur(5px)", duration: 0.5, ease: "power2.in" }, 4.08);
  tl.to(".completion-layer", { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.56, ease: "power3.out" }, 4.26);
  tl.to(".workflow-cursor", { x: -68, y: 68, duration: 0.82, ease: "power2.inOut" }, 5.22);
  tl.to(".browser-component", { x: -40, y: -4, duration: 2.2, ease: "sine.inOut" }, 5.55);

  window.__timelines["claude-launch-browser-workflow"] = tl;

  const capture = new URLSearchParams(window.location.search).get("capture");
  if (capture === "prompt") {
    tl.seek(2.95).pause();
  } else if (capture === "completion" || capture === "hero") {
    tl.seek(5.05).pause();
  }
</script>
