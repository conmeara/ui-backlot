<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #f4efe4;
  }
</style>

<template id="codex-thread-core-template">
  <div id="codex-thread-core-surface" data-composition-id="codex-thread-core-surface" data-width="980" data-height="840">
    <svg style="display:none" aria-hidden="true">
      <symbol id="lucide-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </symbol>
      <symbol id="lucide-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19v3" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <rect x="9" y="2" width="6" height="13" rx="3" />
      </symbol>
      <symbol id="lucide-send-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7" />
        <path d="M12 19V5" />
      </symbol>
      <symbol id="lucide-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6" />
      </symbol>
      <symbol id="lucide-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
      </symbol>
      <symbol id="lucide-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z" />
        <path d="M14 2v5a1 1 0 0 0 1 1h5" />
        <path d="M10 9H8" />
        <path d="M16 13H8" />
        <path d="M16 17H8" />
      </symbol>
    </svg>

    <section id="codex-thread-core" class="codex-thread-core-stage" data-primitive="codex-thread-core-stage" aria-label="Editable Codex working thread core">
      <main class="thread-core-panel" data-primitive="codex-thread-core">
        <div class="thread-scroll">
          <div class="thread-width">
            <article class="message-row user">
              <p class="user-line">Update the component sheet with the new capture sizes</p>
            </article>

            <article class="message-row assistant">
              <div class="assistant-copy">
                <p>Updated the sheet so every row references the current capture dimensions. The width and height columns now match what <code>capture-web-ui.mjs</code> writes for each surface.</p>
              </div>

              <section class="command-card" data-primitive="command-output-card" aria-label="Command output">
                <div class="command-card-head">
                  <span>component-sheet.csv</span>
                  <span class="plus-count">+18</span>
                  <span class="minus-count">-18</span>
                </div>
                <div class="code-row context"><em>12</em><code>claude-thread-core,980,840,zoomed</code></div>
                <div class="code-row remove"><em>13</em><code>codex-thread-core,1080,920,pending</code></div>
                <div class="code-row add"><em>13</em><code>codex-thread-core,980,840,zoomed</code></div>
                <div class="code-row context"><em>14</em><code>claude-app,1280,820,chrome</code></div>
                <div class="code-row remove"><em>15</em><code>codex-app,1200,800,chrome</code></div>
                <div class="code-row add"><em>15</em><code>codex-app,1280,820,chrome</code></div>
              </section>
            </article>
          </div>
        </div>

        <div class="composer-wrap">
          <footer class="composer" data-primitive="codex-composer">
            <div class="composer-input">Ask for follow-up changes</div>
            <div class="composer-bottom">
              <svg class="glyph plus-glyph"><use href="#lucide-plus"></use></svg>
              <button class="permission-chip" type="button">
                <svg class="glyph shield-glyph"><use href="#lucide-shield"></use></svg>
                Full access
                <svg class="glyph chev"><use href="#lucide-chevron-down"></use></svg>
              </button>
              <span class="composer-fill"></span>
              <span class="version-label">5.5</span>
              <button class="effort-chip" type="button">
                Extra High
                <svg class="glyph chev"><use href="#lucide-chevron-down"></use></svg>
              </button>
              <svg class="glyph mic-glyph"><use href="#lucide-mic"></use></svg>
              <button class="send-button" type="button" aria-label="Send"><svg class="glyph"><use href="#lucide-send-up"></use></svg></button>
            </div>
          </footer>

          <div class="project-row">
            <svg class="glyph notebook-glyph"><use href="#lucide-file-text"></use></svg>
            <span>ui-backlot</span>
          </div>
        </div>
      </main>
    </section>

    <style>
      #codex-thread-core-surface {
        --canvas: #f4efe4;
        --card: #faf7ee;
        --ink: #21201c;
        --ink-soft: #4d493f;
        --muted: #83796a;
        --faint: #a8a294;
        --line: #e5dfd2;
        --orange: #d95f2b;
        --green: #2f8a52;
        --red: #c65d58;
        width: 980px;
        height: 840px;
        overflow: visible;
        color: var(--ink);
        font-family: var(--font-macos);
      }

      #codex-thread-core-surface * {
        box-sizing: border-box;
      }

      #codex-thread-core-surface button {
        font: inherit;
      }

      .codex-thread-core-stage {
        width: 980px;
        height: 840px;
        display: grid;
        place-items: center;
        padding: 34px 44px;
        background: var(--canvas);
      }

      .thread-core-panel {
        width: 892px;
        height: 772px;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
        border-radius: 18px;
        background: var(--canvas);
      }

      .thread-scroll {
        min-height: 0;
        overflow: hidden;
        padding: 12px 0 22px;
      }

      .thread-width {
        width: min(calc(100% - 40px), 700px);
        margin-inline: auto;
      }

      .message-row {
        display: block;
        min-width: 0;
        margin-bottom: 22px;
      }

      .user-line {
        margin: 0 0 40px;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.42;
        font-weight: 500;
      }

      .assistant-copy {
        max-width: 620px;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.56;
        font-weight: 420;
      }

      .assistant-copy p {
        margin: 0;
      }

      .assistant-copy code {
        padding: 1px 5px;
        border-radius: 4px;
        background: #ece6d8;
        color: #3a3527;
        font-family: var(--font-terminal);
        font-size: 13px;
      }

      .command-card {
        margin-top: 16px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
      }

      .command-card-head {
        height: 34px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
        color: var(--ink-soft);
        font-family: var(--font-terminal);
        font-size: 12px;
        font-weight: 600;
      }

      .command-card-head span:first-child {
        margin-right: auto;
        color: var(--muted);
        font-weight: 500;
      }

      .plus-count {
        color: var(--green);
      }

      .minus-count {
        color: var(--red);
      }

      .code-row {
        min-height: 25px;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        align-items: center;
        font-family: var(--font-terminal);
        font-size: 11.5px;
        line-height: 1.3;
      }

      .code-row em {
        color: var(--faint);
        text-align: center;
        font-style: normal;
      }

      .code-row code {
        overflow: hidden;
        display: block;
        background: transparent;
        color: var(--ink-soft);
        text-overflow: clip;
        white-space: nowrap;
      }

      .code-row.remove {
        background: #f7e2df;
        box-shadow: inset 3px 0 0 var(--red);
      }

      .code-row.add {
        background: #e2eee0;
        box-shadow: inset 3px 0 0 var(--green);
      }

      .code-row.remove code,
      .code-row.add code {
        color: #2c2a22;
      }

      .code-row:last-child {
        padding-bottom: 2px;
      }

      .composer-wrap {
        padding: 0 0 26px;
      }

      .composer {
        width: min(100%, 700px);
        margin: 0 auto 10px;
        display: grid;
        grid-template-rows: 1fr 40px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
      }

      .composer-input {
        padding: 15px 16px 0;
        color: var(--faint);
        font-size: 15px;
      }

      .composer-bottom {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px 10px 14px;
      }

      .plus-glyph {
        color: var(--faint);
      }

      .permission-chip,
      .effort-chip {
        height: 26px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        padding: 0 4px;
        font-size: 13.5px;
        font-weight: 560;
      }

      .permission-chip {
        color: var(--orange);
      }

      .shield-glyph {
        color: var(--orange);
      }

      .composer-fill {
        flex: 1 1 auto;
      }

      .version-label {
        color: var(--ink);
        font-size: 13.5px;
        font-weight: 560;
      }

      .effort-chip {
        color: var(--faint);
        font-weight: 500;
      }

      .chev {
        width: 12px;
        height: 12px;
        color: currentColor;
      }

      .mic-glyph {
        color: var(--faint);
      }

      .send-button {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        background: #e9e4d8;
        color: #363228;
      }

      .send-button .glyph {
        width: 16px;
        height: 16px;
        stroke-width: 2.2;
      }

      .project-row {
        width: fit-content;
        height: 30px;
        margin: 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 13px;
        border-radius: 10px;
        background: #efe9dc;
        color: var(--ink-soft);
        font-size: 13.5px;
        font-weight: 550;
      }

      .notebook-glyph {
        color: var(--muted);
      }

      .glyph {
        display: block;
        flex: 0 0 auto;
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.85;
        stroke-linecap: round;
        stroke-linejoin: round;
        overflow: visible;
      }
    </style>
    <style>
      #codex-thread-core.theme-dark {
        --canvas: #212019;
        --card: #2a2922;
        --ink: #ece9dd;
        --ink-soft: #d8d5cc;
        --muted: #8a877c;
        --faint: #6f6c61;
        --line: rgba(255, 255, 255, 0.07);
        --orange: #e06c33;
        --green: #6fbf8e;
        --red: #d98a86;
      }

      #codex-thread-core.theme-dark {
        background: var(--canvas);
      }

      #codex-thread-core.theme-dark .thread-core-panel {
        background: var(--canvas);
      }

      #codex-thread-core.theme-dark .user-line {
        color: var(--ink);
      }

      #codex-thread-core.theme-dark .assistant-copy {
        color: var(--ink-soft);
      }

      #codex-thread-core.theme-dark .assistant-copy code {
        background: #35332a;
        color: #ece9dd;
      }

      #codex-thread-core.theme-dark .command-card {
        border-color: var(--line);
        background: var(--card);
      }

      #codex-thread-core.theme-dark .command-card-head {
        border-bottom-color: var(--line);
        color: var(--ink-soft);
      }

      #codex-thread-core.theme-dark .command-card-head span:first-child {
        color: var(--muted);
      }

      #codex-thread-core.theme-dark .code-row em {
        color: var(--faint);
      }

      #codex-thread-core.theme-dark .code-row code {
        color: var(--ink-soft);
      }

      #codex-thread-core.theme-dark .code-row.remove {
        background: rgba(217, 138, 134, 0.16);
        box-shadow: inset 3px 0 0 var(--red);
      }

      #codex-thread-core.theme-dark .code-row.add {
        background: rgba(111, 191, 142, 0.16);
        box-shadow: inset 3px 0 0 var(--green);
      }

      #codex-thread-core.theme-dark .code-row.remove code,
      #codex-thread-core.theme-dark .code-row.add code {
        color: var(--ink-soft);
      }

      #codex-thread-core.theme-dark .composer {
        border-color: var(--line);
        background: var(--card);
      }

      #codex-thread-core.theme-dark .composer-input {
        color: var(--faint);
      }

      #codex-thread-core.theme-dark .plus-glyph {
        color: var(--muted);
      }

      #codex-thread-core.theme-dark .permission-chip {
        color: var(--orange);
      }

      #codex-thread-core.theme-dark .shield-glyph {
        color: var(--orange);
      }

      #codex-thread-core.theme-dark .version-label {
        color: var(--ink);
      }

      #codex-thread-core.theme-dark .effort-chip {
        color: var(--muted);
      }

      #codex-thread-core.theme-dark .mic-glyph {
        color: var(--muted);
      }

      #codex-thread-core.theme-dark .send-button {
        background: #3a3830;
        color: #ece9dd;
      }

      #codex-thread-core.theme-dark .project-row {
        background: #2c2b24;
        color: var(--ink-soft);
      }

      #codex-thread-core.theme-dark .notebook-glyph {
        color: var(--muted);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".thread-core-panel", { opacity: 0, y: 18, filter: "blur(5px)", duration: 0.5, ease: "power3.out" }, 0.1);
      tl.from(".message-row.user", { opacity: 0, y: 10, duration: 0.3, ease: "sine.out" }, 0.34);
      tl.from(".message-row.assistant", { opacity: 0, y: 14, duration: 0.4, ease: "power2.out" }, 0.6);
      tl.from(".command-card", { opacity: 0, y: 10, duration: 0.32, ease: "power2.out" }, 1.02);
      tl.from(".composer", { opacity: 0, y: 14, duration: 0.34, ease: "power2.out" }, 1.36);
      tl.from(".project-row", { opacity: 0, y: 8, duration: 0.26, ease: "sine.out" }, 1.62);
      window.__timelines["codex-thread-core-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/codex-thread-core\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("codex-thread-core-template");
    const mount = () => {
      if (!template || document.querySelector("#codex-thread-core-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
