    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".claude-home-window", { opacity: 0, y: 18, filter: "blur(5px)", duration: 0.48, ease: "power3.out" }, 0.12);
      tl.from(".home-sidebar", { opacity: 0, x: -12, duration: 0.34, ease: "sine.out" }, 0.22);

      tl.from(".prompt-title, .prompt-copy, .prompt-footer", { opacity: 0, y: 8, duration: 0.24, stagger: 0.08, ease: "sine.out" }, 1.08);
      tl.from(".starter-row button", { opacity: 0, y: 10, duration: 0.28, stagger: 0.055, ease: "sine.out" }, 1.42);
      tl.to(".hero-mark", { rotation: 8, scale: 1.035, duration: 0.5, repeat: 3, yoyo: true, ease: "sine.inOut" }, 1.8);
      tl.to(".lets-go", { scale: 1.045, duration: 0.24, repeat: 3, yoyo: true, ease: "sine.inOut" }, 2.18);

<script>
  (() => {
    const isDirectPreview = /\/claude-home\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-home-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-home-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
