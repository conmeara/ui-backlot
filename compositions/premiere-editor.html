      #premiere-editor-surface {
        --app-bg: #1d1d1d;
        --panel: #232323;
        --panel-soft: #2d2d2d;

        --panel-raised: #2d2d2d;

        --muted: #9d9d9d;
        --soft: #737373;
        --accent: #2680eb;
        --accent-blue: #6fa0d8;
        --teal: #36a7a2;
        --green: #08c733;
        --orange: #c18436;
        --pink: #ff5ca8;
        --yellow: #e5cc5d;
        --playhead-red: #4a9de0;
        width: 1440px;
        height: 900px;
        overflow: visible;
        color: var(--ink);
        font-family: var(--font-adobe);
      }

      #premiere-editor-surface * {
        box-sizing: border-box;
      }

      #premiere-editor-surface button {
        font: inherit;
      }

      .premiere-window {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 38px 32px 1fr;
        border-radius: 10px;
        background: var(--app-bg);
        box-shadow:
          0 34px 120px rgba(16, 16, 20, 0.38),
          0 0 0 1px rgba(255, 255, 255, 0.11);
      }

      .premiere-titlebar {
        display: grid;
        grid-template-columns: 92px 34px auto minmax(0, 1fr) auto;
        align-items: center;
        column-gap: 13px;
        padding: 0 10px;
        background: #1d1d1d;
        border-bottom: 1px solid var(--border);
      }

      .traffic {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .traffic span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #ffbd2e; }
      .traffic .green { background: #28c840; }

      .home-icon {
        width: 18px;
        height: 18px;
        position: relative;
        opacity: 0.78;
      }

      .home-icon::before {
        content: "";
        position: absolute;
        left: 2px;
        top: 6px;
        width: 14px;
        height: 10px;
        background: #cfcfcf;
        clip-path: polygon(0 44%, 50% 0, 100% 44%, 88% 44%, 88% 100%, 12% 100%, 12% 44%);
      }

      .mode-tabs {
        display: flex;
        align-items: center;
        gap: 23px;
        height: 100%;
      }

      .mode-tabs button {
        height: 100%;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #d0d0d0;
        font-size: 12px;
        font-weight: 590;
      }

      .mode-tabs button.active {
        border-bottom-color: #e8e8e8;
        color: #fff;
      }

      .app-identity {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        color: #f7f7fb;
        font-size: 11px;
        font-weight: 560;
      }

      .title-muted {
        color: var(--soft);
        font-weight: 520;
      }

      .workspace-tabs button,
      .panel-tabs button,
      .monitor-controls button,
      .tools-panel button {
        border: 0;
        color: inherit;
      }

      .workspace-tabs {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 18px;
        background: var(--panel-soft);
        border-bottom: 1px solid var(--border);
      }

      .workspace-tabs button {
        height: 100%;
        padding: 0;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 560;
      }

      .workspace-tabs button.active {
        background: transparent;
        border-bottom-color: #e8e8e8;
        color: #fff;
      }

      .workspace-divider {
        width: 1px;
        height: 18px;
        margin: 0 4px;
        background: #3b3d47;
      }

      .workspace-spacer {
        flex: 1;
      }

      .workspace-tabs .search-pill {
        min-width: 118px;
        height: 22px;
        padding: 0 12px;
        justify-content: flex-start;
        border: 1px solid #393939;
        border-radius: 5px;
        color: #8b8b8b;
        background: #171717;
        box-shadow: none;
      }

      .editor-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 38px 272px 330px minmax(0, 1fr) 286px 34px;
        grid-template-rows: 306px minmax(0, 1fr);
        gap: 3px;
        padding: 3px;
        background: #151515;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .source-monitor {
        grid-column: 3;
        grid-row: 1;
      }

      .program-monitor {
        grid-column: 4;
        grid-row: 1;
      }

      .audio-meters {
        grid-column: 6;
        grid-row: 1 / 3;
        position: relative;
        display: grid;
        grid-template-rows: 30px 1fr 26px;
        padding: 7px 5px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: #111;
      }

      .project-panel {
        grid-column: 1 / 3;
        grid-row: 1;
      }

      .tools-panel {
        grid-column: 1;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 6px 4px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: #191919;
      }

      .timeline-panel {
        grid-column: 2 / 6;
        grid-row: 2;
      }

      .properties-panel {
        grid-column: 5;
        grid-row: 1;
      }

      .panel-tabs {
        height: 26px;
        display: flex;
        align-items: center;
        gap: 1px;
        padding: 0 5px;
        background: var(--panel-soft);
        border-bottom: 1px solid var(--border);
      }

      .panel-tabs button {
        height: 22px;
        max-width: 220px;
        padding: 0 7px;
        border-radius: 0;
        background: transparent;
        color: #92959f;
        font-size: 11px;
        font-weight: 540;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panel-tabs button.active {
        background: var(--panel);
        color: #f2f2f6;
        box-shadow: inset 0 1px 0 var(--accent);
      }

      .panel-menu {
        width: 19px;
        height: 19px;
        margin-left: auto;
        border-radius: 3px;
        background:
          radial-gradient(circle, #8f929e 0 1px, transparent 1.5px) 5px 5px / 5px 5px repeat;
        opacity: 0.72;
      }

      .monitor-frame {
        position: relative;
        height: 235px;
        margin: 6px;
        overflow: hidden;
        border: 1px solid #101116;
        border-radius: 1px;
        background: #08090c;
      }

      .monitor-overlay {
        position: absolute;
        z-index: 2;
        padding: 3px 6px;
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.44);
        color: rgba(240, 242, 248, 0.72);
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }

      .monitor-overlay.top-left {
        left: 9px;
        top: 8px;
      }

      .source-frame {
        display: grid;
        grid-template-rows: 1fr 20px;
      }

      .video-still {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(130deg, rgba(255, 255, 255, 0.08), transparent 38%),
          linear-gradient(145deg, #223237 0%, #11161a 60%, #25212b 100%);
      }

         workspace NOTICE) standing in for the source clip's footage,
         not a drawn gradient blob. */

      .video-still.interview::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(120% 100% at 50% 45%, transparent 62%, rgba(0, 0, 0, 0.34) 100%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 22% 78%, rgba(0, 0, 0, 0.16));
      }

      .video-still .source-timecode { z-index: 2; }

      .source-timecode,
      .program-timecode {
        position: absolute;
        right: 10px;
        bottom: 8px;
        padding: 3px 7px;
        border-radius: 5px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      .source-waveform {
        position: relative;
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-top: 1px solid #292929;
        background: #1b1b1b;
      }

      .source-waveform::before {
        content: "";
        position: relative;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: #2a2a2a;
      }

      .source-waveform .scrub-tick {
        position: absolute;
        left: calc(10px + 55% - 1.5px);
        width: 3px;
        height: 12px;
        border-radius: 1px;
        background: #4a9de0;
      }

      .safe-guides,
      .safe-guides::before {
        position: absolute;
        inset: 25px 44px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        content: "";
      }

      .safe-guides::before {
        inset: 17px 30px;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .program-card {
        position: absolute;
        left: 54px;
        top: 48px;
        width: 250px;
        padding: 20px;
        border-radius: 13px;
        background: rgba(244, 241, 232, 0.94);
        color: #1c1a16;
        box-shadow: 0 22px 55px rgba(0, 0, 0, 0.25);
      }

      .program-title {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.05;
      }

      .program-subtitle {
        margin-top: 7px;
        color: #5b594f;
        font-size: 12px;
        font-weight: 620;
      }

      .program-progress {
        height: 8px;
        margin-top: 17px;
        overflow: hidden;
        border-radius: 999px;
        background: #d8d1c3;
      }

      .program-progress span {
        display: block;
        width: 68%;
        height: 100%;
        border-radius: inherit;
        background: #43b875;
      }

      .lower-third {
        position: absolute;
        left: 54px;
        bottom: 36px;
        padding: 8px 14px;
        border-left: 4px solid var(--accent);
        border-radius: 5px;
        background: rgba(9, 10, 13, 0.76);
        color: #fff;
        font-size: 14px;
        font-weight: 680;
      }

      .monitor-controls {
        height: 27px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        border-top: 1px solid var(--border);
        color: #888;
        font-size: 10px;
      }

      .timecode,
      .duration,
      .resolution,
      .monitor-scale {
        font-variant-numeric: tabular-nums;
      }

      .timecode.active {
        color: var(--accent-blue);
      }

      .control {
        width: 18px;
        height: 18px;
        border-radius: 2px;
        background: transparent;
        position: relative;
      }

      .control::before,
      .control::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .control.play::before {
        border-left: 8px solid #dedfec;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        transform: translate(-35%, -50%);
      }

      .control.active {
        background: var(--accent);
      }

      .control.prev::before,
      .control.step-back::before {
        width: 8px;
        height: 8px;
        border-left: 2px solid #dedfec;
        border-bottom: 2px solid #dedfec;
        transform: translate(-35%, -50%) rotate(45deg);
      }

      .control.next::before,
      .control.step-forward::before {
        width: 8px;
        height: 8px;
        border-right: 2px solid #dedfec;
        border-top: 2px solid #dedfec;
        transform: translate(-65%, -50%) rotate(45deg);
      }

      .control.mark-in::before,
      .control.safe::before,
      .control.export-frame::before,
      .control.insert::before,
      .control.overwrite::before {
        width: 12px;
        height: 12px;
        border: 1px solid #c8cad5;
      }

      .control.mark-in::before {
        border-right: 0;
        border-top: 0;
      }

      .control.safe::before {
        width: 13px;
        height: 9px;
        border-style: dashed;
      }

      .control.export-frame::before {
        width: 12px;
        height: 9px;
        border-radius: 2px;
      }

      .control.export-frame::after {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #c8cad5;
      }

      .control.insert::before {
        width: 0;
        height: 0;
        border-left: 8px solid #c8cad5;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-right: 0;
      }

      .control.overwrite::before {
        width: 12px;
        height: 8px;
        border-radius: 2px;
      }

      .monitor-scale,
      .resolution {
        height: 18px;
        display: inline-flex;
        align-items: center;
        padding: 0 6px;
        border-radius: 2px;
        background: #171717;
        color: #aeb1bc;
        font-size: 10px;
      }

      .meter-title {
        color: #d7d9e2;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
      }

      .meter-scale {
        grid-row: 2;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;
        padding: 12px 0 30px;
        color: #6f727d;
        font-size: 9px;
      }

      .meter-columns {
        position: absolute;
        left: 17px;
        right: 6px;
        top: 44px;
        bottom: 43px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }

      .meter {
        position: relative;
        overflow: hidden;
        border-radius: 3px;
        background:
          linear-gradient(180deg, #d9544f 0 10%, #e6c454 10% 27%, #315b38 27% 100%);
        opacity: 0.85;
      }

      .level {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(180deg, #ffdd61, #5fd36f);
      }

      .level.l { height: 68%; }
      .level.r { height: 58%; }

      .meter-labels {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        color: #898c96;
        font-size: 10px;
      }

      .project-toolbar {
        height: 27px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        border-bottom: 1px solid #303030;
        color: #c7c7c7;
        font-size: 10px;
      }

      .bin-folder {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bin-folder::before {
        content: "";
        width: 13px;
        height: 9px;
        display: inline-block;
        margin-right: 7px;
        background: #747474;
        clip-path: polygon(0 18%, 38% 18%, 44% 0, 100% 0, 100% 100%, 0 100%);
        vertical-align: -1px;
      }

      .bin-count {
        margin-left: auto;
        color: #8c8c8c;
      }

      .bin-search-row {
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px;
        border-bottom: 1px solid #303030;
      }

      .bin-search {
        flex: 1;
        height: 20px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        border-radius: 2px;
        background: #0d0d0d;
        color: #777;
        font-size: 10px;
      }

      .view-toggle {
        width: 19px;
        height: 19px;
        border-radius: 4px;
        background:
          linear-gradient(90deg, transparent 45%, #7b7e89 45% 55%, transparent 55%),
          linear-gradient(transparent 45%, #7b7e89 45% 55%, transparent 55%);
        box-shadow: inset 0 0 0 1px #4a4c58;
      }

      .view-toggle.icon {
        background:
          radial-gradient(circle, #7b7e89 0 2px, transparent 2.5px) 4px 4px / 8px 8px repeat;
      }

      .project-icon-grid {
        height: calc(100% - 116px);
        overflow: hidden;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-content: start;
        gap: 9px 10px;
        padding: 9px 8px;
      }

      .thumb-card {
        min-width: 0;
        position: relative;
        color: #c7c7c7;
        font-size: 10px;
      }

      .thumb-card strong {
        display: block;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 520;
      }

      .thumb-card em {
        position: absolute;
        right: 4px;
        top: 37px;
        padding: 1px 3px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.62);
        color: #f0f0f0;
        font-size: 9px;
        font-style: normal;
        font-variant-numeric: tabular-nums;
      }

      .thumb {
        display: block;
        height: 53px;
        position: relative;
        border: 1px solid #303030;
        background: #2b2b2b;
      }

      .thumb::after {
        content: "";
        position: absolute;
        right: 2px;
        bottom: 2px;
        width: 16px;
        height: 10px;
        border: 1px solid #6cc3ff;
        background:
          linear-gradient(90deg, #237acc 1px, transparent 1px) 0 0 / 5px 100% repeat-x;
      }

      .thumb::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(120% 100% at 50% 42%, transparent 58%, rgba(0, 0, 0, 0.38) 100%);
      }

      .project-footer-tools {
        height: 31px;
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 0 8px;
        border-top: 1px solid #303030;
      }

      .footer-spacer { flex: 1; }
      .footer-slider {
        width: 58px;
        height: 2px;
        background: #535353;
      }

      .footer-icon {
        width: 14px;
        height: 14px;
        position: relative;
        color: #9d9d9d;
      }

      .footer-icon.active { color: #e2e2e2; }

      .footer-icon::before {
        content: "";
        position: absolute;
        inset: 2px;
        border: 1.5px solid currentColor;
      }

      .tool {
        width: 27px;
        height: 27px;
        position: relative;
        border-radius: 2px;
        background: transparent;
        color: #c7c7c7;
      }

      .tool.active {
        background: var(--accent);
        color: #fff;
        box-shadow: inset 0 0 0 1px #4c9bf0;
      }

      .tool::before,
      .tool::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .tool.selection::before {
        border-left: 9px solid currentColor;
        border-top: 15px solid transparent;
        border-bottom: 4px solid transparent;
        transform: translate(-38%, -42%) rotate(-16deg);
      }

      .tool.track::before {
        width: 17px;
        height: 10px;
        border-top: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
      }

      .tool.track::after {
        width: 8px;
        height: 8px;
        border-right: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: translate(-30%, -50%) rotate(45deg);
      }

      .tool.ripple::before {
        width: 18px;
        height: 13px;
        border-left: 2px solid currentColor;
        border-right: 2px solid currentColor;
      }

      .tool.ripple::after {
        width: 12px;
        height: 2px;
        background: currentColor;
      }

      .tool.razor::before {
        width: 16px;
        height: 7px;
        border: 2px solid currentColor;
        border-radius: 2px;
        transform: translate(-50%, -50%) rotate(-28deg);
      }

      .tool.pen::before {
        width: 15px;
        height: 15px;
        border-left: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .tool.hand::before {
        width: 13px;
        height: 16px;
        border: 2px solid currentColor;
        border-radius: 7px 7px 5px 5px;
      }

      .tool.text::before {
        content: "T";
        color: currentColor;
        font-size: 17px;
        font-weight: 850;
      }

      .timeline-tabs {
        gap: 4px;
      }

      .timeline-status {
        margin-left: auto;
        color: #80838d;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }

      .timeline-toolbar {
        height: 27px;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 0 8px;
        border-bottom: 1px solid var(--border);
      }

      .patches,
      .timeline-controls {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .patch-label {
        color: #8a8a8a;
        font-size: 9.5px;
        font-weight: 520;
      }

      .patch {
        height: 20px;
        min-width: 24px;
        border: 0;
        border-radius: 2px;
        background: #303030;
        color: #aaa;
        font-size: 10px;
        font-weight: 700;
      }

      .patch.active {
        background: var(--accent);
        color: #fff;
      }

      .timeline-icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 2px;
        background: #2a2a2a;
        color: #9b9b9b;
        position: relative;
      }

      .timeline-icon.snap-toggle .backlot-icon {
        width: 12px;
        height: 12px;
      }

      .timeline-icon.snap-toggle.active {
        background: var(--accent);
        color: #fff;
      }

      .timeline-icon::before,
      .timeline-icon::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .timeline-icon.insert-mini::before {
        border-left: 8px solid #c7cad4;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        transform: translate(-38%, -50%);
      }

      .timeline-icon.overwrite-mini::before {
        width: 12px;
        height: 8px;
        border: 1px solid #c7cad4;
      }

      .zoom-track {
        width: 110px;
        height: 4px;
        margin-left: auto;
        border-radius: 999px;
        background: #444;
      }

      .zoom-track span {
        display: block;
        width: 58%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .timeline-ruler {
        height: 27px;
        display: grid;
        grid-template-columns: 118px 1fr;
        border-bottom: 1px solid var(--border);
      }

      .track-label-corner {
        display: flex;
        align-items: center;
        padding-left: 9px;
        border-right: 1px solid var(--border);
        color: #7d7d7d;
        font-size: 9.5px;
        font-variant-numeric: tabular-nums;
      }

      .ruler-scales {
        position: relative;
        background:
          linear-gradient(#d9c836, #d9c836) 0 2px / 100% 2px no-repeat,
          linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px) 0 100% / 8% 8px repeat-x,
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px) 0 100% / 2% 4px repeat-x;
      }

      .ruler-scales span {
        position: absolute;
        top: 8px;
        transform: translateX(-50%);
        color: #858585;
