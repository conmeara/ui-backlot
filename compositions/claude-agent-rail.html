<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fffdfa;
  }
</style>

<template id="claude-agent-rail-template">
  <div id="claude-agent-rail-surface" data-composition-id="claude-agent-rail-surface" data-width="380" data-height="860">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <symbol id="lucide-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </symbol>
      <symbol id="lucide-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z" />
        <path d="M14 2v5a1 1 0 0 0 1 1h5" />
        <path d="M10 9H8" />
        <path d="M16 13H8" />
        <path d="M16 17H8" />
      </symbol>
    </svg>
    <section class="claude-agent-rail-stage" data-primitive="claude-agent-rail-stage" aria-label="Editable Claude agent rail surface">
      <aside class="agent-rail-panel" data-primitive="claude-agent-context-rail" aria-label="Claude task progress and context">
        <section class="rail-section progress-section">
          <div class="rail-title-row">
            <div class="rail-title">Progress</div>
          </div>

          <div class="rail-stepper">
            <span class="stepper-circle done"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-check"/></svg></span>
            <span class="stepper-line"></span>
            <span class="stepper-circle done"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-check"/></svg></span>
            <span class="stepper-line"></span>
            <span class="stepper-circle"></span>
          </div>
          <p class="rail-caption">Steps will show as the task unfolds.</p>
        </section>

        <section class="rail-section">
          <div class="rail-title">Artifacts</div>
          <div class="artifact-card">
            <span class="rail-file-icon deck"><svg class="backlot-icon" aria-hidden="true"><use href="#lucide-file-text"/></svg></span>
            <span class="artifact-name">Deck.pptx</span>
          </div>
        </section>

        <section class="rail-section">
          <div class="rail-title">Context</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon folder"></span><span>Launch Deck</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
          </div>
          <div class="rail-sublabel">Connectors</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon connector"></span><span>Web search</span></div>
          </div>
          <div class="rail-sublabel">Working files</div>
          <div class="rail-list">
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>slide-notes.md</span></div>
            <div class="rail-row"><span class="rail-file-icon doc"></span><span>README.md</span></div>
            <div class="rail-row"><span class="rail-file-icon sheet"></span><span>Q2 revenue.csv</span></div>
          </div>
        </section>

        <section class="rail-section rail-note">
          <span class="sync-pulse"></span>
          <p>Claude is using only the selected folder and working files.</p>
        </section>
      </aside>
    </section>

    <style>
      #claude-agent-rail-surface {
        width: 380px;
        height: 860px;
        overflow: visible;
        color: #211f1c;
        font-family: var(--font-claude-ui);
      }

      #claude-agent-rail-surface * {
        box-sizing: border-box;
      }

      .claude-agent-rail-stage {
        width: 380px;
        height: 860px;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #fffdfa;
      }

      .agent-rail-panel {
        width: 324px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .rail-section {
        display: grid;
        gap: 14px;
        padding: 21px 20px;
        border: 1px solid rgba(39, 37, 34, 0.085);
        border-radius: 18px;
        background: rgba(255, 253, 249, 0.78);
        box-shadow: 0 12px 42px rgba(72, 52, 39, 0.055);
      }

      .progress-section {
        gap: 19px;
      }

      .rail-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .rail-title {
        color: #292520;
        font-size: 22px;
        line-height: 1.1;
        font-weight: 760;
      }

      .progress-section p,
      .rail-note p {
        margin: 8px 0 0;
        color: #6a6259;
        font-size: 14px;
        line-height: 1.35;
      }

      .rail-sublabel {
        margin: 4px 0 -4px;
        color: #7f776c;
        font-size: 13px;
        font-weight: 600;
      }

      .rail-stepper {
        display: flex;
        align-items: center;
        padding: 4px 2px;
      }

      .stepper-circle {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        box-sizing: border-box;
        border: 1.5px solid #d6d0c4;
        color: #86806f;
      }

      .stepper-circle svg {
        width: 9px;
        height: 9px;
      }

      .stepper-circle.done {
        border-color: #b9b3a6;
      }

      .stepper-line {
        width: 22px;
        height: 1.5px;
        flex: 0 0 auto;
        background: #e2ddd3;
      }

      .rail-caption {
        margin: 8px 0 0;
        color: #98917f;
        font-size: 12.5px;
        line-height: 1.4;
      }

      .artifact-card {
        min-height: 26px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .artifact-name {
        min-width: 0;
        overflow: hidden;
        color: #3d3a33;
        font-size: 13px;
        font-weight: 500;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-list {
        display: grid;
        gap: 5px;
      }

      .rail-row {
        min-height: 34px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        color: #292520;
        font-size: 16px;
      }

      .rail-row span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rail-file-icon {
        width: 24px;
        height: 24px;
        position: relative;
        flex: 0 0 auto;
        border: 1.3px solid #a79e91;
        border-radius: 5px;
        background: transparent;
      }

      .rail-file-icon.deck {
        width: 26px;
        height: 26px;
        border: 0;
        border-radius: 6px;
        background: #f1eee6;
        color: #8a8474;
      }

      .rail-file-icon.deck svg {
        width: 14px;
        height: 14px;
      }

      .rail-file-icon.folder {
        border-color: #88aebf;
        background: #edf8fc;
      }

      .rail-file-icon.folder::before {
        content: "";
        position: absolute;
        left: 2px;
        top: -3px;
        width: 10px;
        height: 5px;
        border-radius: 3px 3px 0 0;
        background: #98d5ee;
      }

      .rail-file-icon.sheet {
        border-color: #80ae84;
        background: #f2faf2;
      }

      .rail-file-icon.doc {
        background: transparent;
      }

      .rail-file-icon.connector {
        border-color: #d8d2c9;
        background: #f4efe8;
      }

      .rail-note {
        display: none;
        min-height: 58px;
        grid-template-columns: 12px minmax(0, 1fr);
        align-items: start;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(216, 117, 95, 0.09);
        border-radius: 14px;
        background: rgba(255, 246, 239, 0.64);
        box-shadow: none;
      }

      .rail-note p {
        margin: 0;
      }

      .sync-pulse {
        width: 10px;
        height: 10px;
        margin-top: 4px;
        border-radius: 50%;
        background: #d86f5d;
        box-shadow: 0 0 0 4px rgba(216, 117, 95, 0.12);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".agent-rail-panel", { opacity: 0, x: 18, filter: "blur(5px)", duration: 0.52, ease: "power3.out" }, 0.12);
      tl.from(".stepper-circle", { opacity: 0, x: 9, stagger: 0.055, duration: 0.28, ease: "sine.out" }, 0.52);
      tl.from(".rail-section:not(.progress-section)", { opacity: 0, y: 9, stagger: 0.06, duration: 0.3, ease: "power2.out" }, 0.86);
      tl.to(".sync-pulse", { scale: 1.06, duration: 0.58, repeat: 5, yoyo: true, ease: "sine.inOut" }, 1.16);
      window.__timelines["claude-agent-rail-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-agent-rail\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-agent-rail-template");
      if (!template || document.querySelector("#claude-agent-rail-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
