<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  (() => {
    const isDirectPreview = /\/claude-code-desktop\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-code-desktop-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-code-desktop-surface")) return;
      const fragment = template.content.cloneNode(true);
      document.body.appendChild(fragment);
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.from(".claude-code-window", { opacity: 0, y: 20, filter: "blur(6px)", immediateRender: false, duration: 0.42, ease: "power3.out" }, 0.08);
      tl.from(".code-sidebar", { opacity: 0, x: -16, immediateRender: false, duration: 0.34, ease: "sine.out" }, 0.22);
      tl.from(".user-bubble", { opacity: 0, y: 12, stagger: 0.18, immediateRender: false, duration: 0.32, ease: "sine.out" }, 0.42);
      tl.from(".assistant-block", { opacity: 0, y: 14, stagger: 0.16, immediateRender: false, duration: 0.38, ease: "power2.out" }, 0.72);
      tl.from(".panel", { opacity: 0, x: 18, stagger: 0.08, immediateRender: false, duration: 0.32, ease: "sine.out" }, 0.86);
      tl.from(".view-menu", { opacity: 0, scale: 0.96, x: 10, immediateRender: false, duration: 0.28, ease: "power2.out" }, 1.2);
      tl.to(".spinner", { rotate: 360, duration: 1.1, repeat: 5, ease: "none" }, 1.34);
      tl.to(".task-row.active", { backgroundColor: "#252728", duration: 0.42, repeat: 4, yoyo: true, ease: "sine.inOut" }, 1.6);
      window.__timelines["claude-code-desktop-surface"] = tl;
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
