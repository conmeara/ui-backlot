    <style>
      @font-face {
        font-family: "Anthropic Sans";
        src: url("../assets/fonts/AnthropicSans-Romans-Variable-25x258.ttf") format("truetype");
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }

      #premiere-editor-surface {
        --app-bg: #18181c;
        --panel: #222329;
        --panel-soft: #292a31;
        --panel-dark: #16171b;
        --panel-raised: #30313a;
        --border: #3a3b45;
        --border-strong: #535565;
        --ink: #efeff4;
        --muted: #a7a9b4;
        --soft: #737682;
        --accent: #8f7cff;
        --accent-blue: #4fa1ff;
        --teal: #43b5b0;
        --green: #5bbf72;
        --orange: #d89443;
        --pink: #ca6fb1;
        --yellow: #e5cc5d;
        width: 1440px;
        height: 900px;
        overflow: visible;
        color: var(--ink);
        font-family: "Anthropic Sans", sans-serif;
      }

      #premiere-editor-surface * {
        box-sizing: border-box;
      }

      #premiere-editor-surface button {
        font: inherit;
      }

      .premiere-window {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 42px 38px 1fr;
        border-radius: 17px;
        background: var(--app-bg);
        box-shadow:
          0 34px 120px rgba(16, 16, 20, 0.38),
          0 0 0 1px rgba(255, 255, 255, 0.11);
      }

      .premiere-titlebar {
        display: grid;
        grid-template-columns: 116px minmax(0, 1fr) auto;
        align-items: center;
        padding: 0 13px;
        background: #111216;
        border-bottom: 1px solid #30323b;
      }

      .traffic {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
      }

      .traffic .red { background: #ff5f57; }
      .traffic .yellow { background: #ffbd2e; }
      .traffic .green { background: #28c840; }

      .app-identity {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        color: #f7f7fb;
        font-size: 13px;
        font-weight: 650;
      }

      .pr-mark {
        width: 22px;
        height: 22px;
        display: inline-grid;
        place-items: center;
        border: 1px solid #8f7cff;
        border-radius: 5px;
        color: #cabfff;
        background: #211c3d;
        font-size: 11px;
        font-weight: 780;
      }

      .title-muted {
        color: var(--soft);
        font-weight: 520;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .top-actions button,
      .workspace-tabs button,
      .panel-tabs button,
      .monitor-controls button,
      .tools-panel button {
        border: 0;
        color: inherit;
      }

      .sync-pill,
      .export-cta {
        height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 12px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 650;
      }

      .sync-pill {
        background: #24262d;
        color: #d6d7df;
      }

      .sync-pill span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(91, 191, 114, 0.12);
      }

      .export-cta {
        background: var(--accent);
        color: #fff;
      }

      .workspace-tabs {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0 12px;
        background: #1d1e24;
        border-bottom: 1px solid #333541;
      }

      .workspace-tabs button {
        height: 26px;
        padding: 0 10px;
        border-radius: 7px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 640;
      }

      .workspace-tabs button.active {
        background: #343642;
        color: #fff;
      }

      .workspace-divider {
        width: 1px;
        height: 18px;
        margin: 0 4px;
        background: #3b3d47;
      }

      .workspace-spacer {

      }

        color: #838692;
        background: #15161b;
        box-shadow: inset 0 0 0 1px #333540;
      }

      .editor-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 314px 48px minmax(0, 1fr) 270px 44px;
        grid-template-rows: 306px minmax(0, 1fr);
        gap: 7px;
        padding: 7px;
        background: #17181d;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);

        grid-row: 1;
      }

        display: grid;
        grid-template-rows: 30px 1fr 26px;
        padding: 7px 5px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #15161a;
      }

      .project-panel {
        grid-column: 1;
        grid-row: 2;
      }

      .tools-panel {
        grid-column: 2;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 8px 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #191a20;
      }

      .timeline-panel {
        grid-column: 3;
        grid-row: 2;
      }

      .properties-panel {
        grid-column: 4;
        grid-row: 2;
      }

      .panel-tabs {
        height: 30px;
        display: flex;

        gap: 1px;
        padding: 0 6px;
        background: #1a1b21;
        border-bottom: 1px solid #363843;
