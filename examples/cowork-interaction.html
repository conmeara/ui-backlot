<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Claude Cowork — Interaction Demo</title>
  </head>
  <body>
    <div id="cowork-interaction" data-composition-id="cowork-interaction" data-width="1280" data-height="800" data-start="0" data-duration="14">
      <section class="cw-stage" data-primitive="cowork-interaction" aria-label="The real Claude app (cowork session): type a prompt, send, and watch the task run with the agent rail">
        <div class="cw-backdrop" aria-hidden="true"></div>
        <div class="cw-frame component-frame"
             data-primitive="claude-app-window"
             data-backlot-mount-src="../compositions/claude-composed-app.html"
             data-backlot-mount-selector="#claude-composed-app"></div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      @import url("../styles/backlot-foundation.css");
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#161310; }
      #cowork-interaction { width:1280px; height:800px; overflow:hidden; font-family:-apple-system,"SF Pro Text",Inter,sans-serif; }
      #cowork-interaction * { box-sizing:border-box; }
      .cw-stage { position:relative; width:1280px; height:800px; overflow:hidden; }
      .cw-backdrop { position:absolute; inset:0; background:
        radial-gradient(120% 90% at 20% 0%, #f4f1ea 0%, #ece7dc 60%, #e4ddcd 100%); }
      .component-frame { position:absolute; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; }
      /* claude-composed-app is a fixed 1440x900; 1280/1440 = 800/900 = 8/9
         exactly, so the REAL app fills the stage edge-to-edge (same fit as
         slack-interaction). */
      .cw-frame { left:0; top:0; width:1280px; height:800px; }
      .cw-frame > [data-backlot-mounted-component] { transform: scale(0.888889); }
      .demo-cursor { position:absolute; left:1060px; top:640px; z-index:90; width:24px; height:24px;
        background:url("../assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:38px; height:38px; border:2.5px solid rgba(217,119,87,0.7); border-radius:50%; opacity:0; }

      /* ---- interaction-only additions (runtime DOM built after mount) ---- */
      .demo-placeholder { position:absolute; pointer-events:none; color:var(--claude-text-faint,#7b7974); }
      .demo-caret { display:inline-block; width:1.5px; height:1.05em; margin-left:1px; vertical-align:text-bottom; background:#141414; opacity:0; }
      /* reply-secondary streams via ix.stream(), which (like ix.type()) gives
         each space its own inline white-space:pre span so a space is never
         eaten mid-reveal — but that also removes the browser's normal wrap
         opportunity at every space, so the whole line refuses to break at
         all (same quirk word-interaction.html documents/fixes for .doc-body).
         Force normal + a definite width so the two-line wrap is deterministic. */
      .thread-slot [data-copy="reply-secondary"] { display: block; width: 640px; max-width: 100%; }
      .thread-slot [data-copy="reply-secondary"] .bl-char { white-space: normal !important; }
      /* The typed reply-composer prompt hits the exact same per-char
         white-space:pre-blocks-wrap quirk (see above) — headless capture
         refuses to break the line at all, letting a full-length prompt run
         past the composer's right edge (clipped) and, once wide enough,
         crowd out the send button that sits in the control row beneath it.
         Same fix: force normal wrap on the typed chars. */
      .composer-slot-cowork .cw-prompt-input .bl-char { white-space: normal !important; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // claude-composed-app.html nests its own ./-relative atom mounts, which
      // the loader resolves against document.baseURI — scope a <base> to
      // compositions/ while the loader's mount fetches run (same fix as
      // mac-multi-app-demo / the root index.html).
      const backlotLoaderSrc = new URL("../runtime/backlot-component-loader.js", document.baseURI).href;
      const backlotMountBase = document.createElement("base");
      backlotMountBase.href = "../compositions/";
      document.head.appendChild(backlotMountBase);
      const backlotLoaderScript = document.createElement("script");
      backlotLoaderScript.src = backlotLoaderSrc;
      window.__backlotLoaderReady = new Promise((resolve) => {
        backlotLoaderScript.onload = () => {
          (window.__backlotComponentsReady || Promise.resolve())
            .then(() => { backlotMountBase.remove(); resolve(); })
            .catch(() => { backlotMountBase.remove(); resolve(); });
        };
        backlotLoaderScript.onerror = () => { backlotMountBase.remove(); resolve(); };
      });
      document.head.appendChild(backlotLoaderScript);
    </script>
    <script src="../runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const stage = document.querySelector(".cw-stage");

      // Registered SYNCHRONOUSLY with a full-duration hold (the mount is
      // async; the renderer must never probe a zero-duration composition).
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.to(stage, { opacity: 1, duration: 14 }, 0);
      window.__timelines["cowork-interaction"] = tl;
      tl.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 }, 0);

      window.__backlotLoaderReady.then(() => {
        const app = stage.querySelector("#claude-composed-app");
        if (!app) return;
        // The real app, on its cowork session view (thread + agent rail).
        app.setAttribute("data-page", "cowork");

        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets (all inside the real composed app) ----
        const input = stage.querySelector(".composer-slot-cowork .cw-prompt-input");
        const sendBtn = stage.querySelector(".composer-slot-cowork .cw-prompt-send");
        const bubble = stage.querySelector(".thread-slot .sticky-prompt-bubble");
        const contextStrip = stage.querySelector(".thread-slot .thread-context-strip");
        const threadWidth = stage.querySelector(".thread-slot .thread-width");
        const replyMark = stage.querySelector(".thread-slot .reply-mark");
        const line1 = stage.querySelector('.thread-slot [data-copy="reply-primary"]');
        const line2 = stage.querySelector('.thread-slot [data-copy="reply-secondary"]');
        const thinkingCard = stage.querySelector(".thread-slot .thinking-card");
        const toolCard = stage.querySelector(".thread-slot .tool-card");
        const toolMeta = toolCard ? toolCard.querySelector('[data-copy="tool-meta"]') : null;
        const toolRows = Array.from(stage.querySelectorAll(".thread-slot .tool-row"));
        const commandCard = stage.querySelector(".thread-slot .command-card");
        const commandPre = commandCard && commandCard.querySelector("pre");
        const actions = stage.querySelector(".thread-slot .message-actions");
        const railStepper = stage.querySelector(".rail-slot .rail-stepper");
        const railSteps = railStepper ? Array.from(railStepper.querySelectorAll(".rail-step")) : [];
        // The rail-stepper mounts with steps 1-2 pre-baked "done" (a checkmark
        // svg each) and step 3 hollow — the progress panel reads as already
        // 2/3-complete before the task has even started. Only the first two
        // steps carry a check icon to hide/reveal below (step 3 has none).
        const railCheckIcons = railSteps.slice(0, 2).map((step) => step.querySelector("svg")).filter(Boolean);
        // The generated-file card ("Title-slide-cover.svg" / "Download and
        // open") that sits at the foot of the assistant turn, right above
        // the fixed composer — visible at rest (pre-baked mount state).
        const attachmentCard = stage.querySelector(".thread-slot .artifact-file-list .file-card");
        if (!input || !sendBtn || !bubble || !line1 || !thinkingCard || !toolCard || !commandCard) return;

        // The prompt typed must be the very message the mounted thread shows.
        const PROMPT = bubble.textContent.trim();
        // reply-secondary wraps to two visual lines — captured now (before the
        // stream() rebuild below clears it) so it can be revealed char-by-char
        // in reading order instead of a rectangular clip wipe.
        const LINE2_TEXT = line2 ? line2.textContent.trim() : "";
        // Natural (un-collapsed) row heights, measured before the tool-card
        // rows are pinned to height:0 below, so each row can grow into place
        // as it lands instead of the card fading in pre-sized with an empty body.
        const toolRowHeights = toolRows.map((row) => row.getBoundingClientRect().height);

        // Closing summary line — the third story beat (a streamed reply that
        // summarizes the finished work) once the progress card resolves. The
        // real thread's own .assistant-copy prose block is reused for font
        // idiom, inserted right after the progress card so it reads as the
        // same reply continuing beneath it; the text target starts EMPTY
        // (house rule) and is filled below via ix.stream().
        let summaryEl = null;
        if (toolCard && toolCard.parentNode) {
          const summaryWrap = document.createElement("div");
          summaryWrap.className = "assistant-copy";
          summaryWrap.style.marginTop = "14px";
          summaryEl = document.createElement("span");
          summaryEl.className = "typing-mask assistant-line";
          summaryWrap.appendChild(summaryEl);
          toolCard.parentNode.insertBefore(summaryWrap, toolCard.nextSibling);
        }

        // The context strip is latent (display:none) in the atom's defaults —
        // enable it statically; visibility is animated via autoAlpha. The
        // Response card + message actions are the CHAT demo's closing beat:
        // removed from layout here so the full progress card fits above the
        // composer; this session instead ends on the progress card's last
        // row settling to done (see step 4 below).
        if (contextStrip) contextStrip.style.display = "flex";
        if (commandCard) commandCard.style.display = "none";
        if (actions) actions.style.display = "none";

        // ---- Composer surgery: empty typing target + separate placeholder
        // (house rule: text targets start EMPTY; placeholder is its own
        // hide()-able element). ----
        input.style.position = "relative";
        input.textContent = "";
        const placeholder = document.createElement("span");
        placeholder.className = "demo-placeholder";
        placeholder.textContent = "Reply…";
        placeholder.style.left = "0";
        placeholder.style.top = "0";
        const typed = document.createElement("span");
        typed.style.color = "var(--claude-ink, #141414)";
        const caret = document.createElement("span");
        caret.className = "demo-caret";
        input.append(placeholder, typed, caret);

        // Per-char display flips (zero layout width until revealed, so the
        // inline caret rides the leading edge — same as slack-interaction).
        const typedChars = [];
        for (const ch of PROMPT) {
          const s = document.createElement("span");
          s.className = "bl-char";
          if (ch === " ") s.style.whiteSpace = "pre";
          s.textContent = ch;
          typed.appendChild(s);
          typedChars.push(s);
        }

        // ---- Send button surgery: the real composer's submit control
        // crossfades into a hollow stop-square for the whole generation and
        // back to the send arrow once the reply settles — ground truth:
        // reference/claude/motion/2026-07-09/code-desktop-tool-progress
        // f-001/f-008 (a hollow rounded-square control sitting in the
        // composer's submit slot while a turn is actively running). Same
        // construction as claude-chat-interaction's cwSendArrow/cwSendStop,
        // stacked absolutely on the button so the swap never shifts the two
        // icons apart inside the fixed 38x38 control. ----
        let sendArrowIcon = null;
        let sendStopIcon = null;
        if (sendBtn) {
          sendArrowIcon = sendBtn.querySelector("svg");
          sendStopIcon = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          sendStopIcon.setAttribute("class", "backlot-icon cw-send-stop");
          sendStopIcon.setAttribute("viewBox", "0 0 24 24");
          sendStopIcon.setAttribute("fill", "none");
          sendStopIcon.setAttribute("stroke", "currentColor");
          sendStopIcon.setAttribute("stroke-width", "2");
          sendStopIcon.setAttribute("stroke-linecap", "round");
          sendStopIcon.setAttribute("stroke-linejoin", "round");
          sendStopIcon.setAttribute("aria-hidden", "true");
          sendStopIcon.innerHTML = '<rect x="3" y="3" width="18" height="18" rx="2"/>';
          sendBtn.style.position = "relative";
          sendStopIcon.style.position = "absolute";
          sendStopIcon.style.inset = "0";
          sendStopIcon.style.margin = "auto";
          sendBtn.appendChild(sendStopIcon);
          gsap.set(sendArrowIcon, { transformOrigin: "50% 50%" });
          gsap.set(sendStopIcon, { autoAlpha: 0, scale: 0.7, transformOrigin: "50% 50%" });
        }

        // ---- Rest-frame pins (t=0): the session sits idle — nothing from
        // the assistant turn is on screen yet. autoAlpha keeps layout static
        // (no reflow on seek). ----
        tl.set(typedChars, { display: "none" }, 0);
        tl.set(caret, { opacity: 0 }, 0);
        tl.set([bubble, contextStrip, replyMark, thinkingCard, toolCard], { autoAlpha: 0 }, 0);
        // Rows start collapsed (not just invisible) so the tool card's body
        // grows with them landing rather than fading in already full height.
        // .tool-row has CSS min-height:38px, which floors a height:0 tween
        // unless min-height is cleared too.
        tl.set(toolRows, { autoAlpha: 0, height: 0, minHeight: 0, overflow: "hidden" }, 0);
        tl.set(line1, { clipPath: "inset(0 100% 0 0)" }, 0);
        // All three progress dots start hollow — the pre-baked 2-of-3-done
        // state is a mount artifact, not the true rest state for this demo.
        if (railCheckIcons.length) tl.set(railCheckIcons, { autoAlpha: 0 }, 0);

        // 1) Focus the real reply composer and type the prompt.
        const FOCUS_AT = 0.9;
        ix.click(input, { at: FOCUS_AT, moveDur: 0.7, press: false });
        ix.hide(placeholder, { at: FOCUS_AT + 0.25, dur: 0.1 });
        tl.set(caret, { opacity: 1 }, FOCUS_AT + 0.1);
        const TYPE_AT = 1.35, CPS = 24;
        for (let i = 0; i < typedChars.length; i++) {
          tl.set(typedChars[i], { display: "inline" }, TYPE_AT + i / CPS);
        }
        const TYPE_END = TYPE_AT + PROMPT.length / CPS;
        const blinkReps = 3;
        tl.to(caret, { opacity: 0, duration: 0.12, yoyo: true, repeat: blinkReps, ease: "steps(1)" }, TYPE_END + 0.05);

        // 2) Send: click the real coral send button; the composer clears and
        //    the prompt appears as the thread's user bubble, in place.
        // +0.9s (not +0.55s): leaves at least one rendered frame showing the
        // finished prompt resting in the composer before the send click,
        // instead of compressing the last few typed characters and the send
        // into the same sampled frame.
        const SEND_AT = TYPE_END + 0.9;
        tl.set(caret, { opacity: 0, overwrite: true }, SEND_AT - 0.02);
        ix.click(sendBtn, { at: SEND_AT, moveDur: 0.55 });
        ix.hide(typed, { at: SEND_AT + 0.08, dur: 0.14 });
        tl.set(placeholder, { opacity: 1, visibility: "inherit" }, SEND_AT + 0.24);
        tl.to(bubble, { autoAlpha: 1, duration: 0.14 }, SEND_AT + 0.12);
        tl.to(contextStrip, { autoAlpha: 1, duration: 0.2 }, SEND_AT + 0.4);
        // The attachment card clears as the send consumes it — the composer
        // area clears together with the bubble flying up, instead of the
        // stale generated-file card lingering above the composer forever.
        if (attachmentCard) tl.to(attachmentCard, { autoAlpha: 0, duration: 0.2 }, SEND_AT);

        // Cursor drifts off into the reading column while the task runs.
        tl.to(".demo-cursor", { left: 620, top: 430, duration: 0.7, ease: "power2.inOut" }, SEND_AT + 0.5);

        // Send → stop crossfade: a quick fade+scale (not an instant swap —
        // the prior send-arrow-stays-put behavior was the judge-flagged
        // bug), starting just after the click lands and held through the
        // whole generation window (crossfade back to send happens at
        // SETTLE_AT below, once the last row resolves).
        const GEN_AT = SEND_AT + 0.15;
        const SEND_CROSSFADE = 0.2;
        if (sendArrowIcon && sendStopIcon) {
          tl.to(sendArrowIcon, { autoAlpha: 0, scale: 0.7, duration: SEND_CROSSFADE }, GEN_AT);
          tl.to(sendStopIcon, { autoAlpha: 1, scale: 1, duration: SEND_CROSSFADE }, GEN_AT);
        }

        // Progress dots 1 and 2 fill in during the streaming/tool phase
        // (dot 3 fills separately at SETTLE_AT, once the whole card
        // resolves — see step 4 below), so the rail's own progressive
        // reveal tracks the task actually unfolding.
        if (railCheckIcons[0]) tl.to(railCheckIcons[0], { autoAlpha: 1, duration: 0.15 }, GEN_AT + 1.0);
        if (railCheckIcons[1]) tl.to(railCheckIcons[1], { autoAlpha: 1, duration: 0.15 }, GEN_AT + 2.0);

        // 3) Assistant turn: line1 wipes in as a single-line clip reveal;
        //    line2 wraps to two visual lines, so it streams char-by-char in
        //    reading order instead (a rectangular wipe would show the second
        //    wrapped line's start before the first wrapped line finishes).
        //    Then the Running-command card, then the progress card's rows
        //    land one by one, then the last row settles to done.
        const AI_AT = SEND_AT + 0.8;
        tl.to(replyMark, { autoAlpha: 1, duration: 0.15 }, AI_AT);
        tl.to(line1, { clipPath: "inset(0 0% 0 0)", duration: 0.7, ease: "none" }, AI_AT + 0.05);
        const LINE2_CPS = 48;
        const LINE2_AT = AI_AT + 0.85;
        const LINE2_DUR = LINE2_TEXT.length / LINE2_CPS;
        if (line2 && LINE2_TEXT) ix.stream(line2, LINE2_TEXT, { at: LINE2_AT, cps: LINE2_CPS });

        const THINK_AT = LINE2_AT + LINE2_DUR + 0.2;
        tl.fromTo(thinkingCard, { autoAlpha: 0, y: 8 }, { autoAlpha: 1, y: 0, duration: 0.3 }, THINK_AT);

        const TOOL_AT = THINK_AT + 0.85;
        tl.fromTo(toolCard, { autoAlpha: 0, y: 8 }, { autoAlpha: 1, y: 0, duration: 0.3 }, TOOL_AT);
        // Every row passes through its own working -> done state, not just
        // the last one: rows 0/1 land in the active/coral-spinner state (the
        // same "tool-row active" construction the last row already used)
        // with a generic "working" status, then resolve to their authored
        // done status just before the next row lands. The last row keeps its
        // existing behavior (it resolves at SETTLE_AT, once the whole card
        // is done — see step 4 below).
        toolRows.forEach((row, i) => {
          const landAt = TOOL_AT + 0.3 + i * 0.5;
          tl.to(row, { autoAlpha: 1, height: toolRowHeights[i], duration: 0.22 }, landAt);
          const isLast = i === toolRows.length - 1;
          if (isLast) return;
          const status = row.querySelector(".tool-status");
          const doneStatus = status ? status.textContent.trim() : "";
          tl.set(row, { attr: { class: "tool-row active" } }, landAt);
          if (status) tl.set(status, { textContent: "working" }, landAt);
          const resolveAt = landAt + 0.3;
          tl.set(row, { attr: { class: "tool-row done" } }, resolveAt);
          if (status) tl.set(status, { textContent: doneStatus }, resolveAt);
        });

        // 4) Settle: the last progress row flips from its active/"working"
        //    spinner state to a resolved checkmark row (same state-flip
        //    pattern as the done rows above it) so the demo ends on a still,
        //    completed frame instead of holding on live motion.
        const LAST_ROW_AT = TOOL_AT + 0.3 + (toolRows.length - 1) * 0.5;
        const SETTLE_AT = LAST_ROW_AT + 0.4;

        // The tool timer ("00:07" as-mounted) ticks up while the card is
        // visibly still running, instead of sitting frozen for the whole
        // card lifetime — a real Claude tool clock counts up one second per
        // second of run time. Ticks are spaced across TOOL_AT..SETTLE_AT
        // (the window the rows are actively landing in) and the last value
        // is re-pinned at SETTLE_AT so the final held frame is still.
        if (toolMeta) {
          const tickSpan = SETTLE_AT - TOOL_AT;
          const tickTimes = [TOOL_AT + tickSpan * 0.25, TOOL_AT + tickSpan * 0.55, TOOL_AT + tickSpan * 0.85];
          const tickLabels = ["00:08", "00:09", "00:10"];
          tickTimes.forEach((t, i) => tl.set(toolMeta, { textContent: tickLabels[i] }, t));
          tl.set(toolMeta, { textContent: tickLabels[tickLabels.length - 1] }, SETTLE_AT);
        }
        const lastRow = toolRows[toolRows.length - 1];
        if (lastRow) {
          const lastLabel = lastRow.querySelector('[data-copy^="tool-row-"]');
          const lastStatus = lastRow.querySelector(".tool-status");
          tl.set(lastRow, { attr: { class: "tool-row done" } }, SETTLE_AT);
          if (lastLabel) tl.set(lastLabel, { textContent: "Updated opening slides" }, SETTLE_AT);
          if (lastStatus) tl.set(lastStatus, { textContent: "ready" }, SETTLE_AT);
        }

        // The rail's Progress stepper (top-right) mirrors the same
        // completion: promote its still-empty third dot to "done" (with the
        // same check glyph the first two dots use) at SETTLE_AT, so the
        // stepper's own progressive reveal matches the caption's promise
        // instead of sitting static at 2-of-3 for the whole run.
        if (railStepper) {
          const railSteps = railStepper.querySelectorAll(".rail-step");
          const doneStep = railSteps[0];
          const lastStep = railSteps[2];
          if (lastStep && doneStep) {
            tl.set(lastStep, { attr: { class: "rail-step done" } }, SETTLE_AT);
            tl.set(lastStep, { innerHTML: doneStep.innerHTML }, SETTLE_AT);
          }
        }

        // Nudge the thread up so the closing summary line (below) has room
        // to land above the fixed composer — the progress card's last row
        // already sits close to the composer's top edge, and the new line
        // needs ~40-60px more. Starts at SETTLE_AT so it's mostly settled by
        // the time the summary begins streaming.
        if (threadWidth) {
          tl.to(threadWidth, { y: -50, duration: 0.4, ease: "power2.out" }, SETTLE_AT);
        }

        // 5) Closing summary: once the progress card resolves, the turn
        // continues with a one-line prose summary of the finished work — the
        // brief's third story beat (send -> preamble -> progress -> summary)
        // instead of ending the instant the last row goes green.
        const SUMMARY_TEXT = "Done — the opening slides now use the correct Q2 numbers.";
        const SUMMARY_CPS = 48;
        const SUMMARY_AT = SETTLE_AT + 0.3;
        const SUMMARY_DUR = SUMMARY_TEXT.length / SUMMARY_CPS;
        if (summaryEl) ix.stream(summaryEl, SUMMARY_TEXT, { at: SUMMARY_AT, cps: SUMMARY_CPS });

        // Stop → send crossfade: the composer's submit control reverts to
        // the send arrow once the WHOLE turn settles — tool rows resolving
        // is not the end of generation, the trailing summary is still
        // streaming, so this now waits for it (same quick fade+scale, not a
        // snap).
        const TURN_END = SUMMARY_AT + SUMMARY_DUR + 0.15;
        if (sendArrowIcon && sendStopIcon) {
          tl.to(sendStopIcon, { autoAlpha: 0, scale: 0.7, duration: SEND_CROSSFADE }, TURN_END);
          tl.to(sendArrowIcon, { autoAlpha: 1, scale: 1, duration: SEND_CROSSFADE }, TURN_END);
        }
      }).catch(() => {});

      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(13.7).pause();
        window.__backlotLoaderReady.then(() => { tl.seek(0).seek(13.7).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
