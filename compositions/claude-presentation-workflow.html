<div id="claude-presentation-workflow" data-composition-id="claude-presentation-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="9">
  <section class="workflow-stage" data-primitive="claude-presentation-workflow" aria-label="Claude and presentation workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="./mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame presentation-component"
      data-primitive="presentation-editor"
      data-backlot-mount-src="./presentation-editor.html"
      data-backlot-mount-selector="#presentation-editor-surface"
    ></div>

    <div
      class="component-frame claude-component"
      data-primitive="claude-composed-app"
      data-backlot-mount-src="./claude-composed-app.html"
      data-backlot-mount-selector="#claude-composed-app"
    ></div>

    <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
    <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
  </section>
</div>

<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #edf1ec;
  }

  #claude-presentation-workflow {
    --ink: #181410;
    --cursor: url("../assets/cursors/normal-select.svg");
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    color: var(--ink);
    font-family: var(--font-claude-ui);
  }

  #claude-presentation-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 16% 15%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0) 22%),
      radial-gradient(circle at 78% 18%, rgba(198, 91, 71, 0.13), rgba(198, 91, 71, 0) 26%),
      radial-gradient(circle at 72% 80%, rgba(181, 211, 197, 0.46), rgba(181, 211, 197, 0) 34%),
      linear-gradient(145deg, #f4efe8 0%, #fbfaf6 47%, #deeae3 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 30px 0 0;
    opacity: 0.48;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(to bottom, transparent 0%, #000 17%, #000 78%, transparent 100%);
  }

  .menu-bar-component {
    position: absolute;
    left: 0;
    top: 0;
    z-index: 40;
    width: 100%;
    height: 30px;
  }

  .component-frame {
    position: absolute;
    overflow: hidden;
    transform-origin: top left;
  }

  .presentation-component {
    left: 616px;
    top: 152px;
    z-index: 8;
    width: 836px;
    height: 438px;
    border-radius: 14px;
    scale: 1.28;
    opacity: 0.98;
    box-shadow: 0 42px 132px rgba(37, 42, 55, 0.26);
  }

  .claude-component {
    left: 116px;
    top: 198px;
    z-index: 16;
    width: 1440px;
    height: 900px;
    border-radius: 18px;
    scale: 0.639;
    background: transparent;
    box-shadow:
      0 44px 138px rgba(54, 42, 31, 0.3),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  .component-frame > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  .workflow-cursor {
    position: absolute;
    left: 1338px;
    top: 548px;
    z-index: 40;
    width: 34px;
    height: 34px;
    background: var(--cursor) 0 0 / contain no-repeat;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
  }

  .click-ring {
    position: absolute;
    left: 1341px;
    top: 552px;
    z-index: 39;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(198, 91, 71, 0.74);
    border-radius: 50%;
    opacity: 0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="../runtime/backlot-component-loader.js"></script>
<script>
  // Pass-110 scene-copy convention: the mounted atoms expose stable
  // data-copy="<slot>" hooks (claude-thread-core + claude-agent-rail); the
  // shell's visible cowork topbar title is addressed through its
  // data-primitive hook. Hooks missing from the mounted DOM are skipped,
  // so the map stays declarative and inert against markup churn. The
  // thread atom's canonical Launch Deck scene already matches the mounted
  // presentation-editor surface (Launch Deck.pptx), so the thread copy is
  // pinned to those canonical strings and the shell title + rail are
  // brought onto the same scene.
  const applyClaudeSceneCopy = () => {
    const claudeRoot = document.querySelector(".claude-component #claude-composed-app");
    if (!claudeRoot) return;
    const sceneCopy = {
      "thread-title": "Update Launch Deck opening slides",
      "thread-subtitle": "Working in Launch Deck",
      "user-prompt": "Oh and update the revenue chart in my LP deck with the correct Q2 numbers.",
      "reply-primary": "I'll update the launch deck from the selected folder.",
      "reply-secondary": "I'm checking the notes, Q2 data, and deck file before returning the edited presentation.",
      "thinking-json": '{ "command": "find /sessions/launch-deck -type f -maxdepth 2", "description": "List selected project files" }',
      "source-chip-1": "slide-notes.md",
      "source-chip-2": "Q2 revenue.csv",
      "tool-title": "Editing Deck.pptx",
      "tool-row-1": "Read Launch Deck folder",
      "tool-row-2": "Found slide notes and Q2 data",
      "tool-row-3": "Updating opening slides",
      "command-output": "Found Launch Deck.pptx, slide-notes.md, and Q2 revenue.csv.\nNext I'll update the title slide and refresh the revenue chart.",
      "artifact-1-kind": "PPTX",
      "artifact-1": "Deck.pptx",
      "context-folder": "Launch Deck",
      "context-file-1-kind": "MD",
      "context-file-1": "slide-notes.md",
      "context-file-2-kind": "CSV",
      "context-file-2": "Q2 revenue.csv",
      "context-file-3-kind": "PPTX",
      "context-file-3": "Deck.pptx"
    };
    Object.entries(sceneCopy).forEach(([slot, text]) => {
      claudeRoot.querySelectorAll(`[data-copy="${slot}"]`).forEach((node) => {
        node.textContent = text;
      });
    });
    const shellTitle = claudeRoot.querySelector('[data-primitive="claude-cowork-topbar"] .shell-thread-title');
    if (shellTitle) shellTitle.textContent = sceneCopy["thread-title"];
  };

  window.__backlotComponentsReady?.then(() => {
    const claudeRoot = document.querySelector("#claude-composed-app");
    if (claudeRoot) {
      claudeRoot.setAttribute("data-page", "cowork");
      claudeRoot.setAttribute("data-sidebar", "on");
      claudeRoot.setAttribute("data-rail", "on");
    }
    applyClaudeSceneCopy();
  });

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.34, ease: "sine.out" }, 0.08);
  tl.from(".presentation-component", { opacity: 0, x: 36, y: 18, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.22);
  tl.from(".claude-component", { opacity: 0, x: -28, y: 20, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.48);
  tl.from(".workflow-cursor", { opacity: 0, x: -28, y: 20, duration: 0.28, ease: "sine.out" }, 1.08);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.3, duration: 0.18, ease: "sine.out" }, 1.52);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 1.74);
  tl.to(".workflow-cursor", { x: -554, y: 262, duration: 1.02, ease: "power2.inOut" }, 2.15);
  tl.to(".click-ring", { x: -554, y: 262, duration: 1.02, ease: "power2.inOut" }, 2.15);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1.32, duration: 0.18, ease: "sine.out" }, 3.1);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.24, ease: "sine.in" }, 3.32);
  tl.to(".claude-component", { x: -8, y: -4, duration: 1.2, ease: "sine.inOut" }, 3.62);
  tl.to(".presentation-component", { x: -18, y: 8, duration: 1.2, ease: "sine.inOut" }, 3.62);
  tl.to(".workflow-cursor", { x: 12, y: -52, duration: 1.05, ease: "power2.inOut" }, 4.1);
  window.__timelines["claude-presentation-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(4.32).pause();
    gsap.set(".claude-component", { x: -8, y: -4, opacity: 1, filter: "blur(0px)" });
    gsap.set(".presentation-component", { x: -18, y: 8, opacity: 0.98, filter: "blur(0px)" });
    gsap.set(".workflow-cursor", { x: 12, y: -52, opacity: 1 });
    gsap.set(".click-ring", { opacity: 0 });
  }
</script>
