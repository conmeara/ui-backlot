    <style>
      /* Canonical Claude sidebar atom.
         Visual source of truth: compositions/claude-desktop.html pass-100
         (#claude-desktop-chat .cd-sidebar, #claude-desktop-cowork .cw-sidebar,
         #claude-desktop-code .code-sidebar). Page switch is pure CSS via
         data-page="chat" | "cowork" | "code" on #claude-sidebar-surface
         (default: chat). Colors consume the canonical --claude-* tokens from
         styles/backlot-foundation.css where a token exists; the .theme-dark
         block at the end mirrors claude-desktop's dark variant. */
      #claude-sidebar-surface {
        width: 360px;
        height: 840px;
        overflow: visible;
        color: var(--claude-ink);
        font-family: var(--font-claude-ui);
      }

      #claude-sidebar-surface * {
        box-sizing: border-box;
      }

      #claude-sidebar-surface button {
        font: inherit;
        cursor: default;
      }

      /* :where() keeps this at class-level specificity so per-icon size
         overrides (.cd-claude-mark, .code-page-pill svg) still win. */
      :where(#claude-sidebar-surface) .backlot-icon {
        width: 100%;
        height: 100%;
        display: block;
      }

      .claude-sidebar-stage {
        width: 360px;
        height: 840px;
        display: grid;
        place-items: center;
        background: var(--claude-paper);
      }

      /* Page switching: default chat; data-page selects cowork/code. */
      .claude-sidebar-panel {
        width: 264px;
        height: 768px;
        display: none;
        flex-direction: column;
        overflow: hidden;
        user-select: none;
      }

      #claude-sidebar-surface:not([data-page="cowork"]):not([data-page="code"]) .panel-chat,
      #claude-sidebar-surface[data-page="cowork"] .panel-cowork,
      #claude-sidebar-surface[data-page="code"] .panel-code {
        display: flex;
      }

      /* Atom presentation only: the desktop shell renders the sidebar as a
         flat full-height column with a border-right; standalone the panel
         keeps the same interior but gets a rounded edge + drop shadow so it
         reads as a component on the stage.
         Scoped to .claude-sidebar-stage because the composer atom uses the
         same .panel-chat/.panel-cowork class names — in a composed shell both
         atoms' styles share one document and would cross-pollute. */
      .claude-sidebar-stage .panel-chat,
      .claude-sidebar-stage .panel-cowork {
        border-radius: 12px;
        border: 1px solid rgba(11, 11, 11, 0.1);
        box-shadow: 0 28px 70px rgba(54, 42, 31, 0.13);
      }

      /* ============ CHAT (cd-*) ============ */
      .claude-sidebar-stage .panel-chat {
        padding: 12px 10px 12px;
        background: #f5f2ec;
      }

      .cd-traffic {
        height: 12px;
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 8px 0 14px 5px;
      }

      .cd-traffic span,
      .cw-traffic span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
      }

      .cd-traffic .red, .cw-traffic .red { background: #ff5f57; }
      .cd-traffic .yellow, .cw-traffic .yellow { background: #febc2e; }
      .cd-traffic .green, .cw-traffic .green { background: #28c840; }

      .cd-brand {
        height: 28px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 6px;
        margin-bottom: 14px;
        color: #34322d;
        font-size: 14.5px;
      }

      .cd-brand strong { font-weight: 550; }

      .cd-claude-mark {
        width: 18px;
        height: 18px;
        color: #d97757;
        flex: 0 0 auto;
      }

      .cd-collapse {
        width: 26px;
        height: 26px;
        margin-left: auto;
        padding: 5px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: #7b7974;
      }

      .cd-nav-row,
      .cd-hist {
        height: 34px;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        padding: 0 8px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #373734;
        font-size: 14px;
        text-align: left;
      }

      .cd-nav-row.active {
        background: rgba(255, 255, 255, 0.92);
        color: var(--claude-ink);
        font-weight: 550;
        box-shadow: inset 0 0 0 1px rgba(55, 48, 40, 0.05);
      }

      .cd-row-ico {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        color: #52514e;
      }

      .cd-label {
        margin: 16px 8px 5px;
        color: var(--claude-text-faint);
        font-size: 11px;
        font-weight: 550;
      }

      .cd-hist {
        height: 32px;
        color: #52514e;
        font-weight: 430;
      }

      .cd-hist span:last-child,
      .cd-nav-row span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cd-hist.selected {
        background: rgba(236, 231, 222, 0.9);
        color: var(--claude-ink);
      }

      .cd-foot {
        margin-top: auto;
        height: 44px;
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr) 20px;
        gap: 9px;
        align-items: center;
        padding: 0 6px;
      }

      .cd-avatar {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--claude-brand-deep);
        color: #fff;
        font-size: 10px;
        font-weight: 550;
      }

      .cd-foot-copy {
        display: grid;

      /* ============ DARK VARIANT ============

      .theme-dark#claude-sidebar-surface[data-page="code"] .claude-sidebar-stage,

    <style>
      /* ============ EMBED VARIANT (composed shells) ============
         [data-embed="flat"] sits on a shell mount slot (an ancestor of the
         mounted surface). It swaps the standalone rounded-panel presentation
         for the desktop shell's flat full-height column geometry, matching
         compositions/claude-desktop.html (.cd-sidebar 260px flat column /
         .cw-sidebar 300px flat column / .code-sidebar floating card).
         Standalone captures are unaffected — the attribute never exists
         there — so this may sit after the dark block: it only neutralizes
         standalone stage/panel presentation (size, radius, shadow), never
         the dark colors. */
      [data-embed="flat"] #claude-sidebar-surface,
      [data-embed="flat"] .claude-sidebar-stage {
        width: 100%;
        height: 100%;
      }

      [data-embed="flat"] .claude-sidebar-stage {
        display: block;
        padding: 0;
        background: transparent;
      }

      [data-embed="flat"] .claude-sidebar-stage .claude-sidebar-panel {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      /* Desktop chat/cowork columns keep only the hairline border-right. */
      [data-embed="flat"] .claude-sidebar-stage .panel-chat {
        border-right: 1px solid rgba(11, 11, 11, 0.1);
      }

      [data-embed="flat"] .claude-sidebar-stage .panel-cowork {
        padding: 22px 22px 18px;
        border-right: 1px solid rgba(11, 11, 11, 0.1);
      }

      /* Re-derive the head row for the 22px padding so the traffic dots land

      [data-embed="flat"] .claude-sidebar-stage .panel-cowork .cw-top {
        margin: 0 0 18px 3px;
      }

      /* Collapse toggle lands 114px from the column edge, as in
         claude-desktop's 300px cowork sidebar (22px pad + 92px head offset):
         22 + 3 + 52px traffic + 37 = 114. */
      [data-embed="flat"] .claude-sidebar-stage .panel-cowork .cw-icon-btn {
        margin-left: 37px;
      }

      /* The id-scoped code-page stage backdrop above outranks the generic
         embed reset; the shell window paints the dark radial itself. */
      [data-embed="flat"] #claude-sidebar-surface[data-page="code"] .claude-sidebar-stage {
        background: transparent;
      }

      /* The code sidebar stays a floating rounded card (the shell slot
         provides the 16px dark inset), minus the standalone drop shadow. */
      [data-embed="flat"] .claude-sidebar-stage .panel-code {
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        box-shadow: none;
      }

      .theme-dark [data-embed="flat"] .claude-sidebar-stage .panel-chat,
      .theme-dark [data-embed="flat"] .claude-sidebar-stage .panel-cowork {
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }
    </style>

  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-sidebar\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-sidebar-template");
      if (!template || document.querySelector("#claude-sidebar-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");
      if (page) document.querySelector("#claude-sidebar-surface").setAttribute("data-page", page);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
