<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Claude Chat — Interaction Demo</title>
  </head>
  <body>
    <div id="claude-chat-interaction" data-composition-id="claude-chat-interaction" data-width="1280" data-height="800" data-start="0" data-duration="12">
      <section class="chat-stage" data-primitive="claude-chat-interaction" aria-label="The real Claude app: type on the home page, send, and the conversation opens with a streaming reply">
        <div class="chat-backdrop" aria-hidden="true"></div>
        <div class="chat-frame component-frame"
             data-primitive="claude-app-window"
             data-backlot-mount-src="compositions/claude-composed-app.html"
             data-backlot-mount-selector="#claude-composed-app"></div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      @import url("styles/backlot-foundation.css");
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#161310; }
      #claude-chat-interaction { width:1280px; height:800px; overflow:hidden; font-family:-apple-system,"SF Pro Text",Inter,sans-serif; }
      #claude-chat-interaction * { box-sizing:border-box; }
      .chat-stage { position:relative; width:1280px; height:800px; overflow:hidden; }
      .chat-backdrop { position:absolute; inset:0; background:
        radial-gradient(120% 90% at 20% 0%, #f4f1ea 0%, #ece7dc 60%, #e4ddcd 100%); }
      .component-frame { position:absolute; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; }
      /* claude-composed-app is a fixed 1440x900; 8/9 fills the 1280x800 stage
         edge-to-edge — the REAL app, not a mock chat card. */
      .chat-frame { left:0; top:0; width:1280px; height:800px; }
      .chat-frame > [data-backlot-mounted-component] { transform: scale(0.888889); }
      .demo-cursor { position:absolute; left:1060px; top:640px; z-index:90; width:24px; height:24px;
        background:url("assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:38px; height:38px; border:2.5px solid rgba(217,119,87,0.7); border-radius:50%; opacity:0; }

      /* ---- interaction-only additions (runtime DOM built after mount) ---- */
      .demo-typedrow { min-width:0; font-size:15.5px; color:var(--claude-ink,#141414); white-space:nowrap; overflow:hidden; }
      .demo-caret { display:inline-block; width:1.5px; height:1.05em; margin-left:1px; vertical-align:text-bottom; background:#141414; opacity:0; }
      .demo-send { width:30px; height:30px; border:0; border-radius:9px; background:#d97757; color:#fff; display:grid; place-items:center; }
      .demo-send svg { width:15px; height:15px; display:block; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Same nested-mount <base> scoping as cowork-interaction /
      // mac-multi-app-demo (claude-composed-app mounts its atoms with
      // ./-relative srcs authored for compositions/).
      const backlotLoaderSrc = new URL("runtime/backlot-component-loader.js", document.baseURI).href;
      const backlotMountBase = document.createElement("base");
      backlotMountBase.href = "compositions/";
      document.head.appendChild(backlotMountBase);
      const backlotLoaderScript = document.createElement("script");
      backlotLoaderScript.src = backlotLoaderSrc;
      window.__backlotLoaderReady = new Promise((resolve) => {
        backlotLoaderScript.onload = () => {
          (window.__backlotComponentsReady || Promise.resolve())
            .then(() => { backlotMountBase.remove(); resolve(); })
            .catch(() => { backlotMountBase.remove(); resolve(); });
        };
        backlotLoaderScript.onerror = () => { backlotMountBase.remove(); resolve(); };
      });
      document.head.appendChild(backlotLoaderScript);
    </script>
    <script src="runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const stage = document.querySelector(".chat-stage");

      // Synchronous registration with a full-duration hold (async mount).
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.to(stage, { opacity: 1, duration: 12 }, 0);
      window.__timelines["claude-chat-interaction"] = tl;
      tl.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 }, 0);

      window.__backlotLoaderReady.then(() => {
        const app = stage.querySelector("#claude-composed-app");
        if (!app) return;
        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        // ---- Mounted targets ----
        const card = stage.querySelector(".composer-slot-home .hm-card");
        const placeholder = stage.querySelector(".composer-slot-home .hm-placeholder");
        const controls = stage.querySelector(".composer-slot-home .hm-controls");
        const modeBtns = stage.querySelectorAll(".composer-slot-home .hm-mode button");
        const mic = stage.querySelector(".composer-slot-home .hm-mic");
        const bubble = stage.querySelector(".thread-slot .sticky-prompt-bubble");
        const contextStrip = stage.querySelector(".thread-slot .thread-context-strip");
        const replyMark = stage.querySelector(".thread-slot .reply-mark");
        const line1 = stage.querySelector('.thread-slot [data-copy="reply-primary"]');
        const line2 = stage.querySelector('.thread-slot [data-copy="reply-secondary"]');
        const thinkingCard = stage.querySelector(".thread-slot .thinking-card");
        const toolCard = stage.querySelector(".thread-slot .tool-card");
        const toolRows = Array.from(stage.querySelectorAll(".thread-slot .tool-row"));
        const commandCard = stage.querySelector(".thread-slot .command-card");
        const commandPre = commandCard && commandCard.querySelector("pre");
        const actions = stage.querySelector(".thread-slot .message-actions");
        if (!card || !placeholder || !controls || !bubble || !line1 || !thinkingCard) return;

        // The prompt typed must be the very message the thread then shows.
        const PROMPT = bubble.textContent.trim();

        // The context strip + Response card are latent (display:none) in the
        // atom's defaults — this demo uses them, so enable them statically;
        // their visibility is animated via autoAlpha. The tool/progress card
        // is the COWORK demo's beat: removed from layout here so the Response
        // card and message actions fit above the composer.
        if (contextStrip) contextStrip.style.display = "flex";
        if (commandCard) commandCard.style.display = "block";
        if (toolCard) toolCard.style.display = "none";

        // ---- Home-composer surgery: the placeholder goes absolute, a
        // dedicated typed row takes its grid cell, and a send button (the
        // real app shows one once text is present) joins the controls. ----
        card.style.position = "relative";
        placeholder.style.position = "absolute";
        placeholder.style.left = "16px";
        placeholder.style.top = "18px";
        const typedRow = document.createElement("div");
        typedRow.className = "demo-typedrow";
        const typed = document.createElement("span");
        const caret = document.createElement("span");
        caret.className = "demo-caret";
        typedRow.append(typed, caret);
        card.insertBefore(typedRow, card.firstChild);
        const sendBtn = document.createElement("button");
        sendBtn.type = "button";
        sendBtn.className = "demo-send";
        sendBtn.setAttribute("aria-label", "Send");
        sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>';
        controls.insertBefore(sendBtn, mic || null);

        const typedChars = [];
        for (const ch of PROMPT) {
          const s = document.createElement("span");
          s.className = "bl-char";
          if (ch === " ") s.style.whiteSpace = "pre";
          s.textContent = ch;
          typed.appendChild(s);
          typedChars.push(s);
        }

        // ---- Rest-frame pins (t=0): home page, Chat pill active (this is a
        // chat, not a cowork run), send hidden, thread parts hidden. The
        // tool/progress card never shows in this demo — that's the cowork
        // demo's beat. ----
        tl.set(app, { attr: { "data-page": "home" } }, 0);
        if (modeBtns.length === 2) {
          tl.set(modeBtns[0], { attr: { class: "active" } }, 0);
          tl.set(modeBtns[1], { attr: { class: "" } }, 0);
        }
        tl.set(typedChars, { display: "none" }, 0);
        tl.set(caret, { opacity: 0 }, 0);
        tl.set(sendBtn, { autoAlpha: 0 }, 0);
        tl.set([bubble, contextStrip, replyMark, thinkingCard, commandCard, actions], { autoAlpha: 0 }, 0);
        tl.set([line1, line2], { clipPath: "inset(0 100% 0 0)" }, 0);

        // 1) Click the home composer and type the prompt.
        const FOCUS_AT = 0.9;
        ix.click(placeholder, { at: FOCUS_AT, moveDur: 0.7, press: false });
        ix.hide(placeholder, { at: FOCUS_AT + 0.25, dur: 0.1 });
        tl.set(caret, { opacity: 1 }, FOCUS_AT + 0.1);
        const TYPE_AT = 1.3, CPS = 24;
        for (let i = 0; i < typedChars.length; i++) {
          tl.set(typedChars[i], { display: "inline" }, TYPE_AT + i / CPS);
        }
        tl.to(sendBtn, { autoAlpha: 1, duration: 0.15 }, TYPE_AT + 1 / CPS);
        const TYPE_END = TYPE_AT + PROMPT.length / CPS;
        tl.to(caret, { opacity: 0, duration: 0.12, yoyo: true, repeat: 3, ease: "steps(1)" }, TYPE_END + 0.05);

        // 2) Send → the app opens the conversation (page flips to the real
        //    chat view) with the prompt as the user bubble.
        const SEND_AT = TYPE_END + 0.55;
        tl.set(caret, { opacity: 0, overwrite: true }, SEND_AT - 0.02);
        ix.click(sendBtn, { at: SEND_AT, moveDur: 0.55 });
        const FLIP_AT = SEND_AT + 0.18;
        tl.set(app, { attr: { "data-page": "chat" } }, FLIP_AT);
        tl.to(bubble, { autoAlpha: 1, duration: 0.14 }, FLIP_AT + 0.1);
        tl.to(contextStrip, { autoAlpha: 1, duration: 0.2 }, FLIP_AT + 0.35);

        // Cursor drifts into the reading column while the reply streams.
        tl.to(".demo-cursor", { left: 620, top: 420, duration: 0.7, ease: "power2.inOut" }, FLIP_AT + 0.3);

        // 3) The reply streams in: lead lines wipe like live text, the
        //    Running-command card appears, then the Response output streams.
        const AI_AT = FLIP_AT + 0.7;
        tl.to(replyMark, { autoAlpha: 1, duration: 0.15 }, AI_AT);
        tl.to(line1, { clipPath: "inset(0 0% 0 0)", duration: 0.7, ease: "none" }, AI_AT + 0.05);
        tl.to(line2, { clipPath: "inset(0 0% 0 0)", duration: 0.95, ease: "none" }, AI_AT + 0.85);

        const THINK_AT = AI_AT + 2.0;
        tl.fromTo(thinkingCard, { autoAlpha: 0, y: 8 }, { autoAlpha: 1, y: 0, duration: 0.3 }, THINK_AT);

        const CMD_AT = THINK_AT + 1.0;
        tl.fromTo(commandCard, { autoAlpha: 0, y: 8 }, { autoAlpha: 1, y: 0, duration: 0.3 }, CMD_AT);
        if (commandPre) {
          tl.set(commandPre, { clipPath: "inset(0 0 100% 0)" }, 0);
          tl.to(commandPre, { clipPath: "inset(0 0 0% 0)", duration: 1.1, ease: "none" }, CMD_AT + 0.25);
        }

        // 4) The turn settles.
        if (actions) tl.to(actions, { autoAlpha: 1, duration: 0.2 }, CMD_AT + 1.6);
      }).catch(() => {});

      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") {
        tl.seek(11.6).pause();
        window.__backlotLoaderReady.then(() => { tl.seek(0).seek(11.6).pause(); }).catch(() => {});
      }
    </script>
  </body>
</html>
