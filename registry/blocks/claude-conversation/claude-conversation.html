    <style>
      #claude-conversation-surface {
        --paper: #fbfaf6;
        --paper-deep: #f4efe8;
        --ink: #16120f;
        --muted: #6a6258;
        --hairline: rgba(45, 36, 28, 0.14);
        --brand: #c65b47;
        --brand-soft: #d8755f;
        width: 1280px;
        height: 720px;
        overflow: visible;
        color: var(--ink);
        font-family: var(--font-claude-ui);
      }

      #claude-conversation-surface * {
        box-sizing: border-box;
      }

      #claude-conversation-surface button {
        font: inherit;
      }

      .claude-conversation-canvas {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        border-radius: 26px;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 22%),
          linear-gradient(180deg, #fffefa 0%, var(--paper) 100%);
        box-shadow:
          0 34px 120px rgba(54, 42, 31, 0.14),
          0 0 0 1px rgba(55, 42, 31, 0.07);
      }

      .conversation-field {
        position: absolute;
        inset: 0;
        opacity: 0.42;
        background:
          linear-gradient(90deg, transparent 0 9%, rgba(231, 224, 215, 0.42) 9% calc(9% + 1px), transparent calc(9% + 1px) 100%),
          linear-gradient(90deg, transparent 0 91%, rgba(231, 224, 215, 0.34) 91% calc(91% + 1px), transparent calc(91% + 1px) 100%);
        pointer-events: none;
      }

      .user-bubble-stack {
        position: absolute;
        right: 66px;
        top: 72px;
        z-index: 3;
        width: 306px;
        display: grid;
        gap: 10px;
      }

      .user-bubble {
        justify-self: end;
        max-width: 306px;
        padding: 12px 16px;
        border-radius: 16px;
        background: #f0ede6;
        color: #2b2621;
        box-shadow: 0 1px 0 rgba(55, 48, 40, 0.04);
        font-size: 15px;
        line-height: 1.28;
      }

      .user-bubble.compact {
        max-width: 276px;
      }

      .conversation-body {
        position: absolute;
        left: 164px;
        top: 160px;
        z-index: 2;
        width: 742px;
        min-height: 302px;
      }

      .assistant-response {
        display: grid;
        gap: 46px;
        max-width: 736px;
        color: var(--ink);
        font-family: var(--font-claude-serif);
        letter-spacing: 0;
      }

      .assistant-line {
        margin: 0;
        font-size: 43px;
        line-height: 1.15;
        font-weight: 455;
      }

      .assistant-line.secondary {
        max-width: 720px;
      }

      .claude-mark-icon {
        display: inline-block;
        color: #d97757;
      }

      .claude-mark-icon.response-mark {
        position: absolute;
        left: 12px;
        top: 317px;
        width: 56px;
        height: 56px;
      }

      .reply-composer {
        position: absolute;
        left: 124px;
        right: 124px;
        bottom: 48px;
        z-index: 4;
        min-height: 126px;
        display: grid;
        grid-template-rows: 1fr 42px;
        padding: 21px 22px 16px;
        border: 1px solid var(--hairline);
        border-radius: 26px;
        background: rgba(255, 254, 251, 0.98);
        box-shadow:
          0 1px 1px rgba(49, 44, 38, 0.04),
          0 18px 48px rgba(64, 48, 34, 0.07);
      }

      .composer-placeholder {
        color: #777169;
        font-size: 35px;
        line-height: 1.2;
        font-weight: 430;
      }

      .composer-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
      }

      .composer-round {
        position: relative;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border: 1px solid rgba(39, 37, 34, 0.1);
        border-radius: 50%;
        background: #f7f4ee;
        color: var(--muted);
      }

      .composer-round.plus::before,
      .composer-round.plus::after {
        content: "";
        position: absolute;
        width: 13px;
        height: 2px;
        border-radius: 2px;
        background: currentColor;
      }

      .composer-round.plus::after {
        transform: rotate(90deg);
      }

      .folder-pill {
        height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 13px;
        border: 1px solid rgba(39, 37, 34, 0.1);
        border-radius: 999px;
        background: #faf8f4;
        color: #403a33;
        font-size: 14px;
      }

      .folder-mini {
        position: relative;
        width: 14px;
        height: 11px;
        border-radius: 2px;
        background: #d8d1c5;
      }

      .folder-mini::before {
        content: "";
        position: absolute;
        left: 1px;
        top: -4px;
        width: 8px;
        height: 5px;
        border-radius: 2px 2px 0 0;
        background: #c8bdae;
      }

      .composer-spacer {
        flex: 1 1 auto;
      }

      .composer-round.mic::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 8px;
        width: 8px;
        height: 14px;
        border-radius: 7px;
        border: 2px solid currentColor;
        border-top-width: 3px;
      }

      .composer-round.mic::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 21px;
        width: 13px;
        height: 7px;
        border-bottom: 2px solid currentColor;
        border-radius: 0 0 12px 12px;
      }

      .send-button {
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        border: 0;
        border-radius: 50%;
        background: var(--brand-soft);
        position: relative;
        box-shadow: 0 8px 18px rgba(216, 117, 95, 0.22);
      }

      .send-button::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 12px;
        width: 13px;
        height: 13px;
        border-left: 3px solid #fff;
        border-top: 3px solid #fff;
        transform: rotate(45deg);
      }
    </style>

    <script>

      tl.from(".assistant-line.secondary", { opacity: 0, y: 24, duration: 0.68, ease: "circ.out" }, 1.18);
      tl.from(".response-mark", { opacity: 0, scale: 0.72, rotation: -14, duration: 0.5, ease: "back.out(1.25)" }, 1.48);

      tl.to(".send-button", { scale: 1.055, duration: 0.34, repeat: 2, yoyo: true, ease: "sine.inOut" }, 2.6);

  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-conversation\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-conversation-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-conversation-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
