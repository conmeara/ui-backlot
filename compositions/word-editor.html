    <script>
      window.__timelines = window.__timelines || {};
      const wordDuration = 12;
      const syncRepeat = Math.max(0, Math.floor((wordDuration - 1.6) / 0.9) - 1);
      const tl = gsap.timeline({ paused: true });

      tl.from(".word-window", { opacity: 0, y: 20, scale: 0.987, duration: 0.42, ease: "power2.out" }, 0.12);
      tl.from(".word-ribbon", { opacity: 0, y: -8, duration: 0.32, ease: "power2.out" }, 0.44);
      tl.from(".nav-pane", { opacity: 0, x: -14, duration: 0.34, ease: "power3.out" }, 0.7);
      tl.from(".review-pane", { opacity: 0, x: 14, duration: 0.34, ease: "power3.out" }, 0.78);
      tl.from(".page", { opacity: 0, y: 16, duration: 0.36, ease: "power2.out" }, 0.98);
      tl.to(".before-title", { opacity: 0, y: -5, duration: 0.32, ease: "power2.inOut" }, 1.75);
      tl.to(".after-title", { opacity: 1, y: 0, duration: 0.34, ease: "power2.out" }, 1.9);
      tl.from(".tracked-change", { opacity: 0, x: -8, duration: 0.3, ease: "power2.out" }, 2.18);
      tl.from(".comment-card.active", { opacity: 0, x: 12, duration: 0.3, ease: "power2.out" }, 2.36);

<script>
  (() => {
    const isDirectPreview = decodeURIComponent(window.location.pathname).endsWith("/word-editor.html");
    if (!isDirectPreview) return;

    const mount = () => {
      if (document.getElementById("word-editor-surface")) return;
      const template = document.getElementById("word-editor-surface-template");
      if (!template || !document.body) return;

      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };

    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
