<style>
      @import url("../styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #fbfaf6;
  }
</style>

<template id="claude-home-launch-template">
  <div id="claude-home-launch-surface" data-composition-id="claude-home-launch-surface" data-width="1920" data-height="1080">
    <section class="claude-home-launch-frame" data-primitive="claude-home-launch" aria-label="Editable Claude launch prompt surface">
      <div class="launch-bubbles" data-primitive="claude-launch-user-prompts">
        <div class="launch-bubble bubble-one">
          Ah good catch! I’ll check it out later. Can you actually...<br>
          go and renew my license plate with the DMV?
        </div>
        <div class="launch-bubble bubble-two">and file all the expenses from my SF trip?</div>
        <div class="launch-bubble bubble-three">
          Oh and update the revenue chart in my LP deck<br>
          with the correct Q2 numbers
        </div>
        <div class="launch-bubble bubble-four">
          I also have a shipment arriving Thursday<br>
          but need to push it to Saturday
        </div>
      </div>

      <div class="launch-loader" aria-label="Claude is thinking">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span>
      </div>
    </section>

    <style>
      #claude-home-launch-surface {
        width: 1920px;
        height: 1080px;
        overflow: visible;
        color: #11100f;
        font-family: var(--font-claude-ui);
      }

      #claude-home-launch-surface * {
        box-sizing: border-box;
      }

      .claude-home-launch-frame {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fbfaf6;
      }

      .launch-bubbles {
        position: absolute;
        inset: 0;
      }

      .launch-bubble {
        position: absolute;
        min-height: 1px;
        display: grid;
        align-content: center;
        border-radius: 27px;
        background: #eeece6;
        color: #11100f;
        font-size: 48px;
        font-weight: 385;
        line-height: 1.53;
        letter-spacing: 0;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          0 1px 0 rgba(42, 34, 26, 0.018);
        transform: translateZ(0);
        white-space: nowrap;
      }

      .bubble-one {
        left: 448px;
        top: 101px;
        width: 1288px;
        height: 195px;
        padding: 24px 52px 27px;
      }

      .bubble-two {
        left: 724px;
        top: 314px;
        width: 1012px;
        height: 130px;
        padding: 24px 48px 26px;
      }

      .bubble-three {
        left: 594px;
        top: 464px;
        width: 1142px;
        height: 196px;
        padding: 25px 46px 28px;
      }

      .bubble-four {
        left: 738px;
        top: 680px;
        width: 998px;
        height: 196px;
        padding: 25px 48px 28px;
      }

      .launch-loader {
        position: absolute;
        left: 220px;
        top: 884px;
        width: 92px;
        height: 92px;
        color: #c65b47;
        transform: rotate(9deg);
      }

      .launch-loader span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
        opacity: calc(0.24 + (var(--i) * 0.044));
        transform:
          translate(-50%, -50%)
          rotate(calc(var(--i) * 25.714deg))
          translateY(-40px);
      }

      .launch-loader span:nth-child(1) { --i: 0; }
      .launch-loader span:nth-child(2) { --i: 1; }
      .launch-loader span:nth-child(3) { --i: 2; }
      .launch-loader span:nth-child(4) { --i: 3; }
      .launch-loader span:nth-child(5) { --i: 4; }
      .launch-loader span:nth-child(6) { --i: 5; }
      .launch-loader span:nth-child(7) { --i: 6; }
      .launch-loader span:nth-child(8) { --i: 7; }
      .launch-loader span:nth-child(9) { --i: 8; }
      .launch-loader span:nth-child(10) { --i: 9; }
      .launch-loader span:nth-child(11) { --i: 10; }
      .launch-loader span:nth-child(12) { --i: 11; }
      .launch-loader span:nth-child(13) { --i: 12; }
      .launch-loader span:nth-child(14) { --i: 13; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
      tl.from(".launch-bubble", { opacity: 0, y: 26, filter: "blur(4px)", stagger: 0.18, duration: 0.58 }, 0.1);
      tl.from(".launch-loader", { opacity: 0, scale: 0.82, duration: 0.42, ease: "back.out(1.2)" }, 0.92);
      tl.to(".launch-loader", { rotation: 369, duration: 3.8, ease: "none" }, 1.02);
      tl.to(".launch-loader span", { opacity: 0.9, stagger: 0.025, duration: 0.32, repeat: 4, yoyo: true, ease: "sine.inOut" }, 1.04);
      window.__timelines["claude-home-launch-surface"] = tl;
    </script>
  </div>
</template>

<script>
  (() => {
    const isDirectPreview = /\/claude-home-launch\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("claude-home-launch-template");
    const mount = () => {
      if (!template || document.querySelector("#claude-home-launch-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
