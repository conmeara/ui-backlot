<style>

          <span>Local workspace connected</span>

        <header class="codex-topbar">
          <div>
            <h1>UI Backlot refinement</h1>
            <span>/Users/conmeara/Projects/ui-backlot</span>
          </div>
          <div class="topbar-actions">
            <button type="button" class="model-pill"><span></span>GPT-5</button>
            <button type="button" class="mode-pill">Agent</button>
            <button type="button" class="share-button">Share</button>

                  <strong>Reading local evidence</strong>
                  <em>safe</em>
                </div>
                <div class="tool-row ok"><b>shell</b><span>codex app --help</span><time>ready</time></div>
                <div class="tool-row ok"><b>read</b><span>Codex.app Info.plist</span><time>26.611.62324</time></div>
                <div class="tool-row active"><b>edit</b><span>compositions/codex-app.html</span><time>now</time></div>

            <button type="button" class="attach-button"><span></span>Attach</button>
            <button type="button" class="context-button">ui-backlot</button>
            <button type="button" class="send-button" aria-label="Send"></button>
          </div>
        </footer>

      <aside class="codex-inspector" data-primitive="codex-inspector">

          <div class="goal-meta"><span>Active</span><strong>ui-backlot</strong></div>

          <div class="meta-row"><span>Codex.app</span><strong>26.611.62324</strong></div>
          <div class="meta-row"><span>CodexBar</span><strong>0.32.2</strong></div>

    <style>

        font-style: normal;
        font-display: swap;

      #codex-app-surface {

        --paper-3: #eee7dc;

<script>
  (() => {
    const isDirectPreview = /\/codex-app\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const template = document.getElementById("codex-app-surface-template");
    const mount = () => {
      if (!template || document.querySelector("#codex-app-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mount, { once: true });
    } else {
      mount();
    }
  })();
</script>
