<div id="claude-browser-workflow" data-composition-id="claude-browser-workflow" data-width="1920" data-height="1080" data-start="0" data-duration="10">
  <section class="workflow-stage" data-primitive="claude-browser-workflow" aria-label="Claude and browser workflow composition">
    <div class="desktop-field" aria-hidden="true"></div>

    <div
      class="component-frame menu-bar-component"
      data-primitive="mac-menu-bar"
      data-backlot-mount-src="compositions/mac-menu-bar.html"
      data-backlot-mount-selector="#mac-menu-bar-surface"
    ></div>

    <div
      class="component-frame browser-component"
      data-primitive="browser-app-window"
      data-backlot-mount-src="compositions/browser-app.html"
      data-backlot-mount-selector="#browser-app-surface"
    ></div>

    <div
      class="component-frame claude-draft-component"
      data-primitive="claude-attachment-draft-window"
      data-backlot-mount-src="compositions/claude-attachment-draft.html"
      data-backlot-mount-selector="#claude-attachment-draft-surface"
    ></div>

    <div
      class="component-frame claude-thread-component"
      data-primitive="claude-composed-app"
      data-backlot-mount-src="compositions/claude-composed-app.html"
      data-backlot-mount-selector="#claude-composed-app"
    ></div>

    <div class="workflow-cursor" data-primitive="cursor" aria-hidden="true"></div>
    <div class="click-ring" data-primitive="click-ring" aria-hidden="true"></div>
  </section>
</div>

<style>
      @import url("styles/backlot-foundation.css");
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #e9eee8;
  }

  #claude-browser-workflow {
    --ink: #181410;
    --muted: #625c54;
    --paper: #f7f5ef;
    --hairline: rgba(43, 35, 28, 0.12);
    --glass: rgba(255, 255, 255, 0.58);
    --cursor: url("assets/cursors/normal-select.svg");
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    color: var(--ink);
    font-family: var(--font-claude-ui);
  }

  #claude-browser-workflow * {
    box-sizing: border-box;
  }

  .workflow-stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 16% 16%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 20%),
      radial-gradient(circle at 76% 18%, rgba(205, 110, 87, 0.16), rgba(205, 110, 87, 0) 25%),
      radial-gradient(circle at 72% 78%, rgba(189, 212, 199, 0.42), rgba(189, 212, 199, 0) 30%),
      linear-gradient(145deg, #f2eee7 0%, #fbfaf6 46%, #dfe9e2 100%);
  }

  .desktop-field {
    position: absolute;
    inset: 28px 0 0;
    opacity: 0.55;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.26) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: linear-gradient(to bottom, transparent 0%, #000 18%, #000 76%, transparent 100%);
  }

  .menu-bar-component {
    position: absolute;
    left: 0;
    top: 0;
    z-index: 40;
    width: 100%;
    height: 30px;
  }

  .component-frame {
    position: absolute;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.28);
    box-shadow: 0 34px 110px rgba(47, 38, 30, 0.22);
    transform-origin: top left;
  }

  .browser-component {
    left: 498px;
    top: 122px;
    width: 1516px;
    height: 864px;
    border-radius: 18px;
    scale: 0.82;
    opacity: 0.94;
    filter: saturate(0.98);
  }

  .claude-draft-component,
  .claude-thread-component {
    left: 132px;
    top: 170px;
    width: 1180px;
    height: 780px;
    border-radius: 18px;
    scale: 0.8;
    background: transparent;
    box-shadow:
      0 42px 130px rgba(54, 42, 31, 0.28),
      0 0 0 1px rgba(55, 42, 31, 0.08);
  }

  .claude-draft-component {
    z-index: 16;
  }

  .component-frame > [data-backlot-mounted-component] {
    display: block;
    pointer-events: none;
  }

  /* claude-composed-app is a fixed 1440x900 shell; scale-to-fit-height
     inside the 1180x780 claude-thread-component frame (matches the old
     claude-app footprint, which rendered natively at 1180x780 with no
     inner scaling — the frame's own `scale: 0.8` still applies the overall
     stage shrink). Scoped to the thread slot only: the sibling
     claude-draft-component keeps mounting claude-attachment-draft.html
     unscaled. */
  .claude-thread-component > [data-backlot-mounted-component] {
    width: 1440px;
    height: 900px;
    transform: scale(0.8667);
    transform-origin: top left;
  }

  .claude-thread-component {
    z-index: 15;
    opacity: 0;
    visibility: hidden;
  }

  .workflow-cursor {
    position: absolute;
    left: 875px;
    top: 604px;
    z-index: 40;
    width: 34px;
    height: 34px;
    background: var(--cursor) 0 0 / contain no-repeat;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
  }

  .click-ring {
    position: absolute;
    left: 876px;
    top: 607px;
    z-index: 39;
    width: 26px;
    height: 26px;
    border: 2px solid rgba(198, 91, 71, 0.72);
    border-radius: 50%;
    opacity: 0;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="runtime/backlot-component-loader.js"></script>
<script>
  // Set the canonical shell's page/toggle attributes on the mounted root
  // once the component loader settles (shell defaults to data-page="cowork"
  // already, matching the old claude-app cowork framing; sidebar+rail stay
  // on to match the old three-column crop).
  // Pass-110 scene-copy convention: the mounted atoms expose stable
  // data-copy="<slot>" hooks (claude-thread-core + claude-agent-rail); the
  // shell's visible cowork topbar title is addressed through its
  // data-primitive hook. Hooks missing from the mounted DOM are skipped,
  // so the map stays declarative and inert against markup churn. Scene
  // matches the mounted browser-app surface (the "Launch Deck Review"
  // board at review.local/launch-deck/board with Q2 revenue.csv and
  // slide-notes.md tabs).
  const applyClaudeSceneCopy = () => {
    const claudeRoot = document.querySelector(".claude-thread-component #claude-composed-app");
    if (!claudeRoot) return;
    const sceneCopy = {
      "thread-title": "Update Launch Deck review board",
      "thread-subtitle": "Working in Launch Deck",
      "user-prompt": "Oh and push the approved Q2 numbers to the launch review board.",
      "reply-primary": "I'll update the review board from the selected folder.",
      "reply-secondary": "I'm checking the approved claims and Q2 data before publishing the updated queue.",
      "thinking-json": '{ "command": "find /sessions/launch-deck -type f -maxdepth 2", "description": "List selected project files" }',
      "source-chip-1": "slide-notes.md",
      "source-chip-2": "Q2 revenue.csv",
      "tool-title": "Updating review board",
      "tool-row-1": "Read Launch Deck folder",
      "tool-row-2": "Found approved Q2 claims",
      "tool-row-3": "Publishing board updates",
      "command-output": "Found slide-notes.md, Q2 revenue.csv, and approved-claims.md.\nNext I'll push the approved numbers to the review queue.",
      "artifact-1-kind": "HTML",
      "artifact-1": "review-queue.html",
      "context-folder": "Launch Deck",
      "context-file-1-kind": "MD",
      "context-file-1": "slide-notes.md",
      "context-file-2-kind": "CSV",
      "context-file-2": "Q2 revenue.csv",
      "context-file-3-kind": "MD",
      "context-file-3": "approved-claims.md"
    };
    Object.entries(sceneCopy).forEach(([slot, text]) => {
      claudeRoot.querySelectorAll(`[data-copy="${slot}"]`).forEach((node) => {
        node.textContent = text;
      });
    });
    const shellTitle = claudeRoot.querySelector('[data-primitive="claude-cowork-topbar"] .shell-thread-title');
    if (shellTitle) shellTitle.textContent = sceneCopy["thread-title"];
  };

  if (window.__backlotComponentsReady) {
    window.__backlotComponentsReady.then(() => {
      const shellRoot = document.querySelector(".claude-thread-component #claude-composed-app");
      if (shellRoot) {
        shellRoot.setAttribute("data-page", "cowork");
        shellRoot.setAttribute("data-sidebar", "on");
        shellRoot.setAttribute("data-rail", "on");
      }
      applyClaudeSceneCopy();
    }).catch(() => {});
  }

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
  tl.from(".menu-bar-component", { opacity: 0, y: -12, duration: 0.38, ease: "sine.out" }, 0.08);
  tl.from(".browser-component", { opacity: 0, x: 42, y: 18, filter: "blur(7px)", duration: 0.62, ease: "power3.out" }, 0.2);
  tl.from(".claude-draft-component", { opacity: 0, x: -28, y: 22, filter: "blur(7px)", duration: 0.58, ease: "power3.out" }, 0.62);
  tl.from(".workflow-cursor", { opacity: 0, x: -28, y: 22, duration: 0.28, ease: "sine.out" }, 1.22);
  tl.to(".workflow-cursor", { x: 86, y: 24, duration: 0.72, ease: "power2.inOut" }, 1.75);
  tl.fromTo(".click-ring", { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1.28, duration: 0.24, ease: "sine.out" }, 2.32);
  tl.to(".click-ring", { opacity: 0, scale: 1.9, duration: 0.26, ease: "sine.in" }, 2.6);
  tl.to(".claude-draft-component", { autoAlpha: 0, y: -16, filter: "blur(4px)", duration: 0.34, ease: "sine.inOut" }, 3.05);
  tl.fromTo(".claude-thread-component", { autoAlpha: 0, y: 18, filter: "blur(4px)" }, { autoAlpha: 1, y: 0, filter: "blur(0px)", duration: 0.48, ease: "power3.out" }, 3.16);
  tl.to(".browser-component", { x: -20, y: -8, duration: 1.8, ease: "sine.inOut" }, 3.45);
  tl.to(".claude-thread-component", { y: -10, duration: 1.8, ease: "sine.inOut" }, 5.1);
  tl.to(".workflow-cursor", { x: 538, y: -126, duration: 1.05, ease: "power2.inOut" }, 6.05);
  window.__timelines["claude-browser-workflow"] = tl;

  const captureMode = new URLSearchParams(window.location.search).get("capture");
  if (captureMode === "hero") {
    tl.seek(2.75).pause();
  } else if (captureMode === "thread") {
    tl.seek(5.32).pause();
    gsap.set(".claude-draft-component", { autoAlpha: 0, y: -16, filter: "blur(4px)" });
    gsap.set(".claude-thread-component", { autoAlpha: 1, y: 0, filter: "blur(0px)" });
    gsap.set(".browser-component", { x: -20, y: -8 });
  }
</script>
