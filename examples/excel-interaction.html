<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Excel — Interaction Demo</title>
  </head>
  <body>
    <div id="excel-interaction" data-composition-id="excel-interaction" data-width="1280" data-height="800" data-start="0" data-duration="6.4">
      <section class="xl-stage" data-primitive="excel-interaction" aria-label="Excel with a scripted cell selection, formula entry, and result">
        <div class="xl-window">
          <div class="xl-titlebar"><span class="dots"><i></i><i></i><i></i></span><span class="fname">Launch Metrics.xlsx</span></div>
          <div class="xl-formula">
            <span class="name-box" data-role="namebox">A1</span>
            <span class="fx">fx</span>
            <span class="formula-input" data-role="formula"></span>
          </div>
          <div class="xl-grid" data-role="grid">
            <div class="ch"></div><div class="ch">A</div><div class="ch">B</div><div class="ch">C</div><div class="ch">D</div>
            <div class="rh">1</div><div class="cell head">Launch metrics</div><div class="cell head">Owner</div><div class="cell head">Q2</div><div class="cell head">Goal</div>
            <div class="rh">2</div><div class="cell">Revenue story</div><div class="cell">Claude</div><div class="cell num">128</div><div class="cell num">110</div>
            <div class="rh">3</div><div class="cell">Adoption rate</div><div class="cell">Growth</div><div class="cell num">42</div><div class="cell num">38</div>
            <div class="rh">4</div><div class="cell">Customer quote</div><div class="cell">Review</div><div class="cell num">18</div><div class="cell num">12</div>
            <div class="rh">5</div><div class="cell">Speaker notes</div><div class="cell">Ready</div><div class="cell num" data-cell="C5">2</div><div class="cell num">2</div>
            <div class="rh">6</div><div class="cell">Opening slide</div><div class="cell">Ready</div><div class="cell num" data-cell="C6">4</div><div class="cell num">4</div>
            <div class="rh">7</div><div class="cell">Chart update</div><div class="cell">Working</div><div class="cell num" data-cell="C7">6</div><div class="cell num">5</div>
            <div class="rh">8</div><div class="cell strong">Deck total</div><div class="cell"></div><div class="cell num result" data-cell="C8" data-role="result"></div><div class="cell num">9</div>
          </div>
          <div class="xl-status"><span data-role="status">Ready</span><span class="right">Sum: <b data-role="sum">0</b></span></div>
        </div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#d7dbe0; }
      #excel-interaction { width:1280px; height:800px; overflow:hidden; font-family:-apple-system,"SF Pro Text",Inter,sans-serif; color:#16120f; }
      #excel-interaction * { box-sizing:border-box; }
      .xl-stage { position:relative; width:1280px; height:800px; overflow:hidden; background:linear-gradient(160deg,#e9edf1,#dde3e9); display:grid; place-items:center; }
      .xl-window { position:relative; width:1000px; height:660px; background:#fff; border-radius:12px; border:1px solid rgba(20,30,48,0.12); box-shadow:0 34px 90px rgba(28,30,38,0.24); overflow:hidden; display:grid; grid-template-rows:40px 38px 1fr 30px; }
      .xl-titlebar { display:flex; align-items:center; gap:12px; padding:0 16px; background:#f7f7f7; border-bottom:1px solid rgba(20,30,48,0.08); }
      .dots { display:flex; gap:8px; } .dots i { width:12px; height:12px; border-radius:50%; } .dots i:nth-child(1){background:#ec6a5e;} .dots i:nth-child(2){background:#f4bf4f;} .dots i:nth-child(3){background:#61c554;}
      .fname { font-size:14px; font-weight:600; color:#217346; }
      .xl-formula { display:flex; align-items:center; gap:12px; padding:0 14px; border-bottom:1px solid rgba(20,30,48,0.1); background:#fdfcfb; }
      .name-box { min-width:56px; font-size:13px; color:#16120f; border:1px solid rgba(20,30,48,0.14); border-radius:5px; padding:3px 8px; background:#fff; }
      .fx { font-style:italic; color:#67727f; font-size:13px; }
      .formula-input { font-size:14px; color:#16120f; font-family:"SF Mono",ui-monospace,monospace; }
      .xl-grid { position:relative; display:grid; grid-template-columns:44px repeat(4,1fr); grid-auto-rows:36px; font-size:14px; background:#fff; }
      .ch,.rh { background:#f4f6f8; color:#67727f; font-size:12px; display:grid; place-items:center; border-right:1px solid rgba(20,30,48,0.08); border-bottom:1px solid rgba(20,30,48,0.08); }
      .cell { display:flex; align-items:center; padding:0 12px; border-right:1px solid rgba(20,30,48,0.07); border-bottom:1px solid rgba(20,30,48,0.07); position:relative; }
      .cell.num { justify-content:flex-end; font-variant-numeric:tabular-nums; }
      .cell.head { font-weight:700; } .cell.strong { font-weight:700; }
      .cell.result { color:#0b6631; font-weight:700; }
      .sel-range { position:absolute; border:1.5px solid rgba(33,163,102,0.5); background:rgba(33,163,102,0.08); pointer-events:none; z-index:5; }
      .active-outline { position:absolute; border:2px solid #217346; pointer-events:none; z-index:6; }
      .xl-status { display:flex; align-items:center; justify-content:space-between; padding:0 16px; font-size:12px; color:#52514e; background:#f7f7f7; border-top:1px solid rgba(20,30,48,0.08); }
      .demo-cursor { position:absolute; left:640px; top:640px; z-index:90; width:26px; height:26px; background:url("../assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:40px; height:40px; border:2.5px solid rgba(33,163,102,0.7); border-radius:50%; opacity:0; }
      .bl-char { display:inline; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="../runtime/backlot-component-loader.js"></script>
    <script src="../runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      const stage = document.querySelector(".xl-stage");
      const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

      // Build selection + active-cell outlines positioned over the target cells.
      const grid = stage.querySelector('[data-role="grid"]');
      function rectOf(sel) { const el = stage.querySelector(sel); const g = grid.getBoundingClientRect(); const r = el.getBoundingClientRect(); return { left:r.left-g.left, top:r.top-g.top, w:r.width, h:r.height, cx:r.left-stage.getBoundingClientRect().left+r.width/2, cy:r.top-stage.getBoundingClientRect().top+r.height/2 }; }
      const c5 = rectOf('[data-cell="C5"]'), c7 = rectOf('[data-cell="C7"]'), c8 = rectOf('[data-cell="C8"]');
      const rangeH = c7.top - c5.top + c7.h;   // full C5:C7 height
      const sel = document.createElement("div"); sel.className = "sel-range";
      sel.style.cssText += `left:${c5.left}px;top:${c5.top}px;width:${c5.w}px;height:${c5.h}px;`;
      grid.appendChild(sel);
      const act = document.createElement("div"); act.className = "active-outline";
      act.style.cssText += `left:${c8.left}px;top:${c8.top}px;width:${c8.w}px;height:${c8.h}px;`;
      grid.appendChild(act);
      gsap.set([sel, act], { opacity: 0 });
      const statusRight = stage.querySelector(".xl-status .right");
      gsap.set(statusRight, { opacity: 0 });

      const FORMULA = "=SUM(C5:C7)";

      // 1) Drag-select the range C5:C7 — cursor presses at C5 and drags down to
      //    C7 while the selection rectangle grows under it (property-only height
      //    tween, so it scrubs).
      ix.moveTo('[data-cell="C5"]', { at: 0.5, dur: 0.85 });
      tl.set('[data-role="namebox"]', { textContent: "C5" }, 1.35);
      tl.set(sel, { opacity: 1 }, 1.4);                                  // mouse-down: 1-cell selection
      ix.click('[data-cell="C5"]', { at: 1.4, move: false, press: false }); // press ring
      ix.moveTo('[data-cell="C7"]', { at: 1.52, dur: 0.95, ease: "power2.inOut" });
      tl.to(sel, { height: rangeH, duration: 0.95, ease: "power2.inOut" }, 1.52); // drag grows selection
      tl.set('[data-role="namebox"]', { textContent: "3R x 1C" }, 2.2);
      tl.set('[data-role="namebox"]', { textContent: "C5" }, 2.5);
      // status bar live-sums the selection as Excel does
      tl.to(statusRight, { opacity: 1, duration: 0.2 }, 2.5);
      ix.type('[data-role="sum"]', "12", { at: 2.55, cps: 22, fade: 0.05 });

      // 2) select the total cell C8, then type =SUM(C5:C7) in the formula bar.
      ix.click('[data-cell="C8"]', { at: 3.25, moveDur: 0.85 });
      tl.to(sel, { opacity: 0, duration: 0.2 }, 3.25); // clicking C8 clears the C5:C7 drag-selection
      tl.to(statusRight, { opacity: 0, duration: 0.2 }, 3.25); // and Excel drops the status-bar aggregate when selection collapses to one cell
      ix.show(act, { at: 3.3, dur: 0.18, from: { opacity: 0, scale: 0.92 } });
      tl.set('[data-role="namebox"]', { textContent: "C8" }, 3.3);
      ix.click('[data-role="formula"]', { at: 4.05, moveDur: 0.55 });
      ix.type('[data-role="formula"]', FORMULA, { at: 4.45, cps: 16 });
      // 3) commit: the result appears in C8 atomically (formula results don't type in) and the cell flashes.
      const commitAt = 4.45 + FORMULA.length / 16 + 0.4;
      tl.set('[data-role="result"]', { textContent: "12" }, commitAt);
      tl.fromTo('[data-role="result"]', { opacity: 0 }, { opacity: 1, duration: 0.12 }, commitAt);
      tl.fromTo(act, { scale: 1 }, { scale: 1.05, yoyo: true, repeat: 1, duration: 0.13, transformOrigin: "50% 50%" }, commitAt);

      // The click-ring's fromTo tweens above (via the ix.click/ix.moveTo
      // helpers) render their "from" state (opacity 0.9) for any timeline
      // time before the tween's own start — that's how GSAP fromTo tweens
      // behave on seek, not just at creation. Pin the ring hidden at t=0
      // inside the timeline itself (not a bare gsap.set, which only runs
      // once at parse time and gets overwritten on the next seek) so the
      // opening at-rest frames render clean.
      tl.set(".demo-click-ring", { opacity: 0 }, 0);

      window.__timelines["excel-interaction"] = tl;
      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") tl.seek(6.6).pause();
    </script>
  </body>
</html>
