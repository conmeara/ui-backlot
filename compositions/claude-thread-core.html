    <style>
      /* Canonical Claude working-thread atom.
         Visual source of truth: compositions/claude-desktop.html pass-100
         (#claude-desktop-cowork .cw-main working thread + #claude-desktop-chat
         topbar treatment), verified against the live-app captures behind
         captures/surface-claude-desktop-chat and -cowork. Colors consume the
         canonical --claude-* tokens from styles/backlot-foundation.css where a
         token matches the pass-100 hex; non-token hexes are kept verbatim from
         claude-desktop. Scale switch is pure CSS via
         data-scale="working" | "cinematic" on #claude-thread-core-surface
         (default: working, the dense pass-100 thread). Cinematic is the
         large-serif treatment from compositions/claude-chat-pane.html. */
      #claude-thread-core-surface {
        width: 980px;
        height: 840px;
        overflow: visible;
        color: var(--claude-ink);
        font-family: var(--font-claude-ui);
      }

      #claude-thread-core-surface * {
        box-sizing: border-box;
      }

      #claude-thread-core-surface button {
        font: inherit;
      }

      /* :where() keeps class-level specificity (same pattern as the sidebar
         and composer atoms) while scoping to this surface — an unscoped
         .backlot-icon rule would leak into sibling atoms and shell chrome in
         composed documents (it stretched the sidebar's Claude mark across the
         brand row before scoping). */
      :where(#claude-thread-core-surface) .backlot-icon {
        width: 100%;
        height: 100%;
        display: block;
      }

      .claude-thread-core-stage {
        width: 980px;
        height: 840px;
        display: grid;
        place-items: center;
        padding: 38px 48px;
        background: var(--claude-paper);
      }

      /* Panel geometry (884x764 at 48,38) is the claude-composed-app mount
         contract — do not change. Flat paper canvas: the live app's chat
         conversation has no grid/graph-paper texture behind it (verified
         against reference/claude/2026-07-05/web-app-chat-light/screenshot.png),
         just var(--claude-paper) with a hairline edge. */
      .thread-core-panel {
        width: 884px;
        height: 764px;
        display: grid;
        grid-template-rows: 52px minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid rgba(55, 42, 31, 0.07);
        border-radius: 18px;
        background: var(--claude-paper);
        box-shadow:
          0 1px 1px rgba(49, 44, 38, 0.035),
          0 32px 96px rgba(54, 42, 31, 0.14);
      }

      .thread-topbar {
        height: 52px;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 0 14px 0 10px;
        background: rgba(248, 248, 246, 0.8);
      }

      .topbar-left,
      .topbar-actions {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .topbar-left {
        gap: 6px;
      }

      .topbar-actions {
        gap: 4px;
      }

      .topbar-icon {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        padding: 7px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #7b7974;
      }

      .thread-title-row {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .conversation-title {
        overflow: hidden;
        color: var(--claude-ink-soft);
        font-size: 15px;
        line-height: 1.1;
        font-weight: 550;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title-chev {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        color: #7b7974;
      }

      .thread-scroll {
        min-height: 0;
        position: relative;
        overflow: hidden;
        padding: 37px 0 30px;
      }

      .thread-scroll::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 48px;
        pointer-events: none;
        background: linear-gradient(0deg, #f8f8f6, rgba(248, 248, 246, 0));
      }

      .thread-width {
        width: min(calc(100% - 76px), 640px);
        margin-inline: auto;
      }

      .message-row {
        display: grid;
        min-width: 0;
        margin-bottom: 17px;
      }

      .message-row.user {
        justify-items: end;
      }

      .message-row.assistant {
        display: block;
      }

      .sticky-prompt-bubble {
        max-width: 566px;
        padding: 15px 20px 16px;
        border-radius: 18px;
        background: #ece9e2;
        color: var(--claude-ink);
        font-size: 17px;
        line-height: 1.5;
      }

      .thread-context-strip {
        display: none;
        width: min(calc(100% - 54px), 690px);
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0 0 23px auto;
      }

      .context-pill {
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 9px;
        border: 1px solid rgba(11, 11, 11, 0.1);
        border-radius: 999px;
        background: rgba(248, 248, 246, 0.72);
        color: var(--claude-text-muted);
        font-size: 11.5px;
        font-weight: 550;
      }

      .context-pill.active-context {
        color: var(--claude-brand-deep);
        background: rgba(216, 117, 95, 0.08);
      }

      .context-pill i {
        width: 12px;
        height: 12px;
        position: relative;
        border-radius: 3px;
        background: #d7cfc3;
      }

      .context-pill.folder i {
        background: #64bfe7;
      }

      .context-pill.folder i::before {
        content: "";
        position: absolute;
        left: 1px;
        top: -2px;
        width: 6px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        background: #8dd2f0;
      }

      .context-pill.sheet i {
        background: #84b889;
      }

      .assistant-stack {
        position: relative;
        min-width: 0;
      }

<script>
  (() => {
    const isDirectPreview = /\/claude-thread-core\.html$/.test(window.location.pathname);
    if (!isDirectPreview) return;
    const mount = () => {
      const template = document.getElementById("claude-thread-core-template");
      if (!template || document.querySelector("#claude-thread-core-surface")) return;
      const fragment = template.content.cloneNode(true);
      fragment.querySelectorAll("script").forEach((script) => script.remove());
      document.body.appendChild(fragment);
      const params = new URLSearchParams(window.location.search);
      const scale = params.get("scale");
      if (scale) document.querySelector("#claude-thread-core-surface").setAttribute("data-scale", scale);
    };
    if (document.body) mount();
    else window.addEventListener("DOMContentLoaded", mount, { once: true });
  })();
</script>
