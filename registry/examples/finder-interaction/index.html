<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Finder — Interaction Demo</title>
  </head>
  <body>
    <div id="finder-interaction" data-composition-id="finder-interaction" data-width="1280" data-height="800" data-start="0" data-duration="3.4">
      <section class="fn-stage" data-primitive="finder-interaction" aria-label="Finder (real component) with a scripted selection">
        <div class="wallpaper" aria-hidden="true"></div>
        <div class="fn-frame component-frame"
             data-primitive="finder-window"
             data-backlot-mount-src="compositions/finder-window.html"
             data-backlot-mount-selector="#finder-window-surface"></div>
        <div class="demo-cursor" data-primitive="cursor" aria-hidden="true"></div>
        <div class="demo-click-ring" data-primitive="click-ring" aria-hidden="true"></div>
      </section>
    </div>

    <style>
      @import url("styles/backlot-foundation.css");
      html, body { width:100%; min-height:100%; margin:0; display:grid; place-items:center; overflow:hidden; background:#0b1020; }
      #finder-interaction { width:1280px; height:800px; overflow:hidden; font-family:-apple-system,"SF Pro Text",Inter,sans-serif; }
      #finder-interaction * { box-sizing:border-box; }
      .fn-stage { position:relative; width:1280px; height:800px; overflow:hidden; }
      .wallpaper { position:absolute; inset:0; background:
        radial-gradient(120% 120% at 50% 55%,#3f7fd6 0%,#2a5bc0 45%,#16307e 100%),
        linear-gradient(160deg,#6ea6e8 0%,#2f68c8 48%,#17348a 100%); }
      .component-frame { position:absolute; overflow:hidden; }
      .component-frame > [data-backlot-mounted-component] { position:absolute; left:0; top:0; display:block; pointer-events:none; transform-origin:top left; }
      /* finder-window is 920x436; scale 1.2 and centre so the whole window is
         visible with even margins (was 1196px wide at left:130 → clipped right). */
      .fn-frame { left:88px; top:150px; width:1104px; height:523px; border-radius:12px;
        box-shadow:0 42px 110px rgba(6,18,54,0.45); }
      .fn-frame > [data-backlot-mounted-component] { transform: scale(1.2); }
      .demo-cursor { position:absolute; left:640px; top:520px; z-index:90; width:24px; height:24px;
        background:url("assets/cursors/normal-select.svg") top left / contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
      .demo-click-ring { position:absolute; left:0; top:0; z-index:89; width:38px; height:38px; border:2.5px solid rgba(255,255,255,0.85); border-radius:50%; opacity:0; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="runtime/backlot-component-loader.js"></script>
    <script src="runtime/backlot-interactions.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const stage = document.querySelector(".fn-stage");

      // Register the timeline SYNCHRONOUSLY with a full-duration hold so the
      // renderer never probes a zero-duration composition (the real finder-window
      // mounts asynchronously; the row-selection tweens are layered on once it is
      // ready). Without the hold, a fast browser start races the mount and the
      // render fails with "Composition has zero duration".
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });
      tl.to(stage, { opacity: 1, duration: 3.4 }, 0);   // no-op hold → duration is always 3.4
      window.__timelines["finder-interaction"] = tl;

      // Park the click-ring hidden and off-stage at t=0 so it can never show
      // as a stray artifact before the first click: BacklotInteractions'
      // click() uses gsap.fromTo() for the ring pulse, whose immediateRender
      // paints the "from" state (opacity 0.9) onto the DOM the instant this
      // script runs, before the timeline ever reaches that click's time. An
      // explicit set() at t=0 gives the timeline its own keyframe there so a
      // seek(0) always renders the ring hidden, regardless of that leak.
      tl.set(".demo-click-ring", { opacity: 0, left: -200, top: -200 }, 0);

      (window.__backlotComponentsReady || Promise.resolve()).then(() => {
        const cols = stage.querySelectorAll(".finder-column");
        // Column-view Finder holds exactly one selection path: col1's
        // "demo-workspace" stays the gray (inactive) ancestor untouched, and
        // the blue active-leaf selection walks rightward, col2 → col3, so
        // every downstream column stays coherent with what's on screen.
        const col2 = cols[1] || null;                 // "Launch Deck" (active leaf, blue)
        const col3 = cols[2] || null;                 // Launch Deck's children
        const launchDeck = col2 ? col2.querySelector(".file-row") : null;
        const col3Rows = col3 ? Array.from(col3.querySelectorAll(".file-row")) : [];
        const target = col3Rows[0] || null;            // design-feedback.txt
        const ix = BacklotInteractions.create(tl, { root: stage, cursor: ".demo-cursor", ring: ".demo-click-ring" });

        if (launchDeck && target) {
          // Column 3 starts empty-looking and reveals its rows as the direct
          // consequence of the first click, so drilling col1→col2→col3 reads
          // as a real reaction instead of a click on an already-active leaf.
          if (col3Rows.length) tl.set(col3Rows, { opacity: 0 }, 0);
          // Rest frame must be a state real Finder actually renders: Launch
          // Deck starts UNselected (matches the empty col3 beside it), so the
          // first click has a real payoff instead of re-clicking an
          // already-active leaf next to a column the app would never leave
          // blank.
          tl.set(launchDeck, { attr: { class: "file-row large" } }, 0);
          // 1) advance into column 2: cursor visits Launch Deck and the
          //    click atomically selects it AND populates col3 on the same
          //    beat — real column-view Finder never fades a folder's
          //    children in row-by-row, it shows them the instant the folder
          //    is selected.
          ix.click(launchDeck, { at: 0.7, moveDur: 0.9, press: false });
          tl.set(launchDeck, { attr: { class: "file-row selected large" } }, 0.72);
          if (col3Rows.length) tl.set(col3Rows, { opacity: 1 }, 0.72);
          // 2) advance into column 3: design-feedback.txt becomes the new
          //    blue active leaf; Launch Deck drops "selected" (demoted to a
          //    plain gray ancestor row, never fully unhighlighted) so the
          //    selection breadcrumb stays coherent while only one leaf is
          //    blue at a time. Committed on the same beat as the click so
          //    the highlight never lags behind the mousedown.
          ix.click(target, { at: 2.1, moveDur: 0.8, press: false });
          tl.set(launchDeck, { attr: { class: "file-row selected large ancestor" } }, 2.15);
          tl.set(target, { attr: { class: "file-row selected large" } }, 2.15);
        }
      }).catch(() => {});

      const cap = new URLSearchParams(location.search).get("capture");
      if (cap === "hero") tl.seek(3.4).pause();
    </script>
  </body>
</html>
